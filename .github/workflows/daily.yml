name: Daily

on:
  schedule:
    - cron: "15 6 * * *"   # 06:15 UTC — ~07:15 London / 08:15 CEST in winter
  workflow_dispatch:

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-24.04

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
      DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
      WEBAPP_BASE_URL: ${{ secrets.WEBAPP_BASE_URL }}
      TOKEN_HMAC_SECRET: ${{ secrets.TOKEN_HMAC_SECRET }}
      RANKER_DEGRADE_TO_HAIKU_ONLY: "true"  # remove once backlog of existing jobs is cleared

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Install
        run: pip install -e .

      - name: Run daily pipeline
        run: python -m policy_crawler.run --kind daily
