        style=\\\"min-height:1.5em\\\">10 min closing with Anna</p></li></ol></li></ol><h2><strong>About
        Ashby</strong></h2><p style=\\\"min-height:1.5em\\\">We\u2019re building the
        next generation of enterprise software and we\u2019re starting with a suite
        of products that help talent leaders, recruiters, and hiring managers run
        their hiring process significantly better. We are well-funded, have incredible
        product market fit, and are backed by great investors, including Y Combinator,
        Elad Gil and Lachy Groom.</p><p style=\\\"min-height:1.5em\\\"><em>We're in
        the talent acquisition software business. We run the end-to-end hiring process
        through our own platform, and ensure a level playing field for all candidates.
        Reaching out to hiring managers or recruiters directly won't improve your
        odds of success. Please focus your energy on the quality of your application.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby provides equal employment opportunities
        (EEO) to all employees and applicants for employment without regard to race,
        color, religion, sex, national origin, age, disability, genetics, sexual orientation,
