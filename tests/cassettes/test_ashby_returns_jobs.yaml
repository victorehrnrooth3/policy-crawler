        style=\\\"min-height:1.5em\\\">One of Ashby\u2019s core principles is <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#8---implement-continuous-improvement\\\"><u>continuous
        improvement</u></a> \u2014 exceptional customer experiences are built through
        principled systems, strategic vision, and disciplined execution at scale.
        When you combine that with our principle of caring deeply about our customers,
        we're continuously thinking 'what's a better way to accomplish this'.</p><p
        style=\\\"min-height:1.5em\\\">This is one of the reasons we're thrilled to
        be hiring a <strong>Global Head of Renewals</strong> to lead our post-sales
        renewal engine; helping us scale with discipline, operational rigor, and a
        consistently high bar for the customer experience.</p><p style=\\\"min-height:1.5em\\\">Ashby\u2019s
        growth, retention, and customer trust are best-in-class.  We serve thousands
        of customers, from early-stage startups to sophisticated enterprise organizations,
        and our Net Revenue Retention (NRR) is a critical driver of our business.
        \ As we continue to scale, Contract Management plays a pivotal role in enabling
        expansion while maintaining a transparent customer experience.</p><p style=\\\"min-height:1.5em\\\">This
        role is a senior, revenue-critical leadership position responsible for building
        and scaling Ashby\u2019s global renewal function.</p><p style=\\\"min-height:1.5em\\\"></p><h1><strong>About
        the Role</strong></h1><p style=\\\"min-height:1.5em\\\">As the Global Head
        of Renewals, you will own Ashby\u2019s renewal engine across all customer
        segments and lead a centralized, global team of Contract Managers.  Your mandate
        is to drive NRR while maintaining strong pricing discipline, rigorous renewal
        forecasting, and a transparent, principled commercial experience for our customers.</p><p
        style=\\\"min-height:1.5em\\\">You will partner closely across Customer Success,
        Sales, Finance, Legal, and Revenue Operations to build the systems, processes,
        and team required to support our increasingly sophisticated customer base.</p><p
        style=\\\"min-height:1.5em\\\">A core element of this role is hiring and scaling
        the team \u2014 setting clear expectations, inspecting outcomes, coaching
        toward excellence, and maintaining a consistently high performance bar as
        we grow.  This role reports directly to the VP of Customer Success and operates
        with significant executive visibility.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>What
        You\u2019ll Do</strong></h2><p style=\\\"min-height:1.5em\\\"></p><h3><strong>Lead
        &amp; Scale a High Performing Contract Management Organization</strong></h3><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Lead
        and scale a centralized global Contract Management team (currently 9, will
        be 15+ by end of this year)</p></li><li><p style=\\\"min-height:1.5em\\\">Hire,
        coach, and develop managers and individual contributors, evolving our current
        role definitions, performance standards, and career paths</p></li><li><p style=\\\"min-height:1.5em\\\">Further
        refine performance metrics and accountability mechanisms tied directly to
        NRR, GRR, forecast accuracy, and pricing discipline</p></li><li><p style=\\\"min-height:1.5em\\\">Foster
        a culture of ownership, accountability, and principled decision-making</p></li><li><p
        style=\\\"min-height:1.5em\\\">Surface renewal insights that inform go-to-market
        strategy, pricing decisions, and customer lifecycle improvements</p></li></ul><h3><strong>Own
        Global Renewal Outcomes</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Own renewal outcomes across all customer segments,
        including retention, seat growth, and expansion at renewal, with NRR as the
        primary success metric</p></li><li><p style=\\\"min-height:1.5em\\\">Ensure
        renewals are executed consistently and predictably, aligned with long-term
        customer and business value</p></li><li><p style=\\\"min-height:1.5em\\\">Partner
        closely with Sales to coordinate expansion opportunities at renewal, including
        upgrades across pricing tiers (e.g. Plus to Enterprise)</p></li><li><p style=\\\"min-height:1.5em\\\">Own
        the evolution of renewal tooling, workflows, and forecasting rigor, ensuring
        accurate renewal projections and clear visibility into NRR performance</p></li><li><p
        style=\\\"min-height:1.5em\\\">Build scalable renewal processes cross functionally
        that support Ashby\u2019s growth while maintaining a high-quality commercial
        experience</p></li></ul><h3><strong>Evolve Commercial Policy &amp; Pricing
        Discipline</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Partner
        with Revenue Operations, Finance, Contract Strategy, and Sales to maintain
        our current high standards with regard to pricing guardrails, discounting
        frameworks, and approval workflows</p></li><li><p style=\\\"min-height:1.5em\\\">Maintain
        consistency and rigor in commercial decisions while enabling thoughtful flexibility
        when warranted</p></li><li><p style=\\\"min-height:1.5em\\\">Uphold Ashby\u2019s
        strong pricing discipline as we continue to scale upmarket</p></li></ul><h3><strong>Enable
        Enterprise Renewals</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">As needed, oversee complex renewal motions,
        including multi-year agreements, procurement-heavy renewals, and custom MSAs
        (in close partnership with Legal)</p></li><li><p style=\\\"min-height:1.5em\\\">Ensure
        the team can confidently lead enterprise renewal negotiations, including procurement
        processes, non-standard terms, and executive stakeholder alignment</p></li></ul><h2><strong>You
        Could Be a Great Fit If You</strong></h2><p style=\\\"min-height:1.5em\\\">\U0001F4C8
        Are a post-sales revenue leader with experience owning renewals, retention,
        and NRR in a scaling B2B SaaS environment (ideally Series D or beyond). This
        could include experience leading an Account Management function, Renewals
        or Contract Management team.</p><p style=\\\"min-height:1.5em\\\"> \U0001F465
        Have deep experience hiring, coaching, and driving performance management
        \u2013 you are comfortable setting a high bar, giving direct feedback, and
        working toward excellence</p><p style=\\\"min-height:1.5em\\\"> \U0001F9E0
        Think in systems, not one-off solutions, and enjoy building scalable commercial
        frameworks</p><p style=\\\"min-height:1.5em\\\"> \U0001F91D Excel at cross-functional
        partnership, especially with Sales, Finance, Legal, and RevOps</p><p style=\\\"min-height:1.5em\\\">
        \u2696\uFE0F Balance customer empathy with business rigor, believing great
        commercial experiences are transparent, principled, and fair</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>This
        Role May Not Be a Fit If You</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Do not enjoy building and managing leaders
        and teams (hiring and performance management are key to success in role)</p></li><li><p
        style=\\\"min-height:1.5em\\\">Prefer execution without owning strategy, systems,
        or outcomes</p></li><li><p style=\\\"min-height:1.5em\\\">Have not led renewal
        or post-sales revenue motions in a B2B SaaS at scale</p></li><li><p style=\\\"min-height:1.5em\\\">Are
        uncomfortable partnering closely with Sales while maintaining clear ownership
        boundaries</p></li></ul><h2><strong>About Ashby</strong></h2><p style=\\\"min-height:1.5em\\\">Ashby
        is building the next generation of recruiting software \u2013 starting with
        a powerful, all-in-one platform that helps talent leaders, recruiters, and
        hiring managers run efficient, data-driven hiring processes.</p><p style=\\\"min-height:1.5em\\\">We\u2019re
        backed by Y Combinator, Elad Gil, and Lachy Groom, and trusted by thousands
        of customers including Shopify, Snowflake, Notion, and Zapier.  </p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>The
        Interview</strong></h2><p style=\\\"min-height:1.5em\\\">At Ashby, our team
