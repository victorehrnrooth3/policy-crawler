        TOUCH IMPLEMENTATION SPECIALIST\\n\\nHi, I\u2019m Daryl and I\u2019m the Manager
        of High Touch Implementations at Ashby. One of my favorite aspects of Ashby
        is our operating principle of Continuous Improvement https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#8---implement-continuous-improvement.
        Coupled with our principle of caring deeply about our customers, we often
        find ourselves wondering, \u201CWhat is a better way to accomplish this?\u201D
        That\u2019s why I am thrilled to be hiring a High Touch Implementation Specialist!\\n\\nAs
        a founding member of the High Touch Implementation team and part of our growing
        Professional Services team (within Ashby\u2019s Customer Success organization),
        you\u2019ll have the unique opportunity to help shape this new implementation
        offering, ultimately upleveling the overall customer experience.\\n\\n\\n\\n\\nABOUT
        THIS ROLE:\\n\\nAs an Implementation Specialist aligned to our High Touch
        segment, you will be responsible for managing and executing the end-to-end
        implementation of Ashby\u2019s solution for mid-market and smaller enterprise
        customers. Your book of business will include 12-15 active implementations
        at a time, each lasting 4-8 weeks. You will work directly with customers to
        develop and execute implementation plans that ensure a positive customer experience
        and expedited time to value. Your goal is to support our customers, helping
        them get up and running swiftly with Ashby so they can achieve their desired
        outcomes.\\n\\nRole requirements:\\n\\n - Implementation & Project Management:
        You have extensive experience leading implementation and onboarding projects
        in high growth B2B SaaS environments, defining scope, aligning stakeholders,
        communicating project plans, and delivering results against agreed upon expectations.
        You keep teams on track to meet milestones, work effectively in a remote first
        setting, and are willing to travel <10% for customer engagements.\\n\\n -
        Technical Proficiency: You have experience with complex, multi-module SaaS
        systems, understand shared configuration and data models, and are comfortable
        with analytics, conditional logic, and relational data (Ashby knowledge is
        a plus but not required)\\n\\n - Customer Centricity: You deeply understand
        customer needs and tailor implementations to meet their specific requirements.
        You build strong customer relationships by maintaining high levels of engagement
        and communication; you\u2019re the customer\u2019s proactive guide and advocate
        throughout the implementation period.\\n\\n - Change Management: You are experienced
        in navigating change management processes and helping customers adapt to new
        systems and a refreshed approach.\\n\\n - Best Practices & Recommendations:
        You take pride in advising customers on best practices specific to their usage
        of software to ensure optimal value.\\n\\n - Critical Thinking & Solutions
        Orientation: You proactively address thematic customer opportunities and improve
        our processes accordingly. You don\u2019t rely on \u2018I\u2019ve seen this
        done,\u2019 but instead think critically to solve problems.\\n\\n - Cross-functional
        Collaboration: You effectively partner with cross-functional stakeholders
        across Customer Success, Sales, Product, Engineering, and Operations to align
        and define progress.\\n\\nYou could be a great fit if:\\n\\n - \U0001F4E3
        You demonstrate clear communication. You ask clarifying questions with precision
        and can distill complex concepts into simple themes.\\n\\n - \U0001F3A7 You
        are a great listener. You see your role as the voice of the customer to internal
        stakeholders so we can ensure that our offerings continue to evolve in accordance
        with customer needs.\\n\\n - \U0001F4C8 You are a problem solver. You thrive
        at solving complex challenges with innovative, scalable solutions.\\n\\n -
        \u26A1\uFE0FYou know process matters. You are eager to improve processes and
        workflows to enhance efficiency and efficacy.\\n\\n - \U0001F50D Your peers
        describe you as detail-oriented and technically proficient. You take pride
        in internal operations.\\n\\n - \U0001F4CA You are data-driven. You use metrics
        and analytics to inform decisions and measure success.\\n\\n - \U0001F30D
        You are adaptable. You can navigate changes in a fast-paced, evolving environment.\\n\\n
        - \U0001F9D1\u200D\U0001F3EB You love to coach. You see every teaching moment
        as an opportunity and are excited to help our customers grow.\\n\\nYou might
        not be a great fit if:\\n\\n - You bring project management expertise, but
        rely on other resources to be technical or product subject matter experts
        during implementations.\\n\\n - You prefer managing shorter implementations
        of less than 30 days.\\n\\n - You typically manage only a few simultaneous
        implementations at a time. This segment moves with urgency and we balance
        a book of business from 20-25 implementations at a time\\n\\n - You are accustomed
        to defining ideas and strategies, yet not responsible for their execution.\\n\\n
        - You prefer working with a simple product (such as a point solution).\\n\\n
        - You prefer exclusively to build (rather than build, iterate, optimize).\\n\\n\\nOUR
        PHILOSOPHY\\n\\nHere are a few key points (relevant to the go-to-market side)
        that should give you an idea of what it is like to work with us:\\n\\n - We
        spend a lot of time building best-in-class products since we believe a highly
        differentiated product is a lot easier to sell.\\n\\n - We want to offer deep
        expertise whenever we interact with prospects and customers.\\n\\n - We strongly
        believe that small teams with very talented people (and the right work environment)
        deliver much better performance than teams with large headcount. We hire and
        compensate accordingly.\\n\\nWe value a strong sense of ownership, principled
        thinking over experience, and thoughtful communication (we put a lot of effort
        into using the right communication channels) - we\u2019ll get into these and
        other values during the hiring process. You can take a look at our Operating
        Principles https://www.ashbyhq.com/blog/culture/ashbys-operating-principles
        to get a sense of what we are looking for in folks on the team.\\n\\n\\n\\n\\nTHE
        INTERVIEW\\n\\nAt Ashby, our team and interview process want to help you show
        your best self. Our interview process is structured to get to know you and
        your career as well as empower you with insight into our key focus areas.
        Here is the process in its entirety:\\n\\n - 30 min - Recruiter Screen with
        Talent Team\\n\\n - 45 min - Interview with the Manager, of High Touch Implementations\\n\\n
        - 60 min- Mock Call with Strategic Implementation Specialist and High Touch
        Implementation Specialist\\n\\n - Final Round:\\n   \\n   - 30 min - Cross-Functional
        Interview with Head of Professional Services\\n   \\n   - 30 min - Product
        Complexity Interview with VP of Customer Success\\n   \\n   - 30 min - Customer
        Adoption & Enablement with Manager of High Touch Customer Success and a High
        Touch Customer Success Manager\\n   \\n   - 10 min - Closing Questions with
        Hiring Manager\\n\\n\\nBENEFITS\\n\\n - You\u2019ll get the time to do things
