        this Role</strong></h2><p style=\\\"min-height:1.5em\\\">Our Customer Success
        team is passionate about shaping and scaling an exceptional enterprise customer
        experience globally. As we continue to grow in APAC, we are excited to hire
        our first <strong>Customer Success Manager</strong> in region to support the
        implementation and full lifecycle of our Strategic and High Touch customers
        in the region.</p><p style=\\\"min-height:1.5em\\\">In this role, you will
        serve as both the Implementation Specialist and CSM for a defined book of
        upmarket APAC customers. You will own the customer journey end to end, from
        implementation and onboarding through long-term adoption, customer health,
        and value realization.</p><p style=\\\"min-height:1.5em\\\">You will partner
        with Ashby\u2019s customers, helping them get up and running quickly while
        also building deep, ongoing strategic relationships. Ashby is powerful and
        highly configurable, and this role requires both technical depth and customer
        leadership. You will develop strong product and domain expertise to help customers
        apply Ashby within their hiring workflows and achieve hiring excellence.</p><p
        style=\\\"min-height:1.5em\\\">This role is ideal for someone who thrives
        in complexity, enjoys hands-on execution, and is excited to help shape how
        we support customers in a new region.</p><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\"><strong>Role Requirements</strong></p><h3><strong>Customer
        Success &amp; Account Ownership</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You have a strong background in Customer Success
        in B2B SaaS (5+ years preferred), supporting Enterprise or Strategic customers
        on complex, configurable products and driving adoption, engagement, and long-term
        outcomes.</p></li><li><p style=\\\"min-height:1.5em\\\">You are excited to
        own a strategic book of customers in APAC, balancing both implementation work
        and ongoing Customer Success for our upmarket customers.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        build trusted, multi-threaded relationships with senior stakeholders and act
        as a proactive owner of customer health, risk, and value realization.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You partner closely with Sales, Product, Support,
        Professional Services, and Operations to deliver cohesive, high-quality customer
        outcomes across the full lifecycle.</p></li></ul><h3><strong>Implementation
        &amp; Project Management</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You have experience managing end-to-end implementations
        and onboarding projects, including defining scope, aligning stakeholders,
        communicating project plans, and delivering against milestones and expectations.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You act as the customer\u2019s guide throughout
        implementation, ensuring expedited time to value and a smooth transition into
        steady-state customer success.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        are comfortable working in a remote-first environment and can travel up to
        10 percent as needed for strategic customer engagements in APAC.</p></li></ul><h3><strong>Product,
        Technical, and Domain Expertise</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You love becoming a product and industry expert.
        You create \u201Caha\u201D moments by tailoring configuration, workflows,
        and training to each customer\u2019s specific hiring challenges.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You have worked with technically complex products
        and are deeply curious about how things work, enabling you to anticipate risks,
        troubleshoot issues, and support evolving customer requirements.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You take pride in advising customers on best
        practices to ensure they get maximum value from Ashby.</p></li></ul><h3><strong>Change
        Management &amp; Problem Solving</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You are experienced in change management and
        help customers successfully adopt new systems, workflows, and ways of working.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You think critically and proactively identify
        themes across customers, using those insights to improve internal processes,
        implementation approaches, and customer playbooks.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        use data, signals, and metrics to assess adoption, spot risk, and continuously
        refine your approach.</p></li><li><p style=\\\"min-height:1.5em\\\">You are
        comfortable operating as the first Customer Success hire in APAC, bringing
        curiosity, ownership, and initiative to develop the region, define best practices,
        and partnering cross-functionally.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\"><strong>You Should Apply If:</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F4E3
        You communicate with clarity and precision. You can distill complex workflows,
        reports, or technical concepts into simple, confident guidance for a range
        of stakeholders.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3A7
        You are a listener first. You seek to deeply understand customer needs and
        advocate for them internally to shape how Ashby evolves for enterprise use
        cases.</p></li><li><p style=\\\"min-height:1.5em\\\">\u2699\uFE0F You thrive
        in complexity. You are energized by learning a powerful, configurable product
        and translating that knowledge into practical solutions.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F9D1\u200D\U0001F3EB
        You love teaching and coaching. You see every interaction as an opportunity
        to help customers grow and succeed.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F50D
        Your peers describe you as detail-oriented. You send crisp follow-ups, keep
        projects on track, and take pride in strong internal operations and CRM hygiene.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4CA You are data-driven. You use insights
        to evaluate what is working, identify risks, and improve outcomes over time.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F30D You are adaptable. You are excited
        to help shape and evolve our enterprise and APAC customer motion as the region
        scales. While there are in-region Product Support Specialists and a Support
        Manager, you\u2019ll be our founding CSM!</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F465
        You may have experience as a recruiter, hiring manager, or interviewer, which
        helps you quickly connect Ashby\u2019s workflows to real-world hiring challenges
        (nice to have, not required).</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>Why
        you shouldn\u2019t apply:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You are looking for a role with infrequent,
        transactional customer interactions instead of hands-on, ongoing partnerships.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You prefer exclusively commercial account management
        with variable compensation. This role focuses on implementation, adoption,
        engagement, and long-term value rather than renewals or upsell negotiation.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You are not excited by hands-on execution,
        detailed configuration, project management, or change management work.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You prefer working with simple, point-solution
        products rather than a deep, highly configurable platform.</p></li></ul><h2><strong>About
        Ashby</strong></h2><p style=\\\"min-height:1.5em\\\">We\u2019re building the
        next generation of enterprise software and we\u2019re starting with a suite
        of products that empower talent leaders, recruiters, and hiring managers to
        be a driving force for revenue &amp; efficiency via a holistic, data-centric
        talent strategy.</p><p style=\\\"min-height:1.5em\\\">We are well funded and
        backed by great investors, including Y Combinator, Elad Gil and Lachy Groom.
        <strong>We have thousands of amazing customers</strong> including Snowflake,
        OpenAI, Shopify, Ramp, Notion, and Zapier (and many others who we cannot name!).</p><p
        style=\\\"min-height:1.5em\\\">Our growth and retention metrics are best-in-class
        among our peers: we have tens of millions in ARR, growing &gt;100% year over
        year, over 4,000 customers, very low churn, and many years of runway. In short,
        it's the perfect time to join! \U0001F680</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Interview
        Process</strong></h2><p style=\\\"min-height:1.5em\\\">Our interview process
        is designed to be thorough and transparent, ensuring mutual fit for both you
        and Ashby. The process for this role includes:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Recruiter Screen (30 minutes)</p></li><li><p
        style=\\\"min-height:1.5em\\\">Hiring Manager Interview (45 minutes)</p></li><li><p
        style=\\\"min-height:1.5em\\\">Interview with the Implementation Team (30
        mins) </p><p style=\\\"min-height:1.5em\\\">Implementation or Customer Scenario
        Presentation (45 to 60 minutes)</p></li><li><p style=\\\"min-height:1.5em\\\">Panel
        Interview (approximately 2 hours)</p></li></ol><h2></h2><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">10-year
        exercise window for stock options. You shouldn\u2019t feel pressure to purchase
        stock options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO with four weeks is recommended
        per year<em>.</em> Expect \u201CVacation?\u201D in our one-on-one agenda until
        you start taking it \U0001F605</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        paid family leave<em>.</em></p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li></ul><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"ABOUT
        THIS ROLE\\n\\nOur Customer Success team is passionate about shaping and scaling
        an exceptional enterprise customer experience globally. As we continue to
        grow in APAC, we are excited to hire our first Customer Success Manager in
        region to support the implementation and full lifecycle of our Strategic and
        High Touch customers in the region.\\n\\nIn this role, you will serve as both
        the Implementation Specialist and CSM for a defined book of upmarket APAC
        customers. You will own the customer journey end to end, from implementation
        and onboarding through long-term adoption, customer health, and value realization.\\n\\nYou
        will partner with Ashby\u2019s customers, helping them get up and running
        quickly while also building deep, ongoing strategic relationships. Ashby is
        powerful and highly configurable, and this role requires both technical depth
        and customer leadership. You will develop strong product and domain expertise
        to help customers apply Ashby within their hiring workflows and achieve hiring
        excellence.\\n\\nThis role is ideal for someone who thrives in complexity,
        enjoys hands-on execution, and is excited to help shape how we support customers
        in a new region.\\n\\n\\n\\nRole Requirements\\n\\n\\nCUSTOMER SUCCESS & ACCOUNT
        OWNERSHIP\\n\\n - You have a strong background in Customer Success in B2B
        SaaS (5+ years preferred), supporting Enterprise or Strategic customers on
        complex, configurable products and driving adoption, engagement, and long-term
        outcomes.\\n\\n - You are excited to own a strategic book of customers in
        APAC, balancing both implementation work and ongoing Customer Success for
        our upmarket customers.\\n\\n - You build trusted, multi-threaded relationships
        with senior stakeholders and act as a proactive owner of customer health,
        risk, and value realization.\\n\\n - You partner closely with Sales, Product,
        Support, Professional Services, and Operations to deliver cohesive, high-quality
        customer outcomes across the full lifecycle.\\n\\n\\nIMPLEMENTATION & PROJECT
        MANAGEMENT\\n\\n - You have experience managing end-to-end implementations
        and onboarding projects, including defining scope, aligning stakeholders,
        communicating project plans, and delivering against milestones and expectations.\\n\\n
        - You act as the customer\u2019s guide throughout implementation, ensuring
        expedited time to value and a smooth transition into steady-state customer
        success.\\n\\n - You are comfortable working in a remote-first environment
        and can travel up to 10 percent as needed for strategic customer engagements
        in APAC.\\n\\n\\nPRODUCT, TECHNICAL, AND DOMAIN EXPERTISE\\n\\n - You love
        becoming a product and industry expert. You create \u201Caha\u201D moments
        by tailoring configuration, workflows, and training to each customer\u2019s
        specific hiring challenges.\\n\\n - You have worked with technically complex
        products and are deeply curious about how things work, enabling you to anticipate
        risks, troubleshoot issues, and support evolving customer requirements.\\n\\n
        - You take pride in advising customers on best practices to ensure they get
        maximum value from Ashby.\\n\\n\\nCHANGE MANAGEMENT & PROBLEM SOLVING\\n\\n
        - You are experienced in change management and help customers successfully
        adopt new systems, workflows, and ways of working.\\n\\n - You think critically
        and proactively identify themes across customers, using those insights to
        improve internal processes, implementation approaches, and customer playbooks.\\n\\n
        - You use data, signals, and metrics to assess adoption, spot risk, and continuously
        refine your approach.\\n\\n - You are comfortable operating as the first Customer
        Success hire in APAC, bringing curiosity, ownership, and initiative to develop
        the region, define best practices, and partnering cross-functionally.\\n\\n\\n\\nYou
        Should Apply If:\\n\\n - \U0001F4E3 You communicate with clarity and precision.
        You can distill complex workflows, reports, or technical concepts into simple,
        confident guidance for a range of stakeholders.\\n\\n - \U0001F3A7 You are
        a listener first. You seek to deeply understand customer needs and advocate
        for them internally to shape how Ashby evolves for enterprise use cases.\\n\\n
        - \u2699\uFE0F You thrive in complexity. You are energized by learning a powerful,
        configurable product and translating that knowledge into practical solutions.\\n\\n
        - \U0001F9D1\u200D\U0001F3EB You love teaching and coaching. You see every
        interaction as an opportunity to help customers grow and succeed.\\n\\n -
        \U0001F50D Your peers describe you as detail-oriented. You send crisp follow-ups,
        keep projects on track, and take pride in strong internal operations and CRM
        hygiene.\\n\\n - \U0001F4CA You are data-driven. You use insights to evaluate
        what is working, identify risks, and improve outcomes over time.\\n\\n - \U0001F30D
        You are adaptable. You are excited to help shape and evolve our enterprise
        and APAC customer motion as the region scales. While there are in-region Product
        Support Specialists and a Support Manager, you\u2019ll be our founding CSM!\\n\\n
        - \U0001F465 You may have experience as a recruiter, hiring manager, or interviewer,
        which helps you quickly connect Ashby\u2019s workflows to real-world hiring
        challenges (nice to have, not required).\\n\\nWhy you shouldn\u2019t apply:\\n\\n
        - You are looking for a role with infrequent, transactional customer interactions
        instead of hands-on, ongoing partnerships.\\n\\n - You prefer exclusively
        commercial account management with variable compensation. This role focuses
        on implementation, adoption, engagement, and long-term value rather than renewals
        or upsell negotiation.\\n\\n - You are not excited by hands-on execution,
        detailed configuration, project management, or change management work.\\n\\n
        - You prefer working with simple, point-solution products rather than a deep,
        highly configurable platform.\\n\\n\\nABOUT ASHBY\\n\\nWe\u2019re building
        the next generation of enterprise software and we\u2019re starting with a
        suite of products that empower talent leaders, recruiters, and hiring managers
        to be a driving force for revenue & efficiency via a holistic, data-centric
        talent strategy.\\n\\nWe are well funded and backed by great investors, including
        Y Combinator, Elad Gil and Lachy Groom. We have thousands of amazing customers
        including Snowflake, OpenAI, Shopify, Ramp, Notion, and Zapier (and many others
        who we cannot name!).\\n\\nOur growth and retention metrics are best-in-class
        among our peers: we have tens of millions in ARR, growing >100% year over
        year, over 4,000 customers, very low churn, and many years of runway. In short,
        it's the perfect time to join! \U0001F680\\n\\n\\n\\n\\nINTERVIEW PROCESS\\n\\nOur
        interview process is designed to be thorough and transparent, ensuring mutual
        fit for both you and Ashby. The process for this role includes:\\n\\n 1. Recruiter
        Screen (30 minutes)\\n\\n 2. Hiring Manager Interview (45 minutes)\\n\\n 3.
        Interview with the Implementation Team (30 mins)\\n    \\n    Implementation
        or Customer Scenario Presentation (45 to 60 minutes)\\n\\n 4. Panel Interview
        (approximately 2 hours)\\n\\n\\n\\n\\n\\nBENEFITS\\n\\n - 10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.\\n\\n
        - Unlimited PTO with four weeks is recommended per year. Expect \u201CVacation?\u201D
        in our one-on-one agenda until you start taking it \U0001F605\\n\\n - Generous
        paid family leave.\\n\\n - Generous equipment, software, and office furniture
        budget. Get what you need to be happy and productive!\\n\\n - $100/month education
        budget with more expensive items (like conferences) covered with manager approval.\\n\\nAshby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.\\n\\nAshby
        is committed to a fair and transparent hiring process. We confirm that this
        advertisement is for an active, existing vacancy within our organization.
        Please be advised that we may use artificial intelligence-driven tools to
        assist our recruitment team in screening, assessing, and selecting candidates
        for this position.\",\"compensation\":{\"compensationTierSummary\":\"A$135K
