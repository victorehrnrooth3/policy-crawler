        Kingdom\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/e1eba70b-51ae-422c-ae5d-a36bc5d72441\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/e1eba70b-51ae-422c-ae5d-a36bc5d72441/application\",\"descriptionHtml\":\"<h2><strong>About
        this role</strong></h2><p style=\\\"min-height:1.5em\\\">As a Solutions Engineer
        at Ashby you\u2019ll be at the forefront of our sales efforts with DACH customers,
        partnering closely with German-fluent Account Executives to secure both the
        technical and commercial win. Your goal with each customer is to show how
        Ashby supports their unique needs, and highlight how our platform can transform
        the way they hire. To do this effectively, you'll develop deep expertise in
        our product, gain insights into our competitors, and have a deep understanding
        of the challenges Talent Acquisition teams face.</p><p style=\\\"min-height:1.5em\\\">You\u2019ll
        play a crucial role in DACH sales cycles, where you will deliver personalized
        product demonstrations, facilitate well-structured product trials, and coordinate
        comprehensive and insightful RFP responses. Success in this role means using
        your discovery skills, empathy for our customers, and product knowledge to
        clearly articulate the transformative impact Ashby can have on their business.</p><p
        style=\\\"min-height:1.5em\\\">As an SE, you want to be selling a product
        that customers fall in love with. There\u2019s nothing better than seeing
        a prospect's jaw <em>literally</em> drop in the middle of a demo, and it only
        happens when you have a solution that solves <em>real</em> pain for someone.
        At Ashby, it happens daily.</p><p style=\\\"min-height:1.5em\\\">When prospects
        are <em>eager</em> to buy\u2014something that happens often because our product
        truly stands out\u2014you\u2019ll know you\u2019re hitting the mark!</p><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>You could be a great fit if:</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F30D
        You have sold to multiple regions within EMEA and have strong written and
        verbal fluency in both English and German</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F46A
        You have experience as a Sales Engineer / Solutions Consultant supporting
        complex, multi-stakeholder SaaS sales cycles in a team-selling motion.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F499 You have spent time with HR or Talent
        teams, and you have a high level of empathy for the work they do day to day\u2014their
        pain is our pain.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F913
        You have developed deep product expertise across a suite of solutions. You\u2019re
        well regarded as a subject-matter expert by your peers today.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4C8 You love to learn, and can quickly
        connect the dots between new concepts, product capabilities, and business
        outcomes.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4E3 You demonstrate
        mastery of clear communication. You ask questions with precision and listen
        for nuance in answers. You explain complex concepts in simple terms and can
        articulate the business impact of features.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F6E0
        You're a builder - you get energy from digging into problems and finding unique
        solutions, and you love working in a fast paced organization.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4DA You\u2019re adept at creating and
        delivering tailored demos that span a broad range of product capabilities.
        You are comfortable adapting on the fly based on customer questions.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F91D You proactively engage AEs to distribute
        the work of progressing deals towards a commercial win.</p></li><li><p style=\\\"min-height:1.5em\\\">\u267B\uFE0F
        You are a partner to the product org, translating customer feedback into requirements
        that have resulted in product enhancements</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Bonus
        points for:</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F91D
        Familiarity with recruiting workflows &amp; data in Applicant Tracking Systems</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4C8 Demo infrastructure or demo engineering
        experience</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F6E0 Value
        engineering / consulting experience, building bespoke and quantifiable business
        cases</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Examples
        of things you\u2019ll work on:</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4B0 Help win new marquee accounts! Our
        buyers have nuanced and detailed requirements that you\u2019ll address in
        a systematic way to maintain deal momentum.</p></li><li><p style=\\\"min-height:1.5em\\\">\u2699\uFE0F
        Build upon our existing demo environments to craft compelling narratives to
        showcase product capabilities</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3A8
        Design repeatable processes to make the solutions engineering team a well
        oiled machine as we scale</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Why
        become an SE at Ashby?</strong></h2><p style=\\\"min-height:1.5em\\\">Ashby
        is a unique place to work as a Solutions Engineer - we're not just keeping
        pace with industry standards; we're setting them. Each time we speak with
        customers, our platform enables us to show truly novel ways to improve their
        TA strategy. Here's why:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Incredible
        Product-Market Fit</strong>: Our solutions are not just products; they address
        critical pain points in the talent and recruiting ecosystem. The challenges
        our clients face aren't merely operational; they stem from a sector that has
        historically struggled to keep up with the evolving needs of global talent
        teams. Ashby stands out by offering not just answers but transformation.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Revolutionizing an Under-served Market</strong>:
        The gap between what talent teams need and what traditional software offers
        is wide, but Ashby is bridging it. We bring to the table an exceptional product
        endowed with versatility and innovative capabilities. Our solutions are designed
        for teams strive for hiring excellence through efficiency, agility, and continuous
        improvement.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>A Canvas
        for Creativity and Impact</strong>: At Ashby, Solutions Engineers have the
        unique opportunity to sculpt our offerings across a vast spectrum of product
        capabilities. Our platform empowers you to get creative and solutions that
        continuously exceed expectations. Here, your work directly contributes to
        reshaping how companies around the world attract, hire, and retain talent.</p></li></ul><p
        style=\\\"min-height:1.5em\\\">Becoming a Solutions Engineer at Ashby means
        being at the forefront of a transformation in the talent acquisition landscape.
        Here, your contributions have the power to make a tangible impact on our clients'
        success and the industry at large.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Reasons
        you shouldn't apply:</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">If iteration and innovation makes you anxious,
        and you're more about sticking to the tried-and-true, this role may not be
        the right fit.</p></li><li><p style=\\\"min-height:1.5em\\\">Our team works
        on a wide range of deals - from hundreds to thousands of employees. Each customer
        has unique challenges, and it's important that you're excited by the complexity
        of the issues, not the size of the deal.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        are not comfortable combining both deep technical expertise and business acumen
        to build powerful justifications for purchase.</p></li><li><p style=\\\"min-height:1.5em\\\">If
        a fast-paced and ever-evolving work setting makes you uncomfortable, the dynamic
        environment at Ashby could be more challenging than rewarding.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Should you see feedback more as a critique
        than a catalyst for growth, the collaborative and improvement-driven culture
        at Ashby may not suit your style.</p></li></ul><h2><strong>Interview Process</strong></h2><p
        style=\\\"min-height:1.5em\\\">Our interview process is thorough \u2014 we
        aim to ensure each person that joins the team is the right fit for Ashby and
        will provide ample information for you to assess if Ashby is the right fit
        for you. The process for this role is as follows:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Recruiter Interview: 30 minutes</p></li><li><p
        style=\\\"min-height:1.5em\\\">Hiring Manager Interview: 60 minutes</p></li><li><p
        style=\\\"min-height:1.5em\\\">Demo Role Play: 30 minutes</p></li><li><p style=\\\"min-height:1.5em\\\">Solution
        Strategy Session: 30 minutes</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019ll
        get the time to do things the right way; we put a lot of emphasis on high
        quality work and avoid quick hacks as much as possible.</p></li><li><p style=\\\"min-height:1.5em\\\">Sell
        a product that our<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/customers\\\"> <u>customers are truly excited
        about</u></a>.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous equipment,
        software, and office furniture budget. Get what you need to be happy and productive!</p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>10-year exercise window for stock options</em>.
        You shouldn\u2019t feel pressure to purchase stock options if you leave Ashby
