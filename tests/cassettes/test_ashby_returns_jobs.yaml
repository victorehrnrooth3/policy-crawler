        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"ABOUT
        ASHBY\\n\\n - We\u2019re building the next generation of enterprise software,
        starting with products that help talent leaders, recruiters, and managers
        unlock hiring excellence\\n\\n - Raised our Series D earlier this year, and
        we\u2019re growing ARR >100% YoY\\n\\n - Have over 3,000 amazing customers,
