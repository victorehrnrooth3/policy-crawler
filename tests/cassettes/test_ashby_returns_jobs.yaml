        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/9fba6b38-f324-49b1-ae3d-40894ad12bb1\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/9fba6b38-f324-49b1-ae3d-40894ad12bb1/application\",\"descriptionHtml\":\"<h2>About
        Ashby</h2><p style=\\\"min-height:1.5em\\\">We\u2019re building the next generation
        of enterprise software and we\u2019re starting with a suite of products that
        empower talent leaders, recruiters, and hiring managers to be a driving force
        for revenue &amp; efficiency via a holistic, data-centric talent strategy.</p><p
        style=\\\"min-height:1.5em\\\">We are well funded and backed by great investors,
        including Y Combinator, Elad Gil and Lachy Groom. <strong>We have thousands
        of amazing customers</strong> including Snowflake, OpenAI, Shopify, Ramp,
        Notion, and Zapier (and many others who we cannot name!). </p><p style=\\\"min-height:1.5em\\\">We
        have a clear buyer persona and large target market. Plus, we already have
        multiple products to sell. Revenue and headcount is growing 100% Y/Y and we've
        only taken the first steps towards a much larger opportunity. In short, it's
        the perfect time to join! \U0001F680</p><p style=\\\"min-height:1.5em\\\"></p><h2>About
        this Role</h2><p style=\\\"min-height:1.5em\\\">You will help us win Enterprise
        (1,000+ employees) accounts by managing the full sales cycle from pipeline
        generation through to won. You can expect to own a curated list of excellent
        fit, high propensity accounts as well as a geographic territory with significant
        market opportunity.</p><p style=\\\"min-height:1.5em\\\">In this role, you'll
        primarily focus on new logo acquisition via a healthy mix of inbound and outbound,
        while also covering a small number of customer accounts for expansion and
        upsell. Our emphasis is on your ability to excel in the areas listed below
        and your appetite for continuous growth &amp; improvement.</p><p style=\\\"min-height:1.5em\\\"></p><h3>Role
        Requirements:</h3><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        have a multi-year track record of exceeding $1M+ quotas, selling complex SaaS
        technologies to large organizations</p></li><li><p style=\\\"min-height:1.5em\\\">You
        have closed many $100K+ ARR sales which require consensus building and executive
        engagement.</p></li><li><p style=\\\"min-height:1.5em\\\">You have a demonstrated
        ability to win highly competitive opportunities by identifying pain and business
        impacts and connecting those to strategic initiatives of the leadership team</p></li><li><p
        style=\\\"min-height:1.5em\\\">You are a hunter at heart and are comfortable
        self-sourcing a majority of your own pipeline</p></li><li><p style=\\\"min-height:1.5em\\\">You
        have a growth mindset and are excited to tackle the challenges of a high growth
        startup</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h3>You could be
        a great fit if:</h3><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F4E3
        You demonstrate mastery of clear communication. You ask questions with precision
        and can explain complex concepts in simple terms. You eschew business jargon.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F3D4\uFE0F You skillfully guide prospects
        through their entire buying process\u2014engaging the right stakeholders at
        the right time to create consensus for a strategic technology decision.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F913 You become both a product and industry
        expert. You create \u2018Ah ha!\u2019 moments in collaboration with your Solutions
        Engineer to build momentum &amp; solve customer-specific challenges.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F50D Your peers describe you as detail
        oriented. You send timely &amp; crisp follow-up emails. You take pride in
        internal operations, like real-time CRM updates.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F91D
        You have strong business acumen. You help customers connect the dots between
        technical problems and their business impact. You craft compelling cases for
        change.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4B0 You're excited
        to land the biggest deals we've ever done. You are diligent and gritty and
        have demonstrated perseverance to win long, competitive sales cycles.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\u2699\uFE0F You're a creative problem solver
        and comfortable with some healthy ambiguity. You'll help us refine our Enterprise
        go-to-market motion to maximize the segment's results over time.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\u2708\uFE0F You're willing to travel for company
        events, customer meet ups and on-sites. </p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h3>You
        may not be a great fit if:</h3><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F92B
        You dislike prospecting. Enterprise reps at Ashby are responsible for sourcing
        half or more of their pipeline to complement our robust inbound lead flow.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4BB You prefer to leave demos \\\"to
        the experts.\\\" While you can expect Solutions Engineering support, our most
        successful AEs are those with strong curiosity and deep product acumen.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4BC You're more of a relationship builder
        who focuses on selling into the install base. This is primarily a new business
        oriented role.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F43A You're
        a lone wolf. You prefer to go it alone in your pursuit of new business. We
        believe in a team-selling sales model.</p></li></ul><h3>Bonus:</h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Familiarity with Talent Acquisition and HR
        tools and workflows</p></li><li><p style=\\\"min-height:1.5em\\\">A network
        that includes Heads of Talent you can tap into</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2>Our
        Philosophy</h2><p style=\\\"min-height:1.5em\\\">Here are a few key points
        (relevant to the go-to-market side) that should give you an idea of what it
        is like to work with us:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We
        spend a lot of time building best-in-class products since we believe a highly
        differentiated product is easier to sell.</p></li><li><p style=\\\"min-height:1.5em\\\">We
        aim to provide both product &amp; industry expertise whenever we interact
        with prospects and customers.</p></li><li><p style=\\\"min-height:1.5em\\\">We
        strongly believe that small teams with very talented people (and the right
        work environment) deliver much better performance than teams with large headcount.
        We hire and compensate accordingly.</p></li><li><p style=\\\"min-height:1.5em\\\">We
        value a strong sense of ownership, principled thinking over experience, and
        thoughtful communication.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2>Interview
        Process</h2><p style=\\\"min-height:1.5em\\\">Our interview process is thorough
        \u2014 we assess if you are the right fit for Ashby and we will provide ample
        information for you to determine if Ashby is the right place for you. The
        process for this role is as follows:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\"><strong>Intro Call</strong> (30 min) - You'll
        meet with a Recruiter to discuss your fit for the role and address questions
        about our market and solution.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Written
        Exercise -  </strong>You'll complete a short take home assignment to showcase
        your outbound muscle. </p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Experience
        Deep Dive </strong>(60 min) - You'll walk the Hiring Manager through your
        career journey in some detail to highlight your experience, achievements,
        and points of learning to understand how you've developed into the professional
        you are today.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Challenge
        Interview</strong> (90 min) - This will be made up of two parts: </p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Discovery and Demo Role Play (60 min) </p></li><li><p
        style=\\\"min-height:1.5em\\\">Deal Strategy Discussion (30 min) </p></li></ul></li></ul><p
        style=\\\"min-height:1.5em\\\"></p><h2>Benefits</h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Sell a product that our <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/customers\\\">customers
        are truly excited about</a>.</p></li><li><p style=\\\"min-height:1.5em\\\">Fairly
        set, achievable quotas. Typically, greater than 65% of AEs are at or above
        quota. </p></li><li><p style=\\\"min-height:1.5em\\\">Unlimited PTO with four
        weeks recommended per year</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\"><em>10-year
        exercise window for stock options</em>. You shouldn\u2019t feel pressure to
        purchase stock options if you leave Ashby \u2014do it when you feel financially
        comfortable.</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month education
        budget with more expensive items (like conferences) covered with manager approval.</p></li><li><p
        style=\\\"min-height:1.5em\\\">If you\u2019re in the US, top-notch health
        insurance for you and your dependents with 100% of all premiums covered by
        us, Flexible Spending Accounts <em>and</em> 401K match.<br /><br /></p></li></ul><p
        style=\\\"min-height:1.5em\\\"><em>We're in the talent acquisition software
        business. We run the end-to-end hiring process through our own platform, and
        ensure a level playing field for all candidates. Reaching out to hiring managers
        or recruiters directly won't improve your odds of success. Please focus your
        energy on the quality of your application.</em></p><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"ABOUT
