        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/f2ba7c39-e5cb-47aa-8b80-74c0426725b7\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/f2ba7c39-e5cb-47aa-8b80-74c0426725b7/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">Hi! I'm Allie, Head of Support at Ashby. \U0001F44B
        I have had the privilege of working with an incredible Support Team full of
        highly knowledgeable, driven team members who care deeply about the success
        of our customers. One of our key priorities is to scale our Support Team\u2019s
        ability to resolve deeply technical issues and support complex customers and
        workflows. That\u2019s why we\u2019re searching for a Support Engineering
        Manager to grow and shape the future of Support Engineering at Ashby.</p><p
        style=\\\"min-height:1.5em\\\">This role is not a traditional Support Manager
        position. We\u2019re looking for someone who has technical depth, is confident
        diving into complex systems, and can mentor others on complex problem solving.</p><p
        style=\\\"min-height:1.5em\\\">In this role, you\u2019ll manage a team of
        highly skilled Support Engineers, work closely with Engineering to refine
        escalation and triage practices, and help define how Support Engineering operates
        at Ashby. We\u2019re looking for a builder with strong instincts who sees
        inefficiency quickly, takes action, and drives high-leverage improvements
        without over-engineering solutions.</p><p style=\\\"min-height:1.5em\\\">This
        is a unique opportunity to oversee our Support Engineering function, collaborate
        deeply with our Engineering and Product teams, and create scalable processes
        and systems for technical triage, debugging, and problem-solving. You should
        be energized by moving fast, experimenting, and making pragmatic decisions,
        even when you don\u2019t have perfect data. If you love designing systems,
        building technical teams, and thinking holistically about how support can
        be a force multiplier across the business, you are in the right place!</p><p
        style=\\\"min-height:1.5em\\\"></p><h1><strong>About This Role</strong></h1><p
        style=\\\"min-height:1.5em\\\">As the Support Engineering Manager, you will
        oversee a technically proficient team responsible for resolving complex product
        issues, supporting integrations and data workflows, and influencing product
        decisions through customer insights. This team serves as a key escalation
        layer for high-priority technical challenges while creating proactive solutions
        to elevate the broader Support organization.</p><p style=\\\"min-height:1.5em\\\">You\u2019ll
        play a hands-on role in developing the team\u2019s capabilities, guiding cross-functional
        processes, and building the systems that will allow Support Engineering to
        scale effectively as our business grows. Since this is a new function, you\u2019ll
        have the opportunity to define best practices, establish technical workflows,
        and build a strong partnership between Support and Engineering from day one.</p><p
        style=\\\"min-height:1.5em\\\">We need someone who naturally gravitates toward
        the highest-leverage work by identifying waste, eliminating friction, and
        raising the technical bar of the team quickly. You should be comfortable being
        wrong occasionally if it means we\u2019re right most of the time and moving
        at high velocity.</p><h3></h3><h1><strong>Role Responsibilities:</strong></h1><h2><strong>Team
        Leadership &amp; Development</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Lead and develop a team of Support Engineers
        focused on technical depth, problem-solving, and customer impact.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Foster a culture of ownership, urgency, and
        high standards where problems are driven to resolution quickly and thoughtfully.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Mentor team members on technical skills including
        log analysis, database querying, systems architecture, and integration troubleshooting.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Foster a collaborative environment where knowledge-sharing
        and experimentation are encouraged.</p></li><li><p style=\\\"min-height:1.5em\\\">Help
        define the career path and responsibilities of Support Engineers at Ashby.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Recruit and grow talent with strong technical
        foundations in reading and understanding code, collaborating on bug reproduction,
        and working effectively with Engineering teams.</p></li></ul><h2><strong>Technical
        Expertise &amp; Support Engineering Practices</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Build scalable, repeatable processes for diagnosing
        and resolving complex issues related to integrations, APIs, analytics, and
        product performance.</p></li><li><p style=\\\"min-height:1.5em\\\">Set standards
        for how the team escalates to Engineering, triages bugs, identifies patterns,
        and partners on long-term solutions.</p></li><li><p style=\\\"min-height:1.5em\\\">Create
        internal tools and workflows that help the team operate with efficiency and
        consistency.</p></li><li><p style=\\\"min-height:1.5em\\\">Balance operational
        needs with hands-on technical work, staying close by jumping into issues,
        exploring logs, or conducting hands-on testing when needed to support the
        team.</p></li><li><p style=\\\"min-height:1.5em\\\">Continuously evaluate
        where time is being spent and ruthlessly prioritize work that drives the most
        impact for customers and the business.</p></li><li><p style=\\\"min-height:1.5em\\\">Ship
        improvements quickly. Iterate. Raise the bar again.</p></li></ul><h2><strong>Cross-Functional
        Collaboration with Engineering &amp; Product</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Collaborate closely with Engineering to shape
        how technical escalations are managed and how customer insights are tracked
        and actioned.</p></li><li><p style=\\\"min-height:1.5em\\\">Work with Product
        to provide feedback loops from Support to improve usability and prevent repeat
        issues.</p></li><li><p style=\\\"min-height:1.5em\\\">Serve as an advocate
        for customers in technical conversations and help Engineering teams understand
        the support impact of product decisions.</p></li><li><p style=\\\"min-height:1.5em\\\">Push
        for clarity and resolution. When tradeoffs exist, help the team move forward
        decisively.</p></li></ul><h2><strong>Process Design &amp; Technical Enablement</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Partner
        with our Support Leadership Team to identify and address gaps in our current
        tooling, workflows, and diagnostics capabilities.</p></li><li><p style=\\\"min-height:1.5em\\\">Use
        data from escalations and customer feedback to recommend changes that improve
        team effectiveness and customer outcomes.</p></li><li><p style=\\\"min-height:1.5em\\\">Partner
        with Support leadership to evolve how we measure success in high-complexity
        support scenarios.</p></li><li><p style=\\\"min-height:1.5em\\\">Help scale
        Support Engineering as a function by documenting approaches, onboarding new
        team members, and contributing to internal tooling.</p></li><li><p style=\\\"min-height:1.5em\\\">Default
        to action. Build the first version. Improve it in motion.</p></li></ul><h1><strong>Role
        Requirements</strong></h1><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Support
        &amp; Technical Leadership</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Proven experience managing or mentoring a Technical
        Support Team in a B2B SaaS environment.</p></li><li><p style=\\\"min-height:1.5em\\\">Demonstrated
        ability to make high-quality decisions quickly and operate effectively without
        perfect information.</p></li><li><p style=\\\"min-height:1.5em\\\">Background
        in Software Engineering, Technical Support Engineering, DevOps, or similar
        highly technical customer-facing roles.</p></li><li><p style=\\\"min-height:1.5em\\\">Experience
        guiding cross-functional collaboration between Support and Engineering.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Familiarity with ATS/HRIS platforms or other
        enterprise systems is a plus.</p></li></ul><h2><strong>Systems Thinking &amp;
        Process Design</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Ability
        to zoom out and identify scalable processes for handling complex technical
        work.</p></li><li><p style=\\\"min-height:1.5em\\\">Strong judgment in prioritizing
        bugs, customer needs, and internal enablement work.</p></li><li><p style=\\\"min-height:1.5em\\\">Comfort
        operating in ambiguity and creating structure where none exists.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Clear bias toward simplification over over-optimization.</p></li></ul><h2><strong>Customer-Centric,
        Engineering-Aware</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Passionate
        about improving the customer experience through well-designed, technically
        sound solutions.</p></li><li><p style=\\\"min-height:1.5em\\\">Comfortable
        representing customer needs in Engineering discussions and advocating for
        supportability.</p></li><li><p style=\\\"min-height:1.5em\\\">Able to hold
        a high bar for quality while still moving quickly and iterating.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Understands that speed and quality are not
        opposites and knows how to balance both.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h1><strong>You
