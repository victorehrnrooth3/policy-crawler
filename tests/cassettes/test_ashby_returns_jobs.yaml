        Onsite</strong>, 75 minutes</p></li></ol><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">10-year
        exercise window for stock options. You shouldn't feel pressure to purchase
        stock options if you leave Ashby. Do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO with four weeks recommended per
        year. Expect \\\"Vacation?\\\" in our one-on-one agenda until you start taking
        it.</p></li><li><p style=\\\"min-height:1.5em\\\">Twelve weeks of fully paid
        family leave in the US. We plan to expand this to employees in other countries
        as situations arise.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li><li><p style=\\\"min-height:1.5em\\\">If you're
        in the US, top-notch health insurance for you and your dependents, with all
        premiums covered by us.</p></li></ul><p style=\\\"min-height:1.5em\\\">Ashby's
