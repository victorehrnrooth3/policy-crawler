        style=\\\"min-height:1.5em\\\">Hi \U0001F44B\U0001F3FE, I\u2019m <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/abhikpramanik/\\\"><u>Abhik</u></a>,
        Ashby\u2019s Co-Founder and VP of Engineering. We\u2019re looking for a great
        (former) engineer who built impressive products and now builds teams of great
        engineers. Ashby\u2019s success and ambition mean we\u2019re doubling the
        Engineering team in the next year, and we need your experience and leadership
        to do it thoughtfully.</p><p style=\\\"min-height:1.5em\\\">Our product and
        growth are exceptional. Ashby All-in-One is powerful, easy to use, and replaces
        several venture-backed companies' worth of products (often with a <em>better</em>
        experience). We have notable customers like Notion, Linear, Shopify, and Snowflake.
        Our growth and retention metrics are best-in-class among our peers: we have
        tens of millions in ARR, growing &gt;100% year over year, very low churn,
        and many years of runway.</p><p style=\\\"min-height:1.5em\\\">A big part
        of our secret sauce is how we run Engineering. We achieve incredible speed
        and quality by discarding many industry norms and being optimistic about Engineers.
        We consider what makes exceptional Engineers exceptional, figure out how to
        hire them, and build an environment that gives them the freedom and agency
        to <em>actually</em> be exceptional. In other words, if engineers writing
        product specs, making product decisions, and <em>not</em> breaking down projects
        into individual tickets excites you, you\u2019ve found the right place.</p><p
        style=\\\"min-height:1.5em\\\">As an Engineering Manager, you\u2019ll work
        closely with me, Ben, Colin, and your peers to build out the team and continue
        scaling this unique culture.</p><p style=\\\"min-height:1.5em\\\">You\u2019ll
        first do that through grassroots leadership. You\u2019ll manage three to five
        Engineers and hire three to five more. They\u2019ll cover multiple teams and
        a variety of specializations, from Product Engineers to Site Reliability Engineers
        to Design Engineers. Your day-to-day will include:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Providing feedback on product and technical
        specs to help engineers identify where to cut scope or improve quality. You
        don\u2019t make the final decisions, but you\u2019ll influence and coach ICs
        to reach the right ones.</p></li><li><p style=\\\"min-height:1.5em\\\">Grow
        engineers to the point where they can take large, loosely defined projects
        and deliver them with little intervention.</p></li><li><p style=\\\"min-height:1.5em\\\">Jump
        into our systems and code to debug a customer issue, ship a small bug fix,
        or improve our developer experience. Engineering leaders at Ashby are great
        engineers and enjoy keeping their skills up-to-date (while staying off the
        critical path).</p></li></ul><p style=\\\"min-height:1.5em\\\">You\u2019ll
        also propose and lead department and company-wide initiatives. Some examples:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Rethink
        how we (and the industry) do pull request reviews by aligning on goals with
        the team, sampling a set of PRs to understand how effective they are, and
        writing a proposal to the team about what we could change to speed up reviews
        while giving reviewers the time and space to give useful feedback.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Design and improve interviews based on candidate
        and team feedback. We pride ourselves on thoughtful interviews that simulate
        actually working with us!</p></li><li><p style=\\\"min-height:1.5em\\\">Improve
        how we generate and simulate data in demo accounts. It\u2019s a project off
        the critical path, but it helps you keep up-to-date on our codebase while
        immensely impacting the business, from Engineering to QA to Sales.</p></li></ul><p
        style=\\\"min-height:1.5em\\\">I\u2019ll share more details once we meet.</p><p
        style=\\\"min-height:1.5em\\\"></p><h1><strong>What We\u2019re Building</strong></h1><p
        style=\\\"min-height:1.5em\\\">As engineers, we are used to tooling that makes
        us <strong>better</strong> at what we do. When we started Ashby, we saw the
        opposite with Talent Acquisition software. Recruiting teams were leveling
        up how they did their work, but instead of software meeting this new standard,
        it held them back.</p><p style=\\\"min-height:1.5em\\\">Scheduling a final
        round is an excellent example. Recruiting teams wanted to schedule candidates
        faster, track interviewer preparation and quality, and do it with half the
        headcount. A recruiter needed to manually collect availability from the candidate,
        identify qualified interviewers, perform \u201CCalendar Tetris\u201D to find
        who is available to interview the candidate, schedule on the earliest date
        possible, and make any last-minute adjustments as availability changed. They
        must do this while considering the interview load on each individual and whether
        interviewers need to be trained and shadowing others. \U0001F975 TA software
        didn\u2019t help.</p><p style=\\\"min-height:1.5em\\\">As hiring managers,
        we know TA is a critical function, and as engineers, we know software can
        do better. So, we built and continue to build Ashby to give TA teams the <em>highest</em>
        standard of tooling. Software that\u2019s intelligent and powerful. Software
        that provides insights into where they\u2019re failing and automates or simplifies
        many of the tasks they\u2019re underwater with. We want other functions and
        departments to be jealous of what TA teams can do with Ashby, and today they
        often are!</p><p style=\\\"min-height:1.5em\\\"></p><h1><strong>Why You Shouldn\u2019t
        Apply</strong></h1><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><em>You
        don\u2019t enjoy coding or don\u2019t find time to stay up-to-date on technology.</em>
        We believe great leaders are folks who were great engineers themselves. That
        starts with loving the craft and never giving it up.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        follow the rules and accept the hand you\u2019ve been dealt.</em> We want
        folks with the ambition, courage, and follow-through to change things, whether
        it\u2019s within their own team or across departments.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        went into management because it was the only growth path available.</em> We
        want folks who could have been Principal engineers (or were one!).</p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>You're happy with a team of engineers who
        are predominantly early-career or mid-career or don't thrive with ownership
        or autonomy.</em> You believe that with enough guardrails, the team can get
        things done.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>To you, a Staff
        or Principal Engineer is someone who spends most of their time project managing
        or conducting architecture reviews.</em> You don\u2019t believe staff and
        principal engineers could lead by the example they set or the leverage they
        create through their work.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You\u2019re
        not optimistic or convinced that we can build a large engineering team that
        functions differently from the status quo.</em> You think, at some size, common
        processes need to be implemented to ensure consistent product delivery (e.g.,
        sprint planning, product managers writing in-depth specifications). You might
        not say it out loud, but you think, at some size, compromises have to be made
        for the sake of hiring numbers or consistency.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h1><strong>Engineering
        Culture</strong></h1><p style=\\\"min-height:1.5em\\\">Our engineering culture
        is motivated by Benji\u2019s (my Co-founder and CEO) and my belief that a
        small, talented team, given the right environment, can build high-quality
        software fast (and work regular hours!). We do it through:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Minimal process with ownership over decisions
        normally made by product and design</p></li><li><p style=\\\"min-height:1.5em\\\">Natural
        collaboration and deliberate communication</p></li><li><p style=\\\"min-height:1.5em\\\">Investing
        in tools and abstractions that give us leverage</p></li><li><p style=\\\"min-height:1.5em\\\">Putting
        effort into building a diverse team</p></li></ul><p style=\\\"min-height:1.5em\\\">You\u2019ll
        be an <em>important</em> <em>part</em> of figuring out how to scale these
        methods from 50 engineers to 100 and beyond.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Minimal
        Process &amp; Lots of Ownership</strong></h2><p style=\\\"min-height:1.5em\\\">The
        best engineers we\u2019ve worked with delivered reliably magical outcomes.
        They took customer problems and relentlessly drove them to solutions that
        were not only successful but often brilliant and creative. While they did
        this with minimal oversight, stakeholders were never in the dark as to what
        was going on, and no setback was a surprise.</p><p style=\\\"min-height:1.5em\\\">Traditional
        product-development processes aren\u2019t meant for the best engineers. Their
        purpose is to create consistent outcomes regardless of the engineer\u2019s
        skill. But, consistency comes at the expense of an engineer\u2019s time and
        freedom\u2014both ingredients necessary to generate those magical outcomes.
        As a result, process stifles the best engineers and doesn\u2019t give others
        the opportunity to practice the behaviors that made the best engineers the
        \u201Cbest.\u201D</p><p style=\\\"min-height:1.5em\\\">At Ashby, we want to
        build an environment that encourages every engineer to be their best. So,
        at Ashby, every Engineer runs their project. Product Managers (and Designers)
        build strategy, do customer research, and hand off problem briefs to Engineers.
        Engineers take on the rest: they research the problem, write product specs,
        build wireframes, and implement their solution end-to-end. We rely on engineers,
        not process, to push information outward to the relevant folks (e.g., Product
        Managers) and pull folks in to help (e.g., Designers, Infra). It\u2019s a
        new level of ownership for many engineers, but we\u2019d rather an engineer
        fail a bit and coach up their skills than use process as a crutch. Not everyone
        succeeds in our culture, but those who do <em>thrive</em>.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Collaboration
        is Natural &amp; Communication is Deliberate</strong></h2><p style=\\\"min-height:1.5em\\\">Our
        engineering team consists of lifelong learners who are talented but also humble
        and kind (meet them <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/team\\\"><u>here</u></a>!). These attributes
        create an environment where collaboration happens naturally. We combine this
        with research, prototyping, and written proposals to see around corners and
        get feedback from the team across time zones. Focus time is something that
        we hold sacred, and, with thoughtful and deliberate communication, engineers
        are in &lt;2h meetings per week (I wrote about it <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/company/thoughtful-communication\\\"><u>here</u></a>).</p><p
        style=\\\"min-height:1.5em\\\">To drive it home, here's a recent calendar
        of an engineer who has been with us for over 4 years. ~34 hours of focus time,
        2.5h of interviews, and 3.5 hours of meetings:</p><p style=\\\"min-height:1.5em\\\"></p><div
        style=\\\"text-align:left\\\"><img style=\\\"max-width:100%\\\" src=\\\"https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/d4679311-9dba-4031-bf5e-19ce78597ab1/calendar.png\\\"
        /></div><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\">We
        also meet in person at least twice a year, once as a department and once as
        a company. You also have a small budget to meet up with folks in your city/region.</p><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Increase Leverage, not Team
        Size</strong></h2><p style=\\\"min-height:1.5em\\\">We built Ashby with the
        quality, breadth, and depth that many customers would expect from much larger
        teams over larger time scales. We\u2019ve done this through investment in:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Great
        developer tooling.</strong> Our CI/CD takes ~10m, and we deploy at least 15x
        a day. A debugger that works out of the box. Everyone on the team has contributed
        to our developer experience \U0001F4AA\U0001F3FE.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Building
        blocks to create powerful and customizable products fast.</strong> At the
        core of Ashby is a set of common components (analytics modeling and query
        language, policy engine, workflow engine, design system) that we constantly
        improve. Each improvement to a common component cascades throughout our app
        (short video below).</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>AI-powered
        tooling. </strong>We think of AI as a way to automate the mundane parts of
        building and maintaining high-quality software. We use a combination of third-party
        and internally built tools that, for instance, auto-triage customer issues,
        suggest fixes, prototype ideas, generate production-ready code, and conduct
        code reviews. Engineers have an unlimited token budget (but are not measured
        on it).</p></li></ul><p style=\\\"min-height:1.5em\\\">Here\u2019s an impromptu
        quote from Arjun in our company Slack of what it\u2019s like to build a feature
        at Ashby:</p><p style=\\\"min-height:1.5em\\\"></p><div style=\\\"text-align:left\\\"><img
        style=\\\"max-width:100%\\\" src=\\\"https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/8d94727a-46d8-42a2-9627-ddcd7f822f95/arjun.png\\\"
        /></div><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\">And
        a demo of one of these building blocks:</p><div><div style=\\\"left:0;width:100%;height:0;position:relative;padding-bottom:62.5%\\\"><iframe
        src=\\\"https://embedded-media.ashbyhq.com/embed/4ea5f68e-c33e-4ac9-831a-e732bee4a303/9a5f032d-c731-411e-98cf-261517156f01\\\"
        style=\\\"top:0;left:0;width:100%;height:100%;position:absolute;border:0\\\"
        allowfullscreen scrolling=\\\"no\\\" allow=\\\"encrypted-media *; picture-in-picture
        *;\\\" sandbox=\\\"allow-scripts allow-same-origin allow-presentation\\\"></iframe></div></div><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Put Effort into Diversity</strong></h2><p
        style=\\\"min-height:1.5em\\\">Diverse teams drive innovation and better outcomes.
        Having seen my mother and partner build their careers as minority women in
        non-diverse fields, I want to make sure Ashby creates opportunities for the
        next generation of engineers from underrepresented groups.</p><p style=\\\"min-height:1.5em\\\">Today,
        25% of engineers and 50% of our engineering leaders at Ashby are from underrepresented
        groups. We are taking conscious steps to improve, like sourcing diverse candidates,
        providing generous paid family leave, no leetcode interviews, and more.</p><p
        style=\\\"min-height:1.5em\\\"></p><h1><strong>Interview Process</strong></h1><p
        style=\\\"min-height:1.5em\\\">This is an important role and our interview
        process reflects that both in challenge and length (5h 15m):</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Introduction call with me and Ben (30m, live)</p></li><li><p
        style=\\\"min-height:1.5em\\\">A technical screen where we pair in our actual
        codebase (1h, live)</p></li><li><p style=\\\"min-height:1.5em\\\">An interview
        to explore your past experience as a leader (1h, live)</p></li><li><p style=\\\"min-height:1.5em\\\">Interview
        with Ben, Director of Engineering AMER (45m, live)</p></li><li><p style=\\\"min-height:1.5em\\\">Interview
        with Colin, Head of Engineering EMEA (30m, live)</p></li><li><p style=\\\"min-height:1.5em\\\">Final
        round where you meet Engineers, other Engineering Managers, and Benji, our
        CEO (90m, live)</p></li></ol><p style=\\\"min-height:1.5em\\\">Depending on
        my bandwidth, we may start with an <em>additional</em> 30m screen with a recruiter.
        Near the end of the process, we\u2019ll do reference checks.</p><p style=\\\"min-height:1.5em\\\">This
        is also an important decision for you, so I\u2019m always happy to have coffee
        chats in person or over Zoom to get to know each other. If we don\u2019t move
        forward, we\u2019re happy to share feedback.</p><p style=\\\"min-height:1.5em\\\"></p><h1><strong>Your
        First Six Months at Ashby</strong></h1><p style=\\\"min-height:1.5em\\\">Your
        first three months at Ashby will be spent learning about Ashby Engineering
        and easing into leadership by being an IC. What better way to learn how ICs
        work than to be one! Don\u2019t worry if you don\u2019t know our technologies.
        The team is really helpful, and our dev environment is pretty awesome: it
        sets up in a single script, and you\u2019ll be able to push your first product
        change on day one.</p><p style=\\\"min-height:1.5em\\\">You and I will do
        30-day, 60-day, 90-day, and 6-month reviews to calibrate on our unique culture
        and how you, I, and the team will work together.</p><p style=\\\"min-height:1.5em\\\">This
        role will initially report to me, but may report to Ben, our Director of Engineering,
        over time.</p><p style=\\\"min-height:1.5em\\\"></p><h1><strong>Benefits</strong></h1><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Competitive
        salary and equity.</p></li><li><p style=\\\"min-height:1.5em\\\">10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO.</p></li><li><p style=\\\"min-height:1.5em\\\">A
        minimum of 12 weeks of fully paid parental leave, covered by Ashby. For folks
        outside the US, it may be longer to be in line with regional requirements.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Generous equipment, software, and office furniture
        budget. Get what you need to be happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li><li><p style=\\\"min-height:1.5em\\\">If you\u2019re
        in the US, we offer top-tier health insurance for you and your dependents,
        with 100% of premiums covered by Ashby. In other countries, we provide high-quality
        supplemental health insurance for you and your dependents, also fully covered
        by us.</p></li></ul><p style=\\\"min-height:1.5em\\\">Ashby\u2019s success
        hinges on hiring great people and creating an environment where we can be
        happy, feel challenged, and do our best work. We\u2019re being deliberate
        about building that environment from the ground up. I hope that excites you
        enough to apply.</p><p style=\\\"min-height:1.5em\\\"><em>Ashby provides equal
        employment opportunities (EEO) to all employees and applicants for employment
        without regard to race, color, religion, sex, national origin, age, disability,
        genetics, sexual orientation, gender identity, or gender expression. We are
        committed to a diverse and inclusive workforce and welcome people from all
        backgrounds, experiences, perspectives, and abilities.</em></p><p style=\\\"min-height:1.5em\\\"><em>Ashby
        is committed to a fair and transparent hiring process. We confirm that this
        advertisement is for an active, existing vacancy within our organization.
        Please be advised that we may use artificial intelligence-driven tools to
        assist our recruitment team in screening, assessing, and selecting candidates
        for this position.</em></p>\",\"descriptionPlain\":\"Hi \U0001F44B\U0001F3FE,
        I\u2019m Abhik https://www.linkedin.com/in/abhikpramanik/, Ashby\u2019s Co-Founder
        and VP of Engineering. We\u2019re looking for a great (former) engineer who
        built impressive products and now builds teams of great engineers. Ashby\u2019s
        success and ambition mean we\u2019re doubling the Engineering team in the
        next year, and we need your experience and leadership to do it thoughtfully.\\n\\nOur
        product and growth are exceptional. Ashby All-in-One is powerful, easy to
        use, and replaces several venture-backed companies' worth of products (often
        with a better experience). We have notable customers like Notion, Linear,
        Shopify, and Snowflake. Our growth and retention metrics are best-in-class
        among our peers: we have tens of millions in ARR, growing >100% year over
        year, very low churn, and many years of runway.\\n\\nA big part of our secret
        sauce is how we run Engineering. We achieve incredible speed and quality by
        discarding many industry norms and being optimistic about Engineers. We consider
        what makes exceptional Engineers exceptional, figure out how to hire them,
        and build an environment that gives them the freedom and agency to actually
        be exceptional. In other words, if engineers writing product specs, making
        product decisions, and not breaking down projects into individual tickets
        excites you, you\u2019ve found the right place.\\n\\nAs an Engineering Manager,
        you\u2019ll work closely with me, Ben, Colin, and your peers to build out
        the team and continue scaling this unique culture.\\n\\nYou\u2019ll first
        do that through grassroots leadership. You\u2019ll manage three to five Engineers
        and hire three to five more. They\u2019ll cover multiple teams and a variety
        of specializations, from Product Engineers to Site Reliability Engineers to
        Design Engineers. Your day-to-day will include:\\n\\n - Providing feedback
        on product and technical specs to help engineers identify where to cut scope
        or improve quality. You don\u2019t make the final decisions, but you\u2019ll
        influence and coach ICs to reach the right ones.\\n\\n - Grow engineers to
        the point where they can take large, loosely defined projects and deliver
        them with little intervention.\\n\\n - Jump into our systems and code to debug
        a customer issue, ship a small bug fix, or improve our developer experience.
        Engineering leaders at Ashby are great engineers and enjoy keeping their skills
        up-to-date (while staying off the critical path).\\n\\nYou\u2019ll also propose
        and lead department and company-wide initiatives. Some examples:\\n\\n - Rethink
        how we (and the industry) do pull request reviews by aligning on goals with
        the team, sampling a set of PRs to understand how effective they are, and
        writing a proposal to the team about what we could change to speed up reviews
        while giving reviewers the time and space to give useful feedback.\\n\\n -
        Design and improve interviews based on candidate and team feedback. We pride
        ourselves on thoughtful interviews that simulate actually working with us!\\n\\n
        - Improve how we generate and simulate data in demo accounts. It\u2019s a
        project off the critical path, but it helps you keep up-to-date on our codebase
        while immensely impacting the business, from Engineering to QA to Sales.\\n\\nI\u2019ll
        share more details once we meet.\\n\\n\\n\\n\\nWHAT WE\u2019RE BUILDING\\n\\nAs
        engineers, we are used to tooling that makes us better at what we do. When
        we started Ashby, we saw the opposite with Talent Acquisition software. Recruiting
        teams were leveling up how they did their work, but instead of software meeting
        this new standard, it held them back.\\n\\nScheduling a final round is an
        excellent example. Recruiting teams wanted to schedule candidates faster,
        track interviewer preparation and quality, and do it with half the headcount.
        A recruiter needed to manually collect availability from the candidate, identify
        qualified interviewers, perform \u201CCalendar Tetris\u201D to find who is
        available to interview the candidate, schedule on the earliest date possible,
        and make any last-minute adjustments as availability changed. They must do
        this while considering the interview load on each individual and whether interviewers
        need to be trained and shadowing others. \U0001F975 TA software didn\u2019t
        help.\\n\\nAs hiring managers, we know TA is a critical function, and as engineers,
        we know software can do better. So, we built and continue to build Ashby to
        give TA teams the highest standard of tooling. Software that\u2019s intelligent
        and powerful. Software that provides insights into where they\u2019re failing
        and automates or simplifies many of the tasks they\u2019re underwater with.
        We want other functions and departments to be jealous of what TA teams can
        do with Ashby, and today they often are!\\n\\n\\n\\n\\nWHY YOU SHOULDN\u2019T
        APPLY\\n\\n - You don\u2019t enjoy coding or don\u2019t find time to stay
        up-to-date on technology. We believe great leaders are folks who were great
        engineers themselves. That starts with loving the craft and never giving it
        up.\\n\\n - You follow the rules and accept the hand you\u2019ve been dealt.
        We want folks with the ambition, courage, and follow-through to change things,
        whether it\u2019s within their own team or across departments.\\n\\n - You
        went into management because it was the only growth path available. We want
        folks who could have been Principal engineers (or were one!).\\n\\n - You're
        happy with a team of engineers who are predominantly early-career or mid-career
        or don't thrive with ownership or autonomy. You believe that with enough guardrails,
        the team can get things done.\\n\\n - To you, a Staff or Principal Engineer
        is someone who spends most of their time project managing or conducting architecture
        reviews. You don\u2019t believe staff and principal engineers could lead by
        the example they set or the leverage they create through their work.\\n\\n
        - You\u2019re not optimistic or convinced that we can build a large engineering
        team that functions differently from the status quo. You think, at some size,
        common processes need to be implemented to ensure consistent product delivery
        (e.g., sprint planning, product managers writing in-depth specifications).
        You might not say it out loud, but you think, at some size, compromises have
        to be made for the sake of hiring numbers or consistency.\\n\\n\\n\\n\\nENGINEERING
        CULTURE\\n\\nOur engineering culture is motivated by Benji\u2019s (my Co-founder
        and CEO) and my belief that a small, talented team, given the right environment,
        can build high-quality software fast (and work regular hours!). We do it through:\\n\\n
        - Minimal process with ownership over decisions normally made by product and
        design\\n\\n - Natural collaboration and deliberate communication\\n\\n -
        Investing in tools and abstractions that give us leverage\\n\\n - Putting
        effort into building a diverse team\\n\\nYou\u2019ll be an important part
        of figuring out how to scale these methods from 50 engineers to 100 and beyond.\\n\\n\\n\\n\\nMINIMAL
        PROCESS & LOTS OF OWNERSHIP\\n\\nThe best engineers we\u2019ve worked with
        delivered reliably magical outcomes. They took customer problems and relentlessly
        drove them to solutions that were not only successful but often brilliant
        and creative. While they did this with minimal oversight, stakeholders were
        never in the dark as to what was going on, and no setback was a surprise.\\n\\nTraditional
        product-development processes aren\u2019t meant for the best engineers. Their
        purpose is to create consistent outcomes regardless of the engineer\u2019s
        skill. But, consistency comes at the expense of an engineer\u2019s time and
        freedom\u2014both ingredients necessary to generate those magical outcomes.
        As a result, process stifles the best engineers and doesn\u2019t give others
        the opportunity to practice the behaviors that made the best engineers the
        \u201Cbest.\u201D\\n\\nAt Ashby, we want to build an environment that encourages
        every engineer to be their best. So, at Ashby, every Engineer runs their project.
        Product Managers (and Designers) build strategy, do customer research, and
        hand off problem briefs to Engineers. Engineers take on the rest: they research
        the problem, write product specs, build wireframes, and implement their solution
        end-to-end. We rely on engineers, not process, to push information outward
        to the relevant folks (e.g., Product Managers) and pull folks in to help (e.g.,
        Designers, Infra). It\u2019s a new level of ownership for many engineers,
        but we\u2019d rather an engineer fail a bit and coach up their skills than
        use process as a crutch. Not everyone succeeds in our culture, but those who
        do thrive.\\n\\n\\n\\n\\nCOLLABORATION IS NATURAL & COMMUNICATION IS DELIBERATE\\n\\nOur
        engineering team consists of lifelong learners who are talented but also humble
        and kind (meet them here https://www.ashbyhq.com/team!). These attributes
        create an environment where collaboration happens naturally. We combine this
        with research, prototyping, and written proposals to see around corners and
        get feedback from the team across time zones. Focus time is something that
        we hold sacred, and, with thoughtful and deliberate communication, engineers
        are in <2h meetings per week (I wrote about it here https://www.ashbyhq.com/blog/company/thoughtful-communication).\\n\\nTo
        drive it home, here's a recent calendar of an engineer who has been with us
        for over 4 years. ~34 hours of focus time, 2.5h of interviews, and 3.5 hours
        of meetings:\\n\\n\\n\\n[https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/d4679311-9dba-4031-bf5e-19ce78597ab1/calendar.png]\\n\\n\\n\\nWe
        also meet in person at least twice a year, once as a department and once as
        a company. You also have a small budget to meet up with folks in your city/region.\\n\\n\\n\\n\\nINCREASE
        LEVERAGE, NOT TEAM SIZE\\n\\nWe built Ashby with the quality, breadth, and
        depth that many customers would expect from much larger teams over larger
        time scales. We\u2019ve done this through investment in:\\n\\n - Great developer
        tooling. Our CI/CD takes ~10m, and we deploy at least 15x a day. A debugger
        that works out of the box. Everyone on the team has contributed to our developer
        experience \U0001F4AA\U0001F3FE.\\n\\n - Building blocks to create powerful
        and customizable products fast. At the core of Ashby is a set of common components
        (analytics modeling and query language, policy engine, workflow engine, design
        system) that we constantly improve. Each improvement to a common component
        cascades throughout our app (short video below).\\n\\n - AI-powered tooling.
        We think of AI as a way to automate the mundane parts of building and maintaining
        high-quality software. We use a combination of third-party and internally
        built tools that, for instance, auto-triage customer issues, suggest fixes,
        prototype ideas, generate production-ready code, and conduct code reviews.
        Engineers have an unlimited token budget (but are not measured on it).\\n\\nHere\u2019s
        an impromptu quote from Arjun in our company Slack of what it\u2019s like
        to build a feature at Ashby:\\n\\n\\n\\n[https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/8d94727a-46d8-42a2-9627-ddcd7f822f95/arjun.png]\\n\\n\\n\\nAnd
        a demo of one of these building blocks:\\n\\n\\n\\n\\n\\n\\nPUT EFFORT INTO
        DIVERSITY\\n\\nDiverse teams drive innovation and better outcomes. Having
        seen my mother and partner build their careers as minority women in non-diverse
        fields, I want to make sure Ashby creates opportunities for the next generation
        of engineers from underrepresented groups.\\n\\nToday, 25% of engineers and
        50% of our engineering leaders at Ashby are from underrepresented groups.
        We are taking conscious steps to improve, like sourcing diverse candidates,
        providing generous paid family leave, no leetcode interviews, and more.\\n\\n\\n\\n\\nINTERVIEW
        PROCESS\\n\\nThis is an important role and our interview process reflects
        that both in challenge and length (5h 15m):\\n\\n 1. Introduction call with
        me and Ben (30m, live)\\n\\n 2. A technical screen where we pair in our actual
        codebase (1h, live)\\n\\n 3. An interview to explore your past experience
        as a leader (1h, live)\\n\\n 4. Interview with Ben, Director of Engineering
        AMER (45m, live)\\n\\n 5. Interview with Colin, Head of Engineering EMEA (30m,
        live)\\n\\n 6. Final round where you meet Engineers, other Engineering Managers,
        and Benji, our CEO (90m, live)\\n\\nDepending on my bandwidth, we may start
        with an additional 30m screen with a recruiter. Near the end of the process,
        we\u2019ll do reference checks.\\n\\nThis is also an important decision for
        you, so I\u2019m always happy to have coffee chats in person or over Zoom
        to get to know each other. If we don\u2019t move forward, we\u2019re happy
        to share feedback.\\n\\n\\n\\n\\nYOUR FIRST SIX MONTHS AT ASHBY\\n\\nYour
        first three months at Ashby will be spent learning about Ashby Engineering
        and easing into leadership by being an IC. What better way to learn how ICs
        work than to be one! Don\u2019t worry if you don\u2019t know our technologies.
        The team is really helpful, and our dev environment is pretty awesome: it
        sets up in a single script, and you\u2019ll be able to push your first product
        change on day one.\\n\\nYou and I will do 30-day, 60-day, 90-day, and 6-month
        reviews to calibrate on our unique culture and how you, I, and the team will
        work together.\\n\\nThis role will initially report to me, but may report
        to Ben, our Director of Engineering, over time.\\n\\n\\n\\n\\nBENEFITS\\n\\n
        - Competitive salary and equity.\\n\\n - 10-year exercise window for stock
        options. You shouldn\u2019t feel pressure to purchase stock options if you
        leave Ashby \u2014do it when you feel financially comfortable.\\n\\n - Unlimited
        PTO.\\n\\n - A minimum of 12 weeks of fully paid parental leave, covered by
        Ashby. For folks outside the US, it may be longer to be in line with regional
        requirements.\\n\\n - Generous equipment, software, and office furniture budget.
        Get what you need to be happy and productive!\\n\\n - $100/month education
        budget with more expensive items (like conferences) covered with manager approval.\\n\\n
        - If you\u2019re in the US, we offer top-tier health insurance for you and
        your dependents, with 100% of premiums covered by Ashby. In other countries,
        we provide high-quality supplemental health insurance for you and your dependents,
        also fully covered by us.\\n\\nAshby\u2019s success hinges on hiring great
        people and creating an environment where we can be happy, feel challenged,
        and do our best work. We\u2019re being deliberate about building that environment
        from the ground up. I hope that excites you enough to apply.\\n\\nAshby provides
        equal employment opportunities (EEO) to all employees and applicants for employment
        without regard to race, color, religion, sex, national origin, age, disability,
        genetics, sexual orientation, gender identity, or gender expression. We are
        committed to a diverse and inclusive workforce and welcome people from all
        backgrounds, experiences, perspectives, and abilities.\\n\\nAshby is committed
        to a fair and transparent hiring process. We confirm that this advertisement
        is for an active, existing vacancy within our organization. Please be advised
        that we may use artificial intelligence-driven tools to assist our recruitment
        team in screening, assessing, and selecting candidates for this position.\",\"compensation\":{\"compensationTierSummary\":\"CA$190K
