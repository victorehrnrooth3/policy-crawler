        this Role</strong></h2><p style=\\\"min-height:1.5em\\\">Hi, I\u2019m <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/deniseeures/\\\">Denise</a>,
        and I\u2019m the Head of High-Touch (Mid-Market) Customer Success at Ashby.
        Our team is passionate about shaping and scaling an exceptional customer experience
        for our high-touch customer segment, which primarily supports mid-market and
        growth-stage organizations. I\u2019m excited to be hiring our next CSM as
        we continue expanding globally.</p><p style=\\\"min-height:1.5em\\\">As a
        member of our Customer Success team, you will help us continue to grow our
        High-Touch Customer Success function. In this role, you\u2019ll partner closely
        with customers to drive adoption, deliver strategic guidance, conduct product
        trainings and partnership reviews, and identify opportunities for expanded
        use cases and long-term value realization. You\u2019ll also collaborate with
        a talented group of CSMs across the High-Touch team to continuously evolve
        how we support companies ranging from high-growth startups to public enterprises.</p><p
        style=\\\"min-height:1.5em\\\">Ashby is designed to be powerful and flexible,
        allowing customers to tailor the platform to their unique hiring processes
        and workflows. Because of this, there is a lot to learn. You will become both
        a product and domain expert, enabling customers to make the most of Ashby
        and drive hiring excellence across their organizations.<br /><br /><strong>Role
        Requirements:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        have a strong track record of Customer Success experience in B2B SaaS (at
        least two years), supporting customers through the adoption and long-term
        optimization of complex technologies. You enjoy building trusted partnerships
        with customers and helping them realize measurable value throughout the customer
        lifecycle.</p></li><li><p style=\\\"min-height:1.5em\\\">You have experience
        managing a portfolio of approximately 60 mid-market customers with over $1.5M
        in total ARR. You\u2019re comfortable balancing proactive engagement across
        a broad book of business while building strong relationships with a diverse
        set of stakeholders to drive adoption, retention, and growth.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You have experience partnering cross-functionally
        with teams such as Sales, Marketing, Product, Support, and Operations to advocate
        for customer needs and deliver a seamless customer experience.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You enjoy becoming a product expert and have
        demonstrated this in previous Customer Success roles. You create \u201Caha\u201D
        moments by tailoring trainings, workflow guidance, and strategic recommendations
        to each customer\u2019s unique goals and challenges.</p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019ve
        worked with technically complex products and bring strong curiosity and problem-solving
        skills to understanding how systems, workflows, and integrations operate in
        practice</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You Should
        Apply If:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F4E3
        <em>You demonstrate mastery of clear communication. You ask questions with
        precision and can explain complex concepts in simple terms. </em></p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>\U0001F3A7 You are a great listener. You
        see your role as providing the voice of the customer to internal stakeholders
        so we can ensure that our product roadmap continues delivering value.</em></p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>\U0001F4CAYou enjoy working with a larger
        book of varied customers, and can effectively prioritise your time to make
        the biggest impact.</em></p></li><li><p style=\\\"min-height:1.5em\\\"><em>\U0001F9E9
        You\u2019re energized by learning and supporting a complex product. You enjoy
        diving deep into technical details, navigating advanced configurations, and
        data workflows, and you enjoy helping customers make sense of them.</em></p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>\U0001F9D1\u200D\U0001F3EB You love to
        teach. Whether it\u2019s a complex report to a very tenured data analyst,
        or a workflow to a brand new recruiter, who is new to SaaS tools, you see
        every teaching moment as an opportunity.</em></p></li><li><p style=\\\"min-height:1.5em\\\"><em>\U0001F50D
        Your peers describe you as detail oriented. You obsess over sending crisp
        follow-up emails, on time. You take pride in internal operations, like real-time
        CRM updates.</em></p></li><li><p style=\\\"min-height:1.5em\\\"><em>\u26A1\uFE0F
        You move fast. You leverage tools/technology to maximize your time. You are
        at home managing a wide range of customers, and prioritizing effectively.</em></p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>\U0001F5FA\uFE0F You're energized by an
        ever-improving work environment. Our team is growing, and continually iterating
        on processes - we live by our Operating Principle of \\\"Implement Continuous
        Improvement\\\"</em></p></li><li><p style=\\\"min-height:1.5em\\\"><em>\U0001F4CA
        You are always looking for ways to improve your work through data.</em></p></li></ul><p
