        style=\\\"min-height:1.5em\\\"><strong>Role Overview</strong></p><p style=\\\"min-height:1.5em\\\">In
        this CSSO role, you will drive the strategy, processes, and data-driven insights
        that empower our Customer Success Team to deliver exceptional outcomes for
        our customers.  Reporting to the Senior Manager of Revenue Operations and
        partnering closely with Customer Success leadership, you will define strategies
        and execute improvements that optimize customer health, retention, and revenue
        growth.</p><p style=\\\"min-height:1.5em\\\">Our Customer Success team is
        consistently praised by our customers for their deep expertise, responsiveness,
        and dedication\u2014a testament to how much we Care Deeply About Customers,
        one of our core Operating Principles. As we continue to scale, it\u2019s critical
        that we preserve and enhance this high standard of customer care while ensuring
        our processes, tools, and insights evolve to support sustainable growth.</p><p
        style=\\\"min-height:1.5em\\\">You will play a crucial role in our operations,
        including process improvements, planning, and reporting.  This is both a strategic
        and tactical role in which you\u2019ll design frameworks and programs, uncover
        actionable insights, and create data-informed recommendations across our Customer
        Success functions.</p><p style=\\\"min-height:1.5em\\\"></p><h3>What you'll
        do at Ashby:</h3><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Operationalize
        CS Strategy: </strong>Develop and refine processes, tools, and workflows to
        scale Customer Success operations. This includes customer segmentation, onboarding
        workflows, lifecycle mapping, and playbook development.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Analyze
        Business Dynamics: </strong>Partner with internal stakeholders on reporting
        &amp; analysis of metrics such as NRR, GRR, churn, product adoption, health
        score, and customer sentiment. Use these insights to provide early warnings
        and refine CS strategies.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Optimizate
        the Customer Journey:</strong> Enhance the end-to-end customer journey, ensuring
        smooth transitions across all post-sales touch points from onboarding through
        support and renewal.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Support
        Strategic Planning: </strong>Collaborate with Finance and CS leadership on
        planning cycles, including headcount planning, capacity modeling, and quota
        setting. Provide relevant historical data for informed decision making.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Drive Process Improvements: </strong>Identify
        inefficiencies and implement improvements to CS workflows, customer onboarding,
        account transitions, and renewal processes. Implement &amp; deploy KPIs to
        measure performance against strategic initiatives.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Optimize
        CS Systems: </strong>Define the business requirements to improve Customer
        Success efficiency, efficacy, and scalability. Partner with RevOps teammates
        to implement changes to tools (CRM, health scoring platforms, etc)</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Collaborate Cross-functionally</strong>:
        Ensure alignment with Sales, Product, and other teams to align resources with
        customer needs and forecasted growth.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Support
        Change Management:</strong> Lead the roll-out and adoption of new processes
        or workflows to the CS team. Partner with Enablement on larger scale change
        programs.</p></li></ul><h3>You could be a great fit if you:</h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Are a self-starter, innately curious in your
        approach</p></li><li><p style=\\\"min-height:1.5em\\\">Bring both SaaS &amp;
        financial literacy, offering an informed perspective on CS benchmarks (e.g.ideal
        \ book sizes)</p></li><li><p style=\\\"min-height:1.5em\\\">Have a strategic
        mindset, with the ability to distill data into actionable recommendations</p></li><li><p
        style=\\\"min-height:1.5em\\\">Are detail-oriented and committed to data accuracy
        and process quality</p></li><li><p style=\\\"min-height:1.5em\\\">Have experience
        in fast-growth SaaS environments, ideally in a Customer Success or Revenue
        Operations role</p></li><li><p style=\\\"min-height:1.5em\\\">Are skilled
        in CRM reporting, with preference for HubSpot experience</p></li><li><p style=\\\"min-height:1.5em\\\">Work
        autonomously, managing multiple tasks and deadlines effectively</p></li><li><p
        style=\\\"min-height:1.5em\\\">Are an excellent communicator, both verbally
        and in writing</p></li></ul><h3>This role may <em>not</em> be a fit if:</h3><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019re
        unwilling to manage both high-level strategy and hands-on execution</p></li><li><p
        style=\\\"min-height:1.5em\\\">You\u2019re uncomfortable with ambiguity and
        prefer structured, predefined assignments</p></li><li><p style=\\\"min-height:1.5em\\\">You
        prefer focused work on a single project at a time</p></li><li><p style=\\\"min-height:1.5em\\\">You
        prefer working within a single team rather than across multiple teams</p></li></ul><h3>Interview
        Process</h3><p style=\\\"min-height:1.5em\\\">Our interview process is thorough
        \u2014 we aim to ensure each person joining the team is the right fit for
        Ashby and will provide ample information to assess if Ashby is the right fit
        for you. The process for this role is as follows:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Recruiter Screen with Talent Acquisition Team
        - 30 minutes</p></li><li><p style=\\\"min-height:1.5em\\\">Hiring Manager
        Interview / Career Deep Dive - 60 minutes</p></li><li><p style=\\\"min-height:1.5em\\\">Challenge
        Interview - 45 Minutes </p></li><li><p style=\\\"min-height:1.5em\\\">Final
        Round / Virtual Onsite - 2 hours</p></li></ol><h3><strong>About Ashby</strong></h3><p
        style=\\\"min-height:1.5em\\\">We\u2019re building the next generation of
        enterprise software, and we\u2019re starting with a suite of products that
        help talent leaders, recruiters, and hiring managers run their hiring process
        significantly better. Learn more on our website:<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/%EF%BF%BC%EF%BF%BCWe\\\">
