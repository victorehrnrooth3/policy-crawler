        Touch Implementation Specialist</h1><p style=\\\"min-height:1.5em\\\">Hi,
        I\u2019m Daryl and I\u2019m the Manager of High Touch Implementations at Ashby.
        One of my favorite aspects of Ashby is our operating principle of <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#8---implement-continuous-improvement\\\"><u>Continuous
        Improvement</u></a>. Coupled with our principle of caring deeply about our
        customers, we often find ourselves wondering, \u201CWhat is a better way to
        accomplish this?\u201D That\u2019s why I am thrilled to be hiring a High Touch
        Implementation Specialist! </p><p style=\\\"min-height:1.5em\\\">As a founding
        member of the High Touch Implementation team and part of our growing Professional
        Services team (within Ashby\u2019s Customer Success organization), you\u2019ll
        have the unique opportunity to help shape this new implementation offering,
        ultimately upleveling the overall customer experience.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        this role:</strong></h2><p style=\\\"min-height:1.5em\\\">As an Implementation
        Specialist aligned to our High Touch segment, you will be responsible for
        managing and executing the end-to-end implementation of Ashby\u2019s solution
        for mid-market and smaller enterprise customers. Your book of business will
        include 12-15 active implementations at a time, each lasting 4-8 weeks. You
        will work directly with customers to develop and execute implementation plans
        that ensure a positive customer experience and expedited time to value. Your
        goal is to support our customers, helping them get up and running swiftly
        with Ashby so they can achieve their desired outcomes.</p><p style=\\\"min-height:1.5em\\\"><strong>Role
        requirements:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Implementation
        &amp; Project Management: </strong>You have extensive experience leading implementation
        and onboarding projects in high growth B2B SaaS environments, defining scope,
        aligning stakeholders, communicating project plans, and delivering results
        against agreed upon expectations. You keep teams on track to meet milestones,
        work effectively in a remote first setting, and are willing to travel &lt;10%
        for customer engagements.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Technical
        Proficiency: </strong>You have experience with complex, multi-module SaaS
        systems, understand shared configuration and data models, and are comfortable
        with analytics, conditional logic, and relational data (Ashby knowledge is
        a plus but not required)</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Customer
        Centricity:</strong> You deeply understand customer needs and tailor implementations
        to meet their specific requirements. You build strong customer relationships
        by maintaining high levels of engagement and communication; you\u2019re the
        customer\u2019s proactive guide and advocate throughout the implementation
        period.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Change Management:</strong>
        You are experienced in navigating change management processes and helping
        customers adapt to new systems and a refreshed approach.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Best
        Practices &amp; Recommendations: </strong>You take pride in advising customers
        on best practices specific to their usage of software to ensure optimal value.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Critical Thinking &amp; Solutions Orientation:
        </strong>You proactively address thematic customer opportunities and improve
        our processes accordingly. You don\u2019t rely on \u2018I\u2019ve seen this
        done,\u2019 but instead think critically to solve problems.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Cross-functional Collaboration: </strong>You
        effectively partner with cross-functional stakeholders across Customer Success,
        Sales, Product, Engineering, and Operations to align and define progress.</p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>You could be a great fit if:</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F4E3
        You demonstrate clear communication. You ask clarifying questions with precision
        and can distill complex concepts into simple themes.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3A7
        You are a great listener. You see your role as the voice of the customer to
        internal stakeholders so we can ensure that our offerings continue to evolve
        in accordance with customer needs.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4C8
        You are a problem solver. You thrive at solving complex challenges with innovative,
        scalable solutions.</p></li><li><p style=\\\"min-height:1.5em\\\">\u26A1\uFE0FYou
        know process matters. You are eager to improve processes and workflows to
        enhance efficiency and efficacy.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F50D
        Your peers describe you as detail-oriented and technically proficient. You
        take pride in internal operations.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4CA
        You are data-driven. You use metrics and analytics to inform decisions and
        measure success.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F30D
        You are adaptable. You can navigate changes in a fast-paced, evolving environment.</p></li><li><p
