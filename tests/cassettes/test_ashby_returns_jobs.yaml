        style=\\\"min-height:1.5em\\\"><strong>About Ashby</strong></p><p style=\\\"min-height:1.5em\\\">At
        Ashby, we\u2019re building the future of enterprise software\u2014starting
        with a suite of products that empower talent leaders, recruiters, and hiring
        managers to drive better hiring outcomes with data-informed strategies. We're
        backed by Y Combinator and top-tier investors like Elad Gil and Lachy Groom.
        Our customers include global leaders like Snowflake, OpenAI, Shopify, Ramp,
        and Notion.</p><p style=\\\"min-height:1.5em\\\">We\u2019re growing fast\u2014over
        100% year-over-year in revenue and we\u2019ve only just scratched the surface
        of a massive market opportunity. This is your chance to get in early and help
        shape a category-defining company.</p><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\"><strong>\u2728 About the Role</strong></p><p
        style=\\\"min-height:1.5em\\\">As one of our founding members of the EMEA
        BDR team, you\u2019ll play an important role in building Ashby\u2019s outbound
        pipeline in Europe, the Middle East, and Africa (EMEA). You\u2019ll evangelise
        our solution in the market, focus on outbound prospecting and new business
        account development. You\u2019ll  partner closely with and learn from senior
        AEs to drive pipeline generation in our Mid-Market and Enterprise segments.</p><p
        style=\\\"min-height:1.5em\\\">This role is ideal for someone eager to learn,
        experiment, and grow into a future AE role. You\u2019ll help us refine our
        outbound motion, bring regional insight to our sales strategy, and create
        a scalable structure for future BDR hires.</p><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\"><strong>\U0001F3AF What You\u2019ll Do</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Drive
        top-of-funnel pipeline</strong>: Identify, map, and engage high-quality prospects
        in whitespace accounts using a multi-channel approach (email, LinkedIn, calls,
        video).</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Own your territory</strong>:
        Work side-by-side with Mid-Market or Enterprise AEs to build strategic account
        plans, research buyer personas, and coordinate outreach efforts.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Craft high-quality outreach</strong>:
        Personalize messaging by persona, industry, and trigger event to drive engagement
        while protecting Ashby\u2019s brand reputation.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Contribute
        to playbooks</strong>: Test new prospecting plays (e.g. event-based outreach,
        intent-driven cadences) and feed learnings back to the team.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Collaborate cross-functionally</strong>:
        Partner with Marketing to ensure campaign alignment and feedback loops. Participate
        in weekly syncs with Sales and monthly pipeline reviews.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Track
        and optimize</strong>: Maintain clean CRM hygiene, track activity and outcomes,
        and iterate on what works to hit KPIs.</p><p style=\\\"min-height:1.5em\\\"></p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>\U0001F4A1 You Could Be a Great Fit
        If:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        are a BDR, Sales Executive, Recruiter, Sourcer or in an equivalent role, with
        a track record of achieving monthly targets.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        communicate clearly and write crisp, compelling outreach free of buzzwords.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You\u2019re curious, coachable, and excited
        to experiment with messaging, tools, and tactics.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        have high attention to detail, especially in CRM documentation and lead follow-ups.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You enjoy creating structure from ambiguity
        and want to build something from the ground up.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        want to grow into an AE role and are hungry to learn from top performers at
        a company that believes in internal mobility</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\"><strong>\U0001F9E0 Role Requirement</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Strong
        written and verbal communication skills in English.</p></li><li><p style=\\\"min-height:1.5em\\\">Comfortable
        using LinkedIn, HubSpot/Salesforce, ZoomInfo, and modern prospecting tools
        (or quick to learn).</p></li><li><p style=\\\"min-height:1.5em\\\">Prior experience
        in a customer-facing or high-volume outreach role is a plus, but not required.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Required: Fluency in English.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Bonus: German, Dutch or French.</p><p style=\\\"min-height:1.5em\\\"></p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>\U0001F680 Why This Role Is Special</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019ll
        be a <strong>founding member</strong> of our EMEA BDR team\u2014with room
        to grow into an AE or other GTM roles.</p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019ll
        join a company where <strong>outbound is already working</strong>, and needs
        dedicated focus to scale.</p></li><li><p style=\\\"min-height:1.5em\\\">You'll
        get hands-on exposure to <strong>strategic selling</strong> alongside experienced
        AEs and GTM leaders.</p></li><li><p style=\\\"min-height:1.5em\\\">You'll
        help shape the outbound motion, tools, and metrics at a fast-growing startup.</p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>Why you shouldn\u2019t apply</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019re
        not a self-starter or disciplined in managing your own time</p></li><li><p
        style=\\\"min-height:1.5em\\\">You prefer an in-office environment</p></li><li><p
        style=\\\"min-height:1.5em\\\">You are reluctant to get on the phone or build
        engaging content that can be shared on LinkedIn</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>\U0001F4BC
        Interview Plan</strong></p><ol style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Intro
        Recruiter Call</strong> (25 min)</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Hiring
        Manager Call </strong>(1 hour)</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Outbound
        Prospecting &amp; Strategy Exercise</strong></p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Challenge
        Interview </strong>(75 mins)</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Meet
        the VP of Sales</strong> (30 mins)</p></li></ol><p style=\\\"min-height:1.5em\\\"><strong>\U0001F381
        Benefits</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Sell
        a product customers love and use every day</p></li><li><p style=\\\"min-height:1.5em\\\">Clear
        promotion path into AE roles</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment &amp; learning budgets</p></li><li><p style=\\\"min-height:1.5em\\\">Unlimited
        PTO </p></li><li><p style=\\\"min-height:1.5em\\\">Option to travel for team
        events and enablement</p></li><li><p style=\\\"min-height:1.5em\\\">Inclusive,
        remote-first culture</p></li></ul><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"About
