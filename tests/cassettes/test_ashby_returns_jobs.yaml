        in ARR, growing >100% year over year, over 2500 customers, very low churn,
        and many years of runway. We\u2019ll share more details once we meet, but
        you now probably have a good idea as to why we're hiring for this role \U0001F605.\\n\\n\\n\\n\\nWHAT
        WE\u2019RE BUILDING\\n\\nAs engineers, we are used to tooling that makes us
        better at what we do. When we started Ashby, we saw the opposite with Talent
        Acquisition software. Recruiting teams were leveling up how they did their
