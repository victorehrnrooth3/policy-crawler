        min - Interview with Morgan (Hiring Manager) + Head of Professional Services</p></li><li><p
        style=\\\"min-height:1.5em\\\">60 min-  Mock Call with 2 Implementation Specialists</p></li><li><p
        style=\\\"min-height:1.5em\\\">Final Round:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">30 min - Customer Adoption with Head of Dedicated
        Customer Success &amp; one of our Strategic CSMs</p></li><li><p style=\\\"min-height:1.5em\\\">30
        min - Interview with VP of Customer Success</p></li><li><p style=\\\"min-height:1.5em\\\">10
        min - Closing Questions with Hiring Manager</p></li></ul></li></ul><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019ll
