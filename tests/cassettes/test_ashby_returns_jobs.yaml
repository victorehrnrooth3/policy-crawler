        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"MANAGER
        OF DEDICATED IMPLEMENTATIONS - EMEA\\n\\nHi, I\u2019m John and I\u2019m the
        Head of Professional Services at Ashby. One of my favorite aspects of Ashby
        is our operating principle of Continuous Improvement https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#8---implement-continuous-improvement.
        Coupled with our principle of caring deeply about our customers, we often
        find ourselves wondering \u2018what is a better way to accomplish this\u2019.
        That\u2019s why I am thrilled to be hiring our first EMEA Manager of Dedicated
        Implementations! As a leader on our growing Professional Services team (within
        Ashby\u2019s Customer Success organization), you\u2019ll have the opportunity
        to play a key role early in our customers\u2019 journey, ultimately upleveling
        the overall customer experience.\\n\\n\\n\\n\\nABOUT THIS ROLE:\\n\\nAs our
        first Manager of Dedicated Implementations in EMEA, you will play a key role
        in ensuring high-quality experiences for customers beginning their Ashby journey.
        You will lead an EMEA-based team of Implementation Specialists aligned to
        our Dedicated customer segments, including Strategic (enterprise) and High
        Touch (mid-market) customers. You will oversee the delivery of segment-aligned
        implementation experiences, and will partner cross-functionally to support
        scoping and planning for prospective customers.\\n\\nRole requirements:\\n\\n
        - Implementation & Project Management: You have extensive experience managing
        and executing implementation and onboarding projects (defining the work, aligning
        with stakeholders, communicating the project plan, and ultimately delivering
        results in accordance with the agreed upon expectations). You keep the team
        on track to ensure milestones are met. You work effectively in a remote-first
        setting, with the ability to travel <10% as needed for strategic customer
        engagements.\\n\\n - Team Leadership: You build and scale high-performing
        teams, empowering them to achieve outcomes that meet or exceed the high standards
        set by our team and company.\\n\\n - Customer Centricity: You are adept at
        understanding customer needs and tailoring implementations to meet their specific
        requirements. You build strong customer relationships by maintaining high
        levels of engagement and communication; you\u2019re the customer\u2019s proactive
        guide and advocate throughout the implementation period.\\n\\n - Bias for
        Action: You move work forward, translating ambiguity into clear paths, driving
        toward outcomes, and ensuring follow-through.\\n\\n - Regional Focus: You
        leverage your understanding of the EMEA market to define and evolve how implementations
        are delivered, ensuring our approach optimizes for regional considerations
        and scales without compromising quality.\\n\\n - Fluency with Enterprise Motions:
        You are comfortable operating in complex enterprise environments with multiple
        stakeholders, competing priorities, and evolving requirements. You are experienced
        in navigating change management processes at scale and helping customers adapt
        to new systems and a refreshed approach.\\n\\n - Technical Proficiency: You
        have a solid understanding of a complex product (ideally Ashby) and its technical
        intricacies; you are technically curious and creative.\\n\\n - Critical Thinking
        & Solutions Orientation: You proactively address thematic customer opportunities
        and improve our processes accordingly. You don\u2019t rely only on \u2018I\u2019ve
        seen this done,\u2019 but instead think critically to solve problems.\\n\\n
        - Cross-functional Collaboration: You effectively partner with cross-functional
        stakeholders across Customer Success, Sales, Product, Engineering, and Operations
        to align and define progress.\\n\\nWhat Success Looks Like:\\n\\n - EMEA customers
        achieve time-to-value quickly and predictably\\n\\n - Implementation quality
        is consistent across segments without feeling templated\\n\\n - Upmarket customers
        receive an enterprise-ready onboarding experience\\n\\n - Clear, effective
        transitions into Customer Success support strong adoption momentum\\n\\n -
        Scalable processes reduce manual effort while preserving quality\\n\\nYou
        could be a great fit if:\\n\\n - \U0001F9D1\u200D\U0001F3EB You love to coach.
        You see every teaching moment as an opportunity and are excited to help your
        team and our customers grow.\\n\\n - \U0001F4E3 You demonstrate clear communication.
        You ask clarifying questions with precision and can distill complex concepts
        into simple themes. You approach all stakeholder conversations with confidence.\\n\\n
        - \U0001F3A7 You are a great listener. You see your role as the voice of the
        customer to internal stakeholders so we can ensure that our offerings continue
        to evolve in accordance with customer needs.\\n\\n - \U0001F4C8 You are a
        problem solver. You thrive at solving complex challenges with innovative,
        scalable solutions.\\n\\n - \u26A1\uFE0FYou know process matters. You are
        eager to improve processes and workflows to enhance efficiency and efficacy.\\n\\n
        - \U0001F50D Your peers describe you as detail-oriented and technically proficient.
        You take pride in internal operations.\\n\\n - \U0001F4CA You are data-driven.
        You use metrics and analytics to inform decisions and measure success.\\n\\n
        - \U0001F30D You are adaptable. You can navigate changes in a fast-paced,
        evolving environment.\\n\\nYou might not be a great fit if:\\n\\n - You prefer
        being an individual contributor.\\n\\n - You prefer an in-person role over
        remote.\\n\\n - You are less interested in customer-facing roles that require
        both technical and interpersonal skills.\\n\\n - You are accustomed to defining
        ideas and strategies, yet not responsible for their execution.\\n\\n - You
        prefer working with a simple product (such as a point solution).\\n\\n - You
        prefer exclusively to build (rather than build, iterate, optimize).\\n\\n\\nOUR
        PHILOSOPHY\\n\\nHere are a few key points (relevant to the go-to-market side)
        that should give you an idea of what it is like to work with us:\\n\\n - We
        spend a lot of time building best-in-class products since we believe a highly
        differentiated product is a lot easier to sell.\\n\\n - We want to offer deep
        expertise whenever we interact with prospects and customers.\\n\\n - We strongly
        believe that small teams with very talented people (and the right work environment)
        deliver much better performance than teams with large headcount. We hire and
        compensate accordingly.\\n\\n - We value a strong sense of ownership, principled
        thinking over experience, and thoughtful communication (we put a lot of effort
        into using the right communication channels) - we\u2019ll get into these and
        other values during the hiring process.\\n\\n\\nTHE INTERVIEW\\n\\nAt Ashby,
        our team and interview process want to help you show your best self. Our interview
        process is structured to get to know you and your career as well as empower
        you with insight into our key focus areas. Here is the process in its entirety:\\n\\n
        - 30 min - Recruiter Screen with Talent Team\\n\\n - 45 min - Interview with
        Head of Professional Services (Hiring Manager)\\n\\n - 45 min - Mock Customer
        Escalation Call\\n\\n - Final Round Part 1:\\n   \\n   - 30 min - Interview
        with VP of Customer Success\\n   \\n   - 30 min - Cross-functional Leadership
        interview\\n\\n - Final Round Part 2:\\n   \\n   - 30 min - Interview with
        CEO\\n   \\n   - 10 min - Closing Questions with Hiring Manager\\n\\n\\nBENEFITS\\n\\n
        - You\u2019ll get the time to do things the right way; we put a lot of emphasis
        on high quality work and avoid quick hacks as much as possible.\\n\\n - You
        get to sell a product that our prospects & customers are truly excited about.\\n\\n
        - Competitive compensation is offered.\\n\\n - 10-year exercise window for
        stock options. You shouldn\u2019t feel pressure to purchase stock options
        if you leave Ashby \u2014do it when you feel financially comfortable.\\n\\n
        - Unlimited PTO with four weeks recommended per year. Expect \u201CVacation?\u201D
        in our one-on-one agenda until you start taking it \U0001F605\\n\\n - Twelve
        weeks of fully paid family leave in the US. We plan to expand this to employees
        in other countries as situations arise.\\n\\n - Generous equipment, software,
        and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
        covered with manager approval\\n\\n\\n\\nAshby provides equal employment opportunities
