        Manager - Americas\",\"department\":\"Customer Success\",\"team\":\"Customer
        Support\",\"employmentType\":\"FullTime\",\"location\":\"Remote - US\",\"shouldDisplayCompensationOnJobPostings\":true,\"secondaryLocations\":[],\"publishedAt\":\"2026-05-28T17:52:18.846+00:00\",\"isListed\":true,\"isRemote\":true,\"workplaceType\":\"Remote\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"United
        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/46998ea2-cea7-47c0-9812-238f161b6fc7\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/46998ea2-cea7-47c0-9812-238f161b6fc7/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">Caring deeply about our customers is one of
        our favorite Ashby<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#operating-principles\\\">
        <u>Operating Principles</u></a> in Support. As we continue to grow our Product
        Support Team with the customer experience at the heart of everything we do,
        we're excited to hire a <strong>Manager of Product Support</strong> to our
        Americas team. In this role, you'll lead an incredible group of Technical
        Support Specialists, collaborate closely with a high-performing team of Support
        Managers, and help shape how we scale exceptional customer support globally.</p><p
        style=\\\"min-height:1.5em\\\"><strong>About this role:</strong></p><p style=\\\"min-height:1.5em\\\">This
        is a unique opportunity to take ownership of a region. As our third regional
        manager in the Americas, you won\u2019t just be managing a team. You\u2019ll
        be building and shaping how Support operates as we scale. This role requires
        someone who thrives in ambiguity, has a passion for building and can balance
        strategic foresight with operational execution. You\u2019ll need to be both
        a strong advocate for our customers and for your team, as we continue to grow
        Support in line with our ambitious company goals.</p><p style=\\\"min-height:1.5em\\\">You
        will partner with other Support leaders and operations to develop and implement
        effective Support strategies, monitor key performance indicators, and resolve
        escalated customer issues. You will collaborate closely with Product, Engineering,
        and the broader Customer Success Teams to address customer needs, maintain
        support documentation, and uplevel the customer experience. You will stay
        current with industry trends to continuously improve support processes, foster
        a positive team environment, and drive professional growth and development
        within the support team.</p><p style=\\\"min-height:1.5em\\\">When you start,
        you\u2019ll work closely with our Director of Support and VP of Customer Success
        \u2013 you\u2019ll inherit a team of ~7 Product Support Specialists and will
        grow this team further once you\u2019re ramped.</p><p style=\\\"min-height:1.5em\\\"><strong>Role
        Requirements:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Support
        Leadership:</strong> You have a proven track record of leading and growing
        high-performing and highly technical B2B SaaS Support organizations, while
        driving a culture of excellence and empathy.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Systematic
        thinking: </strong>You proactively address thematic customer issues and improve
        Support processes, leveraging Support technologies and innovative processes
        to enhance the efficiency and efficacy of the Support team.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Customer-Centric:</strong> You have
        a deep understanding of B2B customer needs and have a history of ensuring
        outstanding support experiences.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Strong
        Technical Background:</strong> You have experience working with complex B2B
        software products and can understand, troubleshoot, and communicate technical
        concepts effectively. While you may not be an engineer, you are comfortable
        discussing APIs, integrations, and system workflows with technical teams and
        translating that knowledge into actionable insights for the Support team.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Timely Issue Resolution:</strong> You
        are invested in overseeing the resolution of complex technical issues in alignment
        of our SLAs.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Analytical:
        </strong>You are comfortable using data and metrics to drive decision-making,
        continually improving both the team and customer experience.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Technical expertise:</strong> You are
        well versed in Support organisations, related KPIs, and related systems (ticketing,
        analytics, Help Center, etc.).</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You
        could be a great fit if:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\u2B50 You care deeply about both the customer
        and employee experience and derive satisfaction from enabling others to be
        successful.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F913 You strive
        to become a product and industry expert. You align with the goal of creating
        differentiation via the Support experience and being a go-to partner for your
        team members. You recognize the expertise the team possesses and are continuously
        striving to learn and maintain your own expertise in the product.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F50D Your peers describe you as being
        detail-oriented. You take pride in operational efficiencies and consider processes
        from a holistic perspective.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4CB
        You know process matters. You are eager to improve processes and workflows
        to enhance efficiency and efficacy.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F91D
        You love to coach and enable. You see every teaching moment as an opportunity
        and are excited to help teams grow functionally and expand their technical
        knowledge.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4C8 You enjoy
        analysing the Support journey and identifying opportunities for self-service
        and delivery improvements.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4E3
        You thrive in representing the voice-of-the-customer as you hone internal
        processes, as well as advocating for manageable and efficient processes for
        Support Specialists.</p></li></ul><p style=\\\"min-height:1.5em\\\"> <strong>You
        may not want to apply if:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You\u2019re excellent at managing existing
        Support policies and practices, but identifying and rolling out new processes
        is not an area you\u2019re comfortable with.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        do not want to handle customer-facing tickets, whether for escalation or ongoing
        learning.</p></li><li><p style=\\\"min-height:1.5em\\\">Managing the daily
        Support workload according to urgency, SLAs, and staffing is not something
        you\u2019re interested in.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        need close oversight, a clearly carved out roadmap, or step-by-step guidance
        to succeed. This role requires comfort with ambiguity, initiative and a willingness
        to roll up your sleeves to build something you're passionate about.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You believe there is one right way to provide
        support and measure success.</p></li></ul><p style=\\\"min-height:1.5em\\\"><br
        /><strong>Our Philosophy:</strong></p><p style=\\\"min-height:1.5em\\\">Here
        are a few key points (relevant to the go-to-market side) that should give
        you an idea of what it is like to work with us:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">We spend a lot of time building best-in-class
        products since we believe a highly differentiated product is a lot easier
        to sell.</p></li><li><p style=\\\"min-height:1.5em\\\">We want to offer deep
        expertise whenever we interact with prospects and customers \u2013 whether
        it be through scaled engagements (e.g. webinars), 1:1 conversations, or through
        written word (e.g. documentation).</p></li><li><p style=\\\"min-height:1.5em\\\">We
        strongly believe that small teams with very talented people (and the right
        work environment) deliver much better performance than teams with large headcount.
        We hire and compensate accordingly.</p></li></ul><p style=\\\"min-height:1.5em\\\">We
        value a strong sense of ownership, principled thinking over experience, and
        thoughtful communication (we put a lot of effort into using the right communication
        channels) - we\u2019ll get into these and other values during the hiring process.</p><p
        style=\\\"min-height:1.5em\\\"><strong>The Interview:</strong></p><p style=\\\"min-height:1.5em\\\">At
        Ashby, our team and interview process want to help you show your best self.
        Our interview process is structured to get to know you and your career as
        well as empower you with insight into our key focus areas. Here is the process
        in its entirety:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">30
        min - Recruiter Screen with Talent Team</p></li><li><p style=\\\"min-height:1.5em\\\">45
        min - Interview with Hiring Manager</p></li><li><p style=\\\"min-height:1.5em\\\">Take-Home
        Assessment - one week to complete</p></li><li><p style=\\\"min-height:1.5em\\\">Final
        Round:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">30
        min \\\"Customer Experience\\\" interview with two other Customer Success
        leaders</p></li><li><p style=\\\"min-height:1.5em\\\">30 min \\\"Team Insights\\\"
        interview with a Support Specialist, and a Support Leader</p></li><li><p style=\\\"min-height:1.5em\\\">30
        min \\\"Support Management Approach\\\" interview with another Support Leader</p></li><li><p
        style=\\\"min-height:1.5em\\\">10 min - Closing Questions with Hiring Manager</p></li></ul></li><li><p
        style=\\\"min-height:1.5em\\\">Chat with Benji, CEO</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>Benefits:</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019ll
        get the time to do things the right way; we put a lot of emphasis on high
        quality work and avoid quick hacks as much as possible.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        get to sell a product that our prospects &amp; customers are truly excited
        about.</p></li><li><p style=\\\"min-height:1.5em\\\">Competitive compensation
        is offered.</p></li><li><p style=\\\"min-height:1.5em\\\">10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO. Expect \u201CVacation?\u201D
        in our one-on-one agenda until you start taking it \U0001F605</p></li><li><p
        style=\\\"min-height:1.5em\\\">Generous equipment, software, and office furniture
        budget. Get what you need to be happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li></ul><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"Caring
        deeply about our customers is one of our favorite Ashby Operating Principles
        https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#operating-principles
        in Support. As we continue to grow our Product Support Team with the customer
        experience at the heart of everything we do, we're excited to hire a Manager
        of Product Support to our Americas team. In this role, you'll lead an incredible
        group of Technical Support Specialists, collaborate closely with a high-performing
        team of Support Managers, and help shape how we scale exceptional customer
        support globally.\\n\\nAbout this role:\\n\\nThis is a unique opportunity
        to take ownership of a region. As our third regional manager in the Americas,
        you won\u2019t just be managing a team. You\u2019ll be building and shaping
        how Support operates as we scale. This role requires someone who thrives in
        ambiguity, has a passion for building and can balance strategic foresight
        with operational execution. You\u2019ll need to be both a strong advocate
        for our customers and for your team, as we continue to grow Support in line
        with our ambitious company goals.\\n\\nYou will partner with other Support
        leaders and operations to develop and implement effective Support strategies,
        monitor key performance indicators, and resolve escalated customer issues.
        You will collaborate closely with Product, Engineering, and the broader Customer
        Success Teams to address customer needs, maintain support documentation, and
        uplevel the customer experience. You will stay current with industry trends
        to continuously improve support processes, foster a positive team environment,
        and drive professional growth and development within the support team.\\n\\nWhen
        you start, you\u2019ll work closely with our Director of Support and VP of
        Customer Success \u2013 you\u2019ll inherit a team of ~7 Product Support Specialists
        and will grow this team further once you\u2019re ramped.\\n\\nRole Requirements:\\n\\n
        - Support Leadership: You have a proven track record of leading and growing
        high-performing and highly technical B2B SaaS Support organizations, while
        driving a culture of excellence and empathy.\\n\\n - Systematic thinking:
        You proactively address thematic customer issues and improve Support processes,
        leveraging Support technologies and innovative processes to enhance the efficiency
        and efficacy of the Support team.\\n\\n - Customer-Centric: You have a deep
        understanding of B2B customer needs and have a history of ensuring outstanding
        support experiences.\\n\\n - Strong Technical Background: You have experience
        working with complex B2B software products and can understand, troubleshoot,
        and communicate technical concepts effectively. While you may not be an engineer,
        you are comfortable discussing APIs, integrations, and system workflows with
        technical teams and translating that knowledge into actionable insights for
        the Support team.\\n\\n - Timely Issue Resolution: You are invested in overseeing
        the resolution of complex technical issues in alignment of our SLAs.\\n\\n
