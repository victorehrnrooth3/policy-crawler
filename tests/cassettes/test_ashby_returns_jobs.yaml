        - Intro Call with Recruiting - 30 min\\n\\n - Hiring Manager Interview - 45-60
        min\\n\\n - Take Home Assessment\\n\\n - VP of Customer Success Interview
        - 30 min\\n\\n - Founder Interview - 30 min\\n\\n - Peer Interview (Support
        Leaders) - 60 min\\n\\nIf you're excited about leading a highly technical
        team, eliminating friction, and shaping the future of Support Engineering
        at Ashby, we\u2019d love to hear from you!\\n\\n\\n\\n\\nOUR PHILOSOPHY:\\n\\nHere
        are a few key points (relevant to the go-to-market side) that should give
