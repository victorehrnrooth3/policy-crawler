        I\u2019m Allie, Head of Support here at Ashby. I'm excited to share that we're
        hiring a Support Engineer in North America! \U0001F389\_\\n\\n\\n\\nAbout
        this Role\\n\\nAs a Support Engineer, you will be at the center of providing
        an excellent experience to customers by diagnosing and resolving technical
        issues ensuring a high level of customer satisfaction through effective communication
        and problem-solving. You will assist with investigating and resolving technical
        issues that come to Support while identifying patterns in customer inquiries
        to drive product improvement, as well as opportunities to enable our Support
        team on technical concepts. Your knowledge of integrations and platforms will
        be key to your success, as you'll leverage this expertise to address customer
        inquiries related to system integrations, data flow, and product functionality.
        You\u2019ll be a key contributor to our documentation and enablement strategy
        while collaborating with Engineering and Support to address complex issues.\\n\\n\\n\\nRole
        Responsibilities:\\n\\n - Technical Troubleshooting: Develop a deep technical
        understanding of Ashby capabilities and systems to support diagnosis of technical
        issues and to drive timely and effective resolutions for customers. Provide
        comprehensive support regarding the investigation of integration issues, API
        inquiries, and bug reports.\\n\\n - Expertise in Integrations: Leverage in-depth
        understanding of integration frameworks and related technologies to troubleshoot
        and resolve complex integration issues. Proactively identify patterns in customer
        challenges to recommend product enhancements and streamline integration processes.\\n\\n
        - Customer Experience: Provide exceptional customer service, ensuring clients
        feel supported and valued.\\n\\n - Collaboration with Engineering: Work closely
        with the Ashby Engineering team to escalate issues, share insights, and contribute
        to the continuous improvement of our products.\\n\\n - Documentation: Create
        and maintain detailed documentation of support processes, common issues, and
        solutions to enhance the knowledge base.\\n\\n - Continuous Improvement: Gather,
        analyze, and relay customer feedback to the engineering team to inform product
        development and enhancements.\\n\\n - Support Enablement: Share expanding
        knowledge with the rest of the Support Team to assist with creating holistic
        understanding of the platform.\\n\\nRole Requirements:\\n\\n - Technical Expertise:
        Strong understanding of software applications, Internet protocols, troubleshooting,
        and automation via scripting.\\n\\n - Communication Skills: Excellent verbal
        and written communication skills, with the ability to explain technical concepts
        to non-technical users. Detail-oriented when documenting reproduction steps
        and consolidating relevant information to report technical issues internally.\\n\\n
        - Customer-Focused: A passion for delivering outstanding customer service
        and a commitment to ensuring a positive customer experience.\\n\\n - Team
        Collaboration: Ability to work effectively within a team and independently,
        with a proactive approach to solving problems.\\n\\n - Adaptability: Comfortable
        working in a dynamic environment with the ability to adapt to product updates
        and processes improvements quickly.\\n\\nYou Should Apply If:\\n\\n - You
        have a strong technical background, particularly in API integrations, and
        enjoy solving complex problems by analyzing logs and code.\\n\\n - You are
        passionate about helping customers and providing a top-notch support experience.\\n\\n
        - You have excellent communication skills and can convey technical information
        clearly to various audiences.\\n\\n - You thrive in a collaborative environment
        and enjoy working closely with engineering teams.\\n\\n - You are proactive,
        detail-oriented, and always looking for ways to improve processes.\\n\\nYou
        Should Not Apply If:\\n\\n - You do not have a strong technical background
        or experience in technical troubleshooting.\\n\\n - You are not comfortable
        with asynchronous collaboration or communicating in a thoughtful way with
        Customers, Support Team Members, or Engineers.\\n\\n - You are not comfortable
        communicating with customers or explaining technical concepts in simple terms.\\n\\n
        - You are not adaptable to changing environments and new technologies.\\n\\n
        - You do not have a passion for customer-facing interactions and providing
        a great customer experience.\\n\\n - You value in-office culture for motivation;
        this role is remote (given our office is in San Francisco) so we're seeking
        self-starters!\\n\\n\\nABOUT ASHBY\\n\\nWe\u2019re building the next generation
        of enterprise software, and we\u2019re starting with a suite of products that
        help talent leaders, recruiters, and hiring managers run their hiring process
        significantly better. Learn more on our website: https://ashbyhq.comhttps://www.ashbyhq.com/\\n\\nWe
        are well-funded and backed by great investors, including Y Combinator, Elad
        Gil and Lachy Groom. We publicly launched in October 2022 and are working
        with amazing companies we're proud to partner with.\\n\\nWe\u2019ve built
        an incredible team and exceptional product over the past few years, and we
        truly are just getting started. In short, this is the perfect time to join
        \U0001F680\\n\\n\\n\\n\\nABOUT GO TO MARKET\\n\\nOur Support team is a part
        of our Customer Success department, and thus is a part of our Go To Market
        function. Here are a few points that should give you an idea of what it is
        like to work with us:\\n\\n - We spend a lot of time building best-in-class
        products, since we believe a highly differentiated product is easier to sell.\\n\\n
        - We also spend a lot of time building a best-in-class customer experience.
        We aim to offer deep expertise whenever we interact with prospects and customers
        (we hope our 9.8 Support rating on G2 signals this).\\n\\n - We strongly believe
        that small teams with very talented people and the right work environment
        deliver much high performance and we're built accordingly.\\n\\n\\nINTERVIEW
        PROCESS\\n\\nOur interview process is thorough \u2014 we aim to ensure each
        person that joins the team is the right fit for Ashby and will provide ample
        information for you to assess if Ashby is the right fit for you. The process
        for this role is as follows:\\n\\n - Intro Call with Recruiting - 30 Minutes\\n\\n
        - Take Home Assessment - 1 week to complete\\n\\n - Hiring Manager Interview
        - 45-60 Minutes\\n\\n - Virtual Onsite - 120 Minutes\\n\\n\\nBENEFITS\\n\\n
        - Competitive salary and equity.\\n\\n - 10-year exercise window for stock
        options. You shouldn\u2019t feel pressure to purchase stock options if you
        leave Ashby \u2014do it when you feel financially comfortable.\\n\\n - Unlimited
        PTO with four weeks recommended per year.\_\\n\\n - Twelve weeks of fully
        paid family leave in the US. We plan to expand this to employees in other
        countries as situations arise.\\n\\n - Generous equipment, software, and office
