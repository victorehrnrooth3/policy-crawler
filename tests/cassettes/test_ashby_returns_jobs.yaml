        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"ENTERPRISE
        SOLUTIONS ARCHITECT - AMERICAS\\n\\nHi, I\u2019m John and I\u2019m the Head
        of Professional Services at Ashby. One of my favorite aspects of Ashby is
        our operating principle of Continuous Improvement https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#8---implement-continuous-improvement.
        Coupled with our principle of caring deeply about our customers, we often
        find ourselves wondering \u2018what is a better way to accomplish this\u2019.
        That\u2019s why I am thrilled to be hiring our first Enterprise Solutions
        Architect! As a highly cross-functional member on our growing Professional
        Services team (within Ashby\u2019s Customer Success organization), you\u2019ll
        have the opportunity to start shaping our customers\u2019 journeys before
        they kick off, ultimately upleveling the overall customer experience.\\n\\n\\n\\n\\nABOUT
        THE ROLE\\n\\nAs an Enterprise Solutions Architect (SA), you will have responsibility
        for implementation and services scoping and design, as well as Statement of
        Work creation to capture recommendations. The SA is a member of the Professional
        Services (PS) organization and a close partner to the Enterprise Sales team.
        Broadly, the goal of this role is to ensure the success of Enterprise customers
        through professional services.\\n\\nYou will work directly with prospective
        customers and our Solutions Engineering team during the sales cycle to understand
        the current state, define a clear path to success, and shape both the deal
        and implementation approach accordingly. You will provide continuity between
        what was sold and what is delivered by ensuring a comprehensive handoff from
        Sales to PS.\\n\\nThis is a high-impact, highly cross-functional role focused
        on aligning pre-sales motions with implementation work to improve Enterprise
        sales win rates, accelerate time-to-value, and drive long-term customer outcomes.
        You will play a critical role in matching prospective customers with the approaches
        that best meet their needs, while helping Sales win complex deals by increasing
        buyer confidence and reducing perceived implementation risk.\\n\\n\\n\\n\\nWHAT
        YOU\u2019LL DO\\n\\n\\nDESIGN AND CLOSE SUCCESSFUL PROFESSIONAL SERVICES OPPORTUNITIES
        (PRE-SALES)\\n\\n - Act as a trusted advisor to help prospective customers
        understand how to successfully implement Ashby\\n\\n - Partner with Account
        Executives and Solutions Engineers to scope and design implementation approaches
        for complex enterprise opportunities\\n\\n - Translate prospective customer
        needs and constraints into a tailored path to go-live, including an implementation
        strategy, success milestones, and services offerings required to support the
        customer\\n\\n - Align customer stakeholders (including executives) on desired
        outcomes, timelines, and responsibilities\\n\\n - Create, negotiate, and execute
        Statements of Work (SOWs) aligned with Professional Services best practices
        and offerings that accurately the required scope, effort, and sequencing\\n\\n\\nCREATE
        CONTINUITY INTO DELIVERY (POST-SALES / EARLY LIFECYCLE)\\n\\n - Participate
        in the Sales handoff to ensure effective transition of recommendations and
        expectations to the post-sales team\\n\\n - Ensure alignment between pre-sales
        commitments and post-sales execution by participating in kickoff calls for
        customers with complex or highly custom recommended approaches\\n\\n\\nIMPROVE
        PROFESSIONAL SERVICES GTM MOTIONS\\n\\n - Identify patterns across opportunities
        (what works, what breaks) and use these to refine our Enterprise Sales motion
        in partnership with Leadership.\\n\\n - Refine how and when services are introduced
        and scoped within the sales cycle\\n\\n - Contribute to playbooks, frameworks,
        and assets that improve how we sell and deliver services\\n\\n\\nWHAT WE\u2019RE
        LOOKING FOR\\n\\n - 5+ years of experience in Enterprise SaaS across one or
        more of: Solutions Consulting, Professional Services, or Management Consulting\\n\\n
        - Strong ability to diagnose business processes and translate them into scalable
        technical solutions\\n\\n - Experience with complex, multi-stakeholder deals
        with meaningful implementation components\\n\\n - Comfort navigating collaboration
        with both pre-sales and post-sales teams\\n\\n - Excellent communication skills,
        with the ability to influence executives and align cross-functional teams\\n\\n
        - Strong judgment and ability to balance customer needs, business outcomes,
        and operational feasibility\\n\\n\\nWHAT SUCCESS LOOKS LIKE\\n\\n - Increasing
        win rates, especially in the Enterprise\\n\\n - Clear alignment between scope,
        expectations, and customer outcomes\\n\\n - Reduced implementation friction
        and faster time-to-value\\n\\n - Improved customer confidence and sentiment
        at kickoff and early lifecycle\\n\\n - Stronger partnership between Sales,
        Professional Services, and Customer Success\\n\\n - Increased retention and
        expansion driven by successful customer outcomes\\n\\n\\nWHY THIS ROLE MATTERS\\n\\nAs
        we move upmarket, the complexity of our customers\u2014and the importance
        of getting implementations just right\u2014continues to increase. This role
        ensures we are not just closing quickly, but closing them in a way that sets
        customers up for long-term success.\\n\\n\\n\\n\\nTHE INTERVIEW\\n\\nAt Ashby,
        our team and interview process want to help you show your best self. Our interview
        process is structured to get to know you and your career as well as empower
        you with insight into our key focus areas. Here is the process in its entirety:\\n\\n
        - 30 min - Recruiter Screen with Talent Team\\n\\n - 45 min - Interview with
        Head of Professional Services (Hiring Manager)\\n\\n - 45 min - Change Management
        Challenge\\n\\n - Final Round Part 1:\\n   \\n   - 30 min - Interview with
        VP of Customer Success\\n   \\n   - 30 min - Interview with our Global Head
        of Solutions Engineering\\n\\n - Final Round Part 2:\\n   \\n   - 30 min -
        Interview with CEO\\n   \\n   - 10 min - Closing Questions with Hiring Manager\\n\\n\\n\\n\\nBENEFITS\\n\\n
        - You\u2019ll get the time to do things the right way; we put a lot of emphasis
        on high quality work and avoid quick hacks as much as possible.\\n\\n - You
        get to sell a product that our prospects & customers are truly excited about.\\n\\n
        - Competitive compensation is offered.\\n\\n - 10-year exercise window for
        stock options. You shouldn\u2019t feel pressure to purchase stock options
        if you leave Ashby \u2014do it when you feel financially comfortable.\\n\\n
        - Unlimited PTO with four weeks recommended per year. Expect \u201CVacation?\u201D
        in our one-on-one agenda until you start taking it \U0001F605\\n\\n - Twelve
        weeks of fully paid family leave in the US. We plan to expand this to employees
        in other countries as situations arise.\\n\\n - Generous equipment, software,
        and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
