        on onboarding and learning the product. With support and guidance, you\u2019ll
        begin taking tickets in week one, so you can start getting to know our customers,
        our processes, and begin making an impact right away, all while continuing
        to build confidence and depth in the platform.\\n\\n\\n\\n\\nBENEFITS\\n\\n
        - 10-year exercise window for stock options. You shouldn\u2019t feel pressure
