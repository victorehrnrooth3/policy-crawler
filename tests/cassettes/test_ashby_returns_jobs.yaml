        Strategic CSMs\\n   \\n   - 30 min - Interview with VP of Customer Success
        & Head of PS\\n   \\n   - 10 min - Closing Questions with Hiring Manager\\n\\n\\nBENEFITS\\n\\n
        - You\u2019ll get the time to do things the right way; we put a lot of emphasis
