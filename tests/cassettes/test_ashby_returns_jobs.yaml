        Implementation Specialist</h1><p style=\\\"min-height:1.5em\\\"><em>Hi! I\u2019m
        Morgan, the Manager of Strategic Implementations here at Ashby. Our customers
        are at the center of everything we do, and that\u2019s especially true during
        implementation. We take pride in being responsive, collaborative partners
