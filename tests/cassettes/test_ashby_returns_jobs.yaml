        style=\\\"min-height:1.5em\\\">You typically manage only a few simultaneous
        implementations at a time. This segment moves with urgency and we balance
        a book of business from 20-25 implementations at a time</p></li><li><p style=\\\"min-height:1.5em\\\">You
