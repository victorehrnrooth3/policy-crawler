        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"Role
        Overview\\n\\nIn this CSSO role, you will drive the strategy, processes, and
        data-driven insights that empower our Customer Success Team to deliver exceptional
        outcomes for our customers. Reporting to the Senior Manager of Revenue Operations
        and partnering closely with Customer Success leadership, you will define strategies
        and execute improvements that optimize customer health, retention, and revenue
        growth.\\n\\nOur Customer Success team is consistently praised by our customers
        for their deep expertise, responsiveness, and dedication\u2014a testament
        to how much we Care Deeply About Customers, one of our core Operating Principles.
        As we continue to scale, it\u2019s critical that we preserve and enhance this
        high standard of customer care while ensuring our processes, tools, and insights
        evolve to support sustainable growth.\\n\\nYou will play a crucial role in
        our operations, including process improvements, planning, and reporting. This
        is both a strategic and tactical role in which you\u2019ll design frameworks
        and programs, uncover actionable insights, and create data-informed recommendations
        across our Customer Success functions.\\n\\n\\n\\n\\nWHAT YOU'LL DO AT ASHBY:\\n\\n
        - Operationalize CS Strategy: Develop and refine processes, tools, and workflows
        to scale Customer Success operations. This includes customer segmentation,
        onboarding workflows, lifecycle mapping, and playbook development.\\n\\n -
        Analyze Business Dynamics: Partner with internal stakeholders on reporting
        & analysis of metrics such as NRR, GRR, churn, product adoption, health score,
        and customer sentiment. Use these insights to provide early warnings and refine
        CS strategies.\\n\\n - Optimizate the Customer Journey: Enhance the end-to-end
        customer journey, ensuring smooth transitions across all post-sales touch
        points from onboarding through support and renewal.\\n\\n - Support Strategic
        Planning: Collaborate with Finance and CS leadership on planning cycles, including
        headcount planning, capacity modeling, and quota setting. Provide relevant
        historical data for informed decision making.\\n\\n - Drive Process Improvements:
        Identify inefficiencies and implement improvements to CS workflows, customer
        onboarding, account transitions, and renewal processes. Implement & deploy
        KPIs to measure performance against strategic initiatives.\\n\\n - Optimize
        CS Systems: Define the business requirements to improve Customer Success efficiency,
        efficacy, and scalability. Partner with RevOps teammates to implement changes
        to tools (CRM, health scoring platforms, etc)\\n\\n - Collaborate Cross-functionally:
        Ensure alignment with Sales, Product, and other teams to align resources with
        customer needs and forecasted growth.\\n\\n - Support Change Management: Lead
        the roll-out and adoption of new processes or workflows to the CS team. Partner
        with Enablement on larger scale change programs.\\n\\n\\nYOU COULD BE A GREAT
        FIT IF YOU:\\n\\n - Are a self-starter, innately curious in your approach\\n\\n
        - Bring both SaaS & financial literacy, offering an informed perspective on
        CS benchmarks (e.g.ideal book sizes)\\n\\n - Have a strategic mindset, with
        the ability to distill data into actionable recommendations\\n\\n - Are detail-oriented
        and committed to data accuracy and process quality\\n\\n - Have experience
        in fast-growth SaaS environments, ideally in a Customer Success or Revenue
        Operations role\\n\\n - Are skilled in CRM reporting, with preference for
        HubSpot experience\\n\\n - Work autonomously, managing multiple tasks and
        deadlines effectively\\n\\n - Are an excellent communicator, both verbally
        and in writing\\n\\n\\nTHIS ROLE MAY NOT BE A FIT IF:\\n\\n - You\u2019re
        unwilling to manage both high-level strategy and hands-on execution\\n\\n
        - You\u2019re uncomfortable with ambiguity and prefer structured, predefined
        assignments\\n\\n - You prefer focused work on a single project at a time\\n\\n
        - You prefer working within a single team rather than across multiple teams\\n\\n\\nINTERVIEW
        PROCESS\\n\\nOur interview process is thorough \u2014 we aim to ensure each
