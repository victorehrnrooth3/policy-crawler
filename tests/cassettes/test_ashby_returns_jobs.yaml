        Software Engineer, Product Engineering, UK\",\"department\":\"Engineering\",\"team\":\"EMEA
        Engineering\",\"employmentType\":\"FullTime\",\"location\":\"United Kingdom\",\"shouldDisplayCompensationOnJobPostings\":true,\"secondaryLocations\":[{\"location\":\"Manchester\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"United
        Kingdom\",\"addressLocality\":\"Manchester\"}}},{\"location\":\"Oxford\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"United
