        critique (thanks, React component system!). But, every company made me pick
        one \u2014I couldn\u2019t design and build. At Ashby, you can.\\n\\nWhile
        every engineer can design and build, you\u2019ll tackle our most challenging
        design problems and help others improve their designs by expanding and enhancing
        our in-house design system and consulting on bespoke work. To ground it with
        examples, engineers who can design at Ashby have:\\n\\n - Redesigned our mobile
        web app by talking with customers who use it often, wireframing new flows,
        implementing its design system, and using it to make the wireframes a reality.\\n\\n
        - Built a set of flexible, composable components in our design system that
        allow other engineers to build custom autocompletes. These autocompletes can
        contain filters, options to create new records, etc.\\n\\n - Helped another
        engineer improve their design's information hierarchy and scannability for
        viewing a candidate\u2019s assessments. Recruiters can quickly parse information
        and pick out anomalies.\\n\\nThese projects reflect what we\u2019re accomplishing
        at Ashby: improving the productivity of working professionals (starting with
        talent teams) with intelligent and powerful software. We put a lot of effort
        into designing products that are approachable to beginners but mastered &
        extended by power users. In many ways, spreadsheets set the bar here.\\n\\nWe
        have notable customers like Notion, Linear, Shopify, and Snowflake. Our growth
