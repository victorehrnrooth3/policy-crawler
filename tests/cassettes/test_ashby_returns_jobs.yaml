        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/f310f690-cfad-45d7-9fed-0691dca3d67f\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/f310f690-cfad-45d7-9fed-0691dca3d67f/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\"><strong>The Story!</strong></p><p style=\\\"min-height:1.5em\\\">Hi
        \U0001F44B\U0001F3FC I'm <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
        nofollow\\\" href=\\\"https://www.linkedin.com/in/joshbourke/\\\">Josh</a>,
        Technical Recruiting Manager at Ashby. I've been at Ashby since March 2025,
        and it's been quite the whirlwind! I joined as the first dedicated Technical
        Recruiter, and since then have watched everything go up and to the right,
        whether that be revenue, hiring goals, or team size. </p><p style=\\\"min-height:1.5em\\\">I
        now lead the Tech Recruiting team, which has grown to 6 people spread across
        North America + Europe, and we've doubled the size of the engineering team
        since I joined. As you may have guessed by the fact that I'm hiring for this
        role, we're not slowing down anytime soon!</p><p style=\\\"min-height:1.5em\\\">I\u2019m
        still new enough to remember all the things that impressed me most when I
        joined. Here are a few highlights:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">How involved the recruiting team is in shaping
        the product. We're not only impacting the product indirectly by hiring the
        incredible talent that works here, but also by getting to give direct product
        feedback as an internal resource for our eng, product + design teams as they
        design new features make recruiters' lives easier. </p></li><li><p style=\\\"min-height:1.5em\\\">A
        whole new level of hiring manager involvement in recruiting. As in: hiring
        managers scheduling onsite loops themselves (with a little help from our pretty
        awesome product), writing some of the best job descriptions I\u2019ve ever
        seen, and playing the role of recruiter from end to end creating an exceptional
        candidate experience.</p></li><li><p style=\\\"min-height:1.5em\\\">The highly
        intentional engineering culture truly is a magnet for exceptional engineering
        talent.</p></li><li><p style=\\\"min-height:1.5em\\\">Getting to test all
        the most cutting-edge Ashby features before anyone else and exploring how
        they can be used in creative ways. </p></li></ul><p style=\\\"min-height:1.5em\\\">Joining
        us means being part of a talented team, tackling the challenges of our stage,
        and contributing to our team and product growth. We value humility, continuous
        improvement and a dedication to excellence (<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://ashbyhq.com/blog/culture/ashbys-operating-principles\\\"><u>more
        here</u></a>). If you are passionate about bringing your unique strengths
        to the team and building a culture of success, we would love to hear from
        you.<br /><br /><strong>The Role</strong></p><p style=\\\"min-height:1.5em\\\">Ashby
        is seeking a Technical Recruiter with a proven track record of discovering
        and hiring amazing technical talent. I\u2019m looking for someone with breadth
        across technical hiring beyond just engineering (think Engineering plus some
        combination of Product Design, Product Management, IT, Security, QA, and Data).</p><p
        style=\\\"min-height:1.5em\\\">We\u2019re prioritizing a relationship builder
        who can partner with a wide range of stakeholders, manage multiple searches
        at once, and create a repeatable yet flexible process that works across the
        organization.</p><p style=\\\"min-height:1.5em\\\">You\u2019ll need to know
        how to adjust your approach and manage your time to be successful across different
        recruiting scopes. Here are a few examples of what might fall on your plate:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Coaching
        first-time hiring managers on how to build an exceptional recruitment process
        from the ground up.</p></li><li><p style=\\\"min-height:1.5em\\\">Deep market
        mapping and analysis to predict where the next wave of top talent is currently
        being cultivated.</p></li><li><p style=\\\"min-height:1.5em\\\">Partnering
        directly with the VP/ founder level, where you need to extract key information
        in a limited amount of time.</p></li><li><p style=\\\"min-height:1.5em\\\">Balancing
        periods of managing multiple roles in different domains with times where you
        are deep-diving into a single position. </p></li></ul><p style=\\\"min-height:1.5em\\\">Please
        don\u2019t expect to walk into perfect. Though we\u2019re doing a lot of things
        well, the Tech Recruiting function is barely a year old, which means we are
        still figuring out how to operate optimally and at scale. But if you\u2019re
        someone who is <em>excited by the chance to build</em>, we have a great foundation
        and every tailwind you could ask for.</p><p style=\\\"min-height:1.5em\\\">If
        you\u2019ve used Ashby before, that\u2019s great! I\u2019d love to dive into
        how you\u2019re getting the most out of the product today. If not, I promise
        it\u2019s not a blocker; in fact, <em>none</em> of the recruiters I\u2019ve
        hired so far had used Ashby as their day-to-day ATS before joining.<br /><br
        /> <strong>To be qualified for this role, you must have the following:</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Proven
        track record as an expert \u201CEngineering\u201D Recruiter in a product-led
        company with some exposure to other technical roles such as Product Design,
        Product Management, IT, Security, QA, and Data</p></li><li><p style=\\\"min-height:1.5em\\\">Ideally,
        have been focused on technical hiring from within a SaaS company for a significant
        portion of your career</p></li><li><p style=\\\"min-height:1.5em\\\">You've
        owned hiring for staff+ technical roles. We're heavily weighted to senior+
        engineering talent, so we need someone comfortable working on more senior
        searches </p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019ve operated
        with autonomy and are used to leading searches end-to-end. We value competency
        over tenure, but you have a foundation of proven experience that allows you
        to establish instant credibility with technical leadership</p></li><li><p
        style=\\\"min-height:1.5em\\\">You\u2019ve worked somewhere with a very high
        talent bar and understand the subtle indicators that separate 'good' from
        'great' technical talent</p></li><li><p style=\\\"min-height:1.5em\\\">Data-driven
        mindset, able to optimize your workflows, balancing diversity, quality, and
        volume.</p></li><li><p style=\\\"min-height:1.5em\\\">Demonstrated experience
        in creating innovative sourcing strategies that differentiate the talent pipelines
        from the inbound attraction and referrals that we have traditionally used.</p></li></ul><p
        style=\\\"min-height:1.5em\\\">If you need someone else to do any of the following,
        then this role is probably not for you:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Boolean search and talent mapping activities</p></li><li><p
        style=\\\"min-height:1.5em\\\">Requisition qualification with senior leaders</p></li><li><p
        style=\\\"min-height:1.5em\\\">High volumes of outreach and screening calls</p></li><li><p
        style=\\\"min-height:1.5em\\\">Prioritization of your workload</p></li></ul><p
        style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\"><strong>You
        may want to apply if you\u2019re excited about:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Developing processes that focus on the highest
        quality of hire as we scale.</p></li><li><p style=\\\"min-height:1.5em\\\">Strategizing
        creative ways to accelerate hiring, as well as getting your hands dirty finding
        and evaluating candidates.</p></li><li><p style=\\\"min-height:1.5em\\\">Scaling
        a recruiting function by x\u2019s, not %. We\u2019re looking to 2x\u20135x
        our hiring, not increase it by 20%. Ideally, you\u2019ve been through a similar
        startup journey or have seen what it takes to increase hiring by an order
        of magnitude.</p></li><li><p style=\\\"min-height:1.5em\\\">Being part of
        a documentation-first culture where \\\"the best idea wins.\\\" This means
        being able to communicate concisely and effectively through long-form writing
        - a skillset I don\u2019t see as prevalent on many recruiting teams!</p></li><li><p
        style=\\\"min-height:1.5em\\\">Staying at the forefront of the recruiting
        industry. You want to have an impact on the TA space, so you're excited about
        being an internal tester for our product teams, a resource for sales and marketing,
        and demoing Ashby features to prospective customers.</p></li><li><p style=\\\"min-height:1.5em\\\">Storytelling
        through data. At Ashby, we have an incredible analytics suite; you\u2019re
        excited to dig deep to discover unexpected insights into what makes a great
        hire and how we can improve our process.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\"><strong>Why you shouldn't apply: </strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019re
        a hiring generalist. While I value versatility, this role requires extensive
        experience in technical hiring across Product, Engineering, Design, and adjacent
        technical functions.</p></li><li><p style=\\\"min-height:1.5em\\\">You want
        heavy candidate contact after the initial stages. We run a hiring-manager-led
        process, meaning they handle the deep relationship building with candidates.
        You\u2019ll be the strategic, guiding hand behind the scenes.</p></li><li><p
        style=\\\"min-height:1.5em\\\">The majority of your career has been in high-volume
        or early to mid-stage career hiring. We <a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#5---be-frustratingly-patient-about-hiring\\\">hire
        frustratingly patiently</a> and almost exclusively focus on senior+ talent.
        </p></li><li><p style=\\\"min-height:1.5em\\\">You struggle with autonomy.
        Everyone says they don't want to be micromanaged (who does!) but I find many
        people actually crave a certain level of direction + structure. In this role,
        I'm going to give you areas to own and a lot of freedom; some people can find
        that paralyzing.</p></li><li><p style=\\\"min-height:1.5em\\\">You're coming
        in with a playbook. Having a perspective on how things \\\"should\\\" be done
        is valuable, but first-principles thinking and creativity are what we actually
        need here.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\"><strong>What
        signal am I looking for?  </strong></p><p style=\\\"min-height:1.5em\\\">Not
        every great recruiter is a great fit for every role. I want to share some
        of the unorthodox things that I think make a recruiter great. Hopefully, this
        gives you a sense of what I look for in a teammate:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Strong recruiting instincts: The best recruiters
        I\u2019ve seen can drive urgency the moment they find an exceptional candidate.
        They\u2019re ready to risk their reputation and move any obstacle to give
        us the best chance to hire them. The tough part is <em>that you have to be
        right</em>, and that\u2019s where excellent judgment comes in. You need to
        balance a reliable recruiting system with the agility to treat unique situations
        with the nuance they deserve.</p></li><li><p style=\\\"min-height:1.5em\\\">High
        standards for themselves: Some people have a mental block where they simply
        can't bring themselves to submit poor work. They hold themselves to a very
        high standard, and those standards trickle down into doing the little things
        exceptionally well.</p></li><li><p style=\\\"min-height:1.5em\\\">Spikiness
        and self-awareness: I\u2019d rather have someone exceptional in one area than
        someone who is just good across the board. I like people who recognize that
        doubling down on their strengths will set them apart more than trying to round
        out every weakness.</p></li><li><p style=\\\"min-height:1.5em\\\">Left <em>and</em>
        right-brain thinkers: I\u2019m greedy and I want to see people who can use
        both sides. I love recruiters who approach experimentation with scientific
        rigor and love to slice and dice pass-through rate data daily. Equally, I
        want to see creativity in how we uncover new sources of talent, how we attract
        candidates, or how we utilize a tool in an unexpected way.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Embodying the power of incremental gains: Obsessed
        with compounding and always thinking about where to make small improvements
        to your workflow. Right now, I see this showing up most often in how people
        experiment with new AI tooling.</p></li><li><p style=\\\"min-height:1.5em\\\">Curiosity
        about the recruiting + startup landscape: Recruiting, especially technical
        recruiting, is a dynamic landscape that shifts quickly. If you don't have
        a finger on the pulse of the broader startup ecosystem, it\u2019s hard to
        have a complete picture of what is happening on the field. Being curious about
        the world and staying up to date (whether through newsletters, podcasts, or
        your own social circles) allows you to show up as a true subject matter expert.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Sharpness and intellectual humility: You\u2019re
        a natural thought-sparring partner who embodies \u201Cstrong views, loosely
        held.\u201D You\u2019re quick enough to spot the real issue and start solving
        it while everyone else is still talking about what\u2019s wrong</p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>Instructions:<br /></strong>Take your
        time with your application; you do not need to be first to apply or in the
        first 100 to get this job. <strong>I currently plan to have this role open
        until Sunday May 31st at 8:00pm PT. </strong>We will review <strong>EVERY</strong>
        application and speak to the shortlist we make based on the applications.
        There are no prizes for being first and no advantages to be gained by reaching
        out, being referred or knowing someone here, so <strong>please don't message
        anyone at Ashby</strong>.<br /><br />Here's some resume feedback we've created
        from past Recruiter hiring processes that we've given to applicants we have
        screened out, based on reviewing hundreds of Recruiter/Sourcer resumes. I
        hope you find this useful in tailoring your application!<br /><br />1. Resumes
        showed minimal experience as a Full Lifecycle Recruiter, recruiting for technical
        roles. We will only hire someone with deep technical hiring experience.<br
        />2. Role descriptions on resumes focusing on projects or leadership rather
        than delivery of hires for technical roles. Projects and leadership are great,
        but I needed to see the evidence of you doing the Recruiting work.<br />3.
        Resumes showed no or minimal experience of hiring in a Product led Engineering
        environment. As per the job description, we were looking for SaaS experience
        ideally. Though I believe there are excellent recruiters in many environments,
        I need to be able to clearly see how your experience matches with Ashby's
        current stage of growth.  <br />4. Resumes didn't articulate the impact that
        the applicant had in past roles. The JD stated \\\"Data-driven mindset, able
        to optimize your workflows\\\" and data can show this impact.<br />5. Answers
        to the application questions. These are not \\\"nice to haves\\\" for us,
        your application answers are the primary thing we assess to determine fit.
        Each question had context provided or real meaning for us, beyond what we
        would see in your resume.<br />6. Resumes had a general lack of specifics.
        \\\"Recruited a variety of roles\\\" doesn't tell the reader that you've handled
        Software Engineering recruiting. Likewise, a company name alone doesn't help
        the reader know it's Product led organization. On that last point, a little
        blurb about the company is really helpful for anyone reading the resume and
        helps them avoid mistakes by thinking that a company isn't from \\\"X\\\"
        sector.<br /></p><h2><strong>Benefits</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Competitive salary and equity.</p></li><li><p
        style=\\\"min-height:1.5em\\\">10-year exercise window for stock options.
        You shouldn\u2019t feel pressure to purchase stock options if you leave Ashby
        \u2014do it when you feel financially comfortable.</p></li><li><p style=\\\"min-height:1.5em\\\">Unlimited
        PTO with four weeks recommended per year. Expect \u201CVacation?\u201D in
        our one-on-one agenda until you start taking it \U0001F605.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Twelve weeks of fully paid family leave in
        the US. We plan to expand this to employees in other countries as situations
        arise.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous equipment, software,
        and office furniture budget. Get what you need to be happy and productive!</p></li><li><p
        style=\\\"min-height:1.5em\\\">$100/month education budget with more expensive
        items (like conferences) covered with manager approval.</p></li><li><p style=\\\"min-height:1.5em\\\">If
        you\u2019re in the US, top-notch health insurance for you and your dependents
        with all premiums covered by us.</p></li></ul><p style=\\\"min-height:1.5em\\\">Ashby\u2019s
        success hinges on hiring great people and creating an environment where we
        can be happy, feel challenged, and do our best work. We\u2019re being deliberate
        about building that environment from the ground up. I hope that excites you
        enough to apply.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Interview
        Process</strong></h2><p style=\\\"min-height:1.5em\\\">At Ashby, our team
        and interview process want to help you show your best self. We\u2019ll dive
        into past projects and simulate working together via talking through past
        projects and conducting a short but realistic assignment. Our interview process
        is 4 rounds:</p><ol style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">30-minute
        introduction call to discuss Ashby and your past work with<a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/anna-hall-bb420a9/\\\">
        </a><a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/joshbourke/\\\"><u>Josh</u></a>,
        so expect a traditional recruiting screen.</p></li><li><p style=\\\"min-height:1.5em\\\">A
        take-home assignment that will ask you to create a hiring strategy for a role,
        as well as an example of a tailored outreach to a specific candidate that
        we will provide you.</p></li><li><p style=\\\"min-height:1.5em\\\">60-minute
        deeper dive into your Recruiting experience that will follow on from your
        assignment submission with<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
        nofollow\\\" href=\\\"https://www.linkedin.com/in/abhikpramanik/\\\"> <u>Abhik</u></a>
        (VP, Engineering + Co-Founder).</p></li><li><p style=\\\"min-height:1.5em\\\">A
        virtual onsite loop: 2.5 hours:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">(60 mins) Meeting with <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/jmmmmmmmmmmmmmmmmmmmm/\\\"><u>Jim</u></a>
        (VP, People) to share more about the current state of recruiting at Ashby</p></li><li><p
        style=\\\"min-height:1.5em\\\">(30 mins) A sourcing-focused interview with
        <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/ericromesburg/\\\">Eric</a>
        </p></li><li><p style=\\\"min-height:1.5em\\\">(30 mins) Meeting with one
        of our recruiting managers + one of our recruiters to dive deeper into stakeholder
        management.</p></li><li><p style=\\\"min-height:1.5em\\\">(30 mins) Meeting
        with one of our engineering leaders</p></li></ol></li></ol><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        Ashby</strong></h2><p style=\\\"min-height:1.5em\\\">We\u2019re building the
        next generation of enterprise software and we\u2019re starting with a suite
        of products that help talent leaders, recruiters, and hiring managers run
        their hiring process significantly better. We are well-funded, have incredible
        product market fit, and are backed by great investors, including Y Combinator,
        Elad Gil and Lachy Groom.</p><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"The
        Story!\\n\\nHi \U0001F44B\U0001F3FC I'm Josh https://www.linkedin.com/in/joshbourke/,
        Technical Recruiting Manager at Ashby. I've been at Ashby since March 2025,
        and it's been quite the whirlwind! I joined as the first dedicated Technical
        Recruiter, and since then have watched everything go up and to the right,
        whether that be revenue, hiring goals, or team size.\\n\\nI now lead the Tech
        Recruiting team, which has grown to 6 people spread across North America +
        Europe, and we've doubled the size of the engineering team since I joined.
        As you may have guessed by the fact that I'm hiring for this role, we're not
        slowing down anytime soon!\\n\\nI\u2019m still new enough to remember all
        the things that impressed me most when I joined. Here are a few highlights:\\n\\n
        - How involved the recruiting team is in shaping the product. We're not only
        impacting the product indirectly by hiring the incredible talent that works
        here, but also by getting to give direct product feedback as an internal resource
        for our eng, product + design teams as they design new features make recruiters'
        lives easier.\\n\\n - A whole new level of hiring manager involvement in recruiting.
        As in: hiring managers scheduling onsite loops themselves (with a little help
        from our pretty awesome product), writing some of the best job descriptions
        I\u2019ve ever seen, and playing the role of recruiter from end to end creating
        an exceptional candidate experience.\\n\\n - The highly intentional engineering
        culture truly is a magnet for exceptional engineering talent.\\n\\n - Getting
        to test all the most cutting-edge Ashby features before anyone else and exploring
        how they can be used in creative ways.\\n\\nJoining us means being part of
        a talented team, tackling the challenges of our stage, and contributing to
        our team and product growth. We value humility, continuous improvement and
        a dedication to excellence (more here https://ashbyhq.com/blog/culture/ashbys-operating-principles).
        If you are passionate about bringing your unique strengths to the team and
        building a culture of success, we would love to hear from you.\\n\\nThe Role\\n\\nAshby
        is seeking a Technical Recruiter with a proven track record of discovering
        and hiring amazing technical talent. I\u2019m looking for someone with breadth
        across technical hiring beyond just engineering (think Engineering plus some
        combination of Product Design, Product Management, IT, Security, QA, and Data).\\n\\nWe\u2019re
        prioritizing a relationship builder who can partner with a wide range of stakeholders,
        manage multiple searches at once, and create a repeatable yet flexible process
        that works across the organization.\\n\\nYou\u2019ll need to know how to adjust
        your approach and manage your time to be successful across different recruiting
        scopes. Here are a few examples of what might fall on your plate:\\n\\n -
        Coaching first-time hiring managers on how to build an exceptional recruitment
        process from the ground up.\\n\\n - Deep market mapping and analysis to predict
        where the next wave of top talent is currently being cultivated.\\n\\n - Partnering
        directly with the VP/ founder level, where you need to extract key information
        in a limited amount of time.\\n\\n - Balancing periods of managing multiple
        roles in different domains with times where you are deep-diving into a single
        position.\\n\\nPlease don\u2019t expect to walk into perfect. Though we\u2019re
        doing a lot of things well, the Tech Recruiting function is barely a year
        old, which means we are still figuring out how to operate optimally and at
        scale. But if you\u2019re someone who is excited by the chance to build, we
        have a great foundation and every tailwind you could ask for.\\n\\nIf you\u2019ve
        used Ashby before, that\u2019s great! I\u2019d love to dive into how you\u2019re
        getting the most out of the product today. If not, I promise it\u2019s not
        a blocker; in fact, none of the recruiters I\u2019ve hired so far had used
        Ashby as their day-to-day ATS before joining.\\n\\nTo be qualified for this
        role, you must have the following:\\n\\n - Proven track record as an expert
        \u201CEngineering\u201D Recruiter in a product-led company with some exposure
        to other technical roles such as Product Design, Product Management, IT, Security,
        QA, and Data\\n\\n - Ideally, have been focused on technical hiring from within
        a SaaS company for a significant portion of your career\\n\\n - You've owned
        hiring for staff+ technical roles. We're heavily weighted to senior+ engineering
        talent, so we need someone comfortable working on more senior searches\\n\\n
        - You\u2019ve operated with autonomy and are used to leading searches end-to-end.
        We value competency over tenure, but you have a foundation of proven experience
        that allows you to establish instant credibility with technical leadership\\n\\n
        - You\u2019ve worked somewhere with a very high talent bar and understand
        the subtle indicators that separate 'good' from 'great' technical talent\\n\\n
        - Data-driven mindset, able to optimize your workflows, balancing diversity,
        quality, and volume.\\n\\n - Demonstrated experience in creating innovative
        sourcing strategies that differentiate the talent pipelines from the inbound
        attraction and referrals that we have traditionally used.\\n\\nIf you need
        someone else to do any of the following, then this role is probably not for
        you:\\n\\n - Boolean search and talent mapping activities\\n\\n - Requisition
        qualification with senior leaders\\n\\n - High volumes of outreach and screening
        calls\\n\\n - Prioritization of your workload\\n\\n\\n\\nYou may want to apply
        if you\u2019re excited about:\\n\\n - Developing processes that focus on the
        highest quality of hire as we scale.\\n\\n - Strategizing creative ways to
        accelerate hiring, as well as getting your hands dirty finding and evaluating
        candidates.\\n\\n - Scaling a recruiting function by x\u2019s, not %. We\u2019re
        looking to 2x\u20135x our hiring, not increase it by 20%. Ideally, you\u2019ve
        been through a similar startup journey or have seen what it takes to increase
        hiring by an order of magnitude.\\n\\n - Being part of a documentation-first
        culture where \\\"the best idea wins.\\\" This means being able to communicate
        concisely and effectively through long-form writing - a skillset I don\u2019t
        see as prevalent on many recruiting teams!\\n\\n - Staying at the forefront
        of the recruiting industry. You want to have an impact on the TA space, so
        you're excited about being an internal tester for our product teams, a resource
        for sales and marketing, and demoing Ashby features to prospective customers.\\n\\n
        - Storytelling through data. At Ashby, we have an incredible analytics suite;
        you\u2019re excited to dig deep to discover unexpected insights into what
        makes a great hire and how we can improve our process.\\n\\n\\n\\nWhy you
        shouldn't apply:\\n\\n - You\u2019re a hiring generalist. While I value versatility,
        this role requires extensive experience in technical hiring across Product,
        Engineering, Design, and adjacent technical functions.\\n\\n - You want heavy
        candidate contact after the initial stages. We run a hiring-manager-led process,
        meaning they handle the deep relationship building with candidates. You\u2019ll
        be the strategic, guiding hand behind the scenes.\\n\\n - The majority of
        your career has been in high-volume or early to mid-stage career hiring. We
        hire frustratingly patiently https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#5---be-frustratingly-patient-about-hiring
        and almost exclusively focus on senior+ talent.\\n\\n - You struggle with
        autonomy. Everyone says they don't want to be micromanaged (who does!) but
        I find many people actually crave a certain level of direction + structure.
        In this role, I'm going to give you areas to own and a lot of freedom; some
        people can find that paralyzing.\\n\\n - You're coming in with a playbook.
        Having a perspective on how things \\\"should\\\" be done is valuable, but
        first-principles thinking and creativity are what we actually need here.\\n\\n\\n\\nWhat
        signal am I looking for?\\n\\nNot every great recruiter is a great fit for
        every role. I want to share some of the unorthodox things that I think make
        a recruiter great. Hopefully, this gives you a sense of what I look for in
        a teammate:\\n\\n - Strong recruiting instincts: The best recruiters I\u2019ve
        seen can drive urgency the moment they find an exceptional candidate. They\u2019re
        ready to risk their reputation and move any obstacle to give us the best chance
        to hire them. The tough part is that you have to be right, and that\u2019s
        where excellent judgment comes in. You need to balance a reliable recruiting
        system with the agility to treat unique situations with the nuance they deserve.\\n\\n
        - High standards for themselves: Some people have a mental block where they
        simply can't bring themselves to submit poor work. They hold themselves to
        a very high standard, and those standards trickle down into doing the little
        things exceptionally well.\\n\\n - Spikiness and self-awareness: I\u2019d
        rather have someone exceptional in one area than someone who is just good
        across the board. I like people who recognize that doubling down on their
        strengths will set them apart more than trying to round out every weakness.\\n\\n
        - Left and right-brain thinkers: I\u2019m greedy and I want to see people
        who can use both sides. I love recruiters who approach experimentation with
        scientific rigor and love to slice and dice pass-through rate data daily.
        Equally, I want to see creativity in how we uncover new sources of talent,
        how we attract candidates, or how we utilize a tool in an unexpected way.\\n\\n
        - Embodying the power of incremental gains: Obsessed with compounding and
        always thinking about where to make small improvements to your workflow. Right
        now, I see this showing up most often in how people experiment with new AI
        tooling.\\n\\n - Curiosity about the recruiting + startup landscape: Recruiting,
        especially technical recruiting, is a dynamic landscape that shifts quickly.
        If you don't have a finger on the pulse of the broader startup ecosystem,
        it\u2019s hard to have a complete picture of what is happening on the field.
        Being curious about the world and staying up to date (whether through newsletters,
        podcasts, or your own social circles) allows you to show up as a true subject
        matter expert.\\n\\n - Sharpness and intellectual humility: You\u2019re a
        natural thought-sparring partner who embodies \u201Cstrong views, loosely
        held.\u201D You\u2019re quick enough to spot the real issue and start solving
        it while everyone else is still talking about what\u2019s wrong\\n\\nInstructions:\\nTake
        your time with your application; you do not need to be first to apply or in
        the first 100 to get this job. I currently plan to have this role open until
        Sunday May 31st at 8:00pm PT. We will review EVERY application and speak to
        the shortlist we make based on the applications. There are no prizes for being
        first and no advantages to be gained by reaching out, being referred or knowing
        someone here, so please don't message anyone at Ashby.\\n\\nHere's some resume
        feedback we've created from past Recruiter hiring processes that we've given
        to applicants we have screened out, based on reviewing hundreds of Recruiter/Sourcer
        resumes. I hope you find this useful in tailoring your application!\\n\\n1.
        Resumes showed minimal experience as a Full Lifecycle Recruiter, recruiting
        for technical roles. We will only hire someone with deep technical hiring
        experience.\\n2. Role descriptions on resumes focusing on projects or leadership
        rather than delivery of hires for technical roles. Projects and leadership
        are great, but I needed to see the evidence of you doing the Recruiting work.\\n3.
        Resumes showed no or minimal experience of hiring in a Product led Engineering
        environment. As per the job description, we were looking for SaaS experience
        ideally. Though I believe there are excellent recruiters in many environments,
        I need to be able to clearly see how your experience matches with Ashby's
        current stage of growth.\\n4. Resumes didn't articulate the impact that the
        applicant had in past roles. The JD stated \\\"Data-driven mindset, able to
        optimize your workflows\\\" and data can show this impact.\\n5. Answers to
        the application questions. These are not \\\"nice to haves\\\" for us, your
        application answers are the primary thing we assess to determine fit. Each
        question had context provided or real meaning for us, beyond what we would
        see in your resume.\\n6. Resumes had a general lack of specifics. \\\"Recruited
        a variety of roles\\\" doesn't tell the reader that you've handled Software
        Engineering recruiting. Likewise, a company name alone doesn't help the reader
        know it's Product led organization. On that last point, a little blurb about
        the company is really helpful for anyone reading the resume and helps them
        avoid mistakes by thinking that a company isn't from \\\"X\\\" sector.\\n\\n\\n\\nBENEFITS\\n\\n
        - Competitive salary and equity.\\n\\n - 10-year exercise window for stock
        options. You shouldn\u2019t feel pressure to purchase stock options if you
        leave Ashby \u2014do it when you feel financially comfortable.\\n\\n - Unlimited
        PTO with four weeks recommended per year. Expect \u201CVacation?\u201D in
        our one-on-one agenda until you start taking it \U0001F605.\\n\\n - Twelve
        weeks of fully paid family leave in the US. We plan to expand this to employees
        in other countries as situations arise.\\n\\n - Generous equipment, software,
        and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
        covered with manager approval.\\n\\n - If you\u2019re in the US, top-notch
        health insurance for you and your dependents with all premiums covered by
        us.\\n\\nAshby\u2019s success hinges on hiring great people and creating an
        environment where we can be happy, feel challenged, and do our best work.
        We\u2019re being deliberate about building that environment from the ground
        up. I hope that excites you enough to apply.\\n\\n\\n\\n\\nINTERVIEW PROCESS\\n\\nAt
        Ashby, our team and interview process want to help you show your best self.
        We\u2019ll dive into past projects and simulate working together via talking
        through past projects and conducting a short but realistic assignment. Our
        interview process is 4 rounds:\\n\\n 1. 30-minute introduction call to discuss
        Ashby and your past work with https://www.linkedin.com/in/anna-hall-bb420a9/Josh
        https://www.linkedin.com/in/joshbourke/, so expect a traditional recruiting
        screen.\\n\\n 2. A take-home assignment that will ask you to create a hiring
        strategy for a role, as well as an example of a tailored outreach to a specific
        candidate that we will provide you.\\n\\n 3. 60-minute deeper dive into your
        Recruiting experience that will follow on from your assignment submission
        with Abhik https://www.linkedin.com/in/abhikpramanik/ (VP, Engineering + Co-Founder).\\n\\n
        4. A virtual onsite loop: 2.5 hours:\\n    \\n    1. (60 mins) Meeting with
        Jim https://www.linkedin.com/in/jmmmmmmmmmmmmmmmmmmmm/ (VP, People) to share
        more about the current state of recruiting at Ashby\\n    \\n    2. (30 mins)
        A sourcing-focused interview with Eric https://www.linkedin.com/in/ericromesburg/\\n
        \   \\n    3. (30 mins) Meeting with one of our recruiting managers + one
        of our recruiters to dive deeper into stakeholder management.\\n    \\n    4.
        (30 mins) Meeting with one of our engineering leaders\\n\\n\\n\\n\\nABOUT
        ASHBY\\n\\nWe\u2019re building the next generation of enterprise software
        and we\u2019re starting with a suite of products that help talent leaders,
        recruiters, and hiring managers run their hiring process significantly better.
        We are well-funded, have incredible product market fit, and are backed by
        great investors, including Y Combinator, Elad Gil and Lachy Groom.\\n\\n\\n\\nAshby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.\\n\\nAshby
        is committed to a fair and transparent hiring process. We confirm that this
        advertisement is for an active, existing vacancy within our organization.
        Please be advised that we may use artificial intelligence-driven tools to
        assist our recruitment team in screening, assessing, and selecting candidates
