        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"STRATEGIC
        IMPLEMENTATION SPECIALIST\\n\\nHi! I\u2019m Morgan, the Manager of Strategic
        Implementations here at Ashby. Our customers are at the center of everything
        we do, and that\u2019s especially true during implementation. We take pride
        in being responsive, collaborative partners who focus not just on delivery,
        but on doing things thoughtfully. This role plays a critical part in ensuring
        our new customers start off with a strong foundation and a clear path forward.
        I\u2019m thrilled to be hiring our next Implementation Specialist. As part
        of our growing Professional Services team within Ashby\u2019s Customer Success
        organization, you\u2019ll play a key role early in the customer journey\u2014ultimately
        helping to elevate the entire customer experience.\\n\\n\\n\\n\\nABOUT THIS
        ROLE:\\n\\nAs our Implementation Specialist, you will be responsible for managing
        and executing the end-to-end implementation of Ashby\u2019s solution for many
        of our new customers. You will work directly with customers in our Strategic
        (predominantly Enterprise) segment, developing and executing implementation
        plans to ensure a positive customer experience and expedited time to value.
        Your goal is to support our customers, helping them get up and running swiftly
        with Ashby so they can achieve their desired outcomes.\\n\\nRole requirements:\\n\\n
        - Implementation & Project Management:\_You have extensive experience managing
        and executing several complex implementation and onboarding projects concurrently
        in a high-growth B2B SaaS org (defining the work, aligning with stakeholders,
        communicating the project plan, and ultimately delivering results in accordance
        with the agreed-upon expectations). You keep the team on track to ensure milestones
        are met. You work effectively in a remote-first setting, with the ability
        to travel <10% as needed for strategic customer engagements.\\n\\n - Technical
        Proficiency: You have a strong understanding of complex, configurable B2B
        SaaS products and their technical intricacies. By \\\"complex\\\", we mean
        platforms with multi-step workflows, supporting several core workflows, and
        integrations with other systems. You're technically curious and creative.
        Ashby or ATS experience is a plus, not required.\\n\\n - Customer Centricity:
        You deeply understand customer needs and tailor implementations to meet their
        specific requirements. You build strong customer relationships by maintaining
        high levels of engagement and communication; you\u2019re the customer\u2019s
        proactive guide and advocate throughout the implementation period.\\n\\n -
        Change Management: You are experienced in navigating change management processes
        and helping customers adapt to new systems and a refreshed approach.\\n\\n
        - Best Practices & Recommendations: You take pride in advising customers on
        best practices specific to their usage of software to ensure optimal value.\\n\\n
        - Critical Thinking & Solutions Orientation: You proactively address thematic
        customer opportunities and improve our processes accordingly. You don\u2019t
        rely on \u2018I\u2019ve seen this done,\u2019 but instead think critically
        to solve problems.\\n\\n - Cross-functional Collaboration: You effectively
        partner with cross-functional stakeholders across Customer Success, Sales,
        Product, Engineering, and Operations to align and define progress.\\n\\nYou
        could be a great fit if:\\n\\n - \U0001F4E3 You demonstrate clear communication.
        You ask clarifying questions with precision and can distill complex concepts
        into simple themes.\\n\\n - \U0001F3A7 You are a great listener. You see your
        role as the voice of the customer to internal stakeholders so we can ensure
        that our offerings continue to evolve in accordance with customer needs.\\n\\n
        - \U0001F4C8 You are a problem solver. You thrive at solving complex challenges
        with innovative, scalable solutions.\\n\\n - \u26A1\uFE0FYou know process
        matters. You are eager to improve processes and workflows to enhance efficiency
        and efficacy.\\n\\n - \U0001F50D Your peers describe you as detail-oriented
        and technically proficient. You take pride in internal operations.\\n\\n -
        \U0001F4CA You are data-driven. You use metrics and analytics to inform decisions
        and measure success.\\n\\n - \U0001F30D You are adaptable. You can navigate
        changes in a fast-paced, evolving environment.\\n\\n - \U0001F9D1\u200D\U0001F3EB
        You love to coach. You see every teaching moment as an opportunity and are
        excited to help our customers grow.\\n\\nYou might not be a great fit if:\\n\\n
        - You prefer an in-person role over remote.\\n\\n - You are less interested
        in customer-facing roles that require both technical and interpersonal skills.\\n\\n
        - You are accustomed to defining ideas and strategies, yet not responsible
        for their execution.\\n\\n - You prefer working with a simple product (such
        as a point solution).\\n\\n - You prefer exclusively to build (rather than
        build, iterate, optimize).\\n\\n\\nOUR PHILOSOPHY\\n\\nHere are a few key
        points (relevant to the go-to-market side) that should give you an idea of
        what it is like to work with us:\\n\\n - We spend a lot of time building best-in-class
        products since we believe a highly differentiated product is a lot easier
        to sell.\\n\\n - We want to offer deep expertise whenever we interact with
        prospects and customers.\\n\\n - We strongly believe that small teams with
        very talented people (and the right work environment) deliver much better
        performance than teams with large headcount. We hire and compensate accordingly.\\n\\n
        - We value a strong sense of ownership, principled thinking over experience,
        and thoughtful communication (we put a lot of effort into using the right
        communication channels) - we\u2019ll get into these and other values during
        the hiring process.\\n\\n\\nTHE INTERVIEW\\n\\nAt Ashby, our team and interview
        process want to help you show your best self. Our interview process is structured
        to get to know you and your career as well as empower you with insight into
        our key focus areas. Here is the process in its entirety:\\n\\n - 30 min -
        Recruiter Screen with Talent Team\\n\\n - 45 min - Interview with Hiring Manager\\n\\n
        - 60 min- Mock Call with 2 Implementation Specialists\\n\\n - Final Round:\\n
