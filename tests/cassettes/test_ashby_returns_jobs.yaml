        Contract Managers. Your mandate is to drive NRR while maintaining strong pricing
        discipline, rigorous renewal forecasting, and a transparent, principled commercial
        experience for our customers.\\n\\nYou will partner closely across Customer
        Success, Sales, Finance, Legal, and Revenue Operations to build the systems,
        processes, and team required to support our increasingly sophisticated customer
        base.\\n\\nA core element of this role is hiring and scaling the team \u2014
        setting clear expectations, inspecting outcomes, coaching toward excellence,
        and maintaining a consistently high performance bar as we grow. This role
        reports directly to the VP of Customer Success and operates with significant
        executive visibility.\\n\\n\\n\\n\\nWHAT YOU\u2019LL DO\\n\\n\\n\\n\\nLEAD
        & SCALE A HIGH PERFORMING CONTRACT MANAGEMENT ORGANIZATION\\n\\n - Lead and
        scale a centralized global Contract Management team (currently 9, will be
        15+ by end of this year)\\n\\n - Hire, coach, and develop managers and individual
        contributors, evolving our current role definitions, performance standards,
        and career paths\\n\\n - Further refine performance metrics and accountability
        mechanisms tied directly to NRR, GRR, forecast accuracy, and pricing discipline\\n\\n
        - Foster a culture of ownership, accountability, and principled decision-making\\n\\n
        - Surface renewal insights that inform go-to-market strategy, pricing decisions,
        and customer lifecycle improvements\\n\\n\\nOWN GLOBAL RENEWAL OUTCOMES\\n\\n
        - Own renewal outcomes across all customer segments, including retention,
        seat growth, and expansion at renewal, with NRR as the primary success metric\\n\\n
        - Ensure renewals are executed consistently and predictably, aligned with
        long-term customer and business value\\n\\n - Partner closely with Sales to
        coordinate expansion opportunities at renewal, including upgrades across pricing
        tiers (e.g. Plus to Enterprise)\\n\\n - Own the evolution of renewal tooling,
        workflows, and forecasting rigor, ensuring accurate renewal projections and
        clear visibility into NRR performance\\n\\n - Build scalable renewal processes
        cross functionally that support Ashby\u2019s growth while maintaining a high-quality
        commercial experience\\n\\n\\nEVOLVE COMMERCIAL POLICY & PRICING DISCIPLINE\\n\\n
        - Partner with Revenue Operations, Finance, Contract Strategy, and Sales to
        maintain our current high standards with regard to pricing guardrails, discounting
        frameworks, and approval workflows\\n\\n - Maintain consistency and rigor
        in commercial decisions while enabling thoughtful flexibility when warranted\\n\\n
        - Uphold Ashby\u2019s strong pricing discipline as we continue to scale upmarket\\n\\n\\nENABLE
        ENTERPRISE RENEWALS\\n\\n - As needed, oversee complex renewal motions, including
        multi-year agreements, procurement-heavy renewals, and custom MSAs (in close
        partnership with Legal)\\n\\n - Ensure the team can confidently lead enterprise
        renewal negotiations, including procurement processes, non-standard terms,
        and executive stakeholder alignment\\n\\n\\nYOU COULD BE A GREAT FIT IF YOU\\n\\n\U0001F4C8
        Are a post-sales revenue leader with experience owning renewals, retention,
        and NRR in a scaling B2B SaaS environment (ideally Series D or beyond). This
        could include experience leading an Account Management function, Renewals
        or Contract Management team.\\n\\n\U0001F465 Have deep experience hiring,
        coaching, and driving performance management \u2013 you are comfortable setting
        a high bar, giving direct feedback, and working toward excellence\\n\\n\U0001F9E0
        Think in systems, not one-off solutions, and enjoy building scalable commercial
        frameworks\\n\\n\U0001F91D Excel at cross-functional partnership, especially
        with Sales, Finance, Legal, and RevOps\\n\\n\u2696\uFE0F Balance customer
        empathy with business rigor, believing great commercial experiences are transparent,
        principled, and fair\\n\\n\\n\\n\\nTHIS ROLE MAY NOT BE A FIT IF YOU\\n\\n
        - Do not enjoy building and managing leaders and teams (hiring and performance
        management are key to success in role)\\n\\n - Prefer execution without owning
        strategy, systems, or outcomes\\n\\n - Have not led renewal or post-sales
        revenue motions in a B2B SaaS at scale\\n\\n - Are uncomfortable partnering
        closely with Sales while maintaining clear ownership boundaries\\n\\n\\nABOUT
        ASHBY\\n\\nAshby is building the next generation of recruiting software \u2013
        starting with a powerful, all-in-one platform that helps talent leaders, recruiters,
        and hiring managers run efficient, data-driven hiring processes.\\n\\nWe\u2019re
        backed by Y Combinator, Elad Gil, and Lachy Groom, and trusted by thousands
        of customers including Shopify, Snowflake, Notion, and Zapier.\\n\\n\\n\\n\\nTHE
        INTERVIEW\\n\\nAt Ashby, our team and interview process want to help you show
        your best self. Our interview process is structured to get to know you and
        your career as well as empower you with insight into our key focus areas.
        Here is the process in its entirety:\\n\\n - 30 min - Recruiter Screen with
        Recruiting\\n\\n - 45-60 min - Interview with Kelsey\\n\\n - 45-60 min - Interview
        with Alex\\n\\n - 60 min - Practical Exercise & Presentation\\n\\n - Final
        Round: 1.5-2 hours\\n   \\n   - 30 min - Interview with Senior Leader\\n   \\n
