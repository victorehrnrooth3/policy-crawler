        min - Interview with Head of Professional Services (Hiring Manager)</p></li><li><p
        style=\\\"min-height:1.5em\\\">45 min - Mock Customer Escalation Call</p></li><li><p
        style=\\\"min-height:1.5em\\\">Final Round Part 1:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">30 min - Interview with VP of Customer Success</p></li><li><p
        style=\\\"min-height:1.5em\\\">30 min - Cross-functional Leadership interview</p></li></ul></li><li><p
        style=\\\"min-height:1.5em\\\">Final Round Part 2:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">30 min - Interview with CEO</p></li><li><p
