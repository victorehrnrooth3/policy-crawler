        style=\\\"min-height:1.5em\\\">$100/month education budget with more expensive
        items (like conferences) covered with manager approval.</p></li></ul><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"Hi!
        I'm Allie, Head of Support at Ashby. \U0001F44B I have had the privilege of
        working with an incredible Support Team full of highly knowledgeable, driven
        team members who care deeply about the success of our customers. One of our
        key priorities is to scale our Support Team\u2019s ability to resolve deeply
        technical issues and support complex customers and workflows. That\u2019s
        why we\u2019re searching for a Support Engineering Manager to grow and shape
        the future of Support Engineering at Ashby.\\n\\nThis role is not a traditional
        Support Manager position. We\u2019re looking for someone who has technical
        depth, is confident diving into complex systems, and can mentor others on
        complex problem solving.\\n\\nIn this role, you\u2019ll manage a team of highly
        skilled Support Engineers, work closely with Engineering to refine escalation
        and triage practices, and help define how Support Engineering operates at
        Ashby. We\u2019re looking for a builder with strong instincts who sees inefficiency
        quickly, takes action, and drives high-leverage improvements without over-engineering
        solutions.\\n\\nThis is a unique opportunity to oversee our Support Engineering
        function, collaborate deeply with our Engineering and Product teams, and create
        scalable processes and systems for technical triage, debugging, and problem-solving.
        You should be energized by moving fast, experimenting, and making pragmatic
        decisions, even when you don\u2019t have perfect data. If you love designing
        systems, building technical teams, and thinking holistically about how support
        can be a force multiplier across the business, you are in the right place!\\n\\n\\n\\n\\nABOUT
        THIS ROLE\\n\\nAs the Support Engineering Manager, you will oversee a technically
        proficient team responsible for resolving complex product issues, supporting
        integrations and data workflows, and influencing product decisions through
        customer insights. This team serves as a key escalation layer for high-priority
        technical challenges while creating proactive solutions to elevate the broader
        Support organization.\\n\\nYou\u2019ll play a hands-on role in developing
        the team\u2019s capabilities, guiding cross-functional processes, and building
        the systems that will allow Support Engineering to scale effectively as our
        business grows. Since this is a new function, you\u2019ll have the opportunity
        to define best practices, establish technical workflows, and build a strong
        partnership between Support and Engineering from day one.\\n\\nWe need someone
        who naturally gravitates toward the highest-leverage work by identifying waste,
        eliminating friction, and raising the technical bar of the team quickly. You
        should be comfortable being wrong occasionally if it means we\u2019re right
        most of the time and moving at high velocity.\\n\\n\\n\\n\\n\\nROLE RESPONSIBILITIES:\\n\\n\\nTEAM
        LEADERSHIP & DEVELOPMENT\\n\\n - Lead and develop a team of Support Engineers
        focused on technical depth, problem-solving, and customer impact.\\n\\n -
        Foster a culture of ownership, urgency, and high standards where problems
        are driven to resolution quickly and thoughtfully.\\n\\n - Mentor team members
        on technical skills including log analysis, database querying, systems architecture,
        and integration troubleshooting.\\n\\n - Foster a collaborative environment
        where knowledge-sharing and experimentation are encouraged.\\n\\n - Help define
        the career path and responsibilities of Support Engineers at Ashby.\\n\\n
        - Recruit and grow talent with strong technical foundations in reading and
        understanding code, collaborating on bug reproduction, and working effectively
        with Engineering teams.\\n\\n\\nTECHNICAL EXPERTISE & SUPPORT ENGINEERING
        PRACTICES\\n\\n - Build scalable, repeatable processes for diagnosing and
        resolving complex issues related to integrations, APIs, analytics, and product
        performance.\\n\\n - Set standards for how the team escalates to Engineering,
        triages bugs, identifies patterns, and partners on long-term solutions.\\n\\n
        - Create internal tools and workflows that help the team operate with efficiency
        and consistency.\\n\\n - Balance operational needs with hands-on technical
        work, staying close by jumping into issues, exploring logs, or conducting
