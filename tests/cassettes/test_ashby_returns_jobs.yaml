        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/2fc178fc-fa92-463a-b788-1c66e3f32a00\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/2fc178fc-fa92-463a-b788-1c66e3f32a00/application\",\"descriptionHtml\":\"<h1><strong>Enterprise
        Solutions Architect - Americas</strong></h1><p style=\\\"min-height:1.5em\\\"><em>Hi,
        I\u2019m John and I\u2019m the Head of Professional Services at Ashby. One
        of my favorite aspects of Ashby is our operating principle of </em><a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#8---implement-continuous-improvement\\\"><em><u>Continuous
        Improvement</u></em></a><em>. Coupled with our principle of caring deeply
        about our customers, we often find ourselves wondering \u2018what is a better
        way to accomplish this\u2019. That\u2019s why I am thrilled to be hiring our
        first Enterprise Solutions Architect! As a highly cross-functional member
        on our growing Professional Services team (within Ashby\u2019s Customer Success
        organization), you\u2019ll have the opportunity to start shaping our customers\u2019
        journeys before they kick off, ultimately upleveling the overall customer
        experience.</em></p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        the Role</strong></h2><p style=\\\"min-height:1.5em\\\">As an Enterprise Solutions
        Architect (SA), you will have responsibility for implementation and services
        scoping and design, as well as Statement of Work creation to capture recommendations.
        The SA is a member of the Professional Services (PS) organization and a close
        partner to the Enterprise Sales team. Broadly, the goal of this role is to
        ensure the success of Enterprise customers through professional services.</p><p
        style=\\\"min-height:1.5em\\\">You will work directly with prospective customers
        and our Solutions Engineering team during the sales cycle to understand the
        current state, define a clear path to success, and shape both the deal and
        implementation approach accordingly. You will provide continuity between what
        was sold and what is delivered by ensuring a comprehensive handoff from Sales
        to PS.</p><p style=\\\"min-height:1.5em\\\">This is a high-impact, highly
        cross-functional role focused on aligning pre-sales motions with implementation
        work to improve Enterprise sales win rates, accelerate time-to-value, and
        drive long-term customer outcomes. You will play a critical role in matching
        prospective customers with the approaches that best meet their needs, while
        helping Sales win complex deals by increasing buyer confidence and reducing
        perceived implementation risk.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>What
        You\u2019ll Do</strong></h2><h3><strong>Design and Close Successful Professional
        Services Opportunities (Pre-Sales)</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Act as a trusted advisor to help prospective
        customers understand <em>how</em> to successfully implement Ashby</p></li><li><p
        style=\\\"min-height:1.5em\\\">Partner with Account Executives and Solutions
        Engineers to scope and design implementation approaches for complex enterprise
        opportunities</p></li><li><p style=\\\"min-height:1.5em\\\">Translate prospective
        customer needs and constraints into a tailored path to go-live, including
        an implementation strategy, success milestones, and services offerings required
        to support the customer</p></li><li><p style=\\\"min-height:1.5em\\\">Align
        customer stakeholders (including executives) on desired outcomes, timelines,
        and responsibilities</p></li><li><p style=\\\"min-height:1.5em\\\">Create,
        negotiate, and execute Statements of Work (SOWs) aligned with Professional
        Services best practices and offerings that accurately the required scope,
        effort, and sequencing</p></li></ul><h3><strong>Create Continuity into Delivery
        (Post-Sales / Early Lifecycle)</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Participate in the Sales handoff to ensure
        effective transition of recommendations and expectations to the post-sales
        team</p></li><li><p style=\\\"min-height:1.5em\\\">Ensure alignment between
        pre-sales commitments and post-sales execution by participating in kickoff
        calls for customers with complex or highly custom recommended approaches</p></li></ul><h3><strong>Improve
        Professional Services GTM Motions</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Identify patterns across opportunities (what
        works, what breaks) and use these to refine our Enterprise Sales motion in
        partnership with Leadership.</p></li><li><p style=\\\"min-height:1.5em\\\">Refine
        how and when services are introduced and scoped within the sales cycle</p></li><li><p
        style=\\\"min-height:1.5em\\\">Contribute to playbooks, frameworks, and assets
        that improve how we sell and deliver services</p></li></ul><h2><strong>What
        We\u2019re Looking For</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">5+ years of experience in Enterprise SaaS across
        one or more of: Solutions Consulting, Professional Services, or Management
        Consulting</p></li><li><p style=\\\"min-height:1.5em\\\">Strong ability to
        diagnose business processes and translate them into scalable technical solutions</p></li><li><p
        style=\\\"min-height:1.5em\\\">Experience with complex, multi-stakeholder
        deals with meaningful implementation components</p></li><li><p style=\\\"min-height:1.5em\\\">Comfort
        navigating collaboration with both pre-sales and post-sales teams</p></li><li><p
        style=\\\"min-height:1.5em\\\">Excellent communication skills, with the ability
        to influence executives and align cross-functional teams</p></li><li><p style=\\\"min-height:1.5em\\\">Strong
        judgment and ability to balance customer needs, business outcomes, and operational
        feasibility</p></li></ul><h2><strong>What Success Looks Like</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Increasing
        win rates, especially in the Enterprise</p></li><li><p style=\\\"min-height:1.5em\\\">Clear
        alignment between scope, expectations, and customer outcomes</p></li><li><p
        style=\\\"min-height:1.5em\\\">Reduced implementation friction and faster
        time-to-value</p></li><li><p style=\\\"min-height:1.5em\\\">Improved customer
        confidence and sentiment at kickoff and early lifecycle</p></li><li><p style=\\\"min-height:1.5em\\\">Stronger
        partnership between Sales, Professional Services, and Customer Success</p></li><li><p
        style=\\\"min-height:1.5em\\\">Increased retention and expansion driven by
        successful customer outcomes</p></li></ul><h2><strong>Why This Role Matters</strong></h2><p
        style=\\\"min-height:1.5em\\\">As we move upmarket, the complexity of our
        customers\u2014and the importance of getting implementations <em>just right</em>\u2014continues
        to increase. This role ensures we are not just closing quickly, but closing
        them in a way that sets customers up for long-term success.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>The
        Interview</strong></h2><p style=\\\"min-height:1.5em\\\">At Ashby, our team
        and interview process want to help you show your best self. Our interview
        process is structured to get to know you and your career as well as empower
        you with insight into our key focus areas. Here is the process in its entirety:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">30 min
        - Recruiter Screen with Talent Team</p></li><li><p style=\\\"min-height:1.5em\\\">45
        min - Interview with Head of Professional Services (Hiring Manager)</p></li><li><p
        style=\\\"min-height:1.5em\\\">45 min - Change Management Challenge</p></li><li><p
        style=\\\"min-height:1.5em\\\">Final Round Part 1:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">30 min - Interview with VP of Customer Success</p></li><li><p
        style=\\\"min-height:1.5em\\\">30 min - Interview with our Global Head of
        Solutions Engineering</p></li></ul></li><li><p style=\\\"min-height:1.5em\\\">Final
        Round Part 2:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">30
        min - Interview with CEO</p></li><li><p style=\\\"min-height:1.5em\\\">10
        min - Closing Questions with Hiring Manager</p></li></ul></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019ll
        get the time to do things the right way; we put a lot of emphasis on high
        quality work and avoid quick hacks as much as possible.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        get to sell a product that our prospects &amp; customers are truly excited
        about.</p></li><li><p style=\\\"min-height:1.5em\\\">Competitive compensation
        is offered.</p></li><li><p style=\\\"min-height:1.5em\\\">10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO with four weeks recommended per
        year. Expect \u201CVacation?\u201D in our one-on-one agenda until you start
        taking it \U0001F605</p></li><li><p style=\\\"min-height:1.5em\\\">Twelve
