        Kingdom\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/51061458-3a38-4bea-84f4-7ea0ac3e417f\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/51061458-3a38-4bea-84f4-7ea0ac3e417f/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">Hello! I\u2019m Laura, Support Manager at Ashby.
        I'm excited to share that we're hiring Product Support Specialists in Europe.
        </p><p style=\\\"min-height:1.5em\\\"><em>Please note: we\u2019re currently
        hiring Product Support Specialists to work one weekend day in exchange for
        a weekday off. This role will follow either a Tuesday\u2013Saturday or Sunday\u2013Thursday
        schedule, with occasional adjustments for holidays or business needs. You
        can share your preferred working hours in your application.</em></p><p style=\\\"min-height:1.5em\\\">Over
        the past few years, we\u2019ve built a team of Ashby experts who delight customers
        through keen attention to detail, deep product knowledge, and fast, thoughtful
        support. By joining the team, you\u2019ll contribute to delivering that same
        world-class experience.</p><p style=\\\"min-height:1.5em\\\">In this role,
        you\u2019ll work closely with customers every day. Ashby is a broad and complex
        product, so you can expect to handle everything from troubleshooting sophisticated
        integrations to guiding customers through detailed workflows and best practices.</p><p
        style=\\\"min-height:1.5em\\\">You\u2019ll also spend time on projects that
        make the work we do better. Past projects our team has taken on include:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Absorbing
        and synthesizing highly technical work from our Engineering Team to create
        enablement for technical up-leveling of the broader Support Team.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Developing workflow automation allowing for
        better team cohesion and efficacy.</p></li></ul><p style=\\\"min-height:1.5em\\\">As
        a company, we value a strong sense of ownership, principled thinking over
        experience, and thoughtful communication. These and other values, which we\u2019ll
        explore more deeply during the interview process, guide how we work.</p><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>You should apply if:</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You are
        already comfortable owning complex SaaS troubleshooting from first report
        through resolution, including isolating configuration issues, reproducing
        ambiguous behavior, and communicating clearly</p></li><li><p style=\\\"min-height:1.5em\\\">You
        can explain technical issues concisely, you think systematically, and operate
        with strong ownership in asynchronous environments. You can explain the same
        issue differently depending on the audience, while staying clear and direct.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You\u2019re curious\u2014both when addressing
        customers and when creating solutions that improve our workflows. You seek
        the answers beyond what\u2019s on the surface.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        delight customers. You possess keen attention to detail, ensure your responses
        are thorough and clear, and are empathetic along the way.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        can balance investigation, customer communication, and escalation quality
        in a fast-moving environment.</p></li><li><p style=\\\"min-height:1.5em\\\">You've
        done B2B support across company sizes, from SMB to enterprise.</p></li></ul><h2><strong>You
        should not apply if:</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Your recent experience is primarily customer
        success management, account management, or customer onboarding</p></li><li><p
        style=\\\"min-height:1.5em\\\">You're more drawn to coordination, enablement,
        or team leadership than spending your days deep in tickets.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You avoid getting in the weeds of solving technical
        problems; each member of our support team is highly technical and capable
        of solving deeply complex tickets.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        prefer to triage tickets swiftly; if tagging in Engineering early on (without
        attempting comprehensive solutions) is an exhale moment, this is likely not
        a great fit.</p></li><li><p style=\\\"min-height:1.5em\\\">You prefer to support
        a product you can know the ins and outs of quickly (such as a point solution)
        rather than a product that is rapidly evolving with quite a bit of surface
        area.</p></li><li><p style=\\\"min-height:1.5em\\\">You value in-office culture
        for motivation; this role is remote (given our office is in San Francisco)
        so we're seeking self-starters!</p></li></ul><h2><strong>About Ashby</strong></h2><p
        style=\\\"min-height:1.5em\\\">We\u2019re building the next generation of
        enterprise software, and we\u2019re starting with a suite of products that
        help talent leaders, recruiters, and hiring managers run their hiring process
        significantly better. Learn more on our website:<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/%EF%BF%BC%EF%BF%BCWe\\\"><u>
        </u></a><a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/\\\"><u>https://www.ashbyhq.com/</u></a></p><p
        style=\\\"min-height:1.5em\\\">We are well funded and backed by great investors,
        including Y Combinator, Elad Gil and Lachy Groom. Following our Series D in
        2025, we\u2019re continuing to grow ARR at more than 100% year over year,
        serving over 4,000 customers, including industry leaders like Snowflake, OpenAI,
        Shopify, Ramp, Notion, Reddit, and Zapier (and many others who we cannot name!).
        Our growth and retention metrics are best-in-class among our peers. We\u2019ll
        share more details once we meet. In short, it's the perfect time to join!
        \U0001F680</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About Go To
        Market</strong></h2><p style=\\\"min-height:1.5em\\\">We view our Support
        team as an extension of the product itself, one that ensures an optimal customer
        experience for customers ranging across all market segments. Here are a few
        points that should give you an idea of what it is like to work with us:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We spend
        a lot of time building best-in-class products since we believe a highly differentiated
        product is easier to sell.</p></li><li><p style=\\\"min-height:1.5em\\\">We
        also spend a lot of time building a best-in-class customer experience. We
        aim to offer deep expertise whenever we interact with prospects and customers.</p></li><li><p
        style=\\\"min-height:1.5em\\\">We strongly believe that small teams with very
        talented people and the right work environment deliver much better performance
        than teams with large headcount.</p></li></ul><p style=\\\"min-height:1.5em\\\">We
        value a strong sense of ownership, principled thinking over experience, and
        thoughtful communication (we put a lot of effort into using the right communication
        channels) - we\u2019ll get into these and other values during the hiring process.
        You can take a look at our<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
        nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-leadership-principles\\\">
        <u>Leadership Principles</u></a> to get a sense of what we value in People
        Leaders at Ashby.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Interview
        Process</strong></h2><p style=\\\"min-height:1.5em\\\">Our interview process
        is thorough\u2014we aim to ensure each person that joins the team is the right
        fit for Ashby and will provide ample information for you to assess if Ashby
        is the right fit for you. The process for this role is as follows:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Intro
        Call with Recruiting</strong> - 30 Minutes</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Take
        Home Assessment</strong> - 1 week to complete</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Hiring
        Manager Interview</strong> - 45-60 Minutes</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Final
        Round Interview</strong> - 90 Minutes</p></li></ul><p style=\\\"min-height:1.5em\\\">Throughout
        our interview process, you will be evaluated on both technical reasoning and
        communication precision.</p><p style=\\\"min-height:1.5em\\\"></p><h2>Onboarding
        Process</h2><p style=\\\"min-height:1.5em\\\">Ashby is a highly complex product,
        and we invest a lot of time in ensuring our support team members are experts
        on the platform. Your first 30 days will focus primarily on onboarding and
        learning the product. With support and guidance, you\u2019ll begin taking
        tickets in week one, so you can start getting to know our customers, our processes,
        and begin making an impact right away. All while continuing to build confidence
        and depth in the platform.</p><p style=\\\"min-height:1.5em\\\"></p><h2>Benefits</h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">10-year
        exercise window for stock options. You shouldn\u2019t feel pressure to purchase
        stock options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO<em>.</em> Expect \u201CVacation?\u201D
        in our one-on-one agenda until you start taking it \U0001F605</p></li><li><p
        style=\\\"min-height:1.5em\\\">Twelve weeks of fully paid family leave in
        the US<em>.</em> We plan to expand this to employees in other countries as
        situations arise.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous equipment,
        software, and office furniture budget. Get what you need to be happy and productive!</p></li><li><p
        style=\\\"min-height:1.5em\\\">$100/month education budget with more expensive
        items (like conferences) covered with manager approval.</p></li></ul><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"Hello!
