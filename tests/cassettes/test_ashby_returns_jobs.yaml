        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"IMPLEMENTATION
        CONSULTANT - EMEA\\n\\nHi! I\u2019m Morgan, the Manager of Strategic Implementations
        here at Ashby. Our customers are at the center of everything we do, and that\u2019s
        especially true during implementation. We take pride in being responsive,
        collaborative partners who focus not just on delivery, but on thoughtful execution.\\n\\nI\u2019m
        thrilled to be expanding our implementation motion by hiring an Implementation
        Consultant. As part of our growing EMEA Professional Services team within
        Ashby\u2019s Customer Success organization, you\u2019ll play a critical part
        in helping customers bridge the gap between potential and actual value.\\n\\n\\n\\n\\nABOUT
        THIS ROLE:\\n\\nAs our Implementation Consultant you will own execution of
        the technical configuration for a defined set of new Ashby customers. During
        these implementations, you will partner closely with an Implementation Specialist
        to confirm customer requirements before leading the tailored configuration
        of native platform functionality. As initial configuration concludes, you
        will define and carry out a testing plan ahead of go-live. You will also document
        final configuration choices made to ensure visibility and allow for ongoing
        optimization post-launch.\\n\\nAs we scale, we\u2019re investing in more specialized
        implementation roles to ensure customers get to value quickly. This role is
        ideal for someone earlier in their implementation or customer-facing career
        who is excited to learn, grow, and develop deep expertise in a complex product.\\n\\nYou\u2019ll
        work with increasing independence over time with support from more senior
        Implementation Specialists and cross-functional partners. This role is designed
        as a pathway into the more senior Implementation Specialist role over time.\\n\\n\\n\\nRole
        requirements:\\n\\n - Complex SaaS Implementation & Project Management: You
        have deep experience contributing to or owning implementation projects for
        complex SaaS products (actioning a defined project plan, communicating and
        aligning with stakeholders on progress, and ultimately delivering results
        in accordance with the agreed upon expectations). You feel comfortable independently
        owning your domain, as well as keeping customers accountable to theirs. You
        work effectively in a remote-first setting, with the ability to travel as
        needed (<5%) for strategic customer engagements.\\n\\n - Customer Centricity:
        You are adept at understanding enterprise customer needs and tailoring implementation
        configurations to meet their specific requirements. You build strong customer
        relationships by maintaining high levels of engagement and communication.
        You serve as the customer\u2019s proactive guide and advocate related to technical
        configuration, balancing empathy and practicality throughout the implementation.
        Bonus points if you have prior familiarity with Talent Acquisition teams and
        processes.\\n\\n - Technical Proficiency: You have a solid understanding of
        a complex product (ideally Ashby) and its technical intricacies. You are technically
        curious and creative.\\n\\n - Critical Thinking & Solutions Orientation: You
        proactively address thematic customer opportunities and improve our processes
        accordingly. You don\u2019t rely on \u2018I\u2019ve seen this done,\u2019
        but instead think critically to solve problems. You anticipate how configuration
        decisions might impact customer goals, ask questions to validate options,
        and pair your recommendations with risk mitigation tactics.\\n\\n - Best Practices
        & Recommendations: You take pride in advising customers on best practices
        specific to their usage of software to ensure optimal value.\\n\\n - Change
        Management: You are experienced in navigating change management processes
        and helping customers adapt to new systems and a refreshed approach.\\n\\n
        - Cross-functional Collaboration and Communication: You effectively partner
        with cross-functional stakeholders across Customer Success, Sales, Product,
        Engineering, and Operations to align and define progress. You proactively
        communicate progress and risks with internal and external stakeholders.\\n\\nYou
        could be a great fit if:\\n\\n - \U0001F64BYou strike the balance between
        collaborative teamwork with a strong ability to execute independently on a
        defined plan.\\n\\n - \U0001F4E3 You demonstrate clear communication. You
        ask clarifying questions with precision and can distill complex concepts into
        simple themes.\\n\\n - \U0001F3A7 You are a great listener. You read between
        the lines of what customers share in order to identify core concepts, which
        allows you to surface the right tailored recommendations.You http://recommendations.You
        see your role as the voice of the customer to internal stakeholders so we
        can ensure that our offerings continue to evolve in accordance with customer
        needs.\\n\\n - \U0001F4C8 You are a problem solver. You thrive at solving
        complex challenges with innovative, scalable solutions.\\n\\n - \u26A1\uFE0FYou
        know process matters. You are eager to improve processes and workflows to
        enhance efficiency and efficacy.\\n\\n - \U0001F50D Your peers describe you
        as detail-oriented and technically proficient. You take pride in internal
        operations.\\n\\n - \U0001F4CA You are data-driven. You use metrics and analytics
        to inform decisions and measure success.\\n\\n - \U0001F30D You are adaptable.
        You can navigate changes in a fast-paced, evolving environment.\\n\\n - \U0001F9D1\u200D\U0001F3EB
        You are eager to make an impact and grow. You understand the critical role
        you play in a customer\u2019s success, and seize opportunities to expand your
        impact for customers and the team.\\n\\nYou might not be a great fit if:\\n\\n
        - You are uninterested in customer-facing work that blends technical, operational,
        and interpersonal skills.\\n\\n - You are uncomfortable learning a complex
        product and adapting as it evolves.\\n\\n - You prefer roles that are purely
        strategic without hands-on execution.\\n   \\n   \\n\\n\\nOUR PHILOSOPHY:\\n\\nHere
        are a few key points that should give you a sense of what it\u2019s like to
        work with us:\\n\\n - We invest heavily in building best-in-class products,
        believing that great products make customer success easier and more meaningful.\\n\\n
        - We value deep expertise and thoughtful problem-solving in every customer
        interaction.\\n\\n - We believe small, highly capable teams outperform large
        teams \u2014 and we hire, support, and compensate accordingly.\\n\\n - We
        value ownership, principled thinking, and clear communication, regardless
        of tenure or level.\\n   \\n   \\n\\n\\nTHE INTERVIEW\\n\\nAt Ashby, our team
        and interview process want to help you show your best self. Our interview
        process is structured to get to know you and your career as well as empower
        you with insight into our key focus areas. Here is the process in its entirety:\\n\\n
        - 30 min - Recruiter Screen with Talent Team\\n\\n - 45 min - Interview with
        Manager of Strategic Implementations (Hiring Manager)\\n\\n - Take Home Exercise\\n\\n
        - 30 min - Take Home Deep Dive Interview with 2 Strategic Implementation Specialists\\n\\n
        - Final Round:\\n   \\n   - 30 min - Cross-functional collaboration with Head
        of Professional Services\\n   \\n   - 30 min - Product Complexity with VP
        of Customer Success\\n   \\n   - 10 min - Closing Questions with Hiring Manager\\n
        \    \\n     \\n\\n\\nBENEFITS\\n\\n - You\u2019ll get the time to do things
        the right way; we put a lot of emphasis on high quality work and avoid quick
        hacks as much as possible.\\n\\n - You get to sell a product that our prospects
        & customers are truly excited about.\\n\\n - Competitive compensation is offered.\\n\\n
        - 10-year exercise window for stock options. You shouldn\u2019t feel pressure
        to purchase stock options if you leave Ashby \u2014do it when you feel financially
        comfortable.\\n\\n - Unlimited PTO with four weeks is recommended per year.
        Expect \u201CVacation?\u201D in our one-on-one agenda until you start taking
        it \U0001F605\\n\\n - Twelve weeks of fully paid family leave in the US. We
        plan to expand this to employees in other countries as situations arise.\\n\\n
        - Generous equipment, software, and office furniture budget. Get what you
        need to be happy and productive!\\n\\n - $100/month education budget with
        more expensive items (like conferences) covered with manager approval\\n\\nAshby
