        outbound BDR before becoming an AE\\n\\n\\nREASONS NOT TO APPLY:\\n\\n - You
        are uncomfortable running your own product demonstrations\\n\\n - You only
        want to work on a small number of big deals\\n\\n - You would rather not have
        your day to day to consist of 4+ meetings per day\\n\\n\\nOUR PHILOSOPHY\\n\\nHere
