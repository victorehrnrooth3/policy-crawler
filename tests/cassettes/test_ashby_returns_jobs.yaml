        where time is being spent and ruthlessly prioritize work that drives the most
        impact for customers and the business.\\n\\n - Ship improvements quickly.
        Iterate. Raise the bar again.\\n\\n\\nCROSS-FUNCTIONAL COLLABORATION WITH
        ENGINEERING & PRODUCT\\n\\n - Collaborate closely with Engineering to shape
        how technical escalations are managed and how customer insights are tracked
        and actioned.\\n\\n - Work with Product to provide feedback loops from Support
        to improve usability and prevent repeat issues.\\n\\n - Serve as an advocate
        for customers in technical conversations and help Engineering teams understand
        the support impact of product decisions.\\n\\n - Push for clarity and resolution.
        When tradeoffs exist, help the team move forward decisively.\\n\\n\\nPROCESS
