        collaboration between Support and Engineering.\\n\\n - Familiarity with ATS/HRIS
        platforms or other enterprise systems is a plus.\\n\\n\\nSYSTEMS THINKING
        & PROCESS DESIGN\\n\\n - Ability to zoom out and identify scalable processes
        for handling complex technical work.\\n\\n - Strong judgment in prioritizing
        bugs, customer needs, and internal enablement work.\\n\\n - Comfort operating
        in ambiguity and creating structure where none exists.\\n\\n - Clear bias
        toward simplification over over-optimization.\\n\\n\\nCUSTOMER-CENTRIC, ENGINEERING-AWARE\\n\\n
        - Passionate about improving the customer experience through well-designed,
        technically sound solutions.\\n\\n - Comfortable representing customer needs
        in Engineering discussions and advocating for supportability.\\n\\n - Able
        to hold a high bar for quality while still moving quickly and iterating.\\n\\n
        - Understands that speed and quality are not opposites and knows how to balance
        both.\\n\\n\\n\\n\\nYOU SHOULD APPLY IF:\\n\\n - You have strong instincts
        for what matters most and aren\u2019t afraid to make decisive calls.\\n\\n
        - You believe velocity compounds and you want to build a team that moves fast
        and drives value for customers\\n\\n - You thrive in cross-functional environments
        and love working alongside Engineering teams.\\n\\n - You enjoy solving complex
