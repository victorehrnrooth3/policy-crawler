        plays a critical part in ensuring our new customers start off with a strong
        foundation and a clear path forward. I\u2019m thrilled to be hiring our next
        Implementation Specialist. As part of our growing Professional Services team
        within Ashby\u2019s Customer Success organization, you\u2019ll play a key
        role early in the customer journey\u2014ultimately helping to elevate the
        entire customer experience.</em></p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        this role:</strong></h2><p style=\\\"min-height:1.5em\\\">As our Implementation
        Specialist, you will be responsible for managing and executing the end-to-end
        implementation of Ashby\u2019s solution for many of our new customers. You
