        experience and being a go-to partner for your team members. You recognize
        the expertise the team possesses and are continuously striving to learn and
        maintain your own expertise in the product.\\n\\n - \U0001F50D Your peers
        describe you as being detail-oriented. You take pride in operational efficiencies
