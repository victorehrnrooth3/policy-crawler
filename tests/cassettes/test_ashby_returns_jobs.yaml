        workforce and welcome people from all backgrounds, experiences, perspectives,
        and abilities.</em></p><p style=\\\"min-height:1.5em\\\"><em>Ashby is committed
        to a fair and transparent hiring process. We confirm that this advertisement
        is for an active, existing vacancy within our organization. Please be advised
        that we may use artificial intelligence-driven tools to assist our recruitment
        team in screening, assessing, and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"Hi
        \U0001F44B\U0001F3FC I'm Anna https://www.linkedin.com/in/anna-hall-bb420a9/
        , and I lead our Customer Success, Marketing and G&A hiring efforts at Ashby.
        When I started in Jan '24, I couldn't wait to dive into Ashby the product
        (spoiler, it's even better than you think) and build on the foundations we
        had in place to grow our GTM teams. It's been a lot of fun, and one of the
        things I love most is that our work directly impacts the tool that we get
        to use - how cool is that? We also do things a bit differently here, and here\u2019s
        my favorite example: we don't over-index on referrals (I had never spoken
        to Jim https://www.linkedin.com/in/jmmmmmmmmmmmmmmmmmmmm/ before my first
        interview, and over 60% of our 2025 hires were inbound).\\n\\nThe Ashby team
        has grown so much over the last few years, and now we're adding a few GTM
        Recruiters to our team! Historically we have run a cohort recruiting model
        for these roles (you can learn more about that here https://www.ashbyhq.com/podcast/episodes/cohort-hiring),
        but this time we are treating the position as evergreen as we have multiple
        positions to hire.\\n\\nWe have notable customers like Notion, Linear, Shopify,
        and Snowflake. Our growth and retention metrics are best-in-class among our
        peers: we have tens of millions in ARR, growing >100% year over year, over
        4,000 customers, very low churn, and many years of runway. We\u2019ll share
        more details once we meet, but you now probably have a good idea as to why
        we're hiring for this role \U0001F605.\\n\\nA Note from Jim https://www.linkedin.com/in/jmmmmmmmmmmmmmmmmmmmm/,
        our VP People & Talent:\\n\\nThe job I do at Ashby is my dream job and I hope
        being a Recruiter here is yours! Not only will you get to help build the people
        side of our business but you\u2019ll also get to become an expert user of
        our product and a thought leader on how to use it. You\u2019ll get to make
        a lasting contribution to the whole recruiting community as we drive improvements
        across the talent tech space. Check out our Recruiting blog and Hiring Excellence
        Framework https://www.ashbyhq.com/blog/recruiting as an example of our content
        creation for the talent community.\\n\\nJoining us means being part of a talented
        team, tackling the challenges of our stage, and contributing to our team and
        product growth. We value humility, continuous improvement and a dedication
        to excellence (more here https://ashbyhq.com/blog/culture/ashbys-operating-principles).
        If you are passionate about bringing your unique strengths to the team and
        building a culture of success, we would love to hear from you.\\n\\nThe Role\\n\\nWe
        are seeking GTM Recruiters with a proven track record of discovering and hiring
        amazing non-engineering talent in the tech industry. In this role, you will
        own the end-to-end development and execution of recruitment strategies to
        find exceptional talent to fill critical roles. We will be hiring dedicated
        recruiters to focus on G&A, Professional Services, Customer Success and Sales.
        While we are you are a bit earlier or tenured in your recruiting career, if
        you have experience recruiting for these teams, are, have done this somewhere
        with a high talent bar and are truly excited about staying at the forefront
        of the recruiting industry, please consider applying.\\n\\nSuccess in this
        role over the next six months will involve attracting, evaluating and hiring
        high quality candidates to meet our company's hiring needs for GTM positions
        across the business. It will also require building and collating phenomenal
        talent pools to create a strong infrastructure for future growth.\\n\\nYou
        will achieve this by:\\n\\n - Attracting, evaluating and hiring top talent.
        We focus on quality over quantity, and partner closely with our stakeholders
        to assess the market, diagnose root cause issues and make recommendations.\\n\\n
        - Developing processes that focus on the very highest quality of hire as we
        scale\\n\\n - Engaging with departmental leaders and hiring managers to expertly
        qualify requirements\\n\\n - Using data from Ashby to drive recommendations
        and adjust hiring practices as needed\\n\\n - Focusing on quality and alignment
        at the optimal volume to meet goals\\n\\nAs you are probably ascertaining
        from the above, we are looking for a person that gains energy from both strategizing
        on creative ways to accelerate our hiring as well as getting their hands dirty
        finding and evaluating candidates.\\n\\n\\nTo be qualified for this role,
        you must have the following:\\n\\n - Proven track record as an expert Go To
        Market Recruiter in one or more of the following: G&A or Customer Success,
        from within a B2B SaaS company for a significant portion of your career.\\n\\n
        - You\u2019ve operated with autonomy and are used to leading searches end-to-end.
        We value competency over tenure, but you have a foundation of proven experience
        that allows you to establish instant credibility with technical leadership\\n\\n
        - Data-driven mindset with the to optimize your workflows, balancing diversity,
        quality and volume.\\n\\n - Demonstrated experience in creating innovative
        sourcing strategies that differentiate the talent pipelines from the inbound
        attraction and referrals that we have traditionally used\\n\\nIf you need
        someone else to do any of the following, then this role is probably not for
        you:\\n\\n - Boolean search and talent mapping activities\\n\\n - Requisition
        qualification with senior leaders\\n\\n - High volumes of outreach and screening
        calls\\n\\n - Prioritization of your workload\\n\\n - Root cause analysis
        of your pipelines and roles\\n\\nInstructions:\\nPlease take your time with
        your application. I will review applications on Monday, June 1st and we will
        not review any applications or speak to anyone until after that date/time.
        We will review EVERY application and speak to the shortlist we make based
        on the applications. There are no prizes for being first and no advantages
        to be gained by reaching out, being referred or knowing someone here, so please
        don't message anyone on the recruiting team.\\n\\nWe have hired a few recruiters
        at Ashby and have reviewed hundreds of recruiter applications, so I hope that
        sharing the following might be useful as you consider applying. The applications
        that stand out often include the following:\\n\\n - Demonstrate the impact
        of their work in a recruiter capacity. Resumes focused on projects or leadership
        may not stand out and highlight exactly how your experience relates to this
        role. Metrics can show the reader how well you did the job, and that stands
        out.\\n\\n - Tie their work to the Business functions. We will only hire someone
        with proven full cycle hiring experience, focused on Sales, G&A or CS roles.
        'Recruited a variety of roles' is not the same as showing the reader that
        you've worked Implementation or Customer Success roles, as an example.\\n\\n
        - Highlight this recruiting success in a growth, B2B SaaS company\\n\\n -
        Answer the application questions, in a way that shows your skills and experience
        (not with a copy/paste from AI). Each question has context provided or real
        meaning for us, beyond what we would see in your resume. Applications that
        choose not to answer these questions will not move forward.\\n\\n\\n\\n\\n\\nBENEFITS\\n\\n
        - Competitive salary and equity.\\n\\n - 10-year exercise window for stock
        options. You shouldn\u2019t feel pressure to purchase stock options if you
        leave Ashby \u2014do it when you feel financially comfortable.\\n\\n - Unlimited
        PTO with four weeks recommended per year. Expect \u201CVacation?\u201D in
        our one-on-one agenda until you start taking it \U0001F605.\\n\\n - Twelve
        weeks of fully paid family leave in the US. We plan to expand this to employees
        in other countries as situations arise.\\n\\n - Generous equipment, software,
        and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
        covered with manager approval.\\n\\n - If you\u2019re in the US, top-notch
        health insurance for you and your dependents with all premiums covered by
        us.\\n\\nAshby\u2019s success hinges on hiring great people and creating an
        environment where we can be happy, feel challenged, and do our best work.
        We\u2019re being deliberate about building that environment from the ground
        up. I hope that excites you enough to apply.\\n\\n\\n\\n\\nINTERVIEW PROCESS\\n\\nAt
        Ashby, our team and interview process want to help you show your best self.
        We\u2019ll dive into past projects and simulate working together via talking
        through past projects and conducting a short but realistic assignment. Our
        interview process is 3 rounds:\\n\\n 1. 30-minute introduction call to discuss
        Ashby and your past work with me, Anna https://www.linkedin.com/in/anna-hall-bb420a9/,
        so expect a traditional recruiting screen with a slightly different format.
        https://www.linkedin.com/posts/fishstephanie_how-many-times-have-you-been-in-an-interview-activity-7340765982015049728-JT36?rcm=ACoAAAKizq8B53dTR5ij_zb1PN8bQYwXB63fDfU&utm_medium=member_desktop&utm_source=share\\n\\n
        2. A take-home assignment that will ask you to interpret pipeline data and
        make recommendations to a hiring manager\\n\\n 3. ~2hr hour final round\\n
        \   \\n    1. 30 mins with our VP of People & Talent Jim https://www.linkedin.com/in/jmmmmmmmmmmmmmmmmmmmm/\\n
        \   \\n    2. 30 mins with two GTM leaders\\n    \\n    3. 30 min to Meet
        the Team\\n    \\n    4. 30 mins Sourcing + RecOps focused interview with
        Liz https://www.linkedin.com/in/elizabethmariesmith/ + Will https://www.linkedin.com/in/willducey/\\n
        \   \\n    5. 10 min closing with Anna\\n\\n\\nABOUT ASHBY\\n\\nWe\u2019re
        building the next generation of enterprise software and we\u2019re starting
        with a suite of products that help talent leaders, recruiters, and hiring
        managers run their hiring process significantly better. We are well-funded,
        have incredible product market fit, and are backed by great investors, including
        Y Combinator, Elad Gil and Lachy Groom.\\n\\nWe're in the talent acquisition
        software business. We run the end-to-end hiring process through our own platform,
        and ensure a level playing field for all candidates. Reaching out to hiring
        managers or recruiters directly won't improve your odds of success. Please
        focus your energy on the quality of your application.\\n\\nAshby provides
        equal employment opportunities (EEO) to all employees and applicants for employment
        without regard to race, color, religion, sex, national origin, age, disability,
        genetics, sexual orientation, gender identity, or gender expression. We are
        committed to a diverse and inclusive workforce and welcome people from all
        backgrounds, experiences, perspectives, and abilities.\\n\\nAshby is committed
        to a fair and transparent hiring process. We confirm that this advertisement
        is for an active, existing vacancy within our organization. Please be advised
        that we may use artificial intelligence-driven tools to assist our recruitment
        team in screening, assessing, and selecting candidates for this position.\",\"compensation\":{\"compensationTierSummary\":\"$120K
