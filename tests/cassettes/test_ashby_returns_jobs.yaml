        trust you to provide practical advice and relevant stories.\\n\\n - \u2699\uFE0F
        You have successfully sold a complex multi-product platform and have won competitive
        rip-and-replace sales motions.\\n\\n\\nBONUS\\n\\n - You have sold to Talent
        and/or People leaders and are familiar with their pains and priorities\\n\\n\\nYOU
        SHOULDN'T APPLY IF:\\n\\n - You're a dashboard-and-forecast manager who doesn't
        like to get into the deals and daily operations\\n\\n - You're not keen on
        learning our substantial product. \\\"That's for SEs\\\" isn't how we approach
        things here.\\n\\n\\nOUR PHILOSOPHY\\n\\nHere are a few key points that should
        give you an idea of what it is like to work with us:\\n\\n - We have clear
        expectations about what it means to be a leader at Ashby https://www.ashbyhq.com/blog/culture/ashbys-leadership-principles?utm_source=linkedin&utm_medium=social&utm_campaign=Talent+Trends&utm_term=jim\\n\\n
        - We're highly collaborative and we believe in a team-based sales motion to
        maximize our win rates on high impact deals\\n\\n - We believe in developing
        subject matter expertise (not just on our product but also the TA space broadly)
        which allows us to provide a differentiated buyer experience\\n\\n - We continue
        to make material investments in engineering and product because we know at
        the end of the day, having the best product makes winning new customers easier\\n\\nWe
        value a strong sense of ownership, principled thinking over decades of experience,
        and thoughtful & clear communication both internally and with customers.\\n\\n\\n\\n\\nINTERVIEW
        PROCESS\\n\\nOur interview process is designed so you can showcase your achievements
        and points of learning and apply those to a practical exercise. We'll provide
        you with sample customer calls and pipeline data so you can develop a well
        informed perspective on our product and the Enterprise segment. You\u2019ll
        have opportunities to ask questions of our team throughout.\\n\\nThe interview
        process for this role is four rounds in the following order:\\n\\n 1. Intro
        Call (30 min) - You'll meet with Recruiting to discuss your fit for the role
        and address questions about our market and solution.\\n\\n 2. Experience Deep
        Dive (1 hr) - You'll walk Leigh through your career journey in some detail
