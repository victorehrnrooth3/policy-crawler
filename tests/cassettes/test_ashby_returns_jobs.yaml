        by maintaining high levels of engagement and communication; you\u2019re the
        customer\u2019s proactive guide and advocate throughout the implementation
        period.\\n\\n - Change Management: You are experienced in navigating change
        management processes and helping customers adapt to new systems and a refreshed
        approach.\\n\\n - Best Practices & Recommendations: You take pride in advising
        customers on best practices specific to their usage of software to ensure
        optimal value.\\n\\n - Critical Thinking & Solutions Orientation: You proactively
        address thematic customer opportunities and improve our processes accordingly.
        You don\u2019t rely on \u2018I\u2019ve seen this done,\u2019 but instead think
        critically to solve problems.\\n\\n - Cross-functional Collaboration: You
        effectively partner with cross-functional stakeholders across Customer Success,
        Sales, Product, Engineering, and Operations to align and define progress.\\n
        \  \\n   \\n\\nYou could be a great fit if:\\n\\n - \U0001F4E3 You demonstrate
        clear communication. You ask clarifying questions with precision and can distill
        complex concepts into simple themes.\\n\\n - \U0001F3A7 You are a great listener.
        You see your role as the voice of the customer to internal stakeholders so
