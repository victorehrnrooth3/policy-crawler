        Kingdom\",\"addressLocality\":\"Bristol\"}}},{\"location\":\"Ireland\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Ireland\",\"addressLocality\":\"\"}}},{\"location\":\"Spain\",\"address\":{\"postalAddress\":{\"addressCountry\":\"Spain\"}}},{\"location\":\"Germany\",\"address\":{\"postalAddress\":{\"addressCountry\":\"Germany\",\"addressLocality\":\"\"}}}],\"publishedAt\":\"2026-05-05T01:03:30.058+00:00\",\"isListed\":true,\"isRemote\":true,\"workplaceType\":\"Remote\",\"address\":{\"postalAddress\":{\"postalCode\":\"\",\"addressRegion\":\"\",\"addressCountry\":\"European
        Union\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/35a01a05-8efd-4bc3-a4bf-0a31d902102d\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/35a01a05-8efd-4bc3-a4bf-0a31d902102d/application\",\"descriptionHtml\":\"<h1>Manager
        of Dedicated Implementations - EMEA</h1><p style=\\\"min-height:1.5em\\\"><em>Hi,
        I\u2019m John and I\u2019m the Head of Professional Services at Ashby. One
        of my favorite aspects of Ashby is our operating principle of </em><a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#8---implement-continuous-improvement\\\"><em><u>Continuous
        Improvement</u></em></a><em>. Coupled with our principle of caring deeply
        about our customers, we often find ourselves wondering \u2018what is a better
        way to accomplish this\u2019. That\u2019s why I am thrilled to be hiring our
        first EMEA Manager of Dedicated Implementations! As a leader on our growing
        Professional Services team (within Ashby\u2019s Customer Success organization),
        you\u2019ll have the opportunity to play a key role early in our customers\u2019
        journey, ultimately upleveling the overall customer experience.</em></p><p
        style=\\\"min-height:1.5em\\\"></p><h2>About this role:</h2><p style=\\\"min-height:1.5em\\\">As
        our first Manager of Dedicated Implementations in EMEA, you will play a key
        role in ensuring high-quality experiences for customers beginning their Ashby
        journey. You will lead an EMEA-based team of Implementation Specialists aligned
        to our Dedicated customer segments, including Strategic (enterprise) and High
        Touch (mid-market) customers. You will oversee the delivery of segment-aligned
        implementation experiences, and will partner cross-functionally to support
        scoping and planning for prospective customers.</p><p style=\\\"min-height:1.5em\\\"><strong>Role
        requirements:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Implementation
        &amp; Project Management: </strong>You have extensive experience managing
        and executing implementation and onboarding projects (defining the work, aligning
        with stakeholders, communicating the project plan, and ultimately delivering
        results in accordance with the agreed upon expectations). You keep the team
        on track to ensure milestones are met. You work effectively in a remote-first
        setting, with the ability to travel &lt;10% as needed for strategic customer
        engagements.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Team Leadership:</strong>
        You build and scale high-performing teams, empowering them to achieve outcomes
        that meet or exceed the high standards set by our team and company.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Customer Centricity:</strong> You are
        adept at understanding customer needs and tailoring implementations to meet
        their specific requirements. You build strong customer relationships by maintaining
        high levels of engagement and communication; you\u2019re the customer\u2019s
        proactive guide and advocate throughout the implementation period.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Bias for Action: </strong>You move
        work forward, translating ambiguity into clear paths, driving toward outcomes,
        and ensuring follow-through.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Regional
        Focus: </strong>You leverage your understanding of the EMEA market to define
        and evolve how implementations are delivered, ensuring our approach optimizes
        for regional considerations and scales without compromising quality.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Fluency with Enterprise Motions:</strong>
        You are comfortable operating in complex enterprise environments with multiple
        stakeholders, competing priorities, and evolving requirements. You are experienced
        in navigating change management processes at scale and helping customers adapt
        to new systems and a refreshed approach.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Technical
        Proficiency: </strong>You have a solid understanding of a complex product
        (ideally Ashby) and its technical intricacies; you are technically curious
        and creative.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Critical
        Thinking &amp; Solutions Orientation: </strong>You proactively address thematic
        customer opportunities and improve our processes accordingly. You don\u2019t
        rely only on \u2018I\u2019ve seen this done,\u2019 but instead think critically
        to solve problems.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Cross-functional
        Collaboration: </strong>You effectively partner with cross-functional stakeholders
        across Customer Success, Sales, Product, Engineering, and Operations to align
        and define progress.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>What
        Success Looks Like:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">EMEA customers achieve time-to-value quickly
        and predictably</p></li><li><p style=\\\"min-height:1.5em\\\">Implementation
        quality is consistent across segments without feeling templated</p></li><li><p
        style=\\\"min-height:1.5em\\\">Upmarket customers receive an enterprise-ready
        onboarding experience</p></li><li><p style=\\\"min-height:1.5em\\\">Clear,
        effective transitions into Customer Success support strong adoption momentum</p></li><li><p
        style=\\\"min-height:1.5em\\\">Scalable processes reduce manual effort while
        preserving quality</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You
        could be a great fit if:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\U0001F9D1\u200D\U0001F3EB You love to coach.
        You see every teaching moment as an opportunity and are excited to help your
        team and our customers grow.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4E3
        You demonstrate clear communication. You ask clarifying questions with precision
        and can distill complex concepts into simple themes. You approach all stakeholder
        conversations with confidence.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3A7
        You are a great listener. You see your role as the voice of the customer to
        internal stakeholders so we can ensure that our offerings continue to evolve
        in accordance with customer needs.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4C8
        You are a problem solver. You thrive at solving complex challenges with innovative,
        scalable solutions.</p></li><li><p style=\\\"min-height:1.5em\\\">\u26A1\uFE0FYou
        know process matters. You are eager to improve processes and workflows to
        enhance efficiency and efficacy.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F50D
        Your peers describe you as detail-oriented and technically proficient. You
        take pride in internal operations.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4CA
        You are data-driven. You use metrics and analytics to inform decisions and
        measure success.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F30D
        You are adaptable. You can navigate changes in a fast-paced, evolving environment.</p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>You might not be a great fit if:</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You prefer
        being an individual contributor.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        prefer an in-person role over remote.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        are less interested in customer-facing roles that require both technical and
        interpersonal skills.</p></li><li><p style=\\\"min-height:1.5em\\\">You are
        accustomed to defining ideas and strategies, yet not responsible for their
        execution.</p></li><li><p style=\\\"min-height:1.5em\\\">You prefer working
        with a simple product (such as a point solution).</p></li><li><p style=\\\"min-height:1.5em\\\">You
        prefer exclusively to build (rather than build, iterate, optimize).</p></li></ul><h2><strong>Our
        Philosophy</strong></h2><p style=\\\"min-height:1.5em\\\">Here are a few key
        points (relevant to the go-to-market side) that should give you an idea of
        what it is like to work with us:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">We spend a lot of time building best-in-class
        products since we believe a highly differentiated product is a lot easier
        to sell.</p></li><li><p style=\\\"min-height:1.5em\\\">We want to offer deep
        expertise whenever we interact with prospects and customers.</p></li></ul><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We strongly
        believe that small teams with very talented people (and the right work environment)
        deliver much better performance than teams with large headcount. We hire and
        compensate accordingly.</p></li><li><p style=\\\"min-height:1.5em\\\">We value
        a strong sense of ownership, principled thinking over experience, and thoughtful
        communication (we put a lot of effort into using the right communication channels)
        - we\u2019ll get into these and other values during the hiring process.</p></li></ul><h2><strong>The
