        Team to identify and address gaps in our current tooling, workflows, and diagnostics
        capabilities.\\n\\n - Use data from escalations and customer feedback to recommend
        changes that improve team effectiveness and customer outcomes.\\n\\n - Partner
        with Support leadership to evolve how we measure success in high-complexity
        support scenarios.\\n\\n - Help scale Support Engineering as a function by
        documenting approaches, onboarding new team members, and contributing to internal
        tooling.\\n\\n - Default to action. Build the first version. Improve it in
        motion.\\n\\n\\nROLE REQUIREMENTS\\n\\n\\n\\n\\nSUPPORT & TECHNICAL LEADERSHIP\\n\\n
        - Proven experience managing or mentoring a Technical Support Team in a B2B
