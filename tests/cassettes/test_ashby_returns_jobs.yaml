        Kingdom\",\"addressLocality\":\"Cardiff\"}}}],\"publishedAt\":\"2025-04-01T14:39:51.428+00:00\",\"isListed\":true,\"isRemote\":true,\"workplaceType\":\"Remote\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"United
        Kingdom\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/d573471b-2005-482c-9fbf-d1df9550cb57\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/d573471b-2005-482c-9fbf-d1df9550cb57/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">Hi \U0001F44B I\u2019m <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://uk.linkedin.com/in/colinhoweuk\\\"><u>Colin</u></a>,
        Director of Engineering, Europe. How do you feel about software engineers
        writing product specs, making product decisions, and not breaking down projects
        into individual tickets? If that sounds exciting (even if a bit scary), read
        on because I\u2019m looking for an engineering manager to help us build a
        different type of engineering team and culture at Ashby.</p><p style=\\\"min-height:1.5em\\\">To
        start, why do we need to be different? Time and again, I have witnessed engineers
        knowing what needs to be done yet being unable to get things done because
        of \u201Cthe process\u201D or because \u201Cmore data is needed.\u201D Some
        of the most effective projects have been <em>skunkworks </em>projects, where
        engineers have taken total ownership of a problem and driven it to completion.
        I want to normalize that at Ashby.</p><p style=\\\"min-height:1.5em\\\">When
        we think about how these processes came about, we realize they carry a <em>pessimistic</em>
        mindset. They box people into smaller roles to minimize the chance of not
        meeting a certain standard. At Ashby. we\u2019re building an environment that
        is <em>optimistic </em>about what engineers can own and achieve and embraces
        the innovative engineers (and frankly, often stays out of their way).</p><p
        style=\\\"min-height:1.5em\\\">To accomplish this, our engineering leaders
        need to think deeply about individual performance, process, and culture -
        not running sprint planning or driving product and technical decisions. You\u2019ll
        focus on building your team, their skills to thrive with the ownership they\u2019re
        given, and an environment that empowers them to do their best work consistently,
        with little distraction. For junior EMs we try to stay within 6 direct reports.
        This enables them to spend time with our teams observing, correcting, praising,
        and, yes, coding. We like our managers to be hands-on while also making sure
        they\u2019re not on the critical path.</p><p style=\\\"min-height:1.5em\\\">We\u2019ve
        already gathered an<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/team\\\"> <u>experienced, talented, and collaborative
        team</u></a> of 25+ engineers. You\u2019ll help me manage the growing team
        of engineers in Europe.</p><p style=\\\"min-height:1.5em\\\">In addition to
        working with engineers you\u2019ll also get to work on projects yourselves.
        Some examples of work our engineering leaders have done:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Provide feedback on product and technical specs
        to help engineers identify where to cut scope or improve quality. You don\u2019t
        make the final decisions, but you\u2019ll influence and coach ICs to reach
        the right ones.</p></li><li><p style=\\\"min-height:1.5em\\\">Grow engineers
        to the point where they can take large, loosely defined projects, and deliver
        them with little intervention. They still ask for help when needed - the difference
        is that they\u2019re driving.</p></li><li><p style=\\\"min-height:1.5em\\\">Jump
        into our systems and code to debug a customer issue, ship a small bug fix,
        or improve our developer experience. Engineering leaders at Ashby are great
        engineers and enjoy keeping their skills up-to-date (while staying off the
        critical path).</p></li><li><p style=\\\"min-height:1.5em\\\">Improve how
        we generate and simulate data in demo accounts. It\u2019s a project off the
        critical path, but it helps you keep up-to-date on our codebase while immensely
        impacting the business, from Engineering to QA to Sales.</p><p style=\\\"min-height:1.5em\\\"></p></li></ul><h1>Why
        be a manager?</h1><p style=\\\"min-height:1.5em\\\">I had two experiences
        early in my career that set me on my path. I had a great manager who asked
        tonnes of questions about the decisions I was making and coached me without
        me realizing it. And I had a <em>terrible</em> manager - being told to work
        harder after a week of 3am finishes was not what I needed as a young engineer.
        The stark difference between these two experiences motivated me to become
        a manager: I wanted every engineer I worked with to have the support I had
        in the best case.</p><p style=\\\"min-height:1.5em\\\">Since then, as I\u2019ve
        learned more, I\u2019ve realized that I love the kind of problems I get to
        solve as a manager. Deeply complex problems with long-term impact both on
        the company and on people\u2019s lives. One of my proudest achievements is
        creating a fully transparent pay system, and on the day it was revealed, everybody
        was happy with it. Nobody stormed out. By spending time thinking deeply about
        everybody\u2019s pay and ensuring the mechanics of promotion were clear, I
        put the team in a place where they could see a peer was paid more than them,
        and it not be a problem.</p><p style=\\\"min-height:1.5em\\\">Despite all
        this, I love being technical. I sometimes indulge myself and spend a morning
        writing some code to improve tests or provide better abstractions. If I couldn\u2019t
        be a manager, I\u2019d be super happy to be an IC.</p><p style=\\\"min-height:1.5em\\\">I\u2019m
        looking for someone who is passionate. Passionate about both management and
        being technical. Someone who spots a pattern amongst their team, figures out
        a better way for us to operate, and then builds the automation that powers
        it. I introduced a new process that enables engineers to merge 30% of PRs
        without a human review beforehand. I also built the automation that approves
        these PRs. I <em>also</em> built that automation with abstractions that make
        it easy for the engineers to improve the automation themselves.</p><p style=\\\"min-height:1.5em\\\">It
        can be hard to find seasoned engineering leaders who haven\u2019t succumbed
        to the status quo in some way or another. We're committed to giving all our
        people a total and utter lack of terrible managers, and that means we're willing
        to take a chance on someone early in their leadership journey who's courageous,
        principled, and has the drive to build themselves into a great leader who
        can say \u201CYah I know everyone is doing that, but we won't because...\u201D</p><p
        style=\\\"min-height:1.5em\\\"></p><h1>Why You Should or Shouldn\u2019t Apply</h1><p
        style=\\\"min-height:1.5em\\\">Engineering leadership comes in many flavors,
        not all of which fit our model. I thought I\u2019d outline some things I\u2019m
        looking for to help you decide if this fits what you\u2019re looking for:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><em>You
        love being technical</em> and can hold in-depth conversations with direct
        reports from infra to backend to frontend.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        enjoy management problems</em>. We want people who get <em>excited </em>about
        driving people to be their best, giving difficult feedback, and building systems
        that make this easier</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        hold your team to a high standard</em> and don\u2019t shy away from getting
        into the details and giving feedback, even to the best folks on your team.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>You are an excellent and empathetic communicator.</em>
        Facilitating change at both an individual and organization level requires
        understanding how to navigate the beliefs, opinions, and past experiences
        of engineers and figuring out how to both convince them of a new way of doing
        things while also leaving yourself open to feedback.\_</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        know what exceptional engineers look like.</em> You\u2019ve thought deeply
        about what makes them tick, how to recruit them, and how to grow folks into
        them. I want to see depth here, the industry often regurgitates a vanilla
        description, but the reality is more nuanced.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You\u2019re
        good at thinking about product, business</em>, and maybe even design, but
        you\u2019re not interested in calling the shots and are more interested in
        building a team that can make the best decisions without you.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>You thrive in high-trust, high-autonomy
        environments</em>. We're a young startup where leaders wear multiple hats,
        and you'll build your own (high-speed) on-ramp through developing strong feedback
        loops.</p><p style=\\\"min-height:1.5em\\\"></p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>Put
        another way, you shouldn\u2019t apply if:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You don\u2019t enjoy coding or don\u2019t find
        time to stay up-to-date on technology.</p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019ve
        gotten into management because it was the only growth path available</p></li><li><p
        style=\\\"min-height:1.5em\\\">You want to make all the product decisions
        instead of empowering your team to make those calls.</p></li><li><p style=\\\"min-height:1.5em\\\">You're
        happy with a team of engineers that are predominantly early-career, mid-career,
        or don't thrive with ownership or autonomy. With enough guardrails, the team
        can get things done.</p></li><li><p style=\\\"min-height:1.5em\\\">A staff
        or principal engineer to you is someone who spends most of their time project
        managing or doing architecture reviews.</p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019re
        not optimistic or convinced that we can build a large engineering team that
        functions differently than the status quo. You think, at some size, common
        processes need to be implemented to ensure consistent product delivery (e.g.,
        sprint planning, product managers writing in-depth specifications). You might
        not say it out loud, but you think, at some size, compromises have to be made
        for the sake of hiring numbers.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h1>What
        We\u2019re Building</h1><p style=\\\"min-height:1.5em\\\">Talent teams aspire
        to build a hiring process that identifies great candidates, moves them quickly
        through the interview process, and provides an excellent experience for the
        candidate. To accomplish this, recruiters perform thousands of daily tasks
        to coordinate and relay information between candidates, interviewers, and
        hiring managers. Teams struggle to keep up!</p><p style=\\\"min-height:1.5em\\\">Scheduling
        a final round is an excellent example of our customers' challenges. A recruiter
        needs to collect availability from the candidate, identify potential interviewers,
        perform \u201CCalendar Tetris\u201D to find who is available to interview
        the candidate, schedule on the earliest date possible, and perform any last-minute
        adjustments as availability changes. They must perform this while considering
        the interview load on each individual and whether interviewers need to be
        trained and shadowing others. \U0001F975</p><p style=\\\"min-height:1.5em\\\">Ashby
        provides talent teams with intelligent and powerful software that provides
        insights into where they\u2019re failing and automates or simplifies many
        of the tasks they\u2019re underwater with. We put a lot of effort into designing
        products that are approachable to beginners but mastered and extended by power
        users. In many ways, spreadsheets set the bar here.</p><p style=\\\"min-height:1.5em\\\">We
        have many customers, great revenue growth, years of runway, and amazing investors
        like YCombinator, Elad Gil, and Lachy Groom. I\u2019ll share more once we
        meet.</p><p style=\\\"min-height:1.5em\\\"></p><h1>Engineering Culture</h1><p
        style=\\\"min-height:1.5em\\\">Our engineering culture is motivated by <a
        target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/abhikpramanik/\\\"><u>Abhik</u></a>
        and <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/benjaminencz/\\\"><u>Benji</u></a>\u2019s
        (our co-founders) belief that a small talented team, given the right environment,
        can build high-quality software fast (and work regular hours!).</p><p style=\\\"min-height:1.5em\\\"></p><h2>Collaboration
        is Natural, Communication is Deliberate</h2><p style=\\\"min-height:1.5em\\\">Our
        engineering team (and the team at large) consists of lifelong learners who
        are humble and kind (meet them <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
        nofollow\\\" href=\\\"https://www.ashbyhq.com/team\\\"><u>here</u></a>!).
        These attributes create an environment where collaboration happens naturally
        (we filter for it in interviews). We combine this with research, prototyping,
        and written proposals to see around corners and get feedback from the team
        across time zones. Focus time is something that we hold sacred, and, with
        thoughtful and deliberate communication, engineers can focus 36h out of a
        40h work week (Abhik wrote about it <a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/company/thoughtful-communication\\\"><u>here</u></a>).
        Even managers can rely on getting consistent time (and support to make, if
        necessary) to focus and do creative work without the demand of constant meetings.</p><p
        style=\\\"min-height:1.5em\\\"></p><h2>Increase Leverage, not Team Size</h2><p
        style=\\\"min-height:1.5em\\\">We built Ashby with the quality, breadth, and
        depth that many customers would expect from much larger teams over larger
        time scales. We\u2019ve done this through investment in:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\"><strong>Great developer tooling.</strong> Our
        CI/CD takes ~10m, and we deploy at least 5x a day. Everyone on the team has
        contributed to developer experience \U0001F4AA\U0001F3FE</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Building
        blocks to create powerful and customizable products fast. </strong>At the
        core of Ashby is a set of common components (analytics modeling and query
        language, policy engine, workflow engine, design system) which we are constantly
        improving. Each improvement to a common component cascades throughout our
        app (short video on it <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
        nofollow\\\" href=\\\"https://www.loom.com/share/32c0cc3eedf2450fb66a901b76186ce4\\\"><u>here</u></a>).</p></li></ul><p
        style=\\\"min-height:1.5em\\\">Here\u2019s an impromptu quote from Arjun in
        our company Slack of what it\u2019s like to build a feature at Ashby:</p><p
        style=\\\"min-height:1.5em\\\"></p><div style=\\\"text-align:left\\\"><img
        style=\\\"max-width:100%\\\" src=\\\"https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/8d94727a-46d8-42a2-9627-ddcd7f822f95/arjun.png\\\"
        /></div><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\">And
        a demo of one of these building blocks:</p><div><div style=\\\"left:0;width:100%;height:0;position:relative;padding-bottom:62.5%\\\"><iframe
        src=\\\"https://embedded-media.ashbyhq.com/embed/4ea5f68e-c33e-4ac9-831a-e732bee4a303/9a5f032d-c731-411e-98cf-261517156f01\\\"
        style=\\\"top:0;left:0;width:100%;height:100%;position:absolute;border:0\\\"
        allowfullscreen scrolling=\\\"no\\\" allow=\\\"encrypted-media *; picture-in-picture
        *;\\\" sandbox=\\\"allow-scripts allow-same-origin allow-presentation\\\"></iframe></div></div><h2></h2><h2>Give
        Engineers Ownership &amp; Autonomy</h2><p style=\\\"min-height:1.5em\\\">We,
        as engineers, find clever ways to solve problems, which amplifies when we
        deeply understand the problem. All of us in technical leadership did our best
        work as engineers when we had a deep understanding of the end-user and the
        business and ownership over the solution. Our engineering culture reflects
        this experience: engineers own projects end-to-end, from speaking with users
        to writing product specs to UX design. These are skills that we often don\u2019t
        get to practice as engineers, and, as a manager at Ashby, you\u2019ll provide
        mentorship and feedback to engineers to ensure they are successful when delivering
        projects.</p><p style=\\\"min-height:1.5em\\\"></p><h2>Put Effort into Diversity\_</h2><p
        style=\\\"min-height:1.5em\\\">Diverse teams<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://hbr.org/2016/11/why-diverse-teams-are-smarter\\\">
        <u>drive innovation and better outcomes</u></a>. As the father of two young
        girls, I want to see them grow up in a world where all industries are open
        <em>and welcoming</em> to everyone, regardless of race, gender, or preferences.
        Helping to build a more diverse team at Ashby is my way of contributing to
        this change.</p><p style=\\\"min-height:1.5em\\\">Today, 26% of engineers
        at Ashby are from underrepresented groups. It\u2019s not great, and we are
        taking conscious steps to improve, like sourcing diverse candidates, providing
        generous paid family leave, no leetcode interviews, and more.</p><p style=\\\"min-height:1.5em\\\"></p><h1>Interview
        Process</h1><p style=\\\"min-height:1.5em\\\">At Ashby, our team and interview
        process want to help you show your best self. We\u2019ll dive into past projects
        and simulate working together. Our interview process is six interviews in
        the following order:\_</p><ol style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><em>Intro
        Call (30m)</em> - Discuss your application questions, align on the responsibilities
        of the role, and answer questions about Ashby.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>Past
        Experience Deep Dive (1h)</em> - Discuss your past experience as an engineering
        leader.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>Technical Screen
        (1h)</em> - Add a feature back to Ashby. You'll spend most of your time understanding
        a specific part of our codebase and write less than 15 lines of code.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>Coffee Chat with VP of Engineering (1h)</em>
        - Spend time with our VP of Engineering and get to know each other.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>Meet the Team (2h)</em> - At this point,
        the engineering leadership team is excited about you and you'll meet our CEO,
        Engineers, Product Managers, and some other folks on the team.</p></li></ol><p
        style=\\\"min-height:1.5em\\\">I will be your main point of contact and prepare
        you for interviews. If we don\u2019t give an offer, we\u2019ll provide feedback!</p><p
        style=\\\"min-height:1.5em\\\"></p><h1>Technology Stack</h1><p style=\\\"min-height:1.5em\\\">I\u2019m
        sharing our tech stack with the caveat that we don\u2019t require previous
        experience: TypeScript (frontend &amp; backend), Node.js, React, Apollo GraphQL,
        Postgres, Redis.</p><p style=\\\"min-height:1.5em\\\"></p><h1>Benefits</h1><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Competitive
        salary and equity.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>10-year
        exercise window for stock options</em>. You shouldn\u2019t feel pressure to
        purchase stock options if you leave Ashby \u2014do it when you feel financially
        comfortable.</p></li><li><p style=\\\"min-height:1.5em\\\">Unlimited PTO with
        four weeks recommended per year. Expect \u201CVacation?\u201D in our one-on-one
        agenda until you start taking it \U0001F605.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li></ul><p style=\\\"min-height:1.5em\\\">Ashby\u2019s
        success hinges on hiring great people and creating an environment where we
        can be happy, feel challenged, and do our best work. We\u2019re being deliberate
        about building that environment from the ground up. I hope that excites you
        enough to apply.</p><p style=\\\"min-height:1.5em\\\"><em>Ashby provides equal
        employment opportunities (EEO) to all employees and applicants for employment
        without regard to race, color, religion, sex, national origin, age, disability,
        genetics, sexual orientation, gender identity, or gender expression. We are
        committed to a diverse and inclusive workforce and welcome people from all
        backgrounds, experiences, perspectives, and abilities.</em></p><p style=\\\"min-height:1.5em\\\"><em>Ashby
        is committed to a fair and transparent hiring process. We confirm that this
        advertisement is for an active, existing vacancy within our organization.
        Please be advised that we may use artificial intelligence-driven tools to
        assist our recruitment team in screening, assessing, and selecting candidates
        for this position.</em></p>\",\"descriptionPlain\":\"Hi \U0001F44B I\u2019m
        Colin https://uk.linkedin.com/in/colinhoweuk, Director of Engineering, Europe.
        How do you feel about software engineers writing product specs, making product
        decisions, and not breaking down projects into individual tickets? If that
        sounds exciting (even if a bit scary), read on because I\u2019m looking for
        an engineering manager to help us build a different type of engineering team
        and culture at Ashby.\\n\\nTo start, why do we need to be different? Time
        and again, I have witnessed engineers knowing what needs to be done yet being
        unable to get things done because of \u201Cthe process\u201D or because \u201Cmore
        data is needed.\u201D Some of the most effective projects have been skunkworks
        projects, where engineers have taken total ownership of a problem and driven
        it to completion. I want to normalize that at Ashby.\\n\\nWhen we think about
        how these processes came about, we realize they carry a pessimistic mindset.
        They box people into smaller roles to minimize the chance of not meeting a
        certain standard. At Ashby. we\u2019re building an environment that is optimistic
        about what engineers can own and achieve and embraces the innovative engineers
        (and frankly, often stays out of their way).\\n\\nTo accomplish this, our
        engineering leaders need to think deeply about individual performance, process,
        and culture - not running sprint planning or driving product and technical
        decisions. You\u2019ll focus on building your team, their skills to thrive
        with the ownership they\u2019re given, and an environment that empowers them
        to do their best work consistently, with little distraction. For junior EMs
        we try to stay within 6 direct reports. This enables them to spend time with
        our teams observing, correcting, praising, and, yes, coding. We like our managers
        to be hands-on while also making sure they\u2019re not on the critical path.\\n\\nWe\u2019ve
        already gathered an experienced, talented, and collaborative team https://www.ashbyhq.com/team
        of 25+ engineers. You\u2019ll help me manage the growing team of engineers
        in Europe.\\n\\nIn addition to working with engineers you\u2019ll also get
        to work on projects yourselves. Some examples of work our engineering leaders
        have done:\\n\\n - Provide feedback on product and technical specs to help
        engineers identify where to cut scope or improve quality. You don\u2019t make
        the final decisions, but you\u2019ll influence and coach ICs to reach the
        right ones.\\n\\n - Grow engineers to the point where they can take large,
        loosely defined projects, and deliver them with little intervention. They
        still ask for help when needed - the difference is that they\u2019re driving.\\n\\n
        - Jump into our systems and code to debug a customer issue, ship a small bug
        fix, or improve our developer experience. Engineering leaders at Ashby are
        great engineers and enjoy keeping their skills up-to-date (while staying off
        the critical path).\\n\\n - Improve how we generate and simulate data in demo
        accounts. It\u2019s a project off the critical path, but it helps you keep
        up-to-date on our codebase while immensely impacting the business, from Engineering
        to QA to Sales.\\n   \\n   \\n\\n\\nWHY BE A MANAGER?\\n\\nI had two experiences
        early in my career that set me on my path. I had a great manager who asked
        tonnes of questions about the decisions I was making and coached me without
        me realizing it. And I had a terrible manager - being told to work harder
        after a week of 3am finishes was not what I needed as a young engineer. The
        stark difference between these two experiences motivated me to become a manager:
        I wanted every engineer I worked with to have the support I had in the best
        case.\\n\\nSince then, as I\u2019ve learned more, I\u2019ve realized that
        I love the kind of problems I get to solve as a manager. Deeply complex problems
        with long-term impact both on the company and on people\u2019s lives. One
        of my proudest achievements is creating a fully transparent pay system, and
        on the day it was revealed, everybody was happy with it. Nobody stormed out.
        By spending time thinking deeply about everybody\u2019s pay and ensuring the
        mechanics of promotion were clear, I put the team in a place where they could
        see a peer was paid more than them, and it not be a problem.\\n\\nDespite
        all this, I love being technical. I sometimes indulge myself and spend a morning
        writing some code to improve tests or provide better abstractions. If I couldn\u2019t
        be a manager, I\u2019d be super happy to be an IC.\\n\\nI\u2019m looking for
        someone who is passionate. Passionate about both management and being technical.
        Someone who spots a pattern amongst their team, figures out a better way for
        us to operate, and then builds the automation that powers it. I introduced
        a new process that enables engineers to merge 30% of PRs without a human review
        beforehand. I also built the automation that approves these PRs. I also built
        that automation with abstractions that make it easy for the engineers to improve
        the automation themselves.\\n\\nIt can be hard to find seasoned engineering
        leaders who haven\u2019t succumbed to the status quo in some way or another.
        We're committed to giving all our people a total and utter lack of terrible
        managers, and that means we're willing to take a chance on someone early in
        their leadership journey who's courageous, principled, and has the drive to
        build themselves into a great leader who can say \u201CYah I know everyone
        is doing that, but we won't because...\u201D\\n\\n\\n\\n\\nWHY YOU SHOULD
        OR SHOULDN\u2019T APPLY\\n\\nEngineering leadership comes in many flavors,
        not all of which fit our model. I thought I\u2019d outline some things I\u2019m
        looking for to help you decide if this fits what you\u2019re looking for:\\n\\n
        - You love being technical and can hold in-depth conversations with direct
        reports from infra to backend to frontend.\\n\\n - You enjoy management problems.
        We want people who get excited about driving people to be their best, giving
        difficult feedback, and building systems that make this easier\\n\\n - You
        hold your team to a high standard and don\u2019t shy away from getting into
        the details and giving feedback, even to the best folks on your team.\\n\\n
        - You are an excellent and empathetic communicator. Facilitating change at
        both an individual and organization level requires understanding how to navigate
        the beliefs, opinions, and past experiences of engineers and figuring out
        how to both convince them of a new way of doing things while also leaving
        yourself open to feedback.\_\\n\\n - You know what exceptional engineers look
        like. You\u2019ve thought deeply about what makes them tick, how to recruit
        them, and how to grow folks into them. I want to see depth here, the industry
        often regurgitates a vanilla description, but the reality is more nuanced.\\n\\n
        - You\u2019re good at thinking about product, business, and maybe even design,
        but you\u2019re not interested in calling the shots and are more interested
        in building a team that can make the best decisions without you.\\n\\n - You
        thrive in high-trust, high-autonomy environments. We're a young startup where
        leaders wear multiple hats, and you'll build your own (high-speed) on-ramp
        through developing strong feedback loops.\\n   \\n   \\n\\nPut another way,
        you shouldn\u2019t apply if:\\n\\n - You don\u2019t enjoy coding or don\u2019t
        find time to stay up-to-date on technology.\\n\\n - You\u2019ve gotten into
        management because it was the only growth path available\\n\\n - You want
        to make all the product decisions instead of empowering your team to make
        those calls.\\n\\n - You're happy with a team of engineers that are predominantly
        early-career, mid-career, or don't thrive with ownership or autonomy. With
        enough guardrails, the team can get things done.\\n\\n - A staff or principal
        engineer to you is someone who spends most of their time project managing
        or doing architecture reviews.\\n\\n - You\u2019re not optimistic or convinced
        that we can build a large engineering team that functions differently than
        the status quo. You think, at some size, common processes need to be implemented
        to ensure consistent product delivery (e.g., sprint planning, product managers
        writing in-depth specifications). You might not say it out loud, but you think,
        at some size, compromises have to be made for the sake of hiring numbers.\\n\\n\\n\\n\\nWHAT
        WE\u2019RE BUILDING\\n\\nTalent teams aspire to build a hiring process that
        identifies great candidates, moves them quickly through the interview process,
        and provides an excellent experience for the candidate. To accomplish this,
        recruiters perform thousands of daily tasks to coordinate and relay information
        between candidates, interviewers, and hiring managers. Teams struggle to keep
        up!\\n\\nScheduling a final round is an excellent example of our customers'
        challenges. A recruiter needs to collect availability from the candidate,
        identify potential interviewers, perform \u201CCalendar Tetris\u201D to find
        who is available to interview the candidate, schedule on the earliest date
        possible, and perform any last-minute adjustments as availability changes.
        They must perform this while considering the interview load on each individual
        and whether interviewers need to be trained and shadowing others. \U0001F975\\n\\nAshby
        provides talent teams with intelligent and powerful software that provides
        insights into where they\u2019re failing and automates or simplifies many
        of the tasks they\u2019re underwater with. We put a lot of effort into designing
        products that are approachable to beginners but mastered and extended by power
        users. In many ways, spreadsheets set the bar here.\\n\\nWe have many customers,
        great revenue growth, years of runway, and amazing investors like YCombinator,
        Elad Gil, and Lachy Groom. I\u2019ll share more once we meet.\\n\\n\\n\\n\\nENGINEERING
        CULTURE\\n\\nOur engineering culture is motivated by Abhik https://www.linkedin.com/in/abhikpramanik/
        and Benji https://www.linkedin.com/in/benjaminencz/\u2019s (our co-founders)
        belief that a small talented team, given the right environment, can build
        high-quality software fast (and work regular hours!).\\n\\n\\n\\n\\nCOLLABORATION
        IS NATURAL, COMMUNICATION IS DELIBERATE\\n\\nOur engineering team (and the
        team at large) consists of lifelong learners who are humble and kind (meet
        them here https://www.ashbyhq.com/team!). These attributes create an environment
        where collaboration happens naturally (we filter for it in interviews). We
        combine this with research, prototyping, and written proposals to see around
        corners and get feedback from the team across time zones. Focus time is something
        that we hold sacred, and, with thoughtful and deliberate communication, engineers
        can focus 36h out of a 40h work week (Abhik wrote about it here https://www.ashbyhq.com/blog/company/thoughtful-communication).
        Even managers can rely on getting consistent time (and support to make, if
        necessary) to focus and do creative work without the demand of constant meetings.\\n\\n\\n\\n\\nINCREASE
        LEVERAGE, NOT TEAM SIZE\\n\\nWe built Ashby with the quality, breadth, and
        depth that many customers would expect from much larger teams over larger
        time scales. We\u2019ve done this through investment in:\\n\\n - Great developer
        tooling. Our CI/CD takes ~10m, and we deploy at least 5x a day. Everyone on
        the team has contributed to developer experience \U0001F4AA\U0001F3FE\\n\\n
        - Building blocks to create powerful and customizable products fast. At the
        core of Ashby is a set of common components (analytics modeling and query
        language, policy engine, workflow engine, design system) which we are constantly
        improving. Each improvement to a common component cascades throughout our
        app (short video on it here https://www.loom.com/share/32c0cc3eedf2450fb66a901b76186ce4).\\n\\nHere\u2019s
        an impromptu quote from Arjun in our company Slack of what it\u2019s like
        to build a feature at Ashby:\\n\\n\\n\\n[https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/8d94727a-46d8-42a2-9627-ddcd7f822f95/arjun.png]\\n\\n\\n\\nAnd
        a demo of one of these building blocks:\\n\\n\\n\\n\\n\\n\\n\\nGIVE ENGINEERS
        OWNERSHIP & AUTONOMY\\n\\nWe, as engineers, find clever ways to solve problems,
        which amplifies when we deeply understand the problem. All of us in technical
        leadership did our best work as engineers when we had a deep understanding
        of the end-user and the business and ownership over the solution. Our engineering
        culture reflects this experience: engineers own projects end-to-end, from
        speaking with users to writing product specs to UX design. These are skills
        that we often don\u2019t get to practice as engineers, and, as a manager at
        Ashby, you\u2019ll provide mentorship and feedback to engineers to ensure
        they are successful when delivering projects.\\n\\n\\n\\n\\nPUT EFFORT INTO
        DIVERSITY\_\\n\\nDiverse teams drive innovation and better outcomes https://hbr.org/2016/11/why-diverse-teams-are-smarter.
        As the father of two young girls, I want to see them grow up in a world where
        all industries are open and welcoming to everyone, regardless of race, gender,
        or preferences. Helping to build a more diverse team at Ashby is my way of
        contributing to this change.\\n\\nToday, 26% of engineers at Ashby are from
        underrepresented groups. It\u2019s not great, and we are taking conscious
        steps to improve, like sourcing diverse candidates, providing generous paid
        family leave, no leetcode interviews, and more.\\n\\n\\n\\n\\nINTERVIEW PROCESS\\n\\nAt
        Ashby, our team and interview process want to help you show your best self.
        We\u2019ll dive into past projects and simulate working together. Our interview
        process is six interviews in the following order:\_\\n\\n 1. Intro Call (30m)
        - Discuss your application questions, align on the responsibilities of the
        role, and answer questions about Ashby.\\n\\n 2. Past Experience Deep Dive
        (1h) - Discuss your past experience as an engineering leader.\\n\\n 3. Technical
        Screen (1h) - Add a feature back to Ashby. You'll spend most of your time
        understanding a specific part of our codebase and write less than 15 lines
        of code.\\n\\n 4. Coffee Chat with VP of Engineering (1h) - Spend time with
        our VP of Engineering and get to know each other.\\n\\n 5. Meet the Team (2h)
        - At this point, the engineering leadership team is excited about you and
        you'll meet our CEO, Engineers, Product Managers, and some other folks on
        the team.\\n\\nI will be your main point of contact and prepare you for interviews.
        If we don\u2019t give an offer, we\u2019ll provide feedback!\\n\\n\\n\\n\\nTECHNOLOGY
        STACK\\n\\nI\u2019m sharing our tech stack with the caveat that we don\u2019t
        require previous experience: TypeScript (frontend & backend), Node.js, React,
        Apollo GraphQL, Postgres, Redis.\\n\\n\\n\\n\\nBENEFITS\\n\\n - Competitive
        salary and equity.\\n\\n - 10-year exercise window for stock options. You
        shouldn\u2019t feel pressure to purchase stock options if you leave Ashby
        \u2014do it when you feel financially comfortable.\\n\\n - Unlimited PTO with
        four weeks recommended per year. Expect \u201CVacation?\u201D in our one-on-one
        agenda until you start taking it \U0001F605.\\n\\n - Generous equipment, software,
        and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
        covered with manager approval.\\n\\nAshby\u2019s success hinges on hiring
        great people and creating an environment where we can be happy, feel challenged,
        and do our best work. We\u2019re being deliberate about building that environment
        from the ground up. I hope that excites you enough to apply.\\n\\nAshby provides
