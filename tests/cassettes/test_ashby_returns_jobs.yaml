        Lake City\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Utah\",\"addressCountry\":\"USA\",\"addressLocality\":\"Salt
        Lake City\"}}},{\"location\":\"Calgary\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Alberta\",\"addressCountry\":\"Canada\",\"addressLocality\":\"Calgary\"}}},{\"location\":\"Toronto\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Ontario\",\"addressCountry\":\"Canada\",\"addressLocality\":\"Toronto\"}}},{\"location\":\"Edmonton\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Alberta\",\"addressCountry\":\"Canada\",\"addressLocality\":\"Edmonton\"}}},{\"location\":\"Vancouver\",\"address\":{\"postalAddress\":{\"addressRegion\":\"British
        Columbia\",\"addressCountry\":\"Canada\",\"addressLocality\":\"Vancouver\"}}},{\"location\":\"Montreal\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Quebec\",\"addressCountry\":\"Canada\",\"addressLocality\":\"Montreal\"}}},{\"location\":\"Waterloo\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Ontario\",\"addressCountry\":\"Canada\",\"addressLocality\":\"Waterloo\"}}},{\"location\":\"Chicago\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Illinois\",\"addressCountry\":\"USA\",\"addressLocality\":\"Chicago\"}}},{\"location\":\"Portland\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Oregon\",\"addressCountry\":\"USA\",\"addressLocality\":\"Portland\"}}},{\"location\":\"Austin\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Texas\",\"addressCountry\":\"USA\",\"addressLocality\":\"Austin\"}}}],\"publishedAt\":\"2026-05-21T20:12:31.018+00:00\",\"isListed\":true,\"isRemote\":true,\"workplaceType\":\"Remote\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"United
        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/e5863f7c-2238-410f-9a72-d40c944d2511\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/e5863f7c-2238-410f-9a72-d40c944d2511/application\",\"descriptionHtml\":\"<h2>About
        this role</h2><p style=\\\"min-height:1.5em\\\">As Ashby's first dedicated
        Value Consultant, you'll own how we sell value \u2014 full stop. You'll sit
        within the Solutions Engineering team and be the architect of our value selling
        motion: building and refining the frameworks, tooling, and impact assessments
        that help prospects understand exactly what Ashby can mean for their business.
        While SEs operate within that framework, you'll be the one defining it.</p><p
        style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\">Your
        work will be split roughly 80/20 between pre-sales and post-sales. On the
        pre-sales side, you'll partner closely with SEs to support our most strategic
        opportunities in the Enterprise segment \u2014 sometimes working behind the
        scenes to craft a compelling business case, and sometimes stepping into the
        room yourself as the face of value consulting for executive-level conversations.
        On the post-sales side, you'll work with our Customer Success team to ensure
        we're delivering on the outcomes we promised and helping customers realize
        the value of their investment in Ashby. Your work will directly influence
        not just how we win deals, but how we retain and grow customers by making
        value visible and undeniable.</p><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\">You'll be brought into deals at the consensus-building
        stage, where it matters most. That means you'll need to be sharp on discovery,
        credible with senior stakeholders, and able to translate complex buying dynamics
        into clear, customer-specific narratives about impact.</p><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\">This is a rare opportunity to define something
        from the ground up at a company with exceptional product-market fit. We have
        the foundation \u2014 impact assessment tools, early frameworks, a team of
        SEs who are eager to lean on you \u2014 and we need someone to take it to
        the next level.</p><p style=\\\"min-height:1.5em\\\"></p><h2>You could be
        a great fit if:</h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F4A1
        <strong>You have 5+ years of dedicated value consulting or value engineering
        experience in SaaS.</strong> You've done this before, and you know what good
        looks like. You can operate with significant autonomy and don't need a playbook
        handed to you.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3D7 <strong>You're
        a builder.</strong> You'll be the first person in this role, which means you'll
        be shaping the function as much as filling it. You get energy from creating
        structure where there isn't any.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3AF
        <strong>You think in outcomes, not features.</strong> When you look at a customer's
        business, you see the levers that matter \u2014 and you can quantify and communicate
        them in a way that resonates with a CFO and a Head of Talent alike.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F91D <strong>You know how to enable others.</strong>
        You'll be the expert, but your impact scales through SEs and CSMs. You're
        as comfortable coaching a team as you are running a room yourself.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4E3 <strong>You're an exceptional communicator.</strong>
        You can read the room, ask precise questions, and simplify complex concepts
        without losing nuance. Executive conversations energize you rather than intimidate
        you.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F499 <strong>You
        have genuine empathy for Talent Acquisition teams.</strong> You understand
        the pressures they face, the data they care about, and the outcomes that move
        the needle for them.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F501
        <strong>You're a strong cross-functional partner.</strong> You'll need to
        work seamlessly with SEs, CSMs, and occasionally the product org \u2014 translating
        customer feedback into insights that improve how we sell and what we build.</p></li></ul><h2>Bonus
        points for:</h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F91D
        Prior experience as a Solutions Engineer or management consultant \u2014 you
        know what the other side of the table looks like</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4CA
        Familiarity with HR tech or Applicant Tracking Systems \u2014 understanding
        recruiting workflows gives you a head start</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F6E0
        Experience building or improving impact assessment tooling and processes from
        the ground up</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4C8 A track
        record of tying value consulting work to measurable revenue or retention outcomes</p></li></ul><h2>Examples
        of things you'll work on:</h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F4B0
        <strong>Own and evolve our impact assessment process</strong> \u2014 improve
        the tools, refine the methodology, and make sure every assessment we deliver
        is compelling, credible, and customer-specific</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3A8
        <strong>Define Ashby's value selling motion</strong> \u2014 build the frameworks,
        templates, and messaging that SEs use when engaging on value across the entire
        sales funnel</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F9D1\u200D\U0001F4BC
        <strong>Lead executive-level value conversations</strong> on our most strategic
        deals \u2014 bring the business case to life for the people who sign the check</p></li><li><p
        style=\\\"min-height:1.5em\\\">\u2699\uFE0F <strong>Enable the SE and CSM
        teams</strong> \u2014 run training, create resources, and act as the internal
        subject matter expert on value consulting so the whole team gets sharper over
        time</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F501 <strong>Partner
        with CS on value realization</strong> \u2014 make sure customers can connect
        the outcomes they expected to the results they're seeing after they go live;
        elevating from TA results to overarching business priorities</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F52C <strong>Test and refine messaging
        on larger deals</strong> \u2014 use strategic opportunities as a proving ground
        to sharpen how we talk about Ashby's impact</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2>Why
        become a Value Consultant at Ashby?</h2><p style=\\\"min-height:1.5em\\\">There
        are a lot of value consulting roles out there. Here's what makes this one
        different:</p><p style=\\\"min-height:1.5em\\\"></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\"><strong>The product makes your job easier.</strong>
        When you're building a business case for Ashby, you're not stretching to find
        value \u2014 it's genuinely there. Customers see real, measurable improvements
        in how they hire. That makes every impact assessment feel honest rather than
        aspirational.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>You'll
        define something, not just do it.</strong> Most value consulting roles put
        you inside a mature function with established playbooks. Here, you'll be the
        one writing the playbook. What you build will be felt across every deal we
        run.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>You'll be working
        with a world-class team.</strong> The Ashby team is sharp, collaborative,
        and invested in getting better. They want a strong value partner \u2014 someone
        who can help them have more impactful conversations and win more strategic
        deals.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>The market is
        genuinely underserved.</strong> Talent Acquisition software has lagged behind
        the needs of modern hiring teams for years. Ashby is changing that, and every
        impact assessment you deliver is a chance to show a prospect what's actually
        possible.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Your work
