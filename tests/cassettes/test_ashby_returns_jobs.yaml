        channels) - we\u2019ll get into these and other values during the hiring process.
        You can take a look at our <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
        nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-operating-principles\\\"><u>Operating
        Principles</u></a> to get a sense of what we are looking for in folks on the
        team.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>The Interview</strong></h2><p
