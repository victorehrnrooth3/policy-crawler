        two GTM leaders</p></li><li><p style=\\\"min-height:1.5em\\\">30 min to Meet
        the Team</p></li><li><p style=\\\"min-height:1.5em\\\">30 mins Sourcing +
        RecOps focused interview with<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
