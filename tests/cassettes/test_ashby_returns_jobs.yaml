        style=\\\"min-height:1.5em\\\"><em>Hi! I'm John, Ashby's Head of Professional
        Services. One of my favorite aspects of Ashby is our operating principle of</em><a
        target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-operating-principles#8---implement-continuous-improvement\\\"><em>
        <u>Continuous Improvement</u></em></a><em>. Coupled with our principle of
        caring deeply about our customers, we often find ourselves wondering \u2018what
        is a better way to accomplish this\u2019. That\u2019s why I am thrilled to
        be hiring our next Integrations Consultant!  As the third member of our Integrations
        Consulting team (within Ashby\u2019s Customer Success organization) and first
        in the EMEA region, you\u2019ll have the opportunity to lead customer-facing
        engagements, focusing on complex technical projects for some of our most strategic
        customers.</em></p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        this role:</strong></h2><p style=\\\"min-height:1.5em\\\">As our next Integrations
        Consultant, you\u2019ll be responsible for defining, advising on, and managing
        the technical requirements for enterprise customers integrating their Ashby
        ATS instance with our custom-built Workday API. As additional enterprise HCM
        integrations ship, you may also act as the technical subject matter expert
        for implementing customers. No matter the integration point, you will work
        with customers with varying levels of integration sophistication advising
        on integration best practices, technical configurations, and working with
        a customer\u2019s internal expert on how to best achieve their goals. You
        will use your existing knowledge of both integrations and the products we
        will be integrating with to consult with our customers, helping them get up
        and running swiftly with Ashby, so they can ultimately achieve their desired
        business outcomes. You will partner with Product/Engineering, Implementation
        Specialists, CSMs, Sales Engineers, and other cross functional partners to
        achieve this.</p><p style=\\\"min-height:1.5em\\\"><strong>Role requirements:</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Workday
        Human Capital Management (HCM) Integration Experience: </strong>You have extensive
        experience managing and executing integrations with Workday Core HCM (defining
        the work, aligning with stakeholders, communicating the project plan, and
        ultimately delivering results in accordance with the agreed upon expectations).
        You keep the team on track to ensure milestones are met. Bonus points if you
        have a Workday HCM certification, or experience with Workday Recruiting or
        other enterprise-grade HCM solutions like UKG, ADP, Oracle, and SAP SuccessFactors.
        Even better if you\u2019ve also managed integrations with tools listed under
        Integrations on our <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://docs.ashbyhq.com/\\\"><u>Ashby Knowledge Base</u></a>. Workday
        Studio expertise is not required.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Customer
        Centricity:</strong> You are adept at understanding customer needs and tailoring
        implementations to meet their specific requirements.  You build strong customer
        relationships by maintaining high levels of engagement and communication;
        you\u2019re the customer\u2019s proactive guide and advocate throughout the
        implementation period.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Change
        Management:</strong> You are experienced in navigating change management processes
        and helping customers adapt to new systems and a refreshed approach.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Technical Proficiency: </strong>You
        have a solid understanding of a complex product (ideally Ashby) and its technical
        intricacies; you are technically curious and creative.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Consultative:
        </strong>You take pride in advising customers on best practices specific to
        their usage of software to ensure optimal value.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Innovative
        &amp; Principled: </strong>You proactively address thematic customer opportunities
        and improve our processes accordingly.  You don\u2019t rely on \u2018I\u2019ve
        seen this done\u2019 but instead think critically to solve problems.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Cross-functional Collaboration: </strong>You
        effectively partner with cross-functional stakeholders across Customer Success,
        Sales, Product, Engineering, and Operations to align and define progress.</p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>You could be a great fit if:</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\u2699\uFE0FTechnical
