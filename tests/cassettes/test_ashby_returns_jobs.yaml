        Ashby</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We\u2019re
        building the next generation of enterprise software, starting with products
        that help talent leaders, recruiters, and managers unlock hiring excellence</p></li><li><p
        style=\\\"min-height:1.5em\\\">Series D raised in 2025, and growing ARR &gt;100%
        YoY</p></li><li><p style=\\\"min-height:1.5em\\\">Have thousands of amazing
        customers including OpenAI, Deliveroo, Lemonade &amp; Alan</p></li><li><p
        style=\\\"min-height:1.5em\\\">Multiple products to win both land-and-expand
        and material new business deals</p></li><li><p style=\\\"min-height:1.5em\\\">Rapidly
        moving up-market with no signs of slowing down</p></li><li><p style=\\\"min-height:1.5em\\\"><a
        target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/recruiting/ai-assisted-application-review-in-practice\\\"><u>Implemented
        assistive AI</u></a> throughout the platform</p></li><li><p style=\\\"min-height:1.5em\\\">Known
        for our pace of innovation and advanced analytics</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        this Role</strong></h2><p style=\\\"min-height:1.5em\\\">We are seeking a
        French-fluent Mid-Market Account Executive to help us win Mid-Market accounts
        (100-1k employees) by managing the full sales cycle from pipeline generation
        through to closed-won.</p><p style=\\\"min-height:1.5em\\\">In this role,
        you'll focus on new logo acquisition. Our emphasis is on your raw ability
        to excel in the areas listed below and your appetite for continuous growth
        &amp; improvement.</p><p style=\\\"min-height:1.5em\\\"></p><h3><strong>You
        could be a great fit if:</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4E3 You demonstrate mastery of clear
        communication. You ask questions with precision and can explain complex concepts
        in simple terms.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4B0
        You have strong track record in Mid Market SaaS sales, having closed many
        $50k+ deals consistently. You have won competitive rip-and-replace opportunities
        of core/platform technologies.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3AF
        You are proactive in identifying and pursuing new business opportunities,
        and are comfortable sourcing &gt;50% of your own pipeline. You're both resourceful
        and innovative in finding new business opportunities.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F913
        You love becoming a product and industry expert. You're adept at delivering
        a quick demo to showcase how your solution meets a unique need.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\u2694\uFE0F You're adept at competitive or
        evangelical selling in new or established markets.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3A7
        You're naturally curious about business problems and take pride in positioning
        specific &amp; creative solutions that solve those problems.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F3D4\uFE0F You skillfully guide prospects
        through the evaluation &amp; buying process\u2014engaging the right stakeholders
        to create consensus for a strategic technology decision.</p></li><li><p style=\\\"min-height:1.5em\\\">\u26A1\uFE0F
        Your peers describe you as action-oriented and persistent. You're always on
        the leaderboard for outbound effort and pipeline created.</p></li><li><p style=\\\"min-height:1.5em\\\">\u23F1\uFE0F
        You leverage tools to maximize the impact of your prospecting and selling
        time. You believe in research and personalization to spark a conversation.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\u2699\uFE0F You are at home managing a pipeline
        of a dozen or more active opportunities concurrently. You take pride in internal
        operations, including real-time CRM updates.</p></li><li><p style=\\\"min-height:1.5em\\\">\u2708\uFE0F
        You are willing to travel at least 25% of the time for customer engagements
        and events.</p></li></ul><h3><strong>Requirements:</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\U0001F91D You have 2+ years of full-cycle
        closing experience and have closed many &gt;$50,000 ACV opportunities</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4E2 You have experience selling complex
        platform technologies in a sales-led GTM motion</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4C8
        You are a new business hunter and are confident in your abilities to self-source
        &gt;50% of your own pipeline</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F30D
        You have sold to multiple regions within EMEA and have strong written and
        verbal fluency in both English and French</p></li></ul><h3><strong>Bonus Points:</strong></h3><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F91D
        You have sold to Talent or HR personas</p></li><li><p style=\\\"min-height:1.5em\\\">\u260E\uFE0F
        Prior B/SDR experience</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h3><strong>You
        shouldn't apply if:</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4BC You're more of a relationship builder
        who focuses on selling into the install base and aren't excited about a new
        business focused role.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3AF
        You expect Marketing or BDRs to source all of your pipeline for you. This
        is a hunting role.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4BB
        You believe that \\\"tech stuff\\\" is the SE's job. Our AEs all develop product
        acumen while SEs are a partner in our team selling motion.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4CA You prefer to run established playbooks
        in well defined environments. This role requires creativity and a growth mindset.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F43A You're a lone wolf. You prefer to
        go it alone in your pursuit of new business. We believe in a team-selling
        sales model.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Our
        Philosophy</strong></h2><p style=\\\"min-height:1.5em\\\">Here are a few key
        points (relevant to the go-to-market side) that should give you an idea of
        what it is like to work with us:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">We spend a lot of time building best-in-class
        products since we believe a highly differentiated product is easier to sell.</p></li><li><p
        style=\\\"min-height:1.5em\\\">We aim to offer deep product expertise whenever
        we interact with prospects and customers. AEs are no exception to this.</p></li><li><p
        style=\\\"min-height:1.5em\\\">We strongly believe that small teams with very
        talented people (and the right work environment) deliver much better performance
        than teams with large headcount. We hire and compensate accordingly.</p></li><li><p
        style=\\\"min-height:1.5em\\\">We value a strong sense of ownership, principled
        thinking over experience, and thoughtful communication.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\"><strong>Interview Process</strong></p><p style=\\\"min-height:1.5em\\\">Our
        interview process is designed so you can showcase your achievements and points
        of learning and apply those in a practical exercise. We'll provide you with
        Mid Market Account Executive info so you can develop a well informed perspective
        on our customer / sales motion. You\u2019ll have opportunities to ask questions
        of our team throughout.</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Intro
        Call</strong> (30 min) - You'll meet with a Recruiter to discuss your fit
        for the role and address questions about our market and solution.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Written Exercise - </strong>You'll
        complete a short take home assignment to showcase your outbound muscle.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Experience Deep Dive </strong>(60 min)
        - You'll walk the Hiring Manager [<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/ashbyemea/\\\"><u>Casper
        Bergmans</u></a>] through your career journey in some detail to highlight
        your experience, achievements, and points of learning to understand how you've
        developed into the professional you are today.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Challenge
        Interview</strong> (90 min) - This will be made up of two parts:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Discovery and Demo Role Play (60 min)</p></li><li><p
        style=\\\"min-height:1.5em\\\">Deal Strategy Discussion (30 min)</p></li></ul></li></ul><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Benefits</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Sell a product that our<a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/customers\\\">
        <u>customers are truly excited about</u></a>.</p></li><li><p style=\\\"min-height:1.5em\\\">Fairly
        set, achievable quotas. Typically, greater than 65% of AEs are at or above
        quota.</p></li><li><p style=\\\"min-height:1.5em\\\">Unlimited PTO with four
        weeks recommended per year</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\"><em>10-year
        exercise window for stock options</em>. You shouldn\u2019t feel pressure to
        purchase stock options if you leave Ashby \u2014do it when you feel financially
        comfortable.</p></li><li><p style=\\\"min-height:1.5em\\\">\uFFE1/\u20AC100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li><li><p style=\\\"min-height:1.5em\\\">Extended health
        benefits for you and your dependents (subject to availability with our Employer
        of Record)</p><p style=\\\"min-height:1.5em\\\"></p></li></ul><p style=\\\"min-height:1.5em\\\"><em>We're
        in the talent acquisition software business. We run the end-to-end hiring
        process through our own platform, and ensure a level playing field for all
        candidates. Reaching out to hiring managers or recruiters directly won't improve
        your odds of success. Please focus your energy on the quality of your application.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby provides equal employment opportunities
        (EEO) to all employees and applicants for employment without regard to race,
        color, religion, sex, national origin, age, disability, genetics, sexual orientation,
        gender identity, or gender expression. We are committed to a diverse and inclusive
        workforce and welcome people from all backgrounds, experiences, perspectives,
        and abilities.</em></p><p style=\\\"min-height:1.5em\\\"><em>Ashby is committed
        to a fair and transparent hiring process. We confirm that this advertisement
        is for an active, existing vacancy within our organization. Please be advised
        that we may use artificial intelligence-driven tools to assist our recruitment
        team in screening, assessing, and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"ABOUT
        ASHBY\\n\\n - We\u2019re building the next generation of enterprise software,
        starting with products that help talent leaders, recruiters, and managers
        unlock hiring excellence\\n\\n - Series D raised in 2025, and growing ARR
        >100% YoY\\n\\n - Have thousands of amazing customers including OpenAI, Deliveroo,
        Lemonade & Alan\\n\\n - Multiple products to win both land-and-expand and
        material new business deals\\n\\n - Rapidly moving up-market with no signs
        of slowing down\\n\\n - Implemented assistive AI https://www.ashbyhq.com/blog/recruiting/ai-assisted-application-review-in-practice
        throughout the platform\\n\\n - Known for our pace of innovation and advanced
        analytics\\n\\n\\n\\n\\nABOUT THIS ROLE\\n\\nWe are seeking a French-fluent
        Mid-Market Account Executive to help us win Mid-Market accounts (100-1k employees)
        by managing the full sales cycle from pipeline generation through to closed-won.\\n\\nIn
        this role, you'll focus on new logo acquisition. Our emphasis is on your raw
        ability to excel in the areas listed below and your appetite for continuous
        growth & improvement.\\n\\n\\n\\n\\nYOU COULD BE A GREAT FIT IF:\\n\\n - \U0001F4E3
        You demonstrate mastery of clear communication. You ask questions with precision
        and can explain complex concepts in simple terms.\\n\\n - \U0001F4B0 You have
        strong track record in Mid Market SaaS sales, having closed many $50k+ deals
        consistently. You have won competitive rip-and-replace opportunities of core/platform
        technologies.\\n\\n - \U0001F3AF You are proactive in identifying and pursuing
        new business opportunities, and are comfortable sourcing >50% of your own
        pipeline. You're both resourceful and innovative in finding new business opportunities.\\n\\n
        - \U0001F913 You love becoming a product and industry expert. You're adept
        at delivering a quick demo to showcase how your solution meets a unique need.\\n\\n
        - \u2694\uFE0F You're adept at competitive or evangelical selling in new or
        established markets.\\n\\n - \U0001F3A7 You're naturally curious about business
        problems and take pride in positioning specific & creative solutions that
        solve those problems.\\n\\n - \U0001F3D4\uFE0F You skillfully guide prospects
        through the evaluation & buying process\u2014engaging the right stakeholders
        to create consensus for a strategic technology decision.\\n\\n - \u26A1\uFE0F
        Your peers describe you as action-oriented and persistent. You're always on
        the leaderboard for outbound effort and pipeline created.\\n\\n - \u23F1\uFE0F
        You leverage tools to maximize the impact of your prospecting and selling
        time. You believe in research and personalization to spark a conversation.\\n\\n
        - \u2699\uFE0F You are at home managing a pipeline of a dozen or more active
        opportunities concurrently. You take pride in internal operations, including
        real-time CRM updates.\\n\\n - \u2708\uFE0F You are willing to travel at least
        25% of the time for customer engagements and events.\\n\\n\\nREQUIREMENTS:\\n\\n
        - \U0001F91D You have 2+ years of full-cycle closing experience and have closed
        many >$50,000 ACV opportunities\\n\\n - \U0001F4E2 You have experience selling
        complex platform technologies in a sales-led GTM motion\\n\\n - \U0001F4C8
        You are a new business hunter and are confident in your abilities to self-source
        >50% of your own pipeline\\n\\n - \U0001F30D You have sold to multiple regions
        within EMEA and have strong written and verbal fluency in both English and
        French\\n\\n\\nBONUS POINTS:\\n\\n - \U0001F91D You have sold to Talent or
        HR personas\\n\\n - \u260E\uFE0F Prior B/SDR experience\\n\\n\\n\\n\\nYOU
        SHOULDN'T APPLY IF:\\n\\n - \U0001F4BC You're more of a relationship builder
        who focuses on selling into the install base and aren't excited about a new
        business focused role.\\n\\n - \U0001F3AF You expect Marketing or BDRs to
        source all of your pipeline for you. This is a hunting role.\\n\\n - \U0001F4BB
        You believe that \\\"tech stuff\\\" is the SE's job. Our AEs all develop product
        acumen while SEs are a partner in our team selling motion.\\n\\n - \U0001F4CA
        You prefer to run established playbooks in well defined environments. This
        role requires creativity and a growth mindset.\\n\\n - \U0001F43A You're a
        lone wolf. You prefer to go it alone in your pursuit of new business. We believe
        in a team-selling sales model.\\n\\n\\n\\n\\nOUR PHILOSOPHY\\n\\nHere are
        a few key points (relevant to the go-to-market side) that should give you
        an idea of what it is like to work with us:\\n\\n - We spend a lot of time
        building best-in-class products since we believe a highly differentiated product
        is easier to sell.\\n\\n - We aim to offer deep product expertise whenever
        we interact with prospects and customers. AEs are no exception to this.\\n\\n
        - We strongly believe that small teams with very talented people (and the
        right work environment) deliver much better performance than teams with large
        headcount. We hire and compensate accordingly.\\n\\n - We value a strong sense
        of ownership, principled thinking over experience, and thoughtful communication.\\n\\n\\n\\nInterview
        Process\\n\\nOur interview process is designed so you can showcase your achievements
        and points of learning and apply those in a practical exercise. We'll provide
        you with Mid Market Account Executive info so you can develop a well informed
        perspective on our customer / sales motion. You\u2019ll have opportunities
        to ask questions of our team throughout.\\n\\n - Intro Call (30 min) - You'll
        meet with a Recruiter to discuss your fit for the role and address questions
        about our market and solution.\\n\\n - Written Exercise - You'll complete
        a short take home assignment to showcase your outbound muscle.\\n\\n - Experience
        Deep Dive (60 min) - You'll walk the Hiring Manager [Casper Bergmans https://www.linkedin.com/in/ashbyemea/]
        through your career journey in some detail to highlight your experience, achievements,
        and points of learning to understand how you've developed into the professional
        you are today.\\n\\n - Challenge Interview (90 min) - This will be made up
        of two parts:\\n   \\n   - Discovery and Demo Role Play (60 min)\\n   \\n
        \  - Deal Strategy Discussion (30 min)\\n\\n\\n\\n\\nBENEFITS\\n\\n - Sell
        a product that our customers are truly excited about https://www.ashbyhq.com/customers.\\n\\n
        - Fairly set, achievable quotas. Typically, greater than 65% of AEs are at
        or above quota.\\n\\n - Unlimited PTO with four weeks recommended per year\\n\\n
        - Generous equipment, software, and office furniture budget. Get what you
        need to be happy and productive!\\n\\n - 10-year exercise window for stock
        options. You shouldn\u2019t feel pressure to purchase stock options if you
        leave Ashby \u2014do it when you feel financially comfortable.\\n\\n - \uFFE1/\u20AC100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.\\n\\n - Extended health benefits for you and your dependents
        (subject to availability with our Employer of Record)\\n   \\n   \\n\\nWe're
        in the talent acquisition software business. We run the end-to-end hiring
        process through our own platform, and ensure a level playing field for all
        candidates. Reaching out to hiring managers or recruiters directly won't improve
        your odds of success. Please focus your energy on the quality of your application.\\n\\nAshby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.\\n\\nAshby
        is committed to a fair and transparent hiring process. We confirm that this
        advertisement is for an active, existing vacancy within our organization.
        Please be advised that we may use artificial intelligence-driven tools to
        assist our recruitment team in screening, assessing, and selecting candidates
