        Consultant - Americas</h1><p style=\\\"min-height:1.5em\\\"><em>Hi! I\u2019m
        Morgan, the Manager of Strategic Implementations here at Ashby. Our customers
        are at the center of everything we do, and that\u2019s especially true during
        implementation. We take pride in being responsive, collaborative partners
        who focus not just on delivery, but on thoughtful execution.</em></p><p style=\\\"min-height:1.5em\\\"><em>I\u2019m
        thrilled to be expanding our implementation motion by hiring an Implementation
        Consultant. As part of our growing Professional Services team within Ashby\u2019s
        Customer Success organization, you\u2019ll play a critical part in helping
        customers bridge the gap between potential and actual value.</em></p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        this role:</strong></h2><p style=\\\"min-height:1.5em\\\">As our Implementation
        Consultant, you will own execution of the technical configuration for a defined
        set of new Ashby customers. During these implementations, you will partner
        closely with an Implementation Specialist to confirm customer requirements
        before leading the tailored configuration of native platform functionality.
        As initial configuration concludes, you will define and carry out a testing
        plan ahead of go-live. You will also document final configuration choices
        made to ensure visibility and allow for ongoing optimization post-launch.</p><p
        style=\\\"min-height:1.5em\\\">As we scale, we\u2019re investing in more specialized
        implementation roles to ensure customers get to value quickly. This role is
        ideal for someone earlier in their implementation or customer-facing career
        who is excited to learn, grow, and develop deep expertise in a complex product.
        You\u2019ll work with increasing independence over time with support from
        more senior Implementation Specialists and cross-functional partners. This
        role is designed as a pathway into the more senior Implementation Specialist
        role over time.</p><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\"><strong>Role
        requirements:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Complex
        SaaS Implementation &amp; Project Management: </strong>You have deep experience
        contributing to or owning implementation projects for complex SaaS products
        (actioning a defined project plan, communicating and aligning with stakeholders
        on progress, and ultimately delivering results in accordance with the agreed
        upon expectations). You feel comfortable independently owning your domain,
        as well as keeping customers accountable to theirs. You work effectively in
        a remote-first setting, with the ability to travel as needed (&lt;5%) for
        strategic customer engagements.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Customer
        Centricity:</strong> You are adept at understanding enterprise customer needs
        and tailoring implementation configurations to meet their specific requirements.
        You build strong customer relationships by maintaining high levels of engagement
        and communication. You serve as the customer\u2019s proactive guide and advocate
        related to technical configuration, balancing empathy and practicality throughout
        the implementation. Bonus points if you have prior familiarity with Talent
        Acquisition teams and processes.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Technical
        Proficiency: </strong>You have a solid understanding of a complex product
        (ideally Ashby) and its technical intricacies. You are technically curious
        and creative.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Critical
        Thinking &amp; Solutions Orientation: </strong>You proactively address thematic
        customer opportunities and improve our processes accordingly. You don\u2019t
        rely on \u2018I\u2019ve seen this done,\u2019 but instead think critically
        to solve problems. You anticipate how configuration decisions might impact
        customer goals, ask questions to validate options, and pair your recommendations
        with risk mitigation tactics.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Best
        Practices &amp; Recommendations: </strong>You take pride in advising customers
        on best practices specific to their usage of software to ensure optimal value.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Change Management:</strong> You are
        experienced in navigating change management processes and helping customers
        adapt to new systems and a refreshed approach.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Cross-functional
        Collaboration and Communication: </strong>You effectively partner with cross-functional
        stakeholders across Customer Success, Sales, Product, Engineering, and Operations
        to align and define progress. You proactively communicate progress and risks
        with internal and external stakeholders.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You
        could be a great fit if:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\U0001F64BYou strike the balance between collaborative
        teamwork with a strong ability to execute independently on a defined plan.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4E3 You demonstrate clear communication.
        You ask clarifying questions with precision and can distill complex concepts
        into simple themes.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F3A7
        You are a great listener. You read between the lines of what customers share
        in order to identify core concepts, which allows you to surface the right
        tailored <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"http://recommendations.You\\\">recommendations.You</a> see your role
        as the voice of the customer to internal stakeholders so we can ensure that
        our offerings continue to evolve in accordance with customer needs.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4C8 You are a problem solver. You thrive
        at solving complex challenges with innovative, scalable solutions.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\u26A1\uFE0FYou know process matters. You are
        eager to improve processes and workflows to enhance efficiency and efficacy.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F50D Your peers describe you as detail-oriented
        and technically proficient. You take pride in internal operations.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4CA You are data-driven. You use metrics
        and analytics to inform decisions and measure success.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F30D
        You are adaptable. You can navigate changes in a fast-paced, evolving environment.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F9D1\u200D\U0001F3EB You are eager to
        make an impact and grow. You understand the critical role you play in a customer\u2019s
        success, and seize opportunities to expand your impact for customers and the
        team.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You might not
