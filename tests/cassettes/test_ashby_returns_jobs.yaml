        for this role is as follows:\\n\\n - Recruiter Screen -30 min\\n\\n - Sales
        Writing Take Home\\n\\n - Hiring Manager Interview - 60 min\\n\\n - Sales
        Demo and Revenue Operations Conversation - 1.15 hr\\n\\n\\nBENEFITS\\n\\n
