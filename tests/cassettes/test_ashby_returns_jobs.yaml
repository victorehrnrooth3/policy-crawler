        that we may use artificial intelligence-driven tools to assist our recruitment
        team in screening, assessing, and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"ABOUT
        THIS ROLE\\n\\nAs Ashby's first dedicated Value Consultant, you'll own how
        we sell value \u2014 full stop. You'll sit within the Solutions Engineering
        team and be the architect of our value selling motion: building and refining
        the frameworks, tooling, and impact assessments that help prospects understand
        exactly what Ashby can mean for their business. While SEs operate within that
        framework, you'll be the one defining it.\\n\\n\\n\\nYour work will be split
        roughly 80/20 between pre-sales and post-sales. On the pre-sales side, you'll
        partner closely with SEs to support our most strategic opportunities in the
        Enterprise segment \u2014 sometimes working behind the scenes to craft a compelling
        business case, and sometimes stepping into the room yourself as the face of
        value consulting for executive-level conversations. On the post-sales side,
        you'll work with our Customer Success team to ensure we're delivering on the
        outcomes we promised and helping customers realize the value of their investment
        in Ashby. Your work will directly influence not just how we win deals, but
        how we retain and grow customers by making value visible and undeniable.\\n\\n\\n\\nYou'll
        be brought into deals at the consensus-building stage, where it matters most.
        That means you'll need to be sharp on discovery, credible with senior stakeholders,
        and able to translate complex buying dynamics into clear, customer-specific
        narratives about impact.\\n\\n\\n\\nThis is a rare opportunity to define something
        from the ground up at a company with exceptional product-market fit. We have
        the foundation \u2014 impact assessment tools, early frameworks, a team of
        SEs who are eager to lean on you \u2014 and we need someone to take it to
        the next level.\\n\\n\\n\\n\\nYOU COULD BE A GREAT FIT IF:\\n\\n - \U0001F4A1
        You have 5+ years of dedicated value consulting or value engineering experience
        in SaaS. You've done this before, and you know what good looks like. You can
        operate with significant autonomy and don't need a playbook handed to you.\\n\\n
        - \U0001F3D7 You're a builder. You'll be the first person in this role, which
        means you'll be shaping the function as much as filling it. You get energy
        from creating structure where there isn't any.\\n\\n - \U0001F3AF You think
        in outcomes, not features. When you look at a customer's business, you see
        the levers that matter \u2014 and you can quantify and communicate them in
        a way that resonates with a CFO and a Head of Talent alike.\\n\\n - \U0001F91D
        You know how to enable others. You'll be the expert, but your impact scales
        through SEs and CSMs. You're as comfortable coaching a team as you are running
        a room yourself.\\n\\n - \U0001F4E3 You're an exceptional communicator. You
        can read the room, ask precise questions, and simplify complex concepts without
        losing nuance. Executive conversations energize you rather than intimidate
        you.\\n\\n - \U0001F499 You have genuine empathy for Talent Acquisition teams.
        You understand the pressures they face, the data they care about, and the
        outcomes that move the needle for them.\\n\\n - \U0001F501 You're a strong
        cross-functional partner. You'll need to work seamlessly with SEs, CSMs, and
        occasionally the product org \u2014 translating customer feedback into insights
        that improve how we sell and what we build.\\n\\n\\nBONUS POINTS FOR:\\n\\n
        - \U0001F91D Prior experience as a Solutions Engineer or management consultant
        \u2014 you know what the other side of the table looks like\\n\\n - \U0001F4CA
        Familiarity with HR tech or Applicant Tracking Systems \u2014 understanding
        recruiting workflows gives you a head start\\n\\n - \U0001F6E0 Experience
        building or improving impact assessment tooling and processes from the ground
        up\\n\\n - \U0001F4C8 A track record of tying value consulting work to measurable
        revenue or retention outcomes\\n\\n\\nEXAMPLES OF THINGS YOU'LL WORK ON:\\n\\n
        - \U0001F4B0 Own and evolve our impact assessment process \u2014 improve the
        tools, refine the methodology, and make sure every assessment we deliver is
        compelling, credible, and customer-specific\\n\\n - \U0001F3A8 Define Ashby's
        value selling motion \u2014 build the frameworks, templates, and messaging
        that SEs use when engaging on value across the entire sales funnel\\n\\n -
        \U0001F9D1\u200D\U0001F4BC Lead executive-level value conversations on our
        most strategic deals \u2014 bring the business case to life for the people
        who sign the check\\n\\n - \u2699\uFE0F Enable the SE and CSM teams \u2014
        run training, create resources, and act as the internal subject matter expert
        on value consulting so the whole team gets sharper over time\\n\\n - \U0001F501
        Partner with CS on value realization \u2014 make sure customers can connect
        the outcomes they expected to the results they're seeing after they go live;
        elevating from TA results to overarching business priorities\\n\\n - \U0001F52C
        Test and refine messaging on larger deals \u2014 use strategic opportunities
        as a proving ground to sharpen how we talk about Ashby's impact\\n\\n\\n\\n\\nWHY
        BECOME A VALUE CONSULTANT AT ASHBY?\\n\\nThere are a lot of value consulting
        roles out there. Here's what makes this one different:\\n\\n\\n\\n - The product
        makes your job easier. When you're building a business case for Ashby, you're
        not stretching to find value \u2014 it's genuinely there. Customers see real,
        measurable improvements in how they hire. That makes every impact assessment
        feel honest rather than aspirational.\\n\\n - You'll define something, not
        just do it. Most value consulting roles put you inside a mature function with
        established playbooks. Here, you'll be the one writing the playbook. What
        you build will be felt across every deal we run.\\n\\n - You'll be working
        with a world-class team. The Ashby team is sharp, collaborative, and invested
        in getting better. They want a strong value partner \u2014 someone who can
        help them have more impactful conversations and win more strategic deals.\\n\\n
        - The market is genuinely underserved. Talent Acquisition software has lagged
        behind the needs of modern hiring teams for years. Ashby is changing that,
        and every impact assessment you deliver is a chance to show a prospect what's
        actually possible.\\n\\n - Your work will be foundational to how Ashby grows.
        As we continue to move upmarket, value selling becomes increasingly central
        to how we win. What you build here won't just support today's deals \u2014
        it will shape how the entire go-to-market team operates for years to come.\\n\\n
        - You'll have broad cross-functional reach. This role touches SEs, CSMs, and
        the product org. If you're energized by working across functions and seeing
        your work show up in multiple places, you'll find a lot of satisfaction here.\\n\\n\\n\\n\\nREASONS
        YOU SHOULDN'T APPLY:\\n\\n - If you prefer to work purely behind the scenes,
        this role isn't the right fit. You'll be expected to show up in executive
        conversations and represent value consulting in a visible, credible way.\\n\\n
        - If you're looking for a fully built function with established processes
        and clear lanes, you'll feel uncomfortable here. We have a starting point,
        not a finished system \u2014 and the expectation is that you'll be the one
        finishing it.\\n\\n - If process creation and change management aren't your
        strengths, that's a real gap in this role. Getting SEs and CSMs to adopt a
        new value selling motion requires as much change management as it does framework
        design.\\n\\n - If you're primarily motivated by deal size over customer complexity,
        you won't thrive here. We care more about the depth and quality of our customer
        outcomes than the logo.\\n\\n - If you're looking for a purely pre-sales role,
        the post-sales component of this job is real and important \u2014 it's how
        we close the loop on the value we promise.\\n\\n - If a fast-moving, ambiguous
        environment feels like a threat rather than an opportunity, the pace of Ashby
        will likely frustrate you.\\n\\n\\n\\n\\nINTERVIEW PROCESS\\n\\nOur interview
        process is thorough \u2014 we want to make sure this role is the right fit
        for you and that you're the right fit for Ashby. Details on the process for
        this role will be shared by your recruiter.\\n\\n\\n\\n\\nBENEFITS\\n\\n -
        You'll get the time to do things the right way; we put a lot of emphasis on
