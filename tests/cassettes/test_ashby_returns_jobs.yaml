        Interview - 30 min</p></li><li><p style=\\\"min-height:1.5em\\\">Peer Interview
        (Support Leaders) - 60 min</p></li></ul><p style=\\\"min-height:1.5em\\\">If
        you're excited about leading a highly technical team, eliminating friction,
        and shaping the future of Support Engineering at Ashby, we\u2019d love to
        hear from you!</p><p style=\\\"min-height:1.5em\\\"></p><h1>Our Philosophy:</h1><p
        style=\\\"min-height:1.5em\\\">Here are a few key points (relevant to the
        go-to-market side) that should give you an idea of what it is like to work
        with us:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We
        spend a lot of time building best-in-class products since we believe a highly
        differentiated product is a lot easier to sell.</p></li><li><p style=\\\"min-height:1.5em\\\">We
        want to offer deep expertise whenever we interact with prospects and customers
        \u2013 whether it be through scaled engagements (e.g. webinars), 1:1 conversations,
        or through written word (e.g. documentation).</p></li><li><p style=\\\"min-height:1.5em\\\">We
        strongly believe that small teams with very talented people (and the right
        work environment) deliver much better performance than teams with large headcount.
        We hire and compensate accordingly.</p></li><li><p style=\\\"min-height:1.5em\\\">We
        value a strong sense of ownership, principled thinking over experience, and
        thoughtful communication (we put a lot of effort into using the right communication
        channels) - we\u2019ll get into these and other values during the hiring process.</p></li></ul><p
        style=\\\"min-height:1.5em\\\"></p><h1>Benefits:</h1><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You\u2019ll get the time to do things the right
