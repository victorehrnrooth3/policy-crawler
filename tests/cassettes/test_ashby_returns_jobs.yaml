        Workforce Management Lead - Americas\",\"department\":\"Customer Success\",\"team\":\"Customer
        Support\",\"employmentType\":\"FullTime\",\"location\":\"Remote - US\",\"shouldDisplayCompensationOnJobPostings\":true,\"secondaryLocations\":[],\"publishedAt\":\"2026-01-30T22:08:13.856+00:00\",\"isListed\":true,\"isRemote\":true,\"workplaceType\":\"Remote\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"United
        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/f40bfe31-2f1f-4b81-9b6f-4177f6b3f411\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/f40bfe31-2f1f-4b81-9b6f-4177f6b3f411/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">Hi! I\u2019m <a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/allie-hurley-75557b89/\\\"><u>Allie</u></a>,
        Head of Support at Ashby. \U0001F44B As our Support organization continues
        to scale globally, one of the most critical levers for delivering an exceptional
        customer experience is ensuring we have the <em>right capacity, in the right
        places, at the right times</em>, without sacrificing flexibility, quality,
        or humanity.</p><p style=\\\"min-height:1.5em\\\">That\u2019s why we\u2019re
        excited to hire our first <strong>Workforce Management Lead</strong> at Ashby.</p><p
        style=\\\"min-height:1.5em\\\">This is not a traditional WFM role in a call
        center environment. Our Support team is highly tenured, deeply technical,
        and made up of thoughtful practitioners who regularly contribute beyond tickets
        by partnering on projects, enabling self-service, shaping tooling, and influencing
        product direction. Your role will be to design and own the systems that allow
        this team to do their best work while still meeting our SLA commitments as
        customer needs evolve.</p><p style=\\\"min-height:1.5em\\\">This role is for
        someone who loves forecasting and capacity planning, but also thrives in ambiguity,
        enjoys creative problem-solving, and sees WFM as a strategic function, rather
        than a compliance exercise.</p><p style=\\\"min-height:1.5em\\\"><strong>About
        the Role:</strong></p><p style=\\\"min-height:1.5em\\\">As the Workforce Management
        Lead, you\u2019ll build Ashby\u2019s WFM function from the ground up. You\u2019ll
        own forecasting, capacity modeling, and schedule design across a global Support
        organization, ensuring we can meet SLAs while remaining flexible enough to
        experiment with new channels, offerings, and ways of working.</p><p style=\\\"min-height:1.5em\\\">You\u2019ll
        partner closely with Support Leadership and Support Operations to translate
        business goals into practical staffing plans. You\u2019ll balance data rigor
        with human judgment while recognizing that our team\u2019s expertise is a
        feature, not a constraint, and that great workforce planning enables impact
        beyond ticket queues.</p><p style=\\\"min-height:1.5em\\\">Since this is a
        brand-new function, you\u2019ll have significant influence over <em>how</em>
        WFM operates at Ashby, setting the foundation for a scalable, adaptable, and
        people-centric approach.</p><p style=\\\"min-height:1.5em\\\"><strong>Role
        Responsibilities:</strong></p><h3><strong>Forecasting &amp; Capacity Planning</strong></h3><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Own short-
        and long-term forecasting models across regions, channels, and customer segments.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Translate growth projections, seasonality,
        and product changes into actionable capacity plans.</p></li><li><p style=\\\"min-height:1.5em\\\">Model
        multiple scenarios (e.g. new channels, enterprise coverage shifts, project
        allocations) to support informed decision-making.</p></li></ul><h3><strong>Scheduling
        &amp; Coverage Strategy</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Design and maintain global schedules that align
        required coverage with our headcount and skill distribution.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Partner with Support Managers to evolve schedules
        as the team grows, regions expand, and needs change.</p></li><li><p style=\\\"min-height:1.5em\\\">Ensure
        coverage plans support SLA attainment as part of a holistic vision of Support
        success.</p></li></ul><h3><strong>Strategic Enablement (Not Just Adherence)</strong></h3><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Work
        with a tenured, trusted Support team where flexibility, judgment, and expertise
        are expected.</p></li><li><p style=\\\"min-height:1.5em\\\">Enable Support
        team members to contribute to projects, experiments, and  cross-functional
        initiatives while maintaining customer commitments.</p></li><li><p style=\\\"min-height:1.5em\\\">Help
        leadership understand tradeoffs between capacity, quality, and strategic investment.</p></li></ul><h3><strong>Data,
        Insights &amp; Decision Support</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Build and maintain dashboards and models that
        provide visibility into capacity health, risk, and opportunity.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Surface insights that inform hiring plans,
        regional strategy, and operational priorities.<br />Continuously refine assumptions
        and models as customer behavior and support delivery evolve.</p></li></ul><h3><strong>Cross-Functional
        Partnership</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Partner
        closely with Support Leadership, Operations, Enablement, and Product to align
        workforce planning with company goals.</p></li><li><p style=\\\"min-height:1.5em\\\">Act
        as a thought partner in conversations about new support offerings, channel
        experiments, and service levels.</p></li><li><p style=\\\"min-height:1.5em\\\">Advocate
        for sustainable, human-centered workforce decisions that scale with the business.</p></li></ul><h2><strong>Role
        Requirements</strong></h2><h3><strong>Workforce Management Expertise</strong></h3><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Experience
        in Workforce Management, capacity planning, or operational planning in a Support,
        CX, or technical services environment.</p></li><li><p style=\\\"min-height:1.5em\\\">Strong
        understanding of forecasting methodologies, staffing models, and coverage
        strategies.</p></li><li><p style=\\\"min-height:1.5em\\\">Comfort operating
        without an existing WFM playbook and building systems from scratch.</p></li></ul><h3><strong>Systems
        &amp; Analytical Thinking</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Highly analytical with the ability to turn
        complex data into clear insights and recommendations.</p></li><li><p style=\\\"min-height:1.5em\\\">Skilled
        at building models that account for uncertainty, variability, and change.<br
        />Experience working with Support metrics and SLAs in a nuanced, non-mechanical
        way.</p></li></ul><h3><strong>Collaborative &amp; People-Centered</strong></h3><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Deep
        respect for the expertise of Support professionals and an appreciation for
        flexible, trust-based environments.</p></li><li><p style=\\\"min-height:1.5em\\\">Strong
        communicator who can explain tradeoffs and recommendations to technical and
        non-technical stakeholders.</p></li><li><p style=\\\"min-height:1.5em\\\">Comfortable
        partnering across leadership levels.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You
        Should Apply If:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        love using data to solve ambiguous problems and inform strategic decisions.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You see WFM as an enabling function, not a
        policing one.</p></li><li><p style=\\\"min-height:1.5em\\\">You enjoy designing
        systems that can evolve as the business changes.</p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019re
        excited to partner with experienced, Technical Support professionals who value
        autonomy and impact.</p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019re
        motivated by building something foundational that will shape how Support scales
        long-term.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You should
        not apply if:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019re
        looking for a traditional call-center WFM environment focused primarily on
        schedule adherence.</p></li><li><p style=\\\"min-height:1.5em\\\">You prefer
        fixed rules and static models over iteration and experimentation.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You\u2019re uncomfortable operating in ambiguity
        or building structure where none exists.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        believe there is one \u201Ccorrect\u201D way to staff or forecast Support.</p></li></ul><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>About Ashby</strong></h2><p
        style=\\\"min-height:1.5em\\\">We\u2019re building the next generation of
        enterprise software, and we\u2019re starting with a suite of products that
        help talent leaders, recruiters, and hiring managers run their hiring process
        significantly better. Learn more on our website:<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://ashbyhq.com\\\"> </a><u>https://www.ashbyhq.com/<br
        /><br /></u>We are well-funded and backed by great investors, including Y
        Combinator, Elad Gil and Lachy Groom. We publicly launched in October 2022
        and are working with amazing companies we're proud to partner with.<br /><br
        />We\u2019ve built an incredible team and exceptional product over the past
        few years, and we truly are just getting started. In short, this is the perfect
        time to join \U0001F680</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        Go To Market</strong></h2><p style=\\\"min-height:1.5em\\\">Our Support team
        is a part of our Customer Success department, and thus is a part of our Go
        To Market function. Here are a few points that should give you an idea of
        what it is like to work with us:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">We spend a lot of time building best-in-class
        products, since we believe a highly differentiated product is easier to sell.</p></li><li><p
        style=\\\"min-height:1.5em\\\">We also spend a lot of time building a best-in-class
        customer experience. We aim to offer deep expertise whenever we interact with
        prospects and customers (we hope our 9.8 Support rating on G2 signals this).</p></li></ul><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We strongly
        believe that small teams with very talented people and the right work environment
        deliver much high performance and we're built accordingly.</p></li></ul><h2><strong>Interview
        Process</strong></h2><p style=\\\"min-height:1.5em\\\">Our interview process
        is thorough \u2014 we aim to ensure each person that joins the team is the
        right fit for Ashby and will provide ample information for you to assess if
        Ashby is the right fit for you. The process for this role is as follows:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Intro
        Call with Recruiting</strong> - 30 Minutes</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Hiring
        Manager Interview</strong> - 45-60 Minutes</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Take
        Home Assessment</strong> - 1 week to complete</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Final
        Round interview</strong></p></li></ul><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019ll
        get the time to do things the right way; we put a lot of emphasis on high
        quality work and avoid quick hacks as much as possible.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        get to sell a product that our prospects &amp; customers are truly excited
        about.</p></li><li><p style=\\\"min-height:1.5em\\\">Competitive compensation
        is offered.</p></li><li><p style=\\\"min-height:1.5em\\\">10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO with four weeks is recommended
        per year. Expect \u201CVacation?\u201D in our one-on-one agenda until you
        start taking it \U0001F605</p></li><li><p style=\\\"min-height:1.5em\\\">Twelve
        weeks of fully paid family leave in the US<em>.</em> We plan to expand this
        to employees in other countries as situations arise.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval</p></li></ul><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"Hi!
        I\u2019m Allie https://www.linkedin.com/in/allie-hurley-75557b89/, Head of
        Support at Ashby. \U0001F44B As our Support organization continues to scale
        globally, one of the most critical levers for delivering an exceptional customer
        experience is ensuring we have the right capacity, in the right places, at
        the right times, without sacrificing flexibility, quality, or humanity.\\n\\nThat\u2019s
        why we\u2019re excited to hire our first Workforce Management Lead at Ashby.\\n\\nThis
        is not a traditional WFM role in a call center environment. Our Support team
        is highly tenured, deeply technical, and made up of thoughtful practitioners
        who regularly contribute beyond tickets by partnering on projects, enabling
        self-service, shaping tooling, and influencing product direction. Your role
        will be to design and own the systems that allow this team to do their best
        work while still meeting our SLA commitments as customer needs evolve.\\n\\nThis
        role is for someone who loves forecasting and capacity planning, but also
        thrives in ambiguity, enjoys creative problem-solving, and sees WFM as a strategic
        function, rather than a compliance exercise.\\n\\nAbout the Role:\\n\\nAs
        the Workforce Management Lead, you\u2019ll build Ashby\u2019s WFM function
        from the ground up. You\u2019ll own forecasting, capacity modeling, and schedule
        design across a global Support organization, ensuring we can meet SLAs while
        remaining flexible enough to experiment with new channels, offerings, and
        ways of working.\\n\\nYou\u2019ll partner closely with Support Leadership
        and Support Operations to translate business goals into practical staffing
        plans. You\u2019ll balance data rigor with human judgment while recognizing
        that our team\u2019s expertise is a feature, not a constraint, and that great
        workforce planning enables impact beyond ticket queues.\\n\\nSince this is
        a brand-new function, you\u2019ll have significant influence over how WFM
        operates at Ashby, setting the foundation for a scalable, adaptable, and people-centric
        approach.\\n\\nRole Responsibilities:\\n\\n\\nFORECASTING & CAPACITY PLANNING\\n\\n
        - Own short- and long-term forecasting models across regions, channels, and
        customer segments.\\n\\n - Translate growth projections, seasonality, and
        product changes into actionable capacity plans.\\n\\n - Model multiple scenarios
        (e.g. new channels, enterprise coverage shifts, project allocations) to support
        informed decision-making.\\n\\n\\nSCHEDULING & COVERAGE STRATEGY\\n\\n - Design
        and maintain global schedules that align required coverage with our headcount
        and skill distribution.\\n\\n - Partner with Support Managers to evolve schedules
        as the team grows, regions expand, and needs change.\\n\\n - Ensure coverage
        plans support SLA attainment as part of a holistic vision of Support success.\\n\\n\\nSTRATEGIC
        ENABLEMENT (NOT JUST ADHERENCE)\\n\\n - Work with a tenured, trusted Support
        team where flexibility, judgment, and expertise are expected.\\n\\n - Enable
        Support team members to contribute to projects, experiments, and cross-functional
        initiatives while maintaining customer commitments.\\n\\n - Help leadership
        understand tradeoffs between capacity, quality, and strategic investment.\\n\\n\\nDATA,
        INSIGHTS & DECISION SUPPORT\\n\\n - Build and maintain dashboards and models
        that provide visibility into capacity health, risk, and opportunity.\\n\\n
        - Surface insights that inform hiring plans, regional strategy, and operational
        priorities.\\n   Continuously refine assumptions and models as customer behavior
        and support delivery evolve.\\n\\n\\nCROSS-FUNCTIONAL PARTNERSHIP\\n\\n -
        Partner closely with Support Leadership, Operations, Enablement, and Product
        to align workforce planning with company goals.\\n\\n - Act as a thought partner
        in conversations about new support offerings, channel experiments, and service
        levels.\\n\\n - Advocate for sustainable, human-centered workforce decisions
        that scale with the business.\\n\\n\\nROLE REQUIREMENTS\\n\\n\\nWORKFORCE
        MANAGEMENT EXPERTISE\\n\\n - Experience in Workforce Management, capacity
        planning, or operational planning in a Support, CX, or technical services
        environment.\\n\\n - Strong understanding of forecasting methodologies, staffing
        models, and coverage strategies.\\n\\n - Comfort operating without an existing
        WFM playbook and building systems from scratch.\\n\\n\\nSYSTEMS & ANALYTICAL
        THINKING\\n\\n - Highly analytical with the ability to turn complex data into
        clear insights and recommendations.\\n\\n - Skilled at building models that
        account for uncertainty, variability, and change.\\n   Experience working
        with Support metrics and SLAs in a nuanced, non-mechanical way.\\n\\n\\nCOLLABORATIVE
        & PEOPLE-CENTERED\\n\\n - Deep respect for the expertise of Support professionals
        and an appreciation for flexible, trust-based environments.\\n\\n - Strong
        communicator who can explain tradeoffs and recommendations to technical and
        non-technical stakeholders.\\n\\n - Comfortable partnering across leadership
        levels.\\n\\nYou Should Apply If:\\n\\n - You love using data to solve ambiguous
        problems and inform strategic decisions.\\n\\n - You see WFM as an enabling
        function, not a policing one.\\n\\n - You enjoy designing systems that can
        evolve as the business changes.\\n\\n - You\u2019re excited to partner with
        experienced, Technical Support professionals who value autonomy and impact.\\n\\n
        - You\u2019re motivated by building something foundational that will shape
        how Support scales long-term.\\n\\nYou should not apply if:\\n\\n - You\u2019re
        looking for a traditional call-center WFM environment focused primarily on
        schedule adherence.\\n\\n - You prefer fixed rules and static models over
        iteration and experimentation.\\n\\n - You\u2019re uncomfortable operating
        in ambiguity or building structure where none exists.\\n\\n - You believe
        there is one \u201Ccorrect\u201D way to staff or forecast Support.\\n\\n\\n\\n\\nABOUT
        ASHBY\\n\\nWe\u2019re building the next generation of enterprise software,
        and we\u2019re starting with a suite of products that help talent leaders,
        recruiters, and hiring managers run their hiring process significantly better.
        Learn more on our website: https://ashbyhq.comhttps://www.ashbyhq.com/\\n\\nWe
        are well-funded and backed by great investors, including Y Combinator, Elad
        Gil and Lachy Groom. We publicly launched in October 2022 and are working
        with amazing companies we're proud to partner with.\\n\\nWe\u2019ve built
        an incredible team and exceptional product over the past few years, and we
        truly are just getting started. In short, this is the perfect time to join
        \U0001F680\\n\\n\\n\\n\\nABOUT GO TO MARKET\\n\\nOur Support team is a part
        of our Customer Success department, and thus is a part of our Go To Market
        function. Here are a few points that should give you an idea of what it is
        like to work with us:\\n\\n - We spend a lot of time building best-in-class
        products, since we believe a highly differentiated product is easier to sell.\\n\\n
        - We also spend a lot of time building a best-in-class customer experience.
        We aim to offer deep expertise whenever we interact with prospects and customers
        (we hope our 9.8 Support rating on G2 signals this).\\n\\n - We strongly believe
        that small teams with very talented people and the right work environment
        deliver much high performance and we're built accordingly.\\n\\n\\nINTERVIEW
        PROCESS\\n\\nOur interview process is thorough \u2014 we aim to ensure each
        person that joins the team is the right fit for Ashby and will provide ample
        information for you to assess if Ashby is the right fit for you. The process
        for this role is as follows:\\n\\n - Intro Call with Recruiting - 30 Minutes\\n\\n
        - Hiring Manager Interview - 45-60 Minutes\\n\\n - Take Home Assessment -
        1 week to complete\\n\\n - Final Round interview\\n\\n\\nBENEFITS\\n\\n -
        You\u2019ll get the time to do things the right way; we put a lot of emphasis
        on high quality work and avoid quick hacks as much as possible.\\n\\n - You
        get to sell a product that our prospects & customers are truly excited about.\\n\\n
        - Competitive compensation is offered.\\n\\n - 10-year exercise window for
        stock options. You shouldn\u2019t feel pressure to purchase stock options
        if you leave Ashby \u2014do it when you feel financially comfortable.\\n\\n
        - Unlimited PTO with four weeks is recommended per year. Expect \u201CVacation?\u201D
        in our one-on-one agenda until you start taking it \U0001F605\\n\\n - Twelve
        weeks of fully paid family leave in the US. We plan to expand this to employees
        in other countries as situations arise.\\n\\n - Generous equipment, software,
        and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
        covered with manager approval\\n\\nAshby provides equal employment opportunities
        (EEO) to all employees and applicants for employment without regard to race,
        color, religion, sex, national origin, age, disability, genetics, sexual orientation,
        gender identity, or gender expression. We are committed to a diverse and inclusive
        workforce and welcome people from all backgrounds, experiences, perspectives,
        and abilities.\\n\\nAshby is committed to a fair and transparent hiring process.
        We confirm that this advertisement is for an active, existing vacancy within
        our organization. Please be advised that we may use artificial intelligence-driven
        tools to assist our recruitment team in screening, assessing, and selecting
        candidates for this position.\",\"compensation\":{\"compensationTierSummary\":\"$90K
        \u2013 $115K\",\"scrapeableCompensationSalarySummary\":\"$90K - $115K\",\"compensationTiers\":[{\"id\":\"86a991a5-c245-4079-92b9-c99e880fd7ee\",\"tierSummary\":\"$90K
        \u2013 $115K\",\"title\":null,\"additionalInformation\":null,\"components\":[{\"id\":\"7dad934c-b7e3-41d8-a981-c80f0f66dcb5\",\"summary\":\"$90K
        \u2013 $115K\",\"compensationType\":\"Salary\",\"interval\":\"1 YEAR\",\"currencyCode\":\"USD\",\"minValue\":90000,\"maxValue\":115000}]}],\"summaryComponents\":[{\"compensationType\":\"Salary\",\"interval\":\"1
        YEAR\",\"currencyCode\":\"USD\",\"minValue\":90000,\"maxValue\":115000}]}},{\"id\":\"151f2354-5058-48f5-a2cc-f92c756da5af\",\"title\":\"Staff
        IT Engineer\",\"department\":\"Security & IT\",\"team\":\"IT\",\"employmentType\":\"FullTime\",\"location\":\"Remote
        - US\",\"shouldDisplayCompensationOnJobPostings\":true,\"secondaryLocations\":[{\"location\":\"United
        Kingdom\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"United
        Kingdom\",\"addressLocality\":\"\"}}},{\"location\":\"Remote - European Union\",\"address\":{\"postalAddress\":{\"postalCode\":\"\",\"addressRegion\":\"\",\"addressCountry\":\"European
        Union\",\"addressLocality\":\"\"}}},{\"location\":\"Remote - Canada\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Canada\",\"addressLocality\":\"\"}}}],\"publishedAt\":\"2026-04-27T13:22:02.235+00:00\",\"isListed\":true,\"isRemote\":true,\"workplaceType\":\"Remote\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"United
        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/151f2354-5058-48f5-a2cc-f92c756da5af\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/151f2354-5058-48f5-a2cc-f92c756da5af/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">Hey! My name is<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/john-reynolds-74511660/\\\">
        <u>John</u></a> and I started here at Ashby as IT Manager around 6 months
        ago, excited to meet you! In that time Ashby has grown from ~250 to 320 folks
        and the scope of what we\u2019re doing in IT has expanded, with this role
        we hope to continue the steep trajectory for the team and the world-class
        support for the company.</p><p style=\\\"min-height:1.5em\\\">Currently the
        IT team here is just me, we want to grow that team to keep giving the Ashby
        team world-class service and the most automated, delightful technology to
        work with during their time at Ashby.</p><p style=\\\"min-height:1.5em\\\">All
        the responsibilities and requirements are outlined below so have a look. Some
        points to consider as you\u2019re reading through:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">This job spec might look familiar, we previously
        opened this role as Senior ~2 months ago. After seeing some great candidates
        (and lots of progress internally with the scope of IT) it became clear we
        need more than we should expect at a Senior in terms of demonstrated experience
        and technical ability. We've updated the role and compensation and we're looking
        to find someone with deeper technical and \\\"foundational\\\" experience
        than would be expected at a Senior level.</p></li><li><p style=\\\"min-height:1.5em\\\">This
        is fundamentally a technical role which will become the pivotal role in a
        larger team as we continue to scale. That means you\u2019ll be chatting and
        helping other Ashby folks directly just as much as you will be throwing JSON
        blobs around between APIs. We\u2019re looking for someone who is comfortable
        doing both.</p></li><li><p style=\\\"min-height:1.5em\\\">As folks in IT we
        strongly believe in technology as a great enabling force. We\u2019re always
        looking for novel ways to tackle problems at the fundamental level and that
        means we\u2019re looking for someone who sees the world a little differently.
        You should be able to provide clear examples from previous experience of what
        innovation and technical excellence can look like in the IT/Client Engineering
        space.</p></li><li><p style=\\\"min-height:1.5em\\\">Finally, the problems
        we help people tackle daily are as much emotional as they are technical. Whilst
        it\u2019s great to be able to provide the best technical solution to an issue
        we strive to be able to deliver emotional catharsis alongside this. That means
        listening to people, meeting them where they are and providing the reassurance,
        empathy and the genuine human connection that every great support interaction
        should have.</p></li><li><p style=\\\"min-height:1.5em\\\">I\u2019m the hiring
        manager for this role and would be the manager for the successful candidate
        as well. If you want to learn a little more of my background I have a<a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://hire.john-reynolds.com/about-me?source=copy_link\\\">
        <u>public about me page</u></a> you\u2019re welcome to look through!</p></li></ul><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Responsibilities:</strong></h2><p
        style=\\\"min-height:1.5em\\\">Own and fix customer issues from ingest through
        to resolution, whether that\u2019s a one-time fix or a deeply technical project
        affecting the whole org</p><p style=\\\"min-height:1.5em\\\">Offer, advocate
        and then implement best practices for an IT function that is securely creating
        the most productive workforce in the world</p><p style=\\\"min-height:1.5em\\\">Own
        projects across device management (think Kandji, Crowdstrike), identity management
        (think Okta, Google Workspace), hardware logistics (think laptop shipping,
        accessories lifecycle) and user lifecycle (onboarding, offboarding and user
        changes) to automate manual process and reduce our touchpoints to solely those
        where the human interaction matters</p><p style=\\\"min-height:1.5em\\\">Contribute
        to creating a cohesive, performant and scalable event-driven backend, making
        data shifting across the business effortless and easy to adopt everywhere.</p><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Requirements:</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">A strong
        belief that end user support is an equally important part of being a well-rounded
        engineer as building world-class automations</p></li><li><p style=\\\"min-height:1.5em\\\">Deep
        experience - that means being able to show detailed, specific knowledge <em>and</em>
        broader architectural understanding - across relevant IT systems (device management,
        identity management)</p></li><li><p style=\\\"min-height:1.5em\\\">Demonstrated
        experience of automating the interplay between IT systems and other internal
        systems, that means handling APIs, MCP servers and glue-code for making disparate
        systems talk</p></li><li><p style=\\\"min-height:1.5em\\\">Comfort and interest
        in helping build a stateless internal backend composed of Typescript services,
        pub/sub queues and APIs for both downstream and upstream applications</p></li><li><p
        style=\\\"min-height:1.5em\\\">Desire to work in and help build a small team
        of experts with an open, engaged and radically efficient profile</p></li><li><p
        style=\\\"min-height:1.5em\\\">The ambition to challenge norms and build for
        scale and flexibility outside of the expected</p></li><li><p style=\\\"min-height:1.5em\\\">The
        humility to accept the thoughts and emotions of others as valuable before
        your own and be vulnerable in front of others</p></li><li><p style=\\\"min-height:1.5em\\\">The
        wisdom to know when it\u2019s best to apply the above</p></li></ul><h2><strong>Non-requirements:</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Experience
        in exactly our tech stack. Whilst strong is expected, we're looking for systems
        knowledge first, experience in certain specific platforms a distant second</p></li><li><p
        style=\\\"min-height:1.5em\\\">A specific timezone. Whilst US timezones are
        <em>preferred</em> to help us cover a gap in our current coverage this is
        not a requirement, we're remote-friendly and can hire across Europe, the UK
        and US and other countries for the right candidate. Salaries outside of the
        US would be location-dependent. We will sponsor visas where possible for the
        right candidate.</p></li></ul><h2><strong>A sample of what you would be working
        on:</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Helping
        end users with their everyday issues, tracing those back to root causes and
        rolling out fixes that are structural and lasting</p></li><li><p style=\\\"min-height:1.5em\\\">Leading
        the initiative to build an internal backend that allows for moving data and
        performing business logic between systems in a way that's scalable, auditable,
        testable and production-grade</p></li><li><p style=\\\"min-height:1.5em\\\">Using
        Terraform and Git to make our critical systems (device management, IAM) transparent,
        self-documenting, audit-ready and auto-deployed</p></li><li><p style=\\\"min-height:1.5em\\\">Defining
        and implementing authentication rules for users that tie directly and elegantly
        to the governing policies whilst providing industry-leading security</p></li><li><p
        style=\\\"min-height:1.5em\\\">Building out role-based access control and
        birthright access as well as owning and tackling the people-data challenges
        that stem from this</p></li></ul><h2><strong>What you\u2019ll not be working
        on:</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Break/fix
        cycles when root causes can be tackled instead. You will be empowered and
        expected to fix problems not delay symptoms.</p></li><li><p style=\\\"min-height:1.5em\\\">Non-stop
        tickets. Everyone in the team is expected to contribute equally to interrupt-driven
        and systemic issues, no first or second line here.</p></li><li><p style=\\\"min-height:1.5em\\\">Traditional
        corporate IT. We use a relatively standard \u201Cstartup stack\u201D which
        means nearly everything is cloud based, devices are majority MacOS with a
        very small Linux subset and we have the agency and ability to move fast and
        with outsized impact.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\">If you\u2019d like to hear a little more about
        the role, there's a video walkthrough originally recorded for the previous
        (senior) posting here:</p><div><div style=\\\"left:0;width:100%;height:0;position:relative;padding-bottom:56.25%\\\"><iframe
        src=\\\"https://embedded-media.ashbyhq.com/embed/4ea5f68e-c33e-4ac9-831a-e732bee4a303/01a71fc3-4e95-4fed-809c-1851c754dae1\\\"
        style=\\\"top:0;left:0;width:100%;height:100%;position:absolute;border:0\\\"
        allowfullscreen scrolling=\\\"no\\\" allow=\\\"encrypted-media *; picture-in-picture
        *;\\\" sandbox=\\\"allow-scripts allow-same-origin allow-presentation\\\"></iframe></div></div><p
        style=\\\"min-height:1.5em\\\"></p><h1><strong>How this hiring process works</strong></h1><p
        style=\\\"min-height:1.5em\\\">We want to try and be as transparent as possible
        about how our hiring process works. Here's what we're doing for this role:</p><p
        style=\\\"min-height:1.5em\\\"></p><h3><strong>The application stage</strong></h3><p
        style=\\\"min-height:1.5em\\\">We'll be keeping this role open until it's
        filled. This is different from the previous (Senior) posting where we used<a
        target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/podcast/episodes/cohort-hiring\\\">
        <u>cohort hiring</u></a>, we believe the high bar for a Staff level means
        we need to optimise for getting the most eyes on the posting.</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">That means if you're reading this posting the
        role is open and you're welcome to apply.</p></li><li><p style=\\\"min-height:1.5em\\\">There
        are no auto-reject rules on this role. If you apply your application will
        be reviewed by a human<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
        nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/recruiting/ai-assisted-application-review-in-practice\\\">
        <u>with AI help.</u></a></p></li><li><p style=\\\"min-height:1.5em\\\">We
        will reply to <strong>every</strong> application letting you know whether
        we'd like to advance or not.</p></li><li><p style=\\\"min-height:1.5em\\\">Considering
        the large volume of applications we won't be able to give specific feedback
        at this point. Apologies but we want to be thoughtful and considered with
        any feedback we <em>do</em> provide and we can't do this at the application
        phase.</p></li></ol><p style=\\\"min-height:1.5em\\\"></p><h3><strong>The
        interview process</strong></h3><p style=\\\"min-height:1.5em\\\">If you're
        invited to continue with the application - congratulations! Here's what will
        happen next:</p><ol style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        will be invited to book time in for a 20 minute screen call. We'll be looking
        for answers to initial questions like:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Are your compensation and job role expectations
        aligned with this role?</p></li><li><p style=\\\"min-height:1.5em\\\">Why
        do you want this role?</p></li><li><p style=\\\"min-height:1.5em\\\">Can you
        clearly and crisply convey both your technical and social capability to excel
        in this role?</p></li><li><p style=\\\"min-height:1.5em\\\">Are there outstanding
        questions we can answer?</p></li></ol></li><li><p style=\\\"min-height:1.5em\\\">Assuming
        this goes well we'll invite you back for a longer (60 minute) hiring manager
        interview with me. In this interview we will:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Dive much deeper in to your background and
        try and tease out concrete examples of technical ability</p></li><li><p style=\\\"min-height:1.5em\\\">Test
        your ability to think more broadly and ambitiously about what excellence looks
        like in IT</p></li><li><p style=\\\"min-height:1.5em\\\">Answer any deeper
        questions you might have now we're further into the process and you have more
        context on the company and tech stack.</p></li></ol></li><li><p style=\\\"min-height:1.5em\\\">The
        next stage is a take-home test which has the following format:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Given a broad problem area, propose a technical
        spec on how you would ideally fix this</p></li><li><p style=\\\"min-height:1.5em\\\">Speculate
        on feedback you might receive and answers you might give from both technical
        and non-technical peers</p></li></ol></li><li><p style=\\\"min-height:1.5em\\\">Next,
        you'll have a chance to meet with<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/abhikpramanik/\\\">
        <u>Abhik</u></a> who will be completing a final appraisal of your technical
        fit for the role. You'll go through a <a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/resources/staff-it-engineer-deep-dive\\\">past
        projects deep dive</a> and talk through the value and challenges of a project
        that you feel best exhibits your technical ability.</p></li><li><p style=\\\"min-height:1.5em\\\">Finally,
        you'll get to meet some more of the team! Specifically you'll have a cross-functional
        interview where you'll meet:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Someone from the People function who will have
        some questions about interacting with the People team and how to build a successful
        relationship across functions.</p></li><li><p style=\\\"min-height:1.5em\\\">Someone
        from the Engineering function who will help understand how you might work
        best with the rest of the engineering org, building a successful technical
        partnership.</p></li></ol></li></ol><p style=\\\"min-height:1.5em\\\"></p><h1><strong>Benefits</strong></h1><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Competitive
        salary and equity.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>10-year
        exercise window for stock options</em>. You shouldn\u2019t feel pressure to
        purchase stock options if you leave Ashby \u2014do it when you feel financially
        comfortable.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>Twelve weeks
        of fully paid family leave in the US.</em> We plan to expand this to employees
        in other countries as situations arise.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li><li><p style=\\\"min-height:1.5em\\\">If you\u2019re
        in the US, top-notch health insurance for you and your dependents with all
        premiums covered by us.</p></li></ul><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"Hey!
        My name is John https://www.linkedin.com/in/john-reynolds-74511660/ and I
        started here at Ashby as IT Manager around 6 months ago, excited to meet you!
        In that time Ashby has grown from ~250 to 320 folks and the scope of what
        we\u2019re doing in IT has expanded, with this role we hope to continue the
        steep trajectory for the team and the world-class support for the company.\\n\\nCurrently
        the IT team here is just me, we want to grow that team to keep giving the
        Ashby team world-class service and the most automated, delightful technology
        to work with during their time at Ashby.\\n\\nAll the responsibilities and
        requirements are outlined below so have a look. Some points to consider as
        you\u2019re reading through:\\n\\n - This job spec might look familiar, we
        previously opened this role as Senior ~2 months ago. After seeing some great
        candidates (and lots of progress internally with the scope of IT) it became
        clear we need more than we should expect at a Senior in terms of demonstrated
        experience and technical ability. We've updated the role and compensation
        and we're looking to find someone with deeper technical and \\\"foundational\\\"
        experience than would be expected at a Senior level.\\n\\n - This is fundamentally
        a technical role which will become the pivotal role in a larger team as we
        continue to scale. That means you\u2019ll be chatting and helping other Ashby
        folks directly just as much as you will be throwing JSON blobs around between
        APIs. We\u2019re looking for someone who is comfortable doing both.\\n\\n
        - As folks in IT we strongly believe in technology as a great enabling force.
        We\u2019re always looking for novel ways to tackle problems at the fundamental
        level and that means we\u2019re looking for someone who sees the world a little
        differently. You should be able to provide clear examples from previous experience
        of what innovation and technical excellence can look like in the IT/Client
        Engineering space.\\n\\n - Finally, the problems we help people tackle daily
        are as much emotional as they are technical. Whilst it\u2019s great to be
        able to provide the best technical solution to an issue we strive to be able
        to deliver emotional catharsis alongside this. That means listening to people,
        meeting them where they are and providing the reassurance, empathy and the
        genuine human connection that every great support interaction should have.\\n\\n
        - I\u2019m the hiring manager for this role and would be the manager for the
        successful candidate as well. If you want to learn a little more of my background
        I have a public about me page https://hire.john-reynolds.com/about-me?source=copy_link
        you\u2019re welcome to look through!\\n\\n\\n\\n\\nRESPONSIBILITIES:\\n\\nOwn
        and fix customer issues from ingest through to resolution, whether that\u2019s
        a one-time fix or a deeply technical project affecting the whole org\\n\\nOffer,
        advocate and then implement best practices for an IT function that is securely
        creating the most productive workforce in the world\\n\\nOwn projects across
        device management (think Kandji, Crowdstrike), identity management (think
        Okta, Google Workspace), hardware logistics (think laptop shipping, accessories
        lifecycle) and user lifecycle (onboarding, offboarding and user changes) to
        automate manual process and reduce our touchpoints to solely those where the
        human interaction matters\\n\\nContribute to creating a cohesive, performant
        and scalable event-driven backend, making data shifting across the business
        effortless and easy to adopt everywhere.\\n\\n\\n\\n\\nREQUIREMENTS:\\n\\n
        - A strong belief that end user support is an equally important part of being
        a well-rounded engineer as building world-class automations\\n\\n - Deep experience
        - that means being able to show detailed, specific knowledge and broader architectural
        understanding - across relevant IT systems (device management, identity management)\\n\\n
        - Demonstrated experience of automating the interplay between IT systems and
        other internal systems, that means handling APIs, MCP servers and glue-code
        for making disparate systems talk\\n\\n - Comfort and interest in helping
        build a stateless internal backend composed of Typescript services, pub/sub
        queues and APIs for both downstream and upstream applications\\n\\n - Desire
        to work in and help build a small team of experts with an open, engaged and
        radically efficient profile\\n\\n - The ambition to challenge norms and build
        for scale and flexibility outside of the expected\\n\\n - The humility to
        accept the thoughts and emotions of others as valuable before your own and
        be vulnerable in front of others\\n\\n - The wisdom to know when it\u2019s
        best to apply the above\\n\\n\\nNON-REQUIREMENTS:\\n\\n - Experience in exactly
        our tech stack. Whilst strong is expected, we're looking for systems knowledge
        first, experience in certain specific platforms a distant second\\n\\n - A
        specific timezone. Whilst US timezones are preferred to help us cover a gap
        in our current coverage this is not a requirement, we're remote-friendly and
        can hire across Europe, the UK and US and other countries for the right candidate.
        Salaries outside of the US would be location-dependent. We will sponsor visas
        where possible for the right candidate.\\n\\n\\nA SAMPLE OF WHAT YOU WOULD
        BE WORKING ON:\\n\\n - Helping end users with their everyday issues, tracing
        those back to root causes and rolling out fixes that are structural and lasting\\n\\n
        - Leading the initiative to build an internal backend that allows for moving
        data and performing business logic between systems in a way that's scalable,
        auditable, testable and production-grade\\n\\n - Using Terraform and Git to
        make our critical systems (device management, IAM) transparent, self-documenting,
        audit-ready and auto-deployed\\n\\n - Defining and implementing authentication
        rules for users that tie directly and elegantly to the governing policies
        whilst providing industry-leading security\\n\\n - Building out role-based
        access control and birthright access as well as owning and tackling the people-data
        challenges that stem from this\\n\\n\\nWHAT YOU\u2019LL NOT BE WORKING ON:\\n\\n
        - Break/fix cycles when root causes can be tackled instead. You will be empowered
        and expected to fix problems not delay symptoms.\\n\\n - Non-stop tickets.
        Everyone in the team is expected to contribute equally to interrupt-driven
        and systemic issues, no first or second line here.\\n\\n - Traditional corporate
        IT. We use a relatively standard \u201Cstartup stack\u201D which means nearly
        everything is cloud based, devices are majority MacOS with a very small Linux
        subset and we have the agency and ability to move fast and with outsized impact.\\n\\n\\n\\nIf
        you\u2019d like to hear a little more about the role, there's a video walkthrough
        originally recorded for the previous (senior) posting here:\\n\\n\\n\\n\\n\\n\\nHOW
        THIS HIRING PROCESS WORKS\\n\\nWe want to try and be as transparent as possible
        about how our hiring process works. Here's what we're doing for this role:\\n\\n\\n\\n\\nTHE
        APPLICATION STAGE\\n\\nWe'll be keeping this role open until it's filled.
        This is different from the previous (Senior) posting where we used cohort
        hiring https://www.ashbyhq.com/podcast/episodes/cohort-hiring, we believe
        the high bar for a Staff level means we need to optimise for getting the most
        eyes on the posting.\\n\\n 1. That means if you're reading this posting the
        role is open and you're welcome to apply.\\n\\n 2. There are no auto-reject
        rules on this role. If you apply your application will be reviewed by a human
        with AI help. https://www.ashbyhq.com/blog/recruiting/ai-assisted-application-review-in-practice\\n\\n
        3. We will reply to every application letting you know whether we'd like to
        advance or not.\\n\\n 4. Considering the large volume of applications we won't
        be able to give specific feedback at this point. Apologies but we want to
        be thoughtful and considered with any feedback we do provide and we can't
        do this at the application phase.\\n\\n\\n\\n\\nTHE INTERVIEW PROCESS\\n\\nIf
        you're invited to continue with the application - congratulations! Here's
        what will happen next:\\n\\n 1. You will be invited to book time in for a
        20 minute screen call. We'll be looking for answers to initial questions like:\\n
        \   \\n    1. Are your compensation and job role expectations aligned with
        this role?\\n    \\n    2. Why do you want this role?\\n    \\n    3. Can
        you clearly and crisply convey both your technical and social capability to
        excel in this role?\\n    \\n    4. Are there outstanding questions we can
        answer?\\n\\n 2. Assuming this goes well we'll invite you back for a longer
        (60 minute) hiring manager interview with me. In this interview we will:\\n
        \   \\n    1. Dive much deeper in to your background and try and tease out
        concrete examples of technical ability\\n    \\n    2. Test your ability to
        think more broadly and ambitiously about what excellence looks like in IT\\n
        \   \\n    3. Answer any deeper questions you might have now we're further
        into the process and you have more context on the company and tech stack.\\n\\n
        3. The next stage is a take-home test which has the following format:\\n    \\n
        \   1. Given a broad problem area, propose a technical spec on how you would
        ideally fix this\\n    \\n    2. Speculate on feedback you might receive and
        answers you might give from both technical and non-technical peers\\n\\n 4.
        Next, you'll have a chance to meet with Abhik https://www.linkedin.com/in/abhikpramanik/
        who will be completing a final appraisal of your technical fit for the role.
        You'll go through a past projects deep dive https://www.ashbyhq.com/resources/staff-it-engineer-deep-dive
        and talk through the value and challenges of a project that you feel best
        exhibits your technical ability.\\n\\n 5. Finally, you'll get to meet some
        more of the team! Specifically you'll have a cross-functional interview where
        you'll meet:\\n    \\n    1. Someone from the People function who will have
        some questions about interacting with the People team and how to build a successful
        relationship across functions.\\n    \\n    2. Someone from the Engineering
        function who will help understand how you might work best with the rest of
        the engineering org, building a successful technical partnership.\\n\\n\\n\\n\\nBENEFITS\\n\\n
        - Competitive salary and equity.\\n\\n - 10-year exercise window for stock
        options. You shouldn\u2019t feel pressure to purchase stock options if you
        leave Ashby \u2014do it when you feel financially comfortable.\\n\\n - Twelve
        weeks of fully paid family leave in the US. We plan to expand this to employees
        in other countries as situations arise.\\n\\n - Generous equipment, software,
        and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
        covered with manager approval.\\n\\n - If you\u2019re in the US, top-notch
        health insurance for you and your dependents with all premiums covered by
        us.\\n\\nAshby provides equal employment opportunities (EEO) to all employees
        and applicants for employment without regard to race, color, religion, sex,
        national origin, age, disability, genetics, sexual orientation, gender identity,
        or gender expression. We are committed to a diverse and inclusive workforce
        and welcome people from all backgrounds, experiences, perspectives, and abilities.\\n\\nAshby
        is committed to a fair and transparent hiring process. We confirm that this
        advertisement is for an active, existing vacancy within our organization.
        Please be advised that we may use artificial intelligence-driven tools to
        assist our recruitment team in screening, assessing, and selecting candidates
        for this position.\",\"compensation\":{\"compensationTierSummary\":\"$170K
