        is not something you\u2019re interested in.\\n\\n - You need close oversight,
        a clearly carved out roadmap, or step-by-step guidance to succeed. This role
        requires comfort with ambiguity, initiative and a willingness to roll up your
        sleeves to build something you're passionate about.\\n\\n - You believe there
        is one right way to provide support and measure success.\\n\\n\\nOur Philosophy:\\n\\nHere
        are a few key points (relevant to the go-to-market side) that should give
        you an idea of what it is like to work with us:\\n\\n - We spend a lot of
        time building best-in-class products since we believe a highly differentiated
        product is a lot easier to sell.\\n\\n - We want to offer deep expertise whenever
        we interact with prospects and customers \u2013 whether it be through scaled
        engagements (e.g. webinars), 1:1 conversations, or through written word (e.g.
        documentation).\\n\\n - We strongly believe that small teams with very talented
        people (and the right work environment) deliver much better performance than
        teams with large headcount. We hire and compensate accordingly.\\n\\nWe value
        a strong sense of ownership, principled thinking over experience, and thoughtful
        communication (we put a lot of effort into using the right communication channels)
        - we\u2019ll get into these and other values during the hiring process.\\n\\nThe
        Interview:\\n\\nAt Ashby, our team and interview process want to help you
        show your best self. Our interview process is structured to get to know you
        and your career as well as empower you with insight into our key focus areas.
        Here is the process in its entirety:\\n\\n - 30 min - Recruiter Screen with
        Talent Team\\n\\n - 45 min - Interview with Hiring Manager\\n\\n - Take-Home
        Assessment - one week to complete\\n\\n - Final Round:\\n   \\n   - 30 min
        \\\"Customer Experience\\\" interview with two other Customer Success leaders\\n
        \  \\n   - 30 min \\\"Team Insights\\\" interview with a Support Specialist,
        and a Support Leader\\n   \\n   - 30 min \\\"Support Management Approach\\\"
        interview with another Support Leader\\n   \\n   - 10 min - Closing Questions
        with Hiring Manager\\n\\n - Chat with Benji, CEO\\n\\nBenefits:\\n\\n - You\u2019ll
        get the time to do things the right way; we put a lot of emphasis on high
