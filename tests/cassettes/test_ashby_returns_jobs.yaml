        to lead from a high level without digging into the technical details.\\n\\n
        - You need perfect certainty before acting or prefer prolonged analysis over
        decisive execution.\\n\\n\\n\\n\\nOUR INTERVIEW PROCESS\\n\\nOur interview
        process is thorough \u2014 we aim to ensure each person that joins the team
