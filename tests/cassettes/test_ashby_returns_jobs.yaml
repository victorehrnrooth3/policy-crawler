        AI</u></a> throughout the platform</p></li><li><p style=\\\"min-height:1.5em\\\">Known
        for our pace of innovation and advanced analytics</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        this Role</strong></h2><p style=\\\"min-height:1.5em\\\">We're hiring an Account
        Executive in North America (West) to continue to scale Ashby's fast growing
        Startup segment! In this role, you'll help play a key role on a small team,
        helping us win new business with growth companies of up to 100 employees.
        We receive a steady stream of inbound leads in this segment, which means our
        Startup AEs need to be highly organized and capable of managing a high volume
        of opportunities. You'll also do outbound pipeline development to some of
        the fastest growing and exciting venture-backed startups in the market to
        accelerate our growth.</p><p style=\\\"min-height:1.5em\\\"><em>To ensure
        a smooth review process, please apply to only one territory (East or West)
        that best aligns with your background and time preferences.</em></p><p style=\\\"min-height:1.5em\\\"></p><h3><strong>You
        could be a great fit if</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4E3 You practice clear, concise communication.
        You write short, effective emails. You are skilled at executing outbound strategies
        that target high growth startup accounts and want the opportunity to lead
        the team in pipeline creation.\_</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F558
        You\u2019re highly organized and diligent with your time. You know where to
        focus your efforts to produce the best results.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F913
        You love becoming an expert. You enjoy learning about new fields of interest,
        and can distill information down to its essence to share with others.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F50D Your peers describe you as detail
        oriented. You send crisp follow-up emails, on time. You take pride in internal
        operations, like real-time CRM updates.</p></li><li><p style=\\\"min-height:1.5em\\\">\u26A1\uFE0F
        You move fast. You leverage tools/technology to maximize your selling time.
        You are comfortable managing a pipeline of 15+ opportunities concurrently.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F3A7 You are an excellent listener. You
        consistently seek to understand both the technical pain and the business impact,
        hearing the nuance and detail in what others have to say.</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F9D1\u200D\U0001F4BC
        You are a collaborative team player, dedicated to supporting your colleagues
        and contributing to the team's overall success. You thrive in a cooperative
        environment where growth and team success are valued.</p></li></ul><h3><strong>Requirements</strong></h3><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">\U0001F91D
        You have 2+ years of full-cycle SaaS sales experience</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4E2
        You source sales meetings from outbound prospecting activities</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4C8 You have consistently achieved stretch
        targets by being both creative and organized</p></li></ul><h3><strong>Bonus
        Points</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        were previously a recruiter or RecOps professional and have used Ashby or
        other tools like Greenhouse or Lever</p></li><li><p style=\\\"min-height:1.5em\\\">You
        have previously sold to TA professionals</p></li><li><p style=\\\"min-height:1.5em\\\">Or,
        you were a top performing inbound and outbound BDR before becoming an AE</p></li></ul><h3><strong>Reasons
        not to apply:</strong></h3><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
