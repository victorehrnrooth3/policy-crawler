        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/ac5a2281-806d-4aed-b742-69527b3e4575\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/ac5a2281-806d-4aed-b742-69527b3e4575/application\",\"descriptionHtml\":\"<h2><strong>About
        Ashby</strong></h2><p style=\\\"min-height:1.5em\\\">We\u2019re building the
        next generation of enterprise software, starting with products that help talent
        leaders, recruiters, and hiring managers unlock hiring excellence. Following
        our Series D in 2025, we\u2019re continuing to grow ARR at more than 100%
        year over year, serving over 4,000 customers including industry leaders like
        OpenAI, Ramp, Deliveroo, Notion, and Reddit. Our platform has expanded into
        multiple products that support both land-and-expand growth and significant
        new business wins, and we\u2019re rapidly moving upmarket with strong momentum.
        Along the way, we\u2019ve embedded AI throughout the platform and built a
        reputation for our pace of innovation and advanced analytics. If you\u2019re
        excited to work on meaningful problems in a fast-growing environment, we\u2019d
        love to hear from you.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        this Role</strong></h2><p style=\\\"min-height:1.5em\\\">TA tools in the Enterprise
        represent a huge market opportunity, a $1B+ TAM, and the incumbents are legacy
        players. We are displacing a collection of tools (ATS, Sourcing &amp; CRM,
        Scheduling, Analytics, Offers &amp; Approvals) with a consolidated talent
        suite. This is a proven playbook that Workday used to win the HCM market as
        customers realize value in a multitude of ways, and we are on track to do
        the same.</p><p style=\\\"min-height:1.5em\\\">We are seeking an experienced
        Enterprise Sales Leader in North America to lead the segment and scale our
        Enterprise AE team - West (Mountain, Pacific, Central). There are three primary
        responsibilities that this sales leader will take on:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\"><strong>Own the revenue outcomes for the segment</strong>,
        with clear accountability for delivering results. Partner with the senior
        AEs in a team selling motion to maximize our win rates on the company's largest
        opportunities. Manage deal risks and help navigate the complexities of large-scale
        competitive replacement deals.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Build
        a high calibre team</strong> in lock step with market demand. In general we
        believe that smaller, high caliber teams can achieve remarkable results. Your
        Enterprise team will be an adept group of solution selling experts.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Establish a reputation for excellence</strong>
        by fostering alignment across Product, Marketing, Solutions Engineering &amp;
        Professional Services creating a flywheel for future enterprise customer acquisition.</p></li></ol><p
        style=\\\"min-height:1.5em\\\">In this role, you\u2019ll report to our Head
        of AMER Sales (<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.linkedin.com/in/leighfitzgerald/\\\"><u>Leigh Brown</u></a>)
        and have significant impact in defining our go-to-market strategy and sales
        methodology. If we are even moderately successful relative to our ambition,
        we'll have an incredible growth story to tell in just a few years!</p><p style=\\\"min-height:1.5em\\\"></p><h1><strong>You
        could be a great fit if:</strong></h1><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">\U0001F4BC You\u2019ve led and scaled a team
        of SaaS Enterprise Account Executives delivering $5M/yr+ at a company that
        has scaled beyond $100M ARR</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4B0
        You have helped win $1M+ SaaS deals with publicly traded companies, and can
        help your team see around corners on complex deals</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F947
        You have a proven track record of hiring and onboarding Ent AEs who can create
        their own pipeline and close both more tactical ($100k) and strategic ($500k+)
        deals</p></li><li><p style=\\\"min-height:1.5em\\\">\U0001F4CA You have a
        strong mental model for enterprise sales execution. At the same time, you're
        a lifelong learner and are open to new ideas and experimentation.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F91D You build trusted relationships
        with customers and confidently facilitate peer-to-peer conversations between
        senior leaders to deepen partnerships and elevate strategic engagements.</p></li><li><p
        style=\\\"min-height:1.5em\\\">\U0001F913 You become a product and industry
        expert. You connect the dots quickly. Customers and your team trust you to
        provide practical advice and relevant stories.</p></li><li><p style=\\\"min-height:1.5em\\\">\u2699\uFE0F
        You have successfully sold a complex multi-product platform and have won competitive
        rip-and-replace sales motions.</p></li></ul><h1><strong>Bonus</strong></h1><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You have
        sold to Talent and/or People leaders and are familiar with their pains and
        priorities</p></li></ul><h1><strong>You shouldn't apply if:</strong></h1><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You're
        a dashboard-and-forecast manager who doesn't like to get into the deals and
        daily operations</p></li><li><p style=\\\"min-height:1.5em\\\">You're not
        keen on learning our substantial product. \\\"That's for SEs\\\" isn't how
        we approach things here.</p></li></ul><h2><strong>Our Philosophy</strong></h2><p
        style=\\\"min-height:1.5em\\\">Here are a few key points that should give
        you an idea of what it is like to work with us:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">We have clear expectations about what it means
        to be a <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/blog/culture/ashbys-leadership-principles?utm_source=linkedin&amp;utm_medium=social&amp;utm_campaign=Talent+Trends&amp;utm_term=jim\\\">leader
        at Ashby</a></p></li><li><p style=\\\"min-height:1.5em\\\">We're highly collaborative
        and we believe in a team-based sales motion to maximize our win rates on high
        impact deals</p></li><li><p style=\\\"min-height:1.5em\\\">We believe in developing
        subject matter expertise (not just on our product but also the TA space broadly)
        which allows us to provide a differentiated buyer experience</p></li><li><p
        style=\\\"min-height:1.5em\\\">We continue to make material investments in
        engineering and product because we know at the end of the day, having the
        best product makes winning new customers easier</p></li></ul><p style=\\\"min-height:1.5em\\\">We
        value a strong sense of ownership, principled thinking over decades of experience,
        and thoughtful &amp; clear communication both internally and with customers.</p><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Interview Process</strong></h2><p
        style=\\\"min-height:1.5em\\\">Our interview process is designed so you can
        showcase your achievements and points of learning and apply those to a practical
        exercise. We'll provide you with sample customer calls and pipeline data so
        you can develop a well informed perspective on our product and the Enterprise
        segment. You\u2019ll have opportunities to ask questions of our team throughout.</p><p
        style=\\\"min-height:1.5em\\\">The interview process for this role is four
        rounds in the following order:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\"><strong>Intro Call</strong> (30 min) - You'll
        meet with Recruiting to discuss your fit for the role and address questions
        about our market and solution.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Experience
        Deep Dive </strong>(1 hr) - You'll walk Leigh through your career journey
        in some detail to highlight your experience, achievements, and points of learning
        to understand how you've developed into the leader you are today.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Panel Presentation</strong> (1 hr)
        - We'll provide you with pipeline data and seek your perspective on the segment.
        You'll discuss your approach to hiring, coaching and sales execution.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Final Round</strong> (2.5 hrs) - You'll
        have a set of four interviews with cross-functional leaders</p></li></ol><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">A product
        that our prospects &amp; customers are<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/customers\\\"> <u>truly
        excited about</u></a></p></li><li><p style=\\\"min-height:1.5em\\\">Competitive
        salary, commission and equity.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>10-year
        exercise window for stock options</em>. You shouldn\u2019t feel pressure to
        purchase stock options if you leave Ashby \u2014do it when you feel financially
        comfortable.</p></li><li><p style=\\\"min-height:1.5em\\\">Unlimited PTO with
        four weeks recommended per year.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li></ul><p style=\\\"min-height:1.5em\\\"><em>Ashby
        provides equal employment opportunities (EEO) to all employees and applicants
        for employment without regard to race, color, religion, sex, national origin,
        age, disability, genetics, sexual orientation, gender identity, or gender
        expression. We are committed to a diverse and inclusive workforce and welcome
        people from all backgrounds, experiences, perspectives, and abilities.</em></p><p
        style=\\\"min-height:1.5em\\\"><em>Ashby is committed to a fair and transparent
        hiring process. We confirm that this advertisement is for an active, existing
        vacancy within our organization. Please be advised that we may use artificial
        intelligence-driven tools to assist our recruitment team in screening, assessing,
        and selecting candidates for this position.</em></p>\",\"descriptionPlain\":\"ABOUT
