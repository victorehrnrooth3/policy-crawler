        style=\\\"min-height:1.5em\\\">Hello! I\u2019m Allie, Head of Support here
        at Ashby. I'm excited to share that we're hiring a Support Engineer in North
        America! \U0001F389\_</p><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\"><strong>About
        this Role</strong></p><p style=\\\"min-height:1.5em\\\">As a Support Engineer,
        you will be at the center of providing an excellent experience to customers
        by diagnosing and resolving technical issues ensuring a high level of customer
        satisfaction through effective communication and problem-solving. You will
        assist with investigating and resolving technical issues that come to Support
        while identifying patterns in customer inquiries to drive product improvement,
        as well as opportunities to enable our Support team on technical concepts.
        Your knowledge of integrations and platforms will be key to your success,
        as you'll leverage this expertise to address customer inquiries related to
        system integrations, data flow, and product functionality. You\u2019ll be
        a key contributor to our documentation and enablement strategy while collaborating
        with Engineering and Support to address complex issues.</p><p style=\\\"min-height:1.5em\\\"></p><p
        style=\\\"min-height:1.5em\\\"><strong>Role Responsibilities:</strong></p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Technical
        Troubleshooting:</strong> Develop a deep technical understanding of Ashby
        capabilities and systems to support diagnosis of technical issues and to drive
        timely and effective resolutions for customers. Provide comprehensive support
        regarding the investigation of integration issues, API inquiries, and bug
        reports.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Expertise in
        Integrations:</strong> Leverage in-depth understanding of integration frameworks
        and related technologies to troubleshoot and resolve complex integration issues.
        Proactively identify patterns in customer challenges to recommend product
        enhancements and streamline integration processes.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Customer
        Experience:</strong> Provide exceptional customer service, ensuring clients
        feel supported and valued.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Collaboration
        with Engineering:</strong> Work closely with the Ashby Engineering team to
        escalate issues, share insights, and contribute to the continuous improvement
        of our products.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Documentation:</strong>
        Create and maintain detailed documentation of support processes, common issues,
        and solutions to enhance the knowledge base.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Continuous
        Improvement:</strong> Gather, analyze, and relay customer feedback to the
        engineering team to inform product development and enhancements.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Support Enablement: </strong>Share
        expanding knowledge with the rest of the Support Team to assist with creating
        holistic understanding of the platform.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>Role
        Requirements:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Technical
        Expertise:</strong> Strong understanding of software applications, Internet
        protocols, troubleshooting, and automation via scripting.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Communication
        Skills:</strong> Excellent verbal and written communication skills, with the
        ability to explain technical concepts to non-technical users. Detail-oriented
        when documenting reproduction steps and consolidating relevant information
        to report technical issues internally.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Customer-Focused:</strong>
        A passion for delivering outstanding customer service and a commitment to
        ensuring a positive customer experience.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Team
        Collaboration:</strong> Ability to work effectively within a team and independently,
        with a proactive approach to solving problems.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Adaptability:</strong>
        Comfortable working in a dynamic environment with the ability to adapt to
        product updates and processes improvements quickly.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You
        Should Apply If:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        have a strong technical background, particularly in API integrations, and
        enjoy solving complex problems by analyzing logs and code.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You are passionate about helping customers
        and providing a top-notch support experience.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        have excellent communication skills and can convey technical information clearly
        to various audiences.</p></li><li><p style=\\\"min-height:1.5em\\\">You thrive
        in a collaborative environment and enjoy working closely with engineering
        teams.</p></li><li><p style=\\\"min-height:1.5em\\\">You are proactive, detail-oriented,
        and always looking for ways to improve processes.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>You
        Should Not Apply If:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You do not have a strong technical background
        or experience in technical troubleshooting.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        are not comfortable with asynchronous collaboration or communicating in a
        thoughtful way with Customers, Support Team Members, or Engineers.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You are not comfortable communicating with
        customers or explaining technical concepts in simple terms.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You are not adaptable to changing environments
        and new technologies.</p></li><li><p style=\\\"min-height:1.5em\\\">You do
        not have a passion for customer-facing interactions and providing a great
        customer experience.</p></li><li><p style=\\\"min-height:1.5em\\\">You value
        in-office culture for motivation; this role is remote (given our office is
        in San Francisco) so we're seeking self-starters!</p></li></ul><h2><strong>About
        Ashby</strong></h2><p style=\\\"min-height:1.5em\\\">We\u2019re building the
        next generation of enterprise software, and we\u2019re starting with a suite
        of products that help talent leaders, recruiters, and hiring managers run
        their hiring process significantly better. Learn more on our website:<a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://ashbyhq.com\\\">
        </a><u>https://www.ashbyhq.com/<br /><br /></u>We are well-funded and backed
        by great investors, including Y Combinator, Elad Gil and Lachy Groom. We publicly
        launched in October 2022 and are working with amazing companies we're proud
        to partner with.<br /><br />We\u2019ve built an incredible team and exceptional
        product over the past few years, and we truly are just getting started. In
        short, this is the perfect time to join \U0001F680</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>About
        Go To Market</strong></h2><p style=\\\"min-height:1.5em\\\">Our Support team
        is a part of our Customer Success department, and thus is a part of our Go
        To Market function. Here are a few points that should give you an idea of
