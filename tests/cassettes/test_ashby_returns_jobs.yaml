        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/9921e5a8-5e98-4aae-bd3b-fc954673a2f9\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/9921e5a8-5e98-4aae-bd3b-fc954673a2f9/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">Hi \U0001F44B\U0001F3FC I'm<a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/anna-hall-bb420a9/\\\"><u>
        Anna</u></a><u> </u>, and I lead our Customer Success, Marketing and G&amp;A
        hiring efforts at Ashby. When I started in Jan '24, I couldn't wait to dive
        into Ashby the product (spoiler, it's even better than you think) and build
        on the foundations we had in place to grow our GTM teams. It's been a lot
        of fun, and one of the things I love most is that our work directly impacts
        the tool that we get to use - how cool is that? We also do things a bit differently
        here, and here\u2019s my favorite example: we don't over-index on referrals
        (I had never spoken to <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer
        nofollow\\\" href=\\\"https://www.linkedin.com/in/jmmmmmmmmmmmmmmmmmmmm/\\\"><u>Jim</u></a>
        before my first interview, and over 60% of our 2025 hires were inbound).</p><p
        style=\\\"min-height:1.5em\\\">The Ashby team has grown so much over the last
        few years, and now we're adding a few GTM Recruiters to our team! Historically
        we have run a cohort recruiting model for these roles (you can learn more
        about that <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/podcast/episodes/cohort-hiring\\\"><u>here</u></a>),
        but this time we are treating the position as evergreen as we have multiple
        positions to hire.  </p><p style=\\\"min-height:1.5em\\\">We have notable
        customers like Notion, Linear, Shopify, and Snowflake. Our growth and retention
        metrics are best-in-class among our peers: we have tens of millions in ARR,
        growing &gt;100% year over year, over 4,000 customers, very low churn, and
        many years of runway. We\u2019ll share more details once we meet, but you
        now probably have a good idea as to why we're hiring for this role \U0001F605.<br
        /><br /><strong>A Note from</strong><a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/jmmmmmmmmmmmmmmmmmmmm/\\\"><strong>
        <u>Jim</u></strong></a><strong>, our VP People &amp; Talent:<br /><br /></strong>The
        job I do at Ashby is my dream job and I hope being a Recruiter here is yours!
        Not only will you get to help build the people side of our business but you\u2019ll
        also get to become an expert user of our product and a thought leader on how
        to use it. You\u2019ll get to make a lasting contribution to the whole recruiting
        community as we drive improvements across the talent tech space. Check out
        our<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/recruiting\\\"><u>
        Recruiting blog and Hiring Excellence Framework</u></a> as an example of our
        content creation for the talent community.<br /><br />Joining us means being
        part of a talented team, tackling the challenges of our stage, and contributing
        to our team and product growth. We value humility, continuous improvement
        and a dedication to excellence (<a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://ashbyhq.com/blog/culture/ashbys-operating-principles\\\"><u>more
        here</u></a>). If you are passionate about bringing your unique strengths
        to the team and building a culture of success, we would love to hear from
        you.</p><p style=\\\"min-height:1.5em\\\"><strong>The Role</strong></p><p
        style=\\\"min-height:1.5em\\\">We are seeking GTM Recruiters with a proven
        track record of discovering and hiring amazing non-engineering talent in the
        tech industry. In this role, you will own the end-to-end development and execution
        of recruitment strategies to find exceptional talent to fill critical roles.
        We will be hiring dedicated recruiters to focus on G&amp;A, Professional Services,
        Customer Success and Sales. While we are  you are a bit earlier or tenured
        in your recruiting career, if you have experience recruiting for these teams,
        are, have done this somewhere with a high talent bar and are truly excited
        about staying at the forefront of the recruiting industry, please consider
        applying. <br /><br />Success in this role over the next six months will involve
        attracting, evaluating and hiring high quality candidates to meet our company's
        hiring needs for GTM positions across the business. It will also require building
        and collating phenomenal talent pools to create a strong infrastructure for
        future growth.</p><p style=\\\"min-height:1.5em\\\"><strong>You will achieve
        this by:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Attracting,
        evaluating and hiring top talent. We focus on quality over quantity, and partner
        closely with our stakeholders to assess the market, diagnose root cause issues
        and make recommendations. </p></li><li><p style=\\\"min-height:1.5em\\\">Developing
        processes that focus on the very highest quality of hire as we scale</p></li><li><p
        style=\\\"min-height:1.5em\\\">Engaging with departmental leaders and hiring
        managers to expertly qualify requirements</p></li><li><p style=\\\"min-height:1.5em\\\">Using
        data from Ashby to drive recommendations and adjust hiring practices as needed</p></li><li><p
        style=\\\"min-height:1.5em\\\">Focusing on quality and alignment at the optimal
        volume to meet goals</p></li></ul><p style=\\\"min-height:1.5em\\\">As you
        are probably ascertaining from the above, we are looking for a person that
        gains energy from both strategizing on creative ways to accelerate our hiring
        as well as getting their hands dirty finding and evaluating candidates.<br
        /></p><p style=\\\"min-height:1.5em\\\"><strong>To be qualified for this role,
        you must have the following:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Proven track record as an expert Go To Market
        Recruiter in one or more of the following: G&amp;A or Customer Success, from
        within a B2B SaaS company for a significant portion of your career. </p></li><li><p
        style=\\\"min-height:1.5em\\\">You\u2019ve operated with autonomy and are
        used to leading searches end-to-end. We value competency over tenure, but
        you have a foundation of proven experience that allows you to establish instant
        credibility with technical leadership</p></li><li><p style=\\\"min-height:1.5em\\\">Data-driven
        mindset with the to optimize your workflows, balancing diversity, quality
        and volume.</p></li><li><p style=\\\"min-height:1.5em\\\">Demonstrated experience
        in creating innovative sourcing strategies that differentiate the talent pipelines
        from the inbound attraction and referrals that we have traditionally used</p></li></ul><p
        style=\\\"min-height:1.5em\\\">If you need someone else to do any of the following,
        then this role is probably not for you:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Boolean search and talent mapping activities</p></li><li><p
        style=\\\"min-height:1.5em\\\">Requisition qualification with senior leaders</p></li><li><p
        style=\\\"min-height:1.5em\\\">High volumes of outreach and screening calls</p></li><li><p
        style=\\\"min-height:1.5em\\\">Prioritization of your workload</p></li><li><p
        style=\\\"min-height:1.5em\\\">Root cause analysis of your pipelines and roles</p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>Instructions:<br /></strong>Please
        take your time with your application. I will review applications on Monday,
        June 1st and we will not review any applications or speak to anyone until
        after that date/time. We will review EVERY application and speak to the shortlist
        we make based on the applications. There are no prizes for being first and
        no advantages to be gained by reaching out, being referred or knowing someone
        here, so please don't message anyone on the recruiting team.</p><p style=\\\"min-height:1.5em\\\">We
        have hired a few recruiters at Ashby and have reviewed hundreds of recruiter
        applications, so I hope that sharing the following might be useful as you
        consider applying. The applications that stand out often include the following:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Demonstrate
        the impact of their work in a recruiter capacity. Resumes focused on projects
        or leadership may not stand out and highlight exactly how your experience
        relates to this role. Metrics can show the reader <em>how well</em> you did
        the job, and that stands out.</p></li><li><p style=\\\"min-height:1.5em\\\">Tie
        their work to the Business functions. We will only hire someone with proven
        full cycle  hiring experience, focused on Sales, G&amp;A or CS roles. 'Recruited
        a variety of roles' is not the same as showing the reader that you've worked
        Implementation or Customer Success roles, as an example.</p></li><li><p style=\\\"min-height:1.5em\\\">Highlight
        this recruiting success in a growth, B2B SaaS company</p></li><li><p style=\\\"min-height:1.5em\\\">Answer
        the application questions, in a way that shows your skills and experience
        (not with a copy/paste from AI). Each question has context provided or real
        meaning for us, beyond what we would see in your resume. Applications that
        choose not to answer these questions will not move forward. </p></li></ul><p
        style=\\\"min-height:1.5em\\\"><br /></p><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Competitive
        salary and equity.</p></li><li><p style=\\\"min-height:1.5em\\\">10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO with four weeks recommended per
        year. Expect \u201CVacation?\u201D in our one-on-one agenda until you start
        taking it \U0001F605.</p></li><li><p style=\\\"min-height:1.5em\\\">Twelve
        weeks of fully paid family leave in the US. We plan to expand this to employees
        in other countries as situations arise.</p></li><li><p style=\\\"min-height:1.5em\\\">Generous
        equipment, software, and office furniture budget. Get what you need to be
        happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li><li><p style=\\\"min-height:1.5em\\\">If you\u2019re
        in the US, top-notch health insurance for you and your dependents with all
        premiums covered by us.</p></li></ul><p style=\\\"min-height:1.5em\\\">Ashby\u2019s
        success hinges on hiring great people and creating an environment where we
        can be happy, feel challenged, and do our best work. We\u2019re being deliberate
        about building that environment from the ground up. I hope that excites you
        enough to apply.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Interview
        Process</strong></h2><p style=\\\"min-height:1.5em\\\">At Ashby, our team
        and interview process want to help you show your best self. We\u2019ll dive
        into past projects and simulate working together via talking through past
        projects and conducting a short but realistic assignment. Our interview process
        is 3 rounds:</p><ol style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">30-minute
        introduction call to discuss Ashby and your past work with me,<a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/anna-hall-bb420a9/\\\">
        <u>Anna</u></a>, so expect a traditional recruiting screen with a<a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/posts/fishstephanie_how-many-times-have-you-been-in-an-interview-activity-7340765982015049728-JT36?rcm=ACoAAAKizq8B53dTR5ij_zb1PN8bQYwXB63fDfU&amp;utm_medium=member_desktop&amp;utm_source=share\\\">
        <u>slightly different format.</u></a></p></li><li><p style=\\\"min-height:1.5em\\\">A
        take-home assignment that will ask you to interpret pipeline data and make
        recommendations to a hiring manager</p></li><li><p style=\\\"min-height:1.5em\\\">~2hr
