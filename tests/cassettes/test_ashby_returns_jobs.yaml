cdc4\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/3b9b0141-86e7-46b2-b6b4-ed039b84cdc4/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">Hi \U0001F44B\U0001F3FE I\u2019m <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/abhikpramanik\\\"><u>Abhik</u></a>,
        Ashby's Co-Founder and VP of Engineering. We\u2019re looking for an ambitious
        full-stack engineer who is laser-focused on solving customer problems and
        making the right long-term investments to solve them not only today but in
        our future features and products.</p><p style=\\\"min-height:1.5em\\\">What
        Ashby gives you in return is the best of both early and growth-stage environments.
        The agency and no-nonsense of a seed startup: you write product specs, make
        product and design decisions, and build in an almost-no-meeting culture. While
        also the product-market fit and scale of a growth-stage startup: tens of thousands
        of daily users who depend on your software and eagerly await your next feature.</p><p
        style=\\\"min-height:1.5em\\\">We have notable customers like Notion, Linear,
        Shopify, and Snowflake. Our growth and retention metrics are best-in-class
        among our peers: we have tens of millions in ARR, growing &gt;100% year over
        year, very low churn, and many years of runway. We\u2019ll share more details
        once we meet.</p><p style=\\\"min-height:1.5em\\\">You\u2019ve probably seen
        this role posted before, and it\u2019s because we\u2019re always expanding
        the team (we\u2019re on track to double this year). We\u2019re bubbling with
        ideas on how to support Talent Acquisition through software, and we\u2019ve
        started the journey of building products beyond Talent Acquisition. We read
        every application and aim to respond to yours within 3-4 days (often sooner).</p><p
        style=\\\"min-height:1.5em\\\"></p><h1>About the Role and How We Work</h1><p
        style=\\\"min-height:1.5em\\\">Our engineering culture strives to recreate
        the environments where we did our best work as ICs \u2013 where we had the
        ownership and agency to impact our users with creative and innovative software.</p><p
        style=\\\"min-height:1.5em\\\">I started my career building software for artists
        in the Visual Effects industry. It was a formative experience for me as a
        software engineer because success relied on my ability to be a product manager
        and designer. I talked to artists to understand their needs. I came up with
        ideas. I did industry research, designed interfaces, and prototyped ideas.
        I watched artists use what I built and decided what to tackle in the next
        iteration. No daily stand-ups, no t-shirt sizing, no planning meetings.</p><p
        style=\\\"min-height:1.5em\\\">I studied computer science to solve problems,
        not tickets, and this felt exactly like that. I not only felt creative and
        fulfilled but the agency and ownership we were given as engineers powered
        an incredible amount of innovation.</p><p style=\\\"min-height:1.5em\\\">Innovation
        came differently (or not at all) at technology startups beyond the seed stage,
        often through an engineer\u2019s force of will and ability to push back against
        culture (rather than any encouragement from it). Engineering was narrowed
        to implementation and delivery, partly due to the influence of other departments
        and partly due to the influx of \\\"Agile\\\" processes like sprint planning.
        In those companies, I felt like a JIRA jockey. </p><p style=\\\"min-height:1.5em\\\">At
        Ashby, we\u2019re building an environment that is optimistic about what engineers
        can own and achieve. An environment that embraces innovative engineers, and,
        frankly, often stays out of their way. As a Product Engineer, you\u2019ll
        take ownership over a large portion of one of our products and own projects
        end-to-end (wearing hats traditionally worn by product and design). You\u2019ll
        research competitors, write product specs, make wireframes, and more. To ground
        it with examples, product engineers at Ashby have:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Designed and built automated interview scheduling.
        This feature automates scheduling by calculating possible times from a pool
        of interviewers and other constraints, and then presenting these times to
        the candidate for selection via our responsive web app. This solves the \u201CCalendar
        Tetris\u201D problem I talk about in \\\"What We're Building.\\\"</p></li><li><p
        style=\\\"min-height:1.5em\\\">Built a generalized declarative filter architecture
        that allows users to create complex filters for any record with a consistent
        UI and compile it to SQL in our backend. Many user-facing features use it.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Specced, designed, and implemented a feature
        that allows users to complete signing offers entirely within Ashby. This project
        involved talking to customers to understand their requirements, deciding what
        technologies to use, building a prototype, and working with other team members
        to integrate the final implementation into additional features.</p></li></ul><p
        style=\\\"min-height:1.5em\\\"></p><h1>What We\u2019re Building</h1><p style=\\\"min-height:1.5em\\\">As
        engineers, we are used to tooling that makes us <strong>better</strong> at
        what we do. When we started Ashby, we saw the opposite with Talent Acquisition
        software. Recruiting teams were leveling up how they did their work, but instead
        of software meeting this new standard, it held them back.</p><p style=\\\"min-height:1.5em\\\">Scheduling
        a final round is an excellent example. Recruiting teams wanted to schedule
        candidates faster, track interviewer preparation and quality, and do it with
        half the headcount. A recruiter needed to manually collect availability from
        the candidate, identify qualified interviewers, perform \u201CCalendar Tetris\u201D
        to find who is available to interview the candidate, schedule on the earliest
        date possible, and make any last-minute adjustments as availability changed.
        They must do this while considering the interview load on each individual
        and whether interviewers need to be trained and shadowing others. \U0001F975
        TA software didn\u2019t help.</p><p style=\\\"min-height:1.5em\\\">As hiring
        managers, we know TA is a critical function, and as engineers, we know software
        can do better. So, we built and continue to build Ashby to give TA teams the
        <em>highest</em> standard of tooling. Software that\u2019s intelligent and
        powerful. Software that provides insights into where they\u2019re failing
        and automates or simplifies many of the tasks they\u2019re underwater with.
        We want other functions and departments to be jealous of what TA teams can
        do with Ashby, and today they often are!</p><p style=\\\"min-height:1.5em\\\"></p><h1>Why
        You Should or Shouldn\u2019t Apply</h1><p style=\\\"min-height:1.5em\\\">Software
        engineers come in many flavors, not all of which fit our model. Here are some
        things  to help you decide if this fits you and what you\u2019re looking for:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><em>You\u2019re
        not afraid to tackle any part of a technology stack.</em> You do what\u2019s
        necessary to successfully deliver a feature, whether writing frontend or choosing
        new infrastructure. We\u2019ll provide a supportive environment to do it successfully
        (e.g., design system, SRE team).</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You\u2019ve
        tackled projects with a lot of product and technical ambiguity, and you thrive
        at the intersection of the two. </em>We\u2019re not building a simple CRUD
        app, and many of the challenges we tackle require you to use your knowledge
        of our customers to build powerful abstractions and flexibility in the system
        to solve a class of problems.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        know how to strike the right balance between speed and quality. </em>Ashby
        wasn\u2019t built quickly. We took four years to launch publicly because convincing
        customers to switch required a high-quality product. However, time isn\u2019t
        infinite, especially for a startup, so we still move with urgency\u2014we\u2019ve
        built the equivalent of three or more VC-backed startups with a very small
        team.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You are ambitious
        and always looking to improve your skills. </em>For most engineers, this role
        will give you more freedom and responsibilities than you\u2019ve experienced
        in the past. To thrive (and level up), you\u2019ll need to be open to feedback
        (and we give lots of it).</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You\u2019re
        an excellent collaborator and communicator. </em>Ownership and freedom don\u2019t
        mean you work in a vacuum. You\u2019ll need to vet your decisions with the
        appropriate stakeholders, keep them up to date when necessary, and work with
        other engineers to get your projects across the finish line. Clear and concise
        communication helps a lot here!</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        seek to create leverage in your work. </em>The nature of software is that
        you can often automate or abstract what would be tedious, time-consuming work.
        Your impatience usually leads to new abstractions, tools to allow Support
        to debug before Engineering, new lint rules to prevent common bugs, etc. </p></li></ul><p
        style=\\\"min-height:1.5em\\\"><strong>Put another way, you shouldn\u2019t
        apply if:</strong></p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><em>You
        need company-driven process and structure to get your projects across the
        finish line. </em>Sprint planning and well-defined project management processes
        are things you need or look to others to lead. You\u2019d rather focus on
        the technical details and challenges.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        only want to do exciting work. </em>We\u2019re building a team of kind, collaborative
        folks. Customer issues and investigations are distributed across the team,
        including our high-level ICs.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        can get lost in the details.</em> Once you start implementation, it can be
        hard to take a step back and think about the project as a whole. You like
        everything to be planned upfront.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>You
        haven\u2019t led or taken ownership of projects before.</em> You\u2019re used
        to working with tech leads and taking on tasks distributed by them.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><em>You want to mentor earlier-career engineers.</em>
        We rely on engineers owning their projects, so we need engineers with that
        experience. This requires the team to be reasonably tenured. More than 90%
        of the team would be considered Senior or above in the industry today, so
        mentorship opportunities are very limited.</p></li><li><p style=\\\"min-height:1.5em\\\"><em>To
        you, a tech lead, staff, or principal engineer is someone who spends most
        of their time project managing or doing architecture reviews. </em>Our most
        tenured engineers spend most of their time building, and we often trust them
        with our most challenging problems. While they lead product and technical
        areas and help other engineers plan their most challenging work, it\u2019s
        not a requirement, nor do engineers need their sign-off.</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h1>Engineering
        Culture</h1><p style=\\\"min-height:1.5em\\\">Our engineering culture is motivated
        by Benji\u2019s (my Co-founder and CEO) and my belief that a small, talented
        team, given the right environment, can build high-quality software fast (and
        work regular hours!). We do it through:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Minimal process with ownership over decisions
        normally made by product and design</p></li><li><p style=\\\"min-height:1.5em\\\">Natural
        collaboration and deliberate communication</p></li><li><p style=\\\"min-height:1.5em\\\">Investing
        in tools and abstractions that give us leverage</p></li><li><p style=\\\"min-height:1.5em\\\">Putting
        effort into building a diverse team</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Minimal
        Process &amp; Lots of Ownership</strong></h2><p style=\\\"min-height:1.5em\\\">The
        best engineers we\u2019ve worked with delivered reliably magical outcomes.
        They took customer problems and relentlessly drove them to solutions that
        were not only successful but often brilliant and creative. While they did
        this with minimal oversight, stakeholders were never in the dark as to what
        was going on, and no setback was a surprise.</p><p style=\\\"min-height:1.5em\\\">Traditional
        product-development processes aren\u2019t meant for the best engineers. Their
        purpose is to create consistent outcomes regardless of the engineer\u2019s
        skill. But, consistency comes at the expense of an engineer\u2019s time and
        freedom\u2014both ingredients necessary to generate those magical outcomes.
        As a result, process stifles the best engineers and doesn\u2019t give others
        the opportunity to practice the behaviors that made the best engineers the
        \u201Cbest.\u201D</p><p style=\\\"min-height:1.5em\\\">At Ashby, we want to
        build an environment that encourages every engineer to be their best. So,
        at Ashby, every Engineer runs their project. Product Managers (and Designers)
        build strategy, do customer research, and hand off problem briefs to Engineers.
        Engineers take on the rest: they research the problem, write product specs,
        build wireframes, and implement their solution end-to-end. We rely on engineers,
        not process, to push information outward to the relevant folks (e.g., Product
        Managers) and pull folks in to help (e.g., Designers, Infra). It\u2019s a
        new level of ownership for many engineers, but we\u2019d rather an engineer
        fail a bit and coach up their skills than use process as a crutch. Not everyone
        succeeds in our culture, but those who do <em>thrive</em>.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Collaboration
        is Natural &amp; Communication is Deliberate</strong></h2><p style=\\\"min-height:1.5em\\\">Our
        engineering team consists of lifelong learners who are talented but also humble
        and kind (meet them <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/team\\\"><u>here</u></a>!). These attributes
        create an environment where collaboration happens naturally. We combine this
        with research, prototyping, and written proposals to see around corners and
        get feedback from the team across time zones. Focus time is something that
        we hold sacred, and, with thoughtful and deliberate communication, engineers
        are in &lt;2h meetings per week (I wrote about it <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/company/thoughtful-communication\\\"><u>here</u></a>).</p><p
        style=\\\"min-height:1.5em\\\">To drive it home, here's a recent calendar
        of an engineer who has been with us for over 4 years. ~34 hours of focus time,
        2.5h of interviews, and 3.5 hours of meetings:</p><p style=\\\"min-height:1.5em\\\"></p><div
        style=\\\"text-align:left\\\"><img style=\\\"max-width:100%\\\" src=\\\"https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/d4679311-9dba-4031-bf5e-19ce78597ab1/calendar.png\\\"
        /></div><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\">We
        also meet in person at least twice a year, once as a department and once as
        a company. You also have a small budget to meet up with folks in your city/region.</p><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Increase Leverage, not Team
        Size</strong></h2><p style=\\\"min-height:1.5em\\\">We built Ashby with the
        quality, breadth, and depth that many customers would expect from much larger
        teams over larger time scales. We\u2019ve done this through investment in:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Great
        developer tooling.</strong> Our CI/CD takes ~10m, and we deploy at least 15x
        a day. A debugger that works out of the box. Everyone on the team has contributed
        to our developer experience \U0001F4AA\U0001F3FE.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Building
        blocks to create powerful and customizable products fast.</strong> At the
        core of Ashby is a set of common components (analytics modeling and query
        language, policy engine, workflow engine, design system) that we constantly
        improve. Each improvement to a common component cascades throughout our app
        (short video below).</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>AI-powered
        tooling. </strong>We think of AI as a way to automate the mundane parts of
        building and maintaining high-quality software. We use a combination of third-party
        and internally built tools that, for instance, auto-triage customer issues,
        suggest fixes, prototype ideas, generate production-ready code, and conduct
        code reviews. Engineers have an unlimited token budget (but are not measured
        on it).</p></li></ul><p style=\\\"min-height:1.5em\\\">Here\u2019s an impromptu
        quote from Arjun in our company Slack of what it\u2019s like to build a feature
        at Ashby:</p><p style=\\\"min-height:1.5em\\\"></p><div style=\\\"text-align:left\\\"><img
        style=\\\"max-width:100%\\\" src=\\\"https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/8d94727a-46d8-42a2-9627-ddcd7f822f95/arjun.png\\\"
        /></div><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\">And
        a demo of one of these building blocks:</p><div><div style=\\\"left:0;width:100%;height:0;position:relative;padding-bottom:62.5%\\\"><iframe
        src=\\\"https://embedded-media.ashbyhq.com/embed/4ea5f68e-c33e-4ac9-831a-e732bee4a303/9a5f032d-c731-411e-98cf-261517156f01\\\"
        style=\\\"top:0;left:0;width:100%;height:100%;position:absolute;border:0\\\"
        allowfullscreen scrolling=\\\"no\\\" allow=\\\"encrypted-media *; picture-in-picture
        *;\\\" sandbox=\\\"allow-scripts allow-same-origin allow-presentation\\\"></iframe></div></div><h2><strong>Put
        Effort into Diversity</strong></h2><p style=\\\"min-height:1.5em\\\">Diverse
        teams drive innovation and better outcomes. Having seen my mother and partner
        build their careers as minority women in non-diverse fields, I want to make
        sure Ashby creates opportunities for the next generation of engineers from
        underrepresented groups.</p><p style=\\\"min-height:1.5em\\\">Today, 25% of
        engineers and 50% of our engineering leaders at Ashby are from underrepresented
        groups. We are taking conscious steps to improve, like sourcing diverse candidates,
        providing generous paid family leave, no leetcode interviews, and more.</p><p
        style=\\\"min-height:1.5em\\\"></p><h1><strong>Interview Process</strong></h1><p
        style=\\\"min-height:1.5em\\\">At Ashby, our team and interview process want
        to help you show your best self. We\u2019ll dive into past projects and simulate
        working together via pair programming, writing product and tech specs collaboratively,
        and talking through decisions. There are no leetcode or whiteboard exercises.</p><p
        style=\\\"min-height:1.5em\\\">Our interview process is three rounds:</p><ol
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Introduction
        call with Hiring Manager (15 to 30m, live)</p></li><li><p style=\\\"min-height:1.5em\\\">A
        technical screen where we pair in our actual codebase (1h, live)</p></li><li><p
        style=\\\"min-height:1.5em\\\">Three non-coding interviews that focus on product
        thinking, technical design, and infrastructure (3h 15m, live can be split
        across multiple days)</p></li></ol><p style=\\\"min-height:1.5em\\\">Depending
        on our leadership team\u2019s bandwidth, we may start with an <em>additional</em>
        30m screen with a recruiter.</p><p style=\\\"min-height:1.5em\\\">Your hiring
        manager will be your main point of contact and prep you for interviews. Each
        round will have written guidance so you know what to expect (you\u2019ll need
        minimal preparation). You\u2019ll meet 4 to 6 people in engineering (with
        5-15 minutes in each interview to ask them questions). If we don\u2019t give
        an offer, we\u2019ll provide feedback!</p><p style=\\\"min-height:1.5em\\\"></p><h1><strong>Your
        First Three Months at Ashby</strong></h1><p style=\\\"min-height:1.5em\\\">We
        want an exceptional onboarding experience for every new hire. At Ashby, your
        dev environment is set up with a single script, you push your first product
        change on day one, and you spend the rest of your time shipping product changes
        that give you a tour of our codebase and best practices. The product changes
        increase in scope and ambiguity from simple copy changes to the delivery of
        a prominent, impactful feature. Your manager will do a 30, 60, and 90-day
        review to give feedback and calibrate on how we work together.</p><p style=\\\"min-height:1.5em\\\">It\u2019s
        a team effort to get you successfully onboarded; you\u2019ll have a peer paired
        with you to answer questions, pair program, and check in often to see if you
        need help. The rest of the team will run training sessions on our culture,
        product, engineering process, and technical architecture.</p><p style=\\\"min-height:1.5em\\\"></p><h1><strong>Technology
        Stack</strong></h1><p style=\\\"min-height:1.5em\\\">I\u2019m sharing our
        tech stack with the caveat that we don\u2019t require previous experience
        in it (but a love of typed languages is helpful \U0001F600): TypeScript (frontend
        &amp; backend), React, GraphQL API, Node.js, Postgres, Redis.</p><p style=\\\"min-height:1.5em\\\">When
        they joined Ashby, many of our engineers switched from other languages like
        Swift and Kotlin (<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://linkedin.com/in/benasher44/\\\"><u>Ben</u></a>), platforms
        like iOS (<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.linkedin.com/in/tom-quist-0925a199/\\\"><u>Tom</u></a>)
        and Windows (<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.linkedin.com/in/sergeygalich/\\\"><u>Sergey</u></a>).
        We care more about fundamentals (e.g., debugging, abstractions) and how fast
        you learn. For folks on the team who switched, it's nice seeing changes hot
        reload versus waiting for XCode to compile \U0001F605.</p><p style=\\\"min-height:1.5em\\\"></p><h1><strong>Benefits</strong></h1><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Competitive
        salary and equity.</p></li><li><p style=\\\"min-height:1.5em\\\">10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO, and we will encourage you to
        take it.</p></li><li><p style=\\\"min-height:1.5em\\\">A minimum of 12 weeks
        of fully paid parental leave, covered by Ashby. For folks outside the US,
        it may be longer to be in line with regional requirements.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Generous equipment, software, and office furniture
        budget. Get what you need to be happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li><li><p style=\\\"min-height:1.5em\\\">If you\u2019re
        in the US, we offer top-tier health insurance for you and your dependents,
        with 100% of premiums covered by Ashby. In other countries, we provide high-quality
        supplemental health insurance for you and your dependents, also fully covered
        by us.</p></li></ul><p style=\\\"min-height:1.5em\\\">Ashby\u2019s success
        hinges on hiring great people and creating an environment where we can be
        happy, feel challenged, and do our best work. We\u2019re being deliberate
        about building that environment from the ground up. I hope that excites you
        enough to apply.</p><p style=\\\"min-height:1.5em\\\"><em>Ashby provides equal
        employment opportunities (EEO) to all employees and applicants for employment
        without regard to race, color, religion, sex, national origin, age, disability,
        genetics, sexual orientation, gender identity, or gender expression. We are
        committed to a diverse and inclusive workforce and welcome people from all
        backgrounds, experiences, perspectives, and abilities.</em></p><p style=\\\"min-height:1.5em\\\"><em>Ashby
        is committed to a fair and transparent hiring process. We confirm that this
        advertisement is for an active, existing vacancy within our organization.
        Please be advised that we may use artificial intelligence-driven tools to
        assist our recruitment team in screening, assessing, and selecting candidates
        for this position.</em></p>\",\"descriptionPlain\":\"Hi \U0001F44B\U0001F3FE
        I\u2019m Abhik https://www.linkedin.com/in/abhikpramanik, Ashby's Co-Founder
        and VP of Engineering. We\u2019re looking for an ambitious full-stack engineer
        who is laser-focused on solving customer problems and making the right long-term
        investments to solve them not only today but in our future features and products.\\n\\nWhat
        Ashby gives you in return is the best of both early and growth-stage environments.
        The agency and no-nonsense of a seed startup: you write product specs, make
        product and design decisions, and build in an almost-no-meeting culture. While
        also the product-market fit and scale of a growth-stage startup: tens of thousands
        of daily users who depend on your software and eagerly await your next feature.\\n\\nWe
        have notable customers like Notion, Linear, Shopify, and Snowflake. Our growth
        and retention metrics are best-in-class among our peers: we have tens of millions
        in ARR, growing >100% year over year, very low churn, and many years of runway.
        We\u2019ll share more details once we meet.\\n\\nYou\u2019ve probably seen
        this role posted before, and it\u2019s because we\u2019re always expanding
        the team (we\u2019re on track to double this year). We\u2019re bubbling with
        ideas on how to support Talent Acquisition through software, and we\u2019ve
        started the journey of building products beyond Talent Acquisition. We read
        every application and aim to respond to yours within 3-4 days (often sooner).\\n\\n\\n\\n\\nABOUT
        THE ROLE AND HOW WE WORK\\n\\nOur engineering culture strives to recreate
        the environments where we did our best work as ICs \u2013 where we had the
        ownership and agency to impact our users with creative and innovative software.\\n\\nI
        started my career building software for artists in the Visual Effects industry.
        It was a formative experience for me as a software engineer because success
        relied on my ability to be a product manager and designer. I talked to artists
        to understand their needs. I came up with ideas. I did industry research,
        designed interfaces, and prototyped ideas. I watched artists use what I built
        and decided what to tackle in the next iteration. No daily stand-ups, no t-shirt
        sizing, no planning meetings.\\n\\nI studied computer science to solve problems,
        not tickets, and this felt exactly like that. I not only felt creative and
        fulfilled but the agency and ownership we were given as engineers powered
        an incredible amount of innovation.\\n\\nInnovation came differently (or not
        at all) at technology startups beyond the seed stage, often through an engineer\u2019s
        force of will and ability to push back against culture (rather than any encouragement
        from it). Engineering was narrowed to implementation and delivery, partly
        due to the influence of other departments and partly due to the influx of
        \\\"Agile\\\" processes like sprint planning. In those companies, I felt like
        a JIRA jockey.\\n\\nAt Ashby, we\u2019re building an environment that is optimistic
        about what engineers can own and achieve. An environment that embraces innovative
        engineers, and, frankly, often stays out of their way. As a Product Engineer,
        you\u2019ll take ownership over a large portion of one of our products and
        own projects end-to-end (wearing hats traditionally worn by product and design).
        You\u2019ll research competitors, write product specs, make wireframes, and
        more. To ground it with examples, product engineers at Ashby have:\\n\\n -
        Designed and built automated interview scheduling. This feature automates
        scheduling by calculating possible times from a pool of interviewers and other
        constraints, and then presenting these times to the candidate for selection
        via our responsive web app. This solves the \u201CCalendar Tetris\u201D problem
        I talk about in \\\"What We're Building.\\\"\\n\\n - Built a generalized declarative
        filter architecture that allows users to create complex filters for any record
        with a consistent UI and compile it to SQL in our backend. Many user-facing
        features use it.\\n\\n - Specced, designed, and implemented a feature that
        allows users to complete signing offers entirely within Ashby. This project
        involved talking to customers to understand their requirements, deciding what
        technologies to use, building a prototype, and working with other team members
        to integrate the final implementation into additional features.\\n\\n\\n\\n\\nWHAT
        WE\u2019RE BUILDING\\n\\nAs engineers, we are used to tooling that makes us
        better at what we do. When we started Ashby, we saw the opposite with Talent
        Acquisition software. Recruiting teams were leveling up how they did their
        work, but instead of software meeting this new standard, it held them back.\\n\\nScheduling
        a final round is an excellent example. Recruiting teams wanted to schedule
        candidates faster, track interviewer preparation and quality, and do it with
        half the headcount. A recruiter needed to manually collect availability from
        the candidate, identify qualified interviewers, perform \u201CCalendar Tetris\u201D
        to find who is available to interview the candidate, schedule on the earliest
        date possible, and make any last-minute adjustments as availability changed.
        They must do this while considering the interview load on each individual
        and whether interviewers need to be trained and shadowing others. \U0001F975
        TA software didn\u2019t help.\\n\\nAs hiring managers, we know TA is a critical
        function, and as engineers, we know software can do better. So, we built and
        continue to build Ashby to give TA teams the highest standard of tooling.
        Software that\u2019s intelligent and powerful. Software that provides insights
        into where they\u2019re failing and automates or simplifies many of the tasks
        they\u2019re underwater with. We want other functions and departments to be
        jealous of what TA teams can do with Ashby, and today they often are!\\n\\n\\n\\n\\nWHY
        YOU SHOULD OR SHOULDN\u2019T APPLY\\n\\nSoftware engineers come in many flavors,
        not all of which fit our model. Here are some things to help you decide if
        this fits you and what you\u2019re looking for:\\n\\n - You\u2019re not afraid
        to tackle any part of a technology stack. You do what\u2019s necessary to
        successfully deliver a feature, whether writing frontend or choosing new infrastructure.
        We\u2019ll provide a supportive environment to do it successfully (e.g., design
        system, SRE team).\\n\\n - You\u2019ve tackled projects with a lot of product
        and technical ambiguity, and you thrive at the intersection of the two. We\u2019re
        not building a simple CRUD app, and many of the challenges we tackle require
        you to use your knowledge of our customers to build powerful abstractions
        and flexibility in the system to solve a class of problems.\\n\\n - You know
        how to strike the right balance between speed and quality. Ashby wasn\u2019t
        built quickly. We took four years to launch publicly because convincing customers
        to switch required a high-quality product. However, time isn\u2019t infinite,
        especially for a startup, so we still move with urgency\u2014we\u2019ve built
        the equivalent of three or more VC-backed startups with a very small team.\\n\\n
        - You are ambitious and always looking to improve your skills. For most engineers,
        this role will give you more freedom and responsibilities than you\u2019ve
        experienced in the past. To thrive (and level up), you\u2019ll need to be
        open to feedback (and we give lots of it).\\n\\n - You\u2019re an excellent
        collaborator and communicator. Ownership and freedom don\u2019t mean you work
        in a vacuum. You\u2019ll need to vet your decisions with the appropriate stakeholders,
        keep them up to date when necessary, and work with other engineers to get
        your projects across the finish line. Clear and concise communication helps
        a lot here!\\n\\n - You seek to create leverage in your work. The nature of
        software is that you can often automate or abstract what would be tedious,
        time-consuming work. Your impatience usually leads to new abstractions, tools
        to allow Support to debug before Engineering, new lint rules to prevent common
        bugs, etc.\\n\\nPut another way, you shouldn\u2019t apply if:\\n\\n - You
        need company-driven process and structure to get your projects across the
        finish line. Sprint planning and well-defined project management processes
        are things you need or look to others to lead. You\u2019d rather focus on
        the technical details and challenges.\\n\\n - You only want to do exciting
        work. We\u2019re building a team of kind, collaborative folks. Customer issues
        and investigations are distributed across the team, including our high-level
        ICs.\\n\\n - You can get lost in the details. Once you start implementation,
        it can be hard to take a step back and think about the project as a whole.
        You like everything to be planned upfront.\\n\\n - You haven\u2019t led or
        taken ownership of projects before. You\u2019re used to working with tech
        leads and taking on tasks distributed by them.\\n\\n - You want to mentor
        earlier-career engineers. We rely on engineers owning their projects, so we
        need engineers with that experience. This requires the team to be reasonably
        tenured. More than 90% of the team would be considered Senior or above in
        the industry today, so mentorship opportunities are very limited.\\n\\n -
        To you, a tech lead, staff, or principal engineer is someone who spends most
        of their time project managing or doing architecture reviews. Our most tenured
        engineers spend most of their time building, and we often trust them with
        our most challenging problems. While they lead product and technical areas
        and help other engineers plan their most challenging work, it\u2019s not a
        requirement, nor do engineers need their sign-off.\\n\\n\\n\\n\\nENGINEERING
        CULTURE\\n\\nOur engineering culture is motivated by Benji\u2019s (my Co-founder
        and CEO) and my belief that a small, talented team, given the right environment,
        can build high-quality software fast (and work regular hours!). We do it through:\\n\\n
        - Minimal process with ownership over decisions normally made by product and
        design\\n\\n - Natural collaboration and deliberate communication\\n\\n -
        Investing in tools and abstractions that give us leverage\\n\\n - Putting
        effort into building a diverse team\\n\\n\\n\\n\\nMINIMAL PROCESS & LOTS OF
        OWNERSHIP\\n\\nThe best engineers we\u2019ve worked with delivered reliably
        magical outcomes. They took customer problems and relentlessly drove them
        to solutions that were not only successful but often brilliant and creative.
        While they did this with minimal oversight, stakeholders were never in the
        dark as to what was going on, and no setback was a surprise.\\n\\nTraditional
        product-development processes aren\u2019t meant for the best engineers. Their
        purpose is to create consistent outcomes regardless of the engineer\u2019s
        skill. But, consistency comes at the expense of an engineer\u2019s time and
        freedom\u2014both ingredients necessary to generate those magical outcomes.
        As a result, process stifles the best engineers and doesn\u2019t give others
        the opportunity to practice the behaviors that made the best engineers the
        \u201Cbest.\u201D\\n\\nAt Ashby, we want to build an environment that encourages
        every engineer to be their best. So, at Ashby, every Engineer runs their project.
        Product Managers (and Designers) build strategy, do customer research, and
        hand off problem briefs to Engineers. Engineers take on the rest: they research
        the problem, write product specs, build wireframes, and implement their solution
        end-to-end. We rely on engineers, not process, to push information outward
        to the relevant folks (e.g., Product Managers) and pull folks in to help (e.g.,
        Designers, Infra). It\u2019s a new level of ownership for many engineers,
        but we\u2019d rather an engineer fail a bit and coach up their skills than
        use process as a crutch. Not everyone succeeds in our culture, but those who
        do thrive.\\n\\n\\n\\n\\nCOLLABORATION IS NATURAL & COMMUNICATION IS DELIBERATE\\n\\nOur
        engineering team consists of lifelong learners who are talented but also humble
        and kind (meet them here https://www.ashbyhq.com/team!). These attributes
        create an environment where collaboration happens naturally. We combine this
        with research, prototyping, and written proposals to see around corners and
        get feedback from the team across time zones. Focus time is something that
        we hold sacred, and, with thoughtful and deliberate communication, engineers
        are in <2h meetings per week (I wrote about it here https://www.ashbyhq.com/blog/company/thoughtful-communication).\\n\\nTo
        drive it home, here's a recent calendar of an engineer who has been with us
        for over 4 years. ~34 hours of focus time, 2.5h of interviews, and 3.5 hours
        of meetings:\\n\\n\\n\\n[https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/d4679311-9dba-4031-bf5e-19ce78597ab1/calendar.png]\\n\\n\\n\\nWe
        also meet in person at least twice a year, once as a department and once as
        a company. You also have a small budget to meet up with folks in your city/region.\\n\\n\\n\\n\\nINCREASE
        LEVERAGE, NOT TEAM SIZE\\n\\nWe built Ashby with the quality, breadth, and
        depth that many customers would expect from much larger teams over larger
        time scales. We\u2019ve done this through investment in:\\n\\n - Great developer
        tooling. Our CI/CD takes ~10m, and we deploy at least 15x a day. A debugger
        that works out of the box. Everyone on the team has contributed to our developer
        experience \U0001F4AA\U0001F3FE.\\n\\n - Building blocks to create powerful
        and customizable products fast. At the core of Ashby is a set of common components
        (analytics modeling and query language, policy engine, workflow engine, design
        system) that we constantly improve. Each improvement to a common component
        cascades throughout our app (short video below).\\n\\n - AI-powered tooling.
        We think of AI as a way to automate the mundane parts of building and maintaining
        high-quality software. We use a combination of third-party and internally
        built tools that, for instance, auto-triage customer issues, suggest fixes,
        prototype ideas, generate production-ready code, and conduct code reviews.
        Engineers have an unlimited token budget (but are not measured on it).\\n\\nHere\u2019s
        an impromptu quote from Arjun in our company Slack of what it\u2019s like
        to build a feature at Ashby:\\n\\n\\n\\n[https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/8d94727a-46d8-42a2-9627-ddcd7f822f95/arjun.png]\\n\\n\\n\\nAnd
        a demo of one of these building blocks:\\n\\n\\n\\n\\nPUT EFFORT INTO DIVERSITY\\n\\nDiverse
        teams drive innovation and better outcomes. Having seen my mother and partner
        build their careers as minority women in non-diverse fields, I want to make
        sure Ashby creates opportunities for the next generation of engineers from
        underrepresented groups.\\n\\nToday, 25% of engineers and 50% of our engineering
        leaders at Ashby are from underrepresented groups. We are taking conscious
        steps to improve, like sourcing diverse candidates, providing generous paid
        family leave, no leetcode interviews, and more.\\n\\n\\n\\n\\nINTERVIEW PROCESS\\n\\nAt
        Ashby, our team and interview process want to help you show your best self.
        We\u2019ll dive into past projects and simulate working together via pair
        programming, writing product and tech specs collaboratively, and talking through
        decisions. There are no leetcode or whiteboard exercises.\\n\\nOur interview
        process is three rounds:\\n\\n 1. Introduction call with Hiring Manager (15
        to 30m, live)\\n\\n 2. A technical screen where we pair in our actual codebase
        (1h, live)\\n\\n 3. Three non-coding interviews that focus on product thinking,
        technical design, and infrastructure (3h 15m, live can be split across multiple
        days)\\n\\nDepending on our leadership team\u2019s bandwidth, we may start
        with an additional 30m screen with a recruiter.\\n\\nYour hiring manager will
        be your main point of contact and prep you for interviews. Each round will
        have written guidance so you know what to expect (you\u2019ll need minimal
        preparation). You\u2019ll meet 4 to 6 people in engineering (with 5-15 minutes
        in each interview to ask them questions). If we don\u2019t give an offer,
        we\u2019ll provide feedback!\\n\\n\\n\\n\\nYOUR FIRST THREE MONTHS AT ASHBY\\n\\nWe
        want an exceptional onboarding experience for every new hire. At Ashby, your
        dev environment is set up with a single script, you push your first product
        change on day one, and you spend the rest of your time shipping product changes
        that give you a tour of our codebase and best practices. The product changes
        increase in scope and ambiguity from simple copy changes to the delivery of
        a prominent, impactful feature. Your manager will do a 30, 60, and 90-day
        review to give feedback and calibrate on how we work together.\\n\\nIt\u2019s
        a team effort to get you successfully onboarded; you\u2019ll have a peer paired
        with you to answer questions, pair program, and check in often to see if you
        need help. The rest of the team will run training sessions on our culture,
        product, engineering process, and technical architecture.\\n\\n\\n\\n\\nTECHNOLOGY
        STACK\\n\\nI\u2019m sharing our tech stack with the caveat that we don\u2019t
        require previous experience in it (but a love of typed languages is helpful
        \U0001F600): TypeScript (frontend & backend), React, GraphQL API, Node.js,
        Postgres, Redis.\\n\\nWhen they joined Ashby, many of our engineers switched
        from other languages like Swift and Kotlin (Ben https://linkedin.com/in/benasher44/),
        platforms like iOS (Tom https://www.linkedin.com/in/tom-quist-0925a199/) and
        Windows (Sergey https://www.linkedin.com/in/sergeygalich/). We care more about
        fundamentals (e.g., debugging, abstractions) and how fast you learn. For folks
        on the team who switched, it's nice seeing changes hot reload versus waiting
        for XCode to compile \U0001F605.\\n\\n\\n\\n\\nBENEFITS\\n\\n - Competitive
        salary and equity.\\n\\n - 10-year exercise window for stock options. You
        shouldn\u2019t feel pressure to purchase stock options if you leave Ashby
        \u2014do it when you feel financially comfortable.\\n\\n - Unlimited PTO,
        and we will encourage you to take it.\\n\\n - A minimum of 12 weeks of fully
        paid parental leave, covered by Ashby. For folks outside the US, it may be
        longer to be in line with regional requirements.\\n\\n - Generous equipment,
        software, and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
        covered with manager approval.\\n\\n - If you\u2019re in the US, we offer
        top-tier health insurance for you and your dependents, with 100% of premiums
        covered by Ashby. In other countries, we provide high-quality supplemental
        health insurance for you and your dependents, also fully covered by us.\\n\\nAshby\u2019s
        success hinges on hiring great people and creating an environment where we
        can be happy, feel challenged, and do our best work. We\u2019re being deliberate
        about building that environment from the ground up. I hope that excites you
        enough to apply.\\n\\nAshby provides equal employment opportunities (EEO)
        to all employees and applicants for employment without regard to race, color,
        religion, sex, national origin, age, disability, genetics, sexual orientation,
        gender identity, or gender expression. We are committed to a diverse and inclusive
        workforce and welcome people from all backgrounds, experiences, perspectives,
        and abilities.\\n\\nAshby is committed to a fair and transparent hiring process.
