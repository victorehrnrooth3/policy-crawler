        want to offer deep expertise whenever we interact with prospects and customers.</p></li></ul><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We strongly
        believe that small teams with very talented people (and the right work environment)
