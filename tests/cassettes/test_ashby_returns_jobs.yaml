        style=\\\"min-height:1.5em\\\">Here are a few key points (relevant to the
        go-to-market side) that should give you an idea of what it is like to work
        with us:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We
        spend a lot of time building best-in-class products since we believe a highly
        differentiated product is a lot easier to sell.</p></li><li><p style=\\\"min-height:1.5em\\\">We
        want to offer deep expertise whenever we interact with prospects and customers.</p></li></ul><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">We strongly
        believe that small teams with very talented people (and the right work environment)
        deliver much better performance than teams with large headcount. We hire and
        compensate accordingly.</p></li><li><p style=\\\"min-height:1.5em\\\">We value
        a strong sense of ownership, principled thinking over experience, and thoughtful
        communication (we put a lot of effort into using the right communication channels)
        - we\u2019ll get into these and other values during the hiring process.</p></li></ul><h2><strong>The
        Interview</strong></h2><p style=\\\"min-height:1.5em\\\">At Ashby, our team
        and interview process want to help you show your best self. Our interview
        process is structured to get to know you and your career as well as empower
        you with insight into our key focus areas. Here is the process in its entirety:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">30 min
        - Recruiter Screen with Talent Team</p></li><li><p style=\\\"min-height:1.5em\\\">45
        min - Interview with Hiring Manager</p></li><li><p style=\\\"min-height:1.5em\\\">60
        min-  Mock Call with 2 Implementation Specialists</p></li><li><p style=\\\"min-height:1.5em\\\">Final
        Round:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">30
        min - Customer Adoption with Head of Dedicated CS &amp; one of our Strategic
        CSMs</p></li><li><p style=\\\"min-height:1.5em\\\">30 min - Interview with
        VP of Customer Success &amp; Head of PS</p></li><li><p style=\\\"min-height:1.5em\\\">10
        min - Closing Questions with Hiring Manager</p></li></ul></li></ul><h2><strong>Benefits</strong></h2><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You\u2019ll
        get the time to do things the right way; we put a lot of emphasis on high
        quality work and avoid quick hacks as much as possible.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        get to sell a product that our prospects &amp; customers are truly excited
        about.</p></li><li><p style=\\\"min-height:1.5em\\\">Competitive compensation
        is offered.</p></li><li><p style=\\\"min-height:1.5em\\\">10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO with four weeks is recommended
