        Manager Interview</strong> - 45 Minutes</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Mock
        Customer Call</strong> - 45 Minutes</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Final
        Panel Interview</strong> - 2 hours</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Rather than a traditional panel interview with
        a large group, we structure our panel into a series of smaller conversations.
