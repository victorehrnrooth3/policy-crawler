        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/80e74f0d-6f21-4492-baaa-0d5773466435\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/80e74f0d-6f21-4492-baaa-0d5773466435/application\",\"descriptionHtml\":\"<h2><strong>The
        Role</strong></h2><p style=\\\"min-height:1.5em\\\">Ashby is looking for a
        GTM Engineering Manager to lead our GTM Systems &amp; Tools team within our
        Revenue Operations department. To scale beyond $100M ARR, our internal infrastructure
        must be as elegant and high-performing as the product we sell.</p><p style=\\\"min-height:1.5em\\\">You
        will own our entire revenue tech stack, ensuring Marketing, Sales, and Customer
        Success have the data, automation, and tooling to operate effectively. You
        will build the AI intelligence layer on top of that foundation: LLM-powered
        enrichment, predictive scoring, and automated workflows that replace manual
        audience assembly, sequence selection, and outreach across the full customer
        lifecycle.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Current State</strong></h2><p
        style=\\\"min-height:1.5em\\\">You won't be starting from zero. Ashby has
        a complete GTM pipeline: CRM, enrichment, signal detection, orchestration,
        and delivery all connected and running. What we haven't built is the AI intelligence
        layer on top of it, or the team to own it.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Tech
        Stack</strong></h2><p style=\\\"min-height:1.5em\\\">Our current toolkit includes
        HubSpot (CRM and sequencing), Gong, LinkedIn Sales Nav, Accord, Slab, Chilipiper,
        LeadIQ, Clay, Cargo, Keyplay, Snowflake, Instantly, and Omni. While we don't
        require mastery of every tool, we need a \\\"tinkerer\u2019s mindset\\\".
        You should be comfortable using these as raw materials to build sophisticated,
        AI-driven automation.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>What
        You'll Do</strong></h2><p style=\\\"min-height:1.5em\\\"><strong>Team Leadership.</strong>
        Build and lead a high-impact team. You will define the roles, hire the people,
        and organize the function to deliver on its responsibilities.</p><p style=\\\"min-height:1.5em\\\"><strong>Growth
        Architecture &amp; Strategy.</strong> Operate as an internal product team
        for the GTM org. Define the roadmap, write specs, ship prototypes, and scale
        winning tactics to shrink iteration cycles from months to hours. Evaluate,
        procure, and sunset tools as the stack evolves.</p><p style=\\\"min-height:1.5em\\\"><strong>The
        GTM Hierarchy of Needs.</strong> Own the full stack of revenue engineering:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Data
        Foundation: </strong>Build and maintain the system infrastructure.</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Own and
        evolve the core revenue technology stack (CRM, marketing automation, data
        warehouse). Ensure data quality, governance, and seamless integration across
        systems.</p></li><li><p style=\\\"min-height:1.5em\\\">Design scalable data
        architecture that supports every layer above it. You don't just add fields,
        you build systems.</p></li></ul></li><li><p style=\\\"min-height:1.5em\\\"><strong>Data
        Modeling:</strong> Identify and collect unique data points (signals) that
        predict purchase, expansion, or churn.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Data
        Activation:</strong> Deploy those signals into automated outreach, meeting
        prep, and expansion nudges.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Agent
        Development:</strong> Design, deploy, and orchestrate AI agents that automate
        decision-making and execution across Marketing, Sales, Customer Success, and
        RevOps.</p></li></ul><p style=\\\"min-height:1.5em\\\"><strong>GTM Agent Strategy.</strong>
        Define how Ashby uses AI agents across the full customer lifecycle. Identify
        where agents replace manual decision-making, where they augment human judgment,
        and where humans stay in the loop. Own the roadmap from first deployment to
        full orchestration.</p><p style=\\\"min-height:1.5em\\\"><strong>Cross-Functional
        Engineering.</strong> Partner with Engineering and Data teams to harden winning
        experiments into production-grade systems.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Who
        You Are</strong></h2><p style=\\\"min-height:1.5em\\\"><strong>The Empathetic
        Leader.</strong> You build teams that ship and grow. You coach your people,
        not just manage them. You've spent enough time with sellers and CSMs to understand
        their workflows from the inside, and you use that knowledge to build systems
        they actually adopt. You can't automate what you don't understand.</p><p style=\\\"min-height:1.5em\\\"><strong>The
        Systems Thinker.</strong> You don't just see a single tool; you see an ecosystem.
        You understand how a change in a marketing automation trigger ripples down
        to a Customer Success renewal health score.</p><p style=\\\"min-height:1.5em\\\"><strong>The
        Hybrid Builder.</strong> You are either a commercially minded engineer or
        a deeply technical operator. You are comfortable writing Python and SQL, designing
        system integrations, configuring LLM-powered workflows, and evaluating AI
        agent platforms. You care more about revenue impact than code quality. You
        have hands-on experience with Clay or similar GTM workflow platforms.</p><p
        style=\\\"min-height:1.5em\\\"><strong>The Scaling Veteran.</strong> You've
        built GTM infrastructure at a fast-growing SaaS company (ideally $100M to
        $300M ARR). You know that every system you build today will need to support
        new products, new motions, and significantly more volume within a year. You've
        done this before and know where it breaks.</p><p style=\\\"min-height:1.5em\\\"><strong>The
        AI Practitioner. </strong>You've designed and deployed AI agents that moved
        revenue metrics, not just experimented with ChatGPT. You understand prompt
        engineering, agent orchestration, and the difference between a workflow that
        runs and a system of agents that thinks. You know where AI replaces human
        judgment and where it shouldn't.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>This
        Role May Not Be a Fit If</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You've managed revenue systems but haven't
        built with AI. We need someone who builds new automated systems, not someone
        who optimizes what's already there.</p></li><li><p style=\\\"min-height:1.5em\\\">You've
        operated in environments where the systems and processes were already established.
        At Ashby, you will inherit a small team and need to personally prototype solutions
        in ambiguous situations as you build the function.</p></li><li><p style=\\\"min-height:1.5em\\\">You're
        exceptional at outbound but haven't owned the full customer lifecycle. The
        biggest opportunities in this role span inbound, expansion, and retention.</p></li></ul><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Interview Process</strong></h2><p
        style=\\\"min-height:1.5em\\\">Our interview process is thorough. We aim to
        ensure each person joining the team is the right fit for Ashby, and to provide
        you with enough information to assess if Ashby is the right fit for you.</p><ol
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Recruiter
        Screen</strong> with Talent Acquisition Team, 30 minutes</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Hiring
