        States\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/b4ca892a-8a7d-4703-9522-9727d55c8ff5\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/b4ca892a-8a7d-4703-9522-9727d55c8ff5/application\",\"descriptionHtml\":\"<h2>The
        Role</h2><p style=\\\"min-height:1.5em\\\">Ashby is looking for a manager
        to lead our GTM Systems &amp; Tools team, part of our Revenue Operations department.
        To scale past $100M ARR and beyond, our internal infrastructure must be as
        elegant and high-performing as the product we sell.</p><p style=\\\"min-height:1.5em\\\">You
        will be the architect and steward of our entire revenue tech stack, ensuring
        that Marketing, Sales, and Customer Success have the data, automation, and
        tooling they need to operate efficiently and effectively. You will manage
        a small, high-impact team of systems administrators, architects and GTM developers,
        balancing hands-on execution with long-term strategic planning.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Tech
        Stack</strong></h2><p style=\\\"min-height:1.5em\\\">Our current techstack
        includes but is not limited to, HubSpot for CRM and email sequencing, Gong
        for call recording and coaching, Linkedin Sales Nav for recruitment, Accord
        for mutual action plans, Slab as an internal company wiki, Chilipiper for
        lead routing, LeadIQ for contact data, Keyplay for account data, Snowflake
        as our data warehouse, and Omni as our data visualization tool. It is not
        required that you are familiar with any or all of these specific tools, it
        is more important that you are familiar generally with the tech stack of a
        GTM team a fast growing SaaS company.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>What
        You'll Do</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Systems
        Strategy &amp; Roadmap:</strong> Own the long-term vision for Ashby\u2019s
        GTM tech stack. You\u2019ll evaluate, procure, and implement tools that solve
        for today\u2019s bottlenecks while preparing us for the next years of growth.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Systems Architecture &amp; Management:
        </strong>Own and manage the core revenue technology stack, including the CRM,
        marketing automation platforms, and analytics tools, ensuring they integrate
        seamlessly.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Data Governance
        and Architecture:</strong> Ensuring data quality and consistency across systems.
        Design and maintain a seamless flow of data across our ecosystem (HubSpot
        CRM, Sales Engagement, CS Platforms). You don\u2019t just \\\"add fields\\\"\u2014you
        build scalable systems and data architecture.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Team
        Leadership:</strong> Lead and mentor a lean team of systems experts. You\u2019ll
        set the bar for documentation, testing protocols (UAT), and deployment cycles.
        You create a high performance culture in order to  hire and retain top talent.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>Cross-Functional Partnership:</strong>
        Act as the primary bridge between RevOps and Finance, Data/Analytics, and
        Engineering to ensure our revenue systems align with company-wide data integrity
        and financial reporting.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Optimization:</strong>
        Proactively identify \\\"technical debt\\\" within our revenue stack. You
        will streamline workflows to reduce friction for our account executives, growth
        marketers, and CSMs.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Process
        Optimization:</strong> Designing and streamlining operational workflows, such
        as lead routing, customer onboarding, and renewals, using automation to reduce
        manual effort.</p></li></ul><h2><strong>Who You Are</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\"><strong>The Systems Thinker:</strong> You don't
        just see a single tool; you see an ecosystem. You understand how a change
        in a Marketing automation trigger ripples down to a Customer Success renewal
        health score.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>The Scaling
        Veteran:</strong> You have experience at a fast-growing SaaS company (ideally
        in the $100M\u2013$300M ARR range). You know what good looks like at scale
        and have seen the pitfalls one can encounter during rapid growth.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>The Tools Geek:</strong> You love to
        geek out on the latest technology and stay up to date on the capabilities
        of tools in your company\u2019s stack.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>The
        Empathetic Leader:</strong> You enjoy coaching technical talent and can translate
        complex technical requirements into business outcomes for stakeholders.</p></li><li><p
        style=\\\"min-height:1.5em\\\"><strong>The Builder:</strong> You aren't afraid
        to get your hands dirty. While you are a manager, you still enjoy the \\\"craft\\\"
        of building systems.</p></li></ul><h2><strong>This role may </strong><em><strong>not</strong></em><strong>
        be a fit if:</strong></h2><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        don\u2019t like getting your hands dirty. At Ashby we believe managers should
        be \u201Cin the weeds\u201D. You should be equally comfortable architecting
        and admining a system.</p></li><li><p style=\\\"min-height:1.5em\\\">You haven\u2019t
        operated at meaningful scale. We are looking for someone who can help us scale
        to 100M+ in ARR. Ideally your previous roles have shown you what good looks
        at the scale of company we aspire to become.</p></li><li><p style=\\\"min-height:1.5em\\\">You
        aren\u2019t exceptional at leading large scale cross-functional projects.
        This role must collaborate with most teams and people at Ashby. Your tools
        are the backbone of the GTM team\u2019s success. In order to build and maintain
        tools that meet the needs of the GTM org you will need to manage large cross
        functional projects with organization and agility. </p></li></ul><h2><strong>Interview
        Process</strong></h2><p style=\\\"min-height:1.5em\\\">Our interview process
        is thorough \u2014 we aim to ensure each person joining the team is the right
        fit for Ashby and will provide ample information to assess if Ashby is the
        right fit for you. The process for this role is as follows:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Recruiter Screen with Talent Acquisition Team
