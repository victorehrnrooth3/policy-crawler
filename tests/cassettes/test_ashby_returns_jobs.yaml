        products to win both land-and-expand and material new business deals\\n\\n
        - Rapidly moving up-market with no signs of slowing down\\n\\n - Implemented
        AI https://www.ashbyhq.com/blog/recruiting/ai-assisted-application-review-in-practice
        throughout the platform\\n\\n - Known for our pace of innovation and advanced
        analytics\\n\\n\\n\\n\\nABOUT THIS ROLE\\n\\nWe're hiring an Account Executive
        in North America (East) to continue to scale Ashby's fast growing Startup
        segment! In this role, you'll help play a key role on a small team, helping
        us win new business with growth companies of up to 100 employees. We receive
        a steady stream of inbound leads in this segment, which means our Startup
        AEs need to be highly organized and capable of managing a high volume of opportunities.
        You'll also do outbound pipeline development to some of the fastest growing
        and exciting venture-backed startups in the market to accelerate our growth.\\n\\nTo
        ensure a smooth review process, please apply to only one territory (East or
        West) that best aligns with your background and time preferences.\\n\\n\\n\\n\\nYOU
        COULD BE A GREAT FIT IF\\n\\n - \U0001F4E3 You practice clear, concise communication.
        You write short, effective emails. You are skilled at executing outbound strategies
        that target high growth startup accounts and want the opportunity to lead
        the team in pipeline creation.\_\\n\\n - \U0001F558 You\u2019re highly organized
        and diligent with your time. You know where to focus your efforts to produce
        the best results.\\n\\n - \U0001F913 You love becoming an expert. You enjoy
        learning about new fields of interest, and can distill information down to
        its essence to share with others.\\n\\n - \U0001F50D Your peers describe you
        as detail oriented. You send crisp follow-up emails, on time. You take pride
        in internal operations, like real-time CRM updates.\\n\\n - \u26A1\uFE0F You
        move fast. You leverage tools/technology to maximize your selling time. You
        are comfortable managing a pipeline of 15+ opportunities concurrently.\\n\\n
        - \U0001F3A7 You are an excellent listener. You consistently seek to understand
        both the technical pain and the business impact, hearing the nuance and detail
        in what others have to say.\\n\\n - \U0001F9D1\u200D\U0001F4BC You are a collaborative
        team player, dedicated to supporting your colleagues and contributing to the
        team's overall success. You thrive in a cooperative environment where growth
        and team success are valued.\\n\\n\\nREQUIREMENTS\\n\\n - \U0001F91D You have
        2+ years of full-cycle SaaS sales experience\\n\\n - \U0001F4E2 You source
        sales meetings from outbound prospecting activities\\n\\n - \U0001F4C8 You
        have consistently achieved stretch targets by being both creative and organized\\n\\n\\nBONUS
