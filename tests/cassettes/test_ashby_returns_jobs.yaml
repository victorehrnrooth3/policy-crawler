        excited by the challenge of making Support scalable, efficient, and high-leverage.\\n\\n\\n\\n\\nYOU
        MAY NOT WANT TO APPLY IF:\\n\\n - You prefer support models that avoid technical
        complexity or customer escalations.\\n\\n - You\u2019re uncomfortable operating
