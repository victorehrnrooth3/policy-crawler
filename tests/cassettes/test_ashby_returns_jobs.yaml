        do it when you feel financially comfortable.</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li></ul><h2>About Ashby</h2><p style=\\\"min-height:1.5em\\\">We're
        building the next generation of recruiting software and we're starting with
