        - European Union\",\"shouldDisplayCompensationOnJobPostings\":true,\"secondaryLocations\":[{\"location\":\"Romania\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Romania\",\"addressLocality\":\"\"}}},{\"location\":\"Switzerland\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Switzerland\",\"addressLocality\":\"\"}}},{\"location\":\"Spain\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Spain\",\"addressCountry\":\"Spain\",\"addressLocality\":\"Spain\"}}},{\"location\":\"Ireland\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Ireland\",\"addressCountry\":\"Ireland\",\"addressLocality\":\"Ireland\"}}},{\"location\":\"Italy\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Italy\",\"addressLocality\":\"\"}}},{\"location\":\"Croatia\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Croatia\",\"addressLocality\":\"\"}}},{\"location\":\"Sweden\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Sweden\",\"addressLocality\":\"\"}}},{\"location\":\"Estonia\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Estonia\",\"addressLocality\":\"\"}}},{\"location\":\"Berlin\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Germany\",\"addressLocality\":\"Berlin\"}}},{\"location\":\"Stockholm\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Stockholm\",\"addressCountry\":\"Sweden\",\"addressLocality\":\"Stockholm\"}}},{\"location\":\"Barcelona\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Catalonia\",\"addressCountry\":\"Spain\",\"addressLocality\":\"Barcelona\"}}},{\"location\":\"Germany\",\"address\":{\"postalAddress\":{\"addressCountry\":\"Germany\",\"addressLocality\":\"\"}}},{\"location\":\"France\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"France\",\"addressLocality\":\"\"}}},{\"location\":\"Denmark\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Denmark\",\"addressLocality\":\"\"}}},{\"location\":\"Norway\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Norway\",\"addressLocality\":\"\"}}},{\"location\":\"Portugal\",\"address\":{\"postalAddress\":{\"addressCountry\":\"Portugal\"}}},{\"location\":\"Netherlands\",\"address\":{\"postalAddress\":{\"addressRegion\":\"\",\"addressCountry\":\"Netherlands\",\"addressLocality\":\"Amsterdam\"}}},{\"location\":\"Austria\",\"address\":{\"postalAddress\":{\"addressCountry\":\"Austria\"}}},{\"location\":\"Hungary\",\"address\":{\"postalAddress\":{\"addressRegion\":\"Hungary\",\"addressCountry\":\"Hungary\",\"addressLocality\":\"Budapest\"}}}],\"publishedAt\":\"2025-11-14T00:13:11.459+00:00\",\"isListed\":true,\"isRemote\":true,\"workplaceType\":\"Remote\",\"address\":{\"postalAddress\":{\"postalCode\":\"\",\"addressRegion\":\"\",\"addressCountry\":\"European
        Union\",\"addressLocality\":\"\"}},\"jobUrl\":\"https://jobs.ashbyhq.com/ashby/fa001346-ea81-41b2-bfbe-2271d3faac1a\",\"applyUrl\":\"https://jobs.ashbyhq.com/ashby/fa001346-ea81-41b2-bfbe-2271d3faac1a/application\",\"descriptionHtml\":\"<p
        style=\\\"min-height:1.5em\\\">We\u2019re looking for a curious, rigorous,
        problem-hungry platform engineer (who codes!) to carry the ball as we bring
        Ashby to the big leagues. Ashby builds software that lets talent teams build
        an efficient, delightful, respectful hiring process. Similarly, you\u2019re
        an engineer who wants to build a \u201Cpaved road\u201D that excellent engineering
        teams can safely take to the moon and back.</p><p style=\\\"min-height:1.5em\\\">We
        have notable customers like Notion, Linear, Shopify, and Snowflake. Our growth
        and retention metrics are best-in-class among our peers: we have tens of millions
        in ARR, growing &gt;100% year over year, over 2500 customers, very low churn,
        and many years of runway. We\u2019ll share more details once we meet, but
        you now probably have a good idea as to why we're hiring for this role \U0001F605.</p><p
        style=\\\"min-height:1.5em\\\">We\u2019ve listed this role twice: as a Platform
        Engineer and Site Reliability Engineer \u2013 our team does both, and we are
        open to candidates who lean towards one or the other. </p><p style=\\\"min-height:1.5em\\\"></p><h1>About
        the role and how we work</h1><p style=\\\"min-height:1.5em\\\">Hi \U0001F44B
        I\u2019m<a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://uk.linkedin.com/in/colinhoweuk\\\"> <u>Colin</u></a>, Head
        of EMEA Engineering. I\u2019ve spent a number of years leading engineering
        teams in startups, and that has always included being close to infrastructure
        teams - no matter what name they\u2019ve worn (SRE, infrastructure, platform,
        etc). I\u2019ve got my hands dirty building the initial infrastructure for
        startups and know the value a talented infrastructure engineer brings. The
        rigour, the discipline, the peace and quiet when everything just <em>hums
        along</em>.</p><p style=\\\"min-height:1.5em\\\">Our infrastructure is in
        a good place <em>for now</em>. Nothing is static. Ashby continues to grow
        rapidly, putting strain on our existing infrastructure. We\u2019re always
        looking to give our customers more powerful hiring software, and building
        new product features often requires new pieces of infrastructure.</p><p style=\\\"min-height:1.5em\\\">Having
        herded plenty of <em>snowflakeservers</em> in the past, I\u2019ve learned
        there\u2019s a better way. I (and Ashby) place a lot of value on infrastructure-as-code.
        As a Platform Engineer at Ashby, you\u2019ll get to dive into scaling problems,
        add new capabilities to our platform, and think about how our entire team
        interacts with infrastructure. All our own engineers own their projects end-to-end
        and ship with minimal oversight. We don\u2019t put roadblocks to ensure security
        when common sense will do and we don\u2019t build processes like change management
        boards around the lowest common denominator. But with great power comes great
        responsibility: we handle personal and confidential data about some of the
        biggest decisions we ever make at work. As we grow, more and bigger customers
        rely on us to be reliable and secure and how we operate internally will need
        to evolve.</p><p style=\\\"min-height:1.5em\\\">We\u2019re at an inflection
        point where our ability to scale and deliver a seamless experience has a make-or-break
        impact \u2013 we have some of the fastest growing companies using our platform
        every day to hire hundreds of people per month. We need someone like you to
        make good decisions, debug thorny issues, and build us a future-proof platform
        that can withstand this scale. Our small but mighty infrastructure team has
        set up a secure and simple environment (we don\u2019t believe in spinning
        up a new service unless necessary!) for our growing product team to build
        in. That\u2019s where you come in: you, too, will own projects end-to-end
        and have an impact on core parts of the Ashby developer and user experience.
        For instance, you could work on:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Optimize <a target=\\\"_blank\\\" rel=\\\"noopener
        noreferrer nofollow\\\" href=\\\"https://www.loom.com/share/32c0cc3eedf2450fb66a901b76186ce4\\\"><u>our
        homegrown ultra-dynamic recruiting DSL-to-SQL compiler</u></a>, and create
        tools to help developers do so</p></li><li><p style=\\\"min-height:1.5em\\\">Create
        automated guardrails for the security and privacy of our customer data</p></li><li><p
        style=\\\"min-height:1.5em\\\">Help our developers ship features fast through
        canary deploys, gradual rollouts and feature flags, while keeping complexity
        manageable and reducing downtime</p></li><li><p style=\\\"min-height:1.5em\\\">Work
        with the business and the engineering team to define SLOs and implement the
        corresponding SLIs.</p></li><li><p style=\\\"min-height:1.5em\\\">Ensure all
        communication with external services supports retries and circuit-breakers.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Implement the infrastructure to support an
        event-driven architecture and data warehouse.</p></li></ul><p style=\\\"min-height:1.5em\\\">We\u2019re
        looking for someone who can build systems that an engineer would like to work
        with: mature and boring but open-minded and approachable. We have to balance
        reliability with flexibility. Software and its availability are now mission
        critical to almost every working professional. To be in an SRE in today\u2019s
        world, you have to be extremely comfortable evaluating risk, those you take
        and those others take.</p><p style=\\\"min-height:1.5em\\\"></p><h1>Why you
        should or shouldn\u2019t apply</h1><p style=\\\"min-height:1.5em\\\">You should
        apply if:</p><ul style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">You
        never stop. You get weirdly obsessed about a problem that doesn\u2019t yet
        make sense, turn it every which way in your head until the explanation dawns.
        You\u2019ll search every rock, inventory every clue, hunt every mismatch.
        We do that, too - together we\u2019ll be armed with state-of-the-art monitoring
        tools and an impressive amount of data, and join you in the adventure.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You don\u2019t take shortcuts. You\u2019re
        speaking up for the future user, the edge case, the doomsday design. You know
        product engineers want to build it with you, and see them as allies, where
        you give them the power and knowledge to access greater things.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You\u2019re someone who cares about what you
        do and the team you do it with, and want to work with others who do as well.
        You\u2019ll be on interview panels choosing your next colleagues, and you\u2019ll
        take that seriously. You only want to work with people who make you better,
        and want to make you better.</p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019ve
        built infrastructure at a slightly later stage than Ashby is at - you know
        how to deal with millions of data points, have seen great (or not great) infrastructure
        make or break customer experience, and have automated everything from provisioning
        to monitoring and release process.</p></li><li><p style=\\\"min-height:1.5em\\\">You\u2019re
        a Swiss army knife (all nationalities welcome ;) ). You\u2019ll get every
        hard problem the company faces. You\u2019ll get to do infrastructure updates,
        security enforcements, database optimization, Kubernetes debugging, and digging
        through Typescript traces figuring out what doesn\u2019t work. You probably
        don\u2019t feel like an expert at at least some of that... and that appeals
        to you.</p></li></ul><p style=\\\"min-height:1.5em\\\">All that makes for
        a pretty specific kind of role, and the job isn\u2019t to everyone\u2019s
        tastes! You should not apply if:</p><ul style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">You don\u2019t want to make your own decisions
        on what is the best paved road to build for Ashby, and expect a lead or manager
        to make the final call on what that is. Our leads (and managers) give ample
        commentary and feedback on technical decisions and how they\u2019re made,
        but you ship what you want to build and are accountable for it.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You hate SQL. We have a lot of features built
        around making the best out of data, and our platform engineers also sometimes
        dive into a gnarly report or advise engineers on a more performant data model
        to use.</p></li><li><p style=\\\"min-height:1.5em\\\">You don\u2019t want
        to code. Our SREs are some of our best software engineers and they are just
        as responsible for the application as the other engineering teams - albeit
        at a platform level. Reviewing code and submitting code changes will be part
        of your day to day.</p></li><li><p style=\\\"min-height:1.5em\\\">Your primary
        mode of communicating best practices to engineers is live meetings. We\u2019re
        a very async culture and written communication (and code) is how changes get
        made. As an Ashby SRE, you will need to share new tooling and best practices
        with engineers faster than your next meeting opportunity will take you.</p></li><li><p
        style=\\\"min-height:1.5em\\\">You\u2019ve never delivered a project, on your
        own, without someone prodding you for updates. We have no project or delivery
        managers to fill your calendar with busy work, but the flip side is you have
        to do your project management, seek the help you need to get unstuck and cut
        scope when it\u2019s worthwhile.</p><p style=\\\"min-height:1.5em\\\"></p></li></ul><h1>Technology
        Stack</h1><p style=\\\"min-height:1.5em\\\">I\u2019m sharing our tech stack
        with the caveat that we don\u2019t require previous experience in it: TypeScript
        (frontend &amp; backend), Node.js, React, Apollo GraphQL, Postgres, Redis.</p><p
        style=\\\"min-height:1.5em\\\">We use Datadog and Sentry on 100% cloud-based
        (AWS) infra. We take developer experience and reliability seriously: all engineers
        are on call in a follow-the-sun model, and everyone contributes to developer
        tooling.</p><p style=\\\"min-height:1.5em\\\"></p><h1>What We\u2019re Building</h1><p
        style=\\\"min-height:1.5em\\\">As engineers, we are used to tooling that makes
        us <strong>better</strong> at what we do. When we started Ashby, we saw the
        opposite with Talent Acquisition software. Recruiting teams were leveling
        up how they did their work, but instead of software meeting this new standard,
        it held them back.</p><p style=\\\"min-height:1.5em\\\">Scheduling a final
        round is an excellent example. Recruiting teams wanted to schedule candidates
        faster, track interviewer preparation and quality, and do it with half the
        headcount. A recruiter needed to manually collect availability from the candidate,
        identify qualified interviewers, perform \u201CCalendar Tetris\u201D to find
        who is available to interview the candidate, schedule on the earliest date
        possible, and make any last-minute adjustments as availability changed. They
        must do this while considering the interview load on each individual and whether
        interviewers need to be trained and shadowing others. \U0001F975 TA software
        didn\u2019t help.</p><p style=\\\"min-height:1.5em\\\">As hiring managers,
        we know TA is a critical function, and as engineers, we know software can
        do better. So, we built and continue to build Ashby to give TA teams the <em>highest</em>
        standard of tooling. Software that\u2019s intelligent and powerful. Software
        that provides insights into where they\u2019re failing and automates or simplifies
        many of the tasks they\u2019re underwater with. We want other functions and
        departments to be jealous of what TA teams can do with Ashby, and today they
        often are!</p><p style=\\\"min-height:1.5em\\\"></p><h1>Engineering Culture</h1><p
        style=\\\"min-height:1.5em\\\">Our engineering culture is motivated by <a
        target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/abhikpramanik/\\\"><u>Abhik</u></a>
        and <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.linkedin.com/in/benjaminencz/\\\"><u>Benji</u></a>\u2019s
        (our co-founders) belief that a small talented team, given the right environment,
        can build high-quality software fast (and work regular hours!). We do it through:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Minimal
        process with ownership over decisions normally made by product and design</p></li><li><p
        style=\\\"min-height:1.5em\\\">Natural collaboration and deliberate communication</p></li><li><p
        style=\\\"min-height:1.5em\\\">Investing in tools and abstractions that give
        us leverage</p></li><li><p style=\\\"min-height:1.5em\\\">Putting effort into
        building a diverse team</p></li></ul><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Minimal
        Process &amp; Lots of Ownership</strong></h2><p style=\\\"min-height:1.5em\\\">The
        best engineers we\u2019ve worked with delivered reliably magical outcomes.
        They took customer problems and relentlessly drove them to solutions that
        were not only successful but often brilliant and creative. While they did
        this with minimal oversight, stakeholders were never in the dark as to what
        was going on, and no setback was a surprise.</p><p style=\\\"min-height:1.5em\\\">Traditional
        product-development processes aren\u2019t meant for the best engineers. Their
        purpose is to create consistent outcomes regardless of the engineer\u2019s
        skill. But, consistency comes at the expense of an engineer\u2019s time and
        freedom\u2014both ingredients necessary to generate those magical outcomes.
        As a result, process stifles the best engineers and doesn\u2019t give others
        the opportunity to practice the behaviors that made the best engineers the
        \u201Cbest.\u201D</p><p style=\\\"min-height:1.5em\\\">At Ashby, we want to
        build an environment that encourages every engineer to be their best. So,
        at Ashby, every Engineer runs their project. Product Managers (and Designers)
        build strategy, do customer research, and hand off problem briefs to Engineers.
        Engineers take on the rest: they research the problem, write product specs,
        build wireframes, and implement their solution end-to-end. We rely on engineers,
        not process, to push information outward to the relevant folks (e.g., Product
        Managers) and pull folks in to help (e.g., Designers, Infra). It\u2019s a
        new level of ownership for many engineers, but we\u2019d rather an engineer
        fail a bit and coach up their skills than use process as a crutch. Not everyone
        succeeds in our culture, but those who do <em>thrive</em>.</p><p style=\\\"min-height:1.5em\\\"></p><h2><strong>Collaboration
        is Natural &amp; Communication is Deliberate</strong></h2><p style=\\\"min-height:1.5em\\\">Our
        engineering team consists of lifelong learners who are talented but also humble
        and kind (meet them <a target=\\\"_blank\\\" rel=\\\"noopener noreferrer nofollow\\\"
        href=\\\"https://www.ashbyhq.com/team\\\"><u>here</u></a>!). These attributes
        create an environment where collaboration happens naturally. We combine this
        with research, prototyping, and written proposals to see around corners and
        get feedback from the team across time zones. Focus time is something that
        we hold sacred, and, with thoughtful and deliberate communication, engineers
        are in &lt;2h meetings per week (Abhik wrote about it <a target=\\\"_blank\\\"
        rel=\\\"noopener noreferrer nofollow\\\" href=\\\"https://www.ashbyhq.com/blog/company/thoughtful-communication\\\"><u>here</u></a>).</p><p
        style=\\\"min-height:1.5em\\\">To drive it home, here's a recent calendar
        of an engineer who has been with us for over 4 years. ~34 hours of focus time,
        2.5h of interviews, and 3.5 hours of meetings:</p><p style=\\\"min-height:1.5em\\\"></p><div
        style=\\\"text-align:left\\\"><img style=\\\"max-width:100%\\\" src=\\\"https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/d4679311-9dba-4031-bf5e-19ce78597ab1/calendar.png\\\"
        /></div><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\">We
        also meet in person at least twice a year, once as a department and once as
        a company. You also have a small budget to meet up with folks in your city/region.</p><p
        style=\\\"min-height:1.5em\\\"></p><h2><strong>Increase Leverage, not Team
        Size</strong></h2><p style=\\\"min-height:1.5em\\\">We built Ashby with the
        quality, breadth, and depth that many customers would expect from much larger
        teams over larger time scales. We\u2019ve done this through investment in:</p><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\"><strong>Great
        developer tooling.</strong> Our CI/CD takes ~10m, and we deploy at least 15x
        a day. A debugger that works out of the box. Everyone on the team has contributed
        to our developer experience \U0001F4AA\U0001F3FE.</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>Building
        blocks to create powerful and customizable products fast.</strong> At the
        core of Ashby is a set of common components (analytics modeling and query
        language, policy engine, workflow engine, design system) that we constantly
        improve. Each improvement to a common component cascades throughout our app
        (short video below).</p></li><li><p style=\\\"min-height:1.5em\\\"><strong>AI-powered
        tooling. </strong>We think of AI as a way to automate the mundane parts of
        building and maintaining high-quality software. We use a combination of third-party
        and internally built tools that, for instance, auto-triage customer issues,
        suggest fixes, prototype ideas, generate production-ready code, and conduct
        code reviews. Engineers have an unlimited token budget (but are not measured
        on it).</p></li></ul><p style=\\\"min-height:1.5em\\\">Here\u2019s an impromptu
        quote from Arjun in our company Slack of what it\u2019s like to build a feature
        at Ashby:</p><p style=\\\"min-height:1.5em\\\"></p><div style=\\\"text-align:left\\\"><img
        style=\\\"max-width:100%\\\" src=\\\"https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/8d94727a-46d8-42a2-9627-ddcd7f822f95/arjun.png\\\"
        /></div><p style=\\\"min-height:1.5em\\\"></p><p style=\\\"min-height:1.5em\\\">And
        a demo of one of these building blocks:</p><div><div style=\\\"left:0;width:100%;height:0;position:relative;padding-bottom:62.5%\\\"><iframe
        src=\\\"https://embedded-media.ashbyhq.com/embed/4ea5f68e-c33e-4ac9-831a-e732bee4a303/9a5f032d-c731-411e-98cf-261517156f01\\\"
        style=\\\"top:0;left:0;width:100%;height:100%;position:absolute;border:0\\\"
        allowfullscreen scrolling=\\\"no\\\" allow=\\\"encrypted-media *; picture-in-picture
        *;\\\" sandbox=\\\"allow-scripts allow-same-origin allow-presentation\\\"></iframe></div></div><h2><strong>Put
        Effort into Diversity</strong></h2><p style=\\\"min-height:1.5em\\\">Diverse
        teams drive innovation and better outcomes. Having seen my mother and partner
        build their careers as minority women in non-diverse fields, I want to make
        sure Ashby creates opportunities for the next generation of engineers from
        underrepresented groups.</p><p style=\\\"min-height:1.5em\\\">Today, 25% of
        engineers and 50% of our engineering leaders at Ashby are from underrepresented
        groups. We are taking conscious steps to improve, like sourcing diverse candidates,
        providing generous paid family leave, no leetcode interviews, and more.</p><p
        style=\\\"min-height:1.5em\\\"></p><h1>Interview Process</h1><p style=\\\"min-height:1.5em\\\">At
        Ashby, our team and interview process want to help you show your best self.
        We\u2019ll dive into past projects and simulate working together via pair
        programming, writing product and tech specs collaboratively, and talking through
        decisions. There are no leetcode or whiteboard exercises.</p><p style=\\\"min-height:1.5em\\\">Our
        interview process is three rounds:</p><ol style=\\\"min-height:1.5em\\\"><li><p
        style=\\\"min-height:1.5em\\\">Introduction call with Hiring Manager (15 to
        30m, live)</p></li><li><p style=\\\"min-height:1.5em\\\">A technical screen
        where we pair in our actual codebase (1h, live)</p></li><li><p style=\\\"min-height:1.5em\\\">Three
        non-coding interviews that focus on technical design, debugging incidents,
        and infrastructure (3h 15m, live can be split across multiple days)</p></li></ol><p
        style=\\\"min-height:1.5em\\\">Depending on our leadership team\u2019s bandwidth,
        we may start with an <em>additional</em> 30m screen with a recruiter.</p><p
        style=\\\"min-height:1.5em\\\">Your hiring manager will be your main point
        of contact and prep you for interviews. Each round will have written guidance
        so you know what to expect (you\u2019ll need minimal preparation). You\u2019ll
        meet 4 to 6 people in engineering (with 5-15 minutes in each interview to
        ask them questions). If we don\u2019t give an offer, we\u2019ll provide feedback!</p><p
        style=\\\"min-height:1.5em\\\"></p><h1><strong>Your First Three Months at
        Ashby</strong></h1><p style=\\\"min-height:1.5em\\\">We want an exceptional
        onboarding experience for every new hire. At Ashby, your dev environment is
        set up with a single script, you push your first product change on day one,
        and you spend the rest of your time shipping product changes that give you
        a tour of our codebase and best practices. The product changes increase in
        scope and ambiguity from simple copy changes to the delivery of a prominent,
        impactful feature. Your manager will do a 30, 60, and 90-day review to give
        feedback and calibrate on how we work together.</p><p style=\\\"min-height:1.5em\\\">It\u2019s
        a team effort to get you successfully onboarded; you\u2019ll have a peer paired
        with you to answer questions, pair program, and check in often to see if you
        need help. The rest of the team will run training sessions on our culture,
        product, engineering process, and technical architecture.</p><p style=\\\"min-height:1.5em\\\"></p><h1>Benefits</h1><ul
        style=\\\"min-height:1.5em\\\"><li><p style=\\\"min-height:1.5em\\\">Competitive
        salary and equity.</p></li><li><p style=\\\"min-height:1.5em\\\">10-year exercise
        window for stock options. You shouldn\u2019t feel pressure to purchase stock
        options if you leave Ashby \u2014do it when you feel financially comfortable.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Unlimited PTO, and we will encourage you to
        take it.</p></li><li><p style=\\\"min-height:1.5em\\\">A minimum of 12 weeks
        of fully paid parental leave, covered by Ashby. For folks outside the US,
        it may be longer to be in line with regional requirements.</p></li><li><p
        style=\\\"min-height:1.5em\\\">Generous equipment, software, and office furniture
        budget. Get what you need to be happy and productive!</p></li><li><p style=\\\"min-height:1.5em\\\">$100/month
        education budget with more expensive items (like conferences) covered with
        manager approval.</p></li><li><p style=\\\"min-height:1.5em\\\">If you\u2019re
        in the US, we offer top-tier health insurance for you and your dependents,
        with 100% of premiums covered by Ashby. In other countries, we provide high-quality
        supplemental health insurance for you and your dependents, also fully covered
        by us.</p></li></ul><p style=\\\"min-height:1.5em\\\">Ashby\u2019s success
        hinges on hiring great people and creating an environment where we can be
        happy, feel challenged, and do our best work. We\u2019re being deliberate
        about building that environment from the ground up. I hope that excites you
        enough to apply.</p><p style=\\\"min-height:1.5em\\\"><em>Ashby provides equal
        employment opportunities (EEO) to all employees and applicants for employment
        without regard to race, color, religion, sex, national origin, age, disability,
        genetics, sexual orientation, gender identity, or gender expression. We are
        committed to a diverse and inclusive workforce and welcome people from all
        backgrounds, experiences, perspectives, and abilities.</em></p><p style=\\\"min-height:1.5em\\\"><em>Ashby
        is committed to a fair and transparent hiring process. We confirm that this
        advertisement is for an active, existing vacancy within our organization.
        Please be advised that we may use artificial intelligence-driven tools to
        assist our recruitment team in screening, assessing, and selecting candidates
        for this position.</em></p>\",\"descriptionPlain\":\"We\u2019re looking for
        a curious, rigorous, problem-hungry platform engineer (who codes!) to carry
        the ball as we bring Ashby to the big leagues. Ashby builds software that
        lets talent teams build an efficient, delightful, respectful hiring process.
        Similarly, you\u2019re an engineer who wants to build a \u201Cpaved road\u201D
        that excellent engineering teams can safely take to the moon and back.\\n\\nWe
        have notable customers like Notion, Linear, Shopify, and Snowflake. Our growth
        and retention metrics are best-in-class among our peers: we have tens of millions
        in ARR, growing >100% year over year, over 2500 customers, very low churn,
        and many years of runway. We\u2019ll share more details once we meet, but
        you now probably have a good idea as to why we're hiring for this role \U0001F605.\\n\\nWe\u2019ve
        listed this role twice: as a Platform Engineer and Site Reliability Engineer
        \u2013 our team does both, and we are open to candidates who lean towards
        one or the other.\\n\\n\\n\\n\\nABOUT THE ROLE AND HOW WE WORK\\n\\nHi \U0001F44B
        I\u2019m Colin https://uk.linkedin.com/in/colinhoweuk, Head of EMEA Engineering.
        I\u2019ve spent a number of years leading engineering teams in startups, and
        that has always included being close to infrastructure teams - no matter what
        name they\u2019ve worn (SRE, infrastructure, platform, etc). I\u2019ve got
        my hands dirty building the initial infrastructure for startups and know the
        value a talented infrastructure engineer brings. The rigour, the discipline,
        the peace and quiet when everything just hums along.\\n\\nOur infrastructure
        is in a good place for now. Nothing is static. Ashby continues to grow rapidly,
        putting strain on our existing infrastructure. We\u2019re always looking to
        give our customers more powerful hiring software, and building new product
        features often requires new pieces of infrastructure.\\n\\nHaving herded plenty
        of snowflakeservers in the past, I\u2019ve learned there\u2019s a better way.
        I (and Ashby) place a lot of value on infrastructure-as-code. As a Platform
        Engineer at Ashby, you\u2019ll get to dive into scaling problems, add new
        capabilities to our platform, and think about how our entire team interacts
        with infrastructure. All our own engineers own their projects end-to-end and
        ship with minimal oversight. We don\u2019t put roadblocks to ensure security
        when common sense will do and we don\u2019t build processes like change management
        boards around the lowest common denominator. But with great power comes great
        responsibility: we handle personal and confidential data about some of the
        biggest decisions we ever make at work. As we grow, more and bigger customers
        rely on us to be reliable and secure and how we operate internally will need
        to evolve.\\n\\nWe\u2019re at an inflection point where our ability to scale
        and deliver a seamless experience has a make-or-break impact \u2013 we have
        some of the fastest growing companies using our platform every day to hire
        hundreds of people per month. We need someone like you to make good decisions,
        debug thorny issues, and build us a future-proof platform that can withstand
        this scale. Our small but mighty infrastructure team has set up a secure and
        simple environment (we don\u2019t believe in spinning up a new service unless
        necessary!) for our growing product team to build in. That\u2019s where you
        come in: you, too, will own projects end-to-end and have an impact on core
        parts of the Ashby developer and user experience. For instance, you could
        work on:\\n\\n - Optimize our homegrown ultra-dynamic recruiting DSL-to-SQL
        compiler https://www.loom.com/share/32c0cc3eedf2450fb66a901b76186ce4, and
        create tools to help developers do so\\n\\n - Create automated guardrails
        for the security and privacy of our customer data\\n\\n - Help our developers
        ship features fast through canary deploys, gradual rollouts and feature flags,
        while keeping complexity manageable and reducing downtime\\n\\n - Work with
        the business and the engineering team to define SLOs and implement the corresponding
        SLIs.\\n\\n - Ensure all communication with external services supports retries
        and circuit-breakers.\\n\\n - Implement the infrastructure to support an event-driven
        architecture and data warehouse.\\n\\nWe\u2019re looking for someone who can
        build systems that an engineer would like to work with: mature and boring
        but open-minded and approachable. We have to balance reliability with flexibility.
        Software and its availability are now mission critical to almost every working
        professional. To be in an SRE in today\u2019s world, you have to be extremely
        comfortable evaluating risk, those you take and those others take.\\n\\n\\n\\n\\nWHY
        YOU SHOULD OR SHOULDN\u2019T APPLY\\n\\nYou should apply if:\\n\\n - You never
        stop. You get weirdly obsessed about a problem that doesn\u2019t yet make
        sense, turn it every which way in your head until the explanation dawns. You\u2019ll
        search every rock, inventory every clue, hunt every mismatch. We do that,
        too - together we\u2019ll be armed with state-of-the-art monitoring tools
        and an impressive amount of data, and join you in the adventure.\\n\\n - You
        don\u2019t take shortcuts. You\u2019re speaking up for the future user, the
        edge case, the doomsday design. You know product engineers want to build it
        with you, and see them as allies, where you give them the power and knowledge
        to access greater things.\\n\\n - You\u2019re someone who cares about what
        you do and the team you do it with, and want to work with others who do as
        well. You\u2019ll be on interview panels choosing your next colleagues, and
        you\u2019ll take that seriously. You only want to work with people who make
        you better, and want to make you better.\\n\\n - You\u2019ve built infrastructure
        at a slightly later stage than Ashby is at - you know how to deal with millions
        of data points, have seen great (or not great) infrastructure make or break
        customer experience, and have automated everything from provisioning to monitoring
        and release process.\\n\\n - You\u2019re a Swiss army knife (all nationalities
        welcome ;) ). You\u2019ll get every hard problem the company faces. You\u2019ll
        get to do infrastructure updates, security enforcements, database optimization,
        Kubernetes debugging, and digging through Typescript traces figuring out what
        doesn\u2019t work. You probably don\u2019t feel like an expert at at least
        some of that... and that appeals to you.\\n\\nAll that makes for a pretty
        specific kind of role, and the job isn\u2019t to everyone\u2019s tastes! You
        should not apply if:\\n\\n - You don\u2019t want to make your own decisions
        on what is the best paved road to build for Ashby, and expect a lead or manager
        to make the final call on what that is. Our leads (and managers) give ample
        commentary and feedback on technical decisions and how they\u2019re made,
        but you ship what you want to build and are accountable for it.\\n\\n - You
        hate SQL. We have a lot of features built around making the best out of data,
        and our platform engineers also sometimes dive into a gnarly report or advise
        engineers on a more performant data model to use.\\n\\n - You don\u2019t want
        to code. Our SREs are some of our best software engineers and they are just
        as responsible for the application as the other engineering teams - albeit
        at a platform level. Reviewing code and submitting code changes will be part
        of your day to day.\\n\\n - Your primary mode of communicating best practices
        to engineers is live meetings. We\u2019re a very async culture and written
        communication (and code) is how changes get made. As an Ashby SRE, you will
        need to share new tooling and best practices with engineers faster than your
        next meeting opportunity will take you.\\n\\n - You\u2019ve never delivered
        a project, on your own, without someone prodding you for updates. We have
        no project or delivery managers to fill your calendar with busy work, but
        the flip side is you have to do your project management, seek the help you
        need to get unstuck and cut scope when it\u2019s worthwhile.\\n   \\n   \\n\\n\\nTECHNOLOGY
        STACK\\n\\nI\u2019m sharing our tech stack with the caveat that we don\u2019t
        require previous experience in it: TypeScript (frontend & backend), Node.js,
        React, Apollo GraphQL, Postgres, Redis.\\n\\nWe use Datadog and Sentry on
        100% cloud-based (AWS) infra. We take developer experience and reliability
        seriously: all engineers are on call in a follow-the-sun model, and everyone
        contributes to developer tooling.\\n\\n\\n\\n\\nWHAT WE\u2019RE BUILDING\\n\\nAs
        engineers, we are used to tooling that makes us better at what we do. When
        we started Ashby, we saw the opposite with Talent Acquisition software. Recruiting
        teams were leveling up how they did their work, but instead of software meeting
        this new standard, it held them back.\\n\\nScheduling a final round is an
        excellent example. Recruiting teams wanted to schedule candidates faster,
        track interviewer preparation and quality, and do it with half the headcount.
        A recruiter needed to manually collect availability from the candidate, identify
        qualified interviewers, perform \u201CCalendar Tetris\u201D to find who is
        available to interview the candidate, schedule on the earliest date possible,
        and make any last-minute adjustments as availability changed. They must do
        this while considering the interview load on each individual and whether interviewers
        need to be trained and shadowing others. \U0001F975 TA software didn\u2019t
        help.\\n\\nAs hiring managers, we know TA is a critical function, and as engineers,
        we know software can do better. So, we built and continue to build Ashby to
        give TA teams the highest standard of tooling. Software that\u2019s intelligent
        and powerful. Software that provides insights into where they\u2019re failing
        and automates or simplifies many of the tasks they\u2019re underwater with.
        We want other functions and departments to be jealous of what TA teams can
        do with Ashby, and today they often are!\\n\\n\\n\\n\\nENGINEERING CULTURE\\n\\nOur
        engineering culture is motivated by Abhik https://www.linkedin.com/in/abhikpramanik/
        and Benji https://www.linkedin.com/in/benjaminencz/\u2019s (our co-founders)
        belief that a small talented team, given the right environment, can build
        high-quality software fast (and work regular hours!). We do it through:\\n\\n
        - Minimal process with ownership over decisions normally made by product and
        design\\n\\n - Natural collaboration and deliberate communication\\n\\n -
        Investing in tools and abstractions that give us leverage\\n\\n - Putting
        effort into building a diverse team\\n\\n\\n\\n\\nMINIMAL PROCESS & LOTS OF
        OWNERSHIP\\n\\nThe best engineers we\u2019ve worked with delivered reliably
        magical outcomes. They took customer problems and relentlessly drove them
        to solutions that were not only successful but often brilliant and creative.
        While they did this with minimal oversight, stakeholders were never in the
        dark as to what was going on, and no setback was a surprise.\\n\\nTraditional
        product-development processes aren\u2019t meant for the best engineers. Their
        purpose is to create consistent outcomes regardless of the engineer\u2019s
        skill. But, consistency comes at the expense of an engineer\u2019s time and
        freedom\u2014both ingredients necessary to generate those magical outcomes.
        As a result, process stifles the best engineers and doesn\u2019t give others
        the opportunity to practice the behaviors that made the best engineers the
        \u201Cbest.\u201D\\n\\nAt Ashby, we want to build an environment that encourages
        every engineer to be their best. So, at Ashby, every Engineer runs their project.
        Product Managers (and Designers) build strategy, do customer research, and
        hand off problem briefs to Engineers. Engineers take on the rest: they research
        the problem, write product specs, build wireframes, and implement their solution
        end-to-end. We rely on engineers, not process, to push information outward
        to the relevant folks (e.g., Product Managers) and pull folks in to help (e.g.,
        Designers, Infra). It\u2019s a new level of ownership for many engineers,
        but we\u2019d rather an engineer fail a bit and coach up their skills than
        use process as a crutch. Not everyone succeeds in our culture, but those who
        do thrive.\\n\\n\\n\\n\\nCOLLABORATION IS NATURAL & COMMUNICATION IS DELIBERATE\\n\\nOur
        engineering team consists of lifelong learners who are talented but also humble
        and kind (meet them here https://www.ashbyhq.com/team!). These attributes
        create an environment where collaboration happens naturally. We combine this
        with research, prototyping, and written proposals to see around corners and
        get feedback from the team across time zones. Focus time is something that
        we hold sacred, and, with thoughtful and deliberate communication, engineers
        are in <2h meetings per week (Abhik wrote about it here https://www.ashbyhq.com/blog/company/thoughtful-communication).\\n\\nTo
        drive it home, here's a recent calendar of an engineer who has been with us
        for over 4 years. ~34 hours of focus time, 2.5h of interviews, and 3.5 hours
        of meetings:\\n\\n\\n\\n[https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/d4679311-9dba-4031-bf5e-19ce78597ab1/calendar.png]\\n\\n\\n\\nWe
        also meet in person at least twice a year, once as a department and once as
        a company. You also have a small budget to meet up with folks in your city/region.\\n\\n\\n\\n\\nINCREASE
        LEVERAGE, NOT TEAM SIZE\\n\\nWe built Ashby with the quality, breadth, and
        depth that many customers would expect from much larger teams over larger
        time scales. We\u2019ve done this through investment in:\\n\\n - Great developer
        tooling. Our CI/CD takes ~10m, and we deploy at least 15x a day. A debugger
        that works out of the box. Everyone on the team has contributed to our developer
        experience \U0001F4AA\U0001F3FE.\\n\\n - Building blocks to create powerful
        and customizable products fast. At the core of Ashby is a set of common components
        (analytics modeling and query language, policy engine, workflow engine, design
        system) that we constantly improve. Each improvement to a common component
        cascades throughout our app (short video below).\\n\\n - AI-powered tooling.
        We think of AI as a way to automate the mundane parts of building and maintaining
        high-quality software. We use a combination of third-party and internally
        built tools that, for instance, auto-triage customer issues, suggest fixes,
        prototype ideas, generate production-ready code, and conduct code reviews.
        Engineers have an unlimited token budget (but are not measured on it).\\n\\nHere\u2019s
        an impromptu quote from Arjun in our company Slack of what it\u2019s like
        to build a feature at Ashby:\\n\\n\\n\\n[https://app.ashbyhq.com/api/images/user-content/4ea5f68e-c33e-4ac9-831a-e732bee4a303/8d94727a-46d8-42a2-9627-ddcd7f822f95/arjun.png]\\n\\n\\n\\nAnd
        a demo of one of these building blocks:\\n\\n\\n\\n\\nPUT EFFORT INTO DIVERSITY\\n\\nDiverse
        teams drive innovation and better outcomes. Having seen my mother and partner
        build their careers as minority women in non-diverse fields, I want to make
        sure Ashby creates opportunities for the next generation of engineers from
        underrepresented groups.\\n\\nToday, 25% of engineers and 50% of our engineering
        leaders at Ashby are from underrepresented groups. We are taking conscious
        steps to improve, like sourcing diverse candidates, providing generous paid
        family leave, no leetcode interviews, and more.\\n\\n\\n\\n\\nINTERVIEW PROCESS\\n\\nAt
        Ashby, our team and interview process want to help you show your best self.
        We\u2019ll dive into past projects and simulate working together via pair
        programming, writing product and tech specs collaboratively, and talking through
        decisions. There are no leetcode or whiteboard exercises.\\n\\nOur interview
        process is three rounds:\\n\\n 1. Introduction call with Hiring Manager (15
        to 30m, live)\\n\\n 2. A technical screen where we pair in our actual codebase
        (1h, live)\\n\\n 3. Three non-coding interviews that focus on technical design,
        debugging incidents, and infrastructure (3h 15m, live can be split across
        multiple days)\\n\\nDepending on our leadership team\u2019s bandwidth, we
        may start with an additional 30m screen with a recruiter.\\n\\nYour hiring
        manager will be your main point of contact and prep you for interviews. Each
        round will have written guidance so you know what to expect (you\u2019ll need
        minimal preparation). You\u2019ll meet 4 to 6 people in engineering (with
        5-15 minutes in each interview to ask them questions). If we don\u2019t give
        an offer, we\u2019ll provide feedback!\\n\\n\\n\\n\\nYOUR FIRST THREE MONTHS
        AT ASHBY\\n\\nWe want an exceptional onboarding experience for every new hire.
        At Ashby, your dev environment is set up with a single script, you push your
        first product change on day one, and you spend the rest of your time shipping
        product changes that give you a tour of our codebase and best practices. The
        product changes increase in scope and ambiguity from simple copy changes to
        the delivery of a prominent, impactful feature. Your manager will do a 30,
        60, and 90-day review to give feedback and calibrate on how we work together.\\n\\nIt\u2019s
        a team effort to get you successfully onboarded; you\u2019ll have a peer paired
        with you to answer questions, pair program, and check in often to see if you
        need help. The rest of the team will run training sessions on our culture,
        product, engineering process, and technical architecture.\\n\\n\\n\\n\\nBENEFITS\\n\\n
        - Competitive salary and equity.\\n\\n - 10-year exercise window for stock
        options. You shouldn\u2019t feel pressure to purchase stock options if you
        leave Ashby \u2014do it when you feel financially comfortable.\\n\\n - Unlimited
        PTO, and we will encourage you to take it.\\n\\n - A minimum of 12 weeks of
        fully paid parental leave, covered by Ashby. For folks outside the US, it
        may be longer to be in line with regional requirements.\\n\\n - Generous equipment,
        software, and office furniture budget. Get what you need to be happy and productive!\\n\\n
        - $100/month education budget with more expensive items (like conferences)
        covered with manager approval.\\n\\n - If you\u2019re in the US, we offer
        top-tier health insurance for you and your dependents, with 100% of premiums
        covered by Ashby. In other countries, we provide high-quality supplemental
        health insurance for you and your dependents, also fully covered by us.\\n\\nAshby\u2019s
        success hinges on hiring great people and creating an environment where we
        can be happy, feel challenged, and do our best work. We\u2019re being deliberate
        about building that environment from the ground up. I hope that excites you
        enough to apply.\\n\\nAshby provides equal employment opportunities (EEO)
        to all employees and applicants for employment without regard to race, color,
        religion, sex, national origin, age, disability, genetics, sexual orientation,
        gender identity, or gender expression. We are committed to a diverse and inclusive
        workforce and welcome people from all backgrounds, experiences, perspectives,
        and abilities.\\n\\nAshby is committed to a fair and transparent hiring process.
        We confirm that this advertisement is for an active, existing vacancy within
        our organization. Please be advised that we may use artificial intelligence-driven
        tools to assist our recruitment team in screening, assessing, and selecting
        candidates for this position.\",\"compensation\":{\"compensationTierSummary\":\"\u20AC141K
