{% extends "base.html" %}
{% block title %}Manual Entry{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Manual job entry</h1>
</div>
<div class="card">
  {% if success %}
  <p class="success">&#10003; Job saved successfully.</p>
  {% endif %}
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/manual">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="url">Job posting URL *</label>
    <input type="url" id="url" name="url" required placeholder="https://...">
    <label for="freetext">Notes (optional)</label>
    <textarea id="freetext" name="freetext" rows="4" placeholder="Anything you want to add about this posting..."></textarea>
    <button type="submit" class="btn-primary">Extract &amp; save</button>
  </form>
</div>
{% endblock %}
