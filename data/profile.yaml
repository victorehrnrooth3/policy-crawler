geography:
  primary: [london]
  secondary: [nyc, bay_area, boston, dc]
  acceptable: [paris, brussels, geneva, remote, global]
  hard_no: []
  timeline_note: "London now (wife relocating there). US transition expected ~12 months out. Chicago acceptable for PhD/research roles despite not being in secondary list."

seniority_fit: "Early-career to mid-level. 0–4 years experience typical. Senior/exec roles are surface-only."

must_haves:
  - "Topic match: at least one heavy topic or strong dual-medium overlap"
  - "Quantitative/analytical character: policy research, modelling, data work, or rigorous strategy — not pure comms/pure ops"
  - "Geography within primary or secondary (acceptable with strong topic match)"
  - "Seniority realistic for Oxford MPhil + ~1-2 years McKinsey (generalist early-career)"

dealbreakers:
  - "US role with explicit 'no visa sponsorship' language (until work authorization status changes)"
  - "Pure IB / sell-side / trading / portfolio management roles"
  - "Marketing / sales / pure ops / pure comms"
  - "Lobbying-without-research (public affairs that is really lobbyist/comms)"
  - "Location outside acceptable geography set without a high-priority topic-match override"

soft_negatives:
  - "Slow-bureaucratic-only environment (certain IGOs, some legacy think tanks)"
  - "Requires 5+ years of relevant experience (still surface; may be useful later)"
  - "Topic adjacent but not core (e.g., development economics without infra/energy/trade angle)"
  - "Role looks like 'business management' in a think tank wrapper"

