# Preference profile — v1 seed bootstrapped from docs/02-personal-context.md.
# This is the runtime artifact used by the ranker.
# Updated by the weekly self-update (Step 10); changes land via a reviewed PR.
version: 1

identity:
  summary: |
    Oxford MPhil Economics (Distinction). UPenn BA Mathematical Economics (Summa Cum
    Laude, A/A+ across math/econ courses). Currently McKinsey, on an MGI project.
    Finnish military background (sodanjohtaja — company commander, 150 troops).
    Fluent English & Finnish; good French. Finnish (EU) citizenship; UK/EU right to
    work; US requires sponsorship.
  cv_url: "https://victorehrnrooth.com"

career_thesis: |
  Re-launching toward ambitious, quantitatively serious policy work on energy,
  defense, geopolitics, and tech/AI policy. The "MGI feel" — McKinsey-pace,
  intellectually serious, policy-flavored — is the reference point for what to
  optimize toward. Allergic to slow-bureaucratic-only roles, pure finance, and
  management consulting outside the policy/energy/defense practices.

  Target paths (all positive territory — do not penalize):
  1. Top US PhD (econ or policy with real math) → academic-quality methods → OECD/
     IEA/Fed/top think tank/faculty-policy hybrid.
  2. Geopolitical-risk firm or asset-manager policy institute (Eurasia Group, Rhodium,
     BlackRock BII, KKR Global Institute).
  3. Frontier-tech / defense / energy corporate policy (Anthropic, OpenAI, Anduril,
     NextEra, CFS).
  4. Think tank or predoc (RFF, Brookings, CGEP, CSET, Belfer, IISS, RUSI, TBI,
     Bruegel, IFRI).
  5. IGO / YPP (OECD, WB, IMF, IEA, NATO).

